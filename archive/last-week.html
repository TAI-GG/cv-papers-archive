99", "date": "2026-07-09T00:04:54.000Z", "summary": "Meta Superintelligence Labs推出最强图像生成模型Muse Image，并预览同基座模型Muse Video。Muse Image能忠实遵循指令、精准编辑、多参考图合成，并调用Instagram社交上下文生成内容；具备agentic tool use能力，与Muse Spark深度整合。Muse Video基于相同预训练底座，实现高视觉保真度与原生音频支持。目前已在M...", "type": "model", "relTime": "1周前"}, {"id": 76, "title": "SAM-MT：实时交互式多目标视频分割", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08688", "date": "2026-07-09T00:00:00.000Z", "summary": "现有视频目标分割（VOS）方法处理多目标时，通常为每个目标复制单目标流程，导致帧率下降且延迟随目标数量增加。基于SAM2，SAM-MT将其改造为交互式框架，实现实时多目标分割。它使用显式查询表示不同个体，配合共享全局上下文，通过解耦掩码注意力保持身份独立、避免跨目标干扰，并采用稀疏记忆实现稳定时序演化，以及处理遮挡和重叠的策略。SAM-MT将延迟与目标数量解耦，在10个目标下达到与单目标基线...", "type": "paper", "relTime": "1周前"}, {"id": 77, "title": "Canvas360：几何感知预训练增强上下文全景生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08765", "date": "2026-07-09T00:00:00.000Z", "summary": "Canvas360 提出两阶段框架，结合几何感知预训练与下游任务微调，用于上下文全景生成。团队构建 Canvas360Dataset，包含 100 万对高质量全景样本，覆盖风格迁移、修复、扩图与编辑任务。模型通过并行深度生成、速度循环填充与相似性损失正则化，学习几何感知表征、捕捉物体畸变细节。Canvas360 通过 token 级拼接实现统一框架，支持多种下游任务。实验表明，Canvas3...", "type": "paper", "relTime": "1周前"}, {"id": 78, "title": "LongE2V：利用视频扩散模型实现长时域事件相机视频重建、预测与帧插值", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08770", "date": "2026-07-09T00:00:00.000Z", "summary": "LongE2V 提出利用预训练视频扩散先验，联合处理基于稀疏事件流的视频重建、预测与帧插值三项任务。通过微调基础视频模型，该方法实现了高数据效率和优越感知质量。引入自回归展开与自适应上下文切换机制，缓解极长序列中的时间漂移；提出带交叉残差校正的重编码对齐，确保帧插值时的精确双向一致性；事件体素密度增强则提升了跨不同传感器分辨率的鲁棒性。在真实世界基准测试中，LongE2V 在三项任务上均超越...", "type": "paper", "relTime": "1周前"}, {"id": 79, "title": "OpenCoF：通过视频生成学习推理", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08763", "date": "2026-07-09T00:00:00.000Z", "summary": "视频生成模型提供了一种不同于链式思维（CoT）的推理路径--链式帧（CoF）推理，即通过时间上连续的帧展开推理过程。然而现有视频生成器缺乏针对CoF推理的多样化监督与专用设计。为此，OpenCoF框架被提出，包含覆盖11个任务族的推理视频数据集OpenCoF-17K，以及基于Wan2.2-I2V-A14B微调的视频模型Wan-CoF。在四个视频推理基准上，Wan-CoF相比基线取得显著提升。...", "type": "paper", "relTime": "1周前"}, {"id": 80, "title": "ARDY：面向交互式人体运动生成的混合表示自回归扩散模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08741", "date": "2026-07-09T00:00:00.000Z", "summary": "ARDY提出流式生成框架，通过在线文本提示和灵活的运动学约束实现高保真运动生成。其混合表示结合显式根特征与隐式身体嵌入，平衡轨迹控制与生成学习效率。两阶段自回归Transformer去噪器支持可变历史上下文和长程运动学约束条件。在HumanML3D和Bones Rigplay数据集上的评估验证了ARDY的高运动质量和约束遵循能力。交互式演示支持动态文本控制、关键帧姿态约束、路径跟随及鼠标键盘...", "type": "paper", "relTime": "1周前"}, {"id": 81, "title": "OPSD-V：少步自回归视频扩散模型的后训练在线策略自蒸馏范式", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08766", "date": "2026-07-09T00:00:00.000Z", "summary": "研究者提出 OPSD-V，一种用于少步自回归（AR）视频扩散模型后训练的在线策略自蒸馏范式。该方法引入真实长视频数据作为时间上下文，提供密集轨迹级监督：学生模型遵循推理时展开路径，基于自身生成的 KV 缓存逐块生成；教师模型在同一去噪状态下评估，但使用更干净的 AR 一致时间缓存。应用于 Self-Forcing 和 LongLive 等模型后，视觉质量、运动动态和 VBenchLong 分...", "type": "paper", "relTime": "1周前"}, {"id": 82, "title": "TGPO：通过可验证奖励强化学习激励第一人称视频时序感知", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/incentivizing-temporal-awareness-egocentric", "date": "2026-07-09T00:00:00.000Z", "summary": "多模态大语言模型（MLLM）在第一人称视频理解中缺乏时序感知，常依赖空间捷径。为此，研究者提出 Temporal Global Policy Optimization（TGPO），一种基于可验证奖励的强化学习算法。TGPO 通过对比模型在时序有序与打乱帧上的输出，生成全局归一化奖励信号，明确奖励时序连贯推理。TGPO 可集成 GRPO 和 GSPO，支持冷启动 RL 训练，抑制 MLLM 的...", "type": "paper", "relTime": "1周前"}, {"id": 83, "title": "ReChannel：从 RGB 生成到密集场读出--基于文生图模型的像素空间密集预测", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06553", "date": "2026-07-09T00:00:00.000Z", "summary": "现有方法将深度、法线等标注编码为 RGB 图像再解码，继承了不必要的生成式输出接口。ReChannel 提出新思路：预训练 DiT 已将 RGB 输入组织为 patch-to-token-to-patch 网格，每个 token 索引固定输出 patch，其通道可直接承载任务原生数值。ReChannel 保留 VAE 编码器，移除目标侧解码器，用任务 LoRA 适配冻结的 DiT，通过共享 ...", "type": "paper", "relTime": "1周前"}, {"id": 84, "title": "SearchGen：揭示视觉生成模型的知识边界与搜索增强框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05382", "date": "2026-07-09T00:00:00.000Z", "summary": "研究团队构建了含20，839条提示词的SearchGen-20K数据集与基准，发现前沿开源视觉生成模型得分仅21-28分（满分100），比现有基准骤降40分。简单接入搜索工具会引入噪声，而\"先教学后搜索\"的协同训练框架可发现生成器动态知识边界，实现单调改进。", "type": "paper", "relTime": "1周前"}, {"id": 85, "title": "Grok 4.5 加入港口小镇3D模拟测试画廊", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2074995698479542291", "date": "2026-07-08T23:15:00.000Z", "summary": "Ethan Mollick 将 Grok 4.5 加入其「港口小镇可玩画廊」，该画廊汇集了 20 个模型的测试结果。测试提示词要求模型「生成一个程序化生成的 3D 模拟，展示港口小镇从公元前 3000 年到公元 3000 年的演变，需美观且允许用户控制」。Grok 4.5 的生成效果可通过链接对比查看。", "type": "tip", "relTime": "1周前"}, {"id": 86, "title": "Robbyant 发布 LingBot-Vision：1B 参数视觉基础模型，深度估计超越 7B 模型", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074982612746322275", "date": "2026-07-08T22:23:00.000Z", "summary": "Robbyant 推出 LingBot-Vision，1B 参数的视觉基础模型，在 NYU-Depth v2 深度估计上取得 0.296 RMSE，超越 7B 参数的 DINOv3（0.309），参数量小 7 倍，开放权重。模型通过自学习边界视觉 token 进行训练，无需人类标签、外部边缘检测器或预训练骨干。边界 token 作为密集视觉特征的训练目标，使模型在 patch 层面学习场景结...", "type": "model", "relTime": "1周前"}, {"id": 87, "title": "Seedream 5.0 Pro 登陆 Runway，支持14种语言", "source": "X：Runway (@runwayml)", "sourceUrl": "https://x.com/runwayml/status/2074982268175630814", "date": "2026-07-08T22:21:38.000Z", "summary": "Seedream 5.0 Pro 现已登陆 Runway。可通过提示词或参考图生成高细节图像，图像内文字清晰可读，支持多达14种语言。立即点击下方链接尝试。", "type": "paper", "relTime": "1周前"}, {"id": 88, "title": "Google 深度伪造检测系统 SynthID 用于揭穿 McConnell 恶搞图片", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/08/googles-deepfake-detector-system-used-to-debunk-mcconnell-hoax-pic", "date": "2026-07-08T20:37:03.000Z", "summary": "Google 的 SynthID 系统成功揭穿一张高曝光度的 AI 生成恶搞图片。该图显示肯塔基州参议员 Mitch McConnell 在医院病床上插满管子，在 Reddit 和 X 广泛流传。事实核查网站 Snopes 检测到图中嵌入的 SynthID 水印，确认其为伪造。SynthID 于 2025 年 Google I/O 发布，是一种不可见水印，跨平台截屏也能保留。其局限性在于仅参...", "type": "industry", "relTime": "1周前"}, {"id": 89, "title": "Grok 4.5 生成 twigl 着色器程序化城市景观", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2074950849894236312", "date": "2026-07-08T20:16:47.000Z", "summary": "Ethan Mollick 在 Grok 4.5 上使用系列提示词生成 twigl 着色器，描绘一个无限的新哥特式城市部分淹没在暴风雨海洋中。初始代码技术正确但完全超出 twigl 浏览器显示能力。引用提示词要求\"创建一个在 twigl-dot-app 能运行的视觉有趣着色器，像无限新哥特式塔楼城市部分淹没在暴风雨海洋中，有大浪。让它更好\"--所有内容均为程序化生成。", "type": "tip", "relTime": "1周前"}, {"id": 90, "title": "Lingbot-World-2 实时世界模型通过 Reactor 平台以 API 发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074946474732130802", "date": "2026-07-08T19:59:24.000Z", "summary": "Lingbot-World-2 是一款新型实时世界模型，今日通过 Reactor 平台以 API 形式发布。与传统视频模型不同，它在用户移动摄像头时持续渲染生成交互式世界，支持 WASD 移动、箭头键视角、提示词更改和原生相机姿态控制。Reactor 作为基础设施层，提供 SDK，让开发者构建随用户行为实时变化的世界，适用于游戏、创意工具、仿真、机器人等领域。该模型接受参考图像和文本提示，输...", "type": "model", "relTime": "1周前"}, {"id": 91, "title": "诉讼：男子使用Grok制作7000张继女色情图像后自杀", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/tech-policy/2026/07/lawsuit-grok-user-made-7k-child-sex-images-xai-only-reported-one-gang-rape-prompt", "date": "2026-07-08T19:56:37.000Z", "summary": "一男子使用Grok生成7000张继女儿童性虐待材料（CSAM）后自杀。更多年轻女孩起诉X平台，指控其涉及Grok生成CSAM，并包庇儿童性犯罪者。", "type": "industry", "relTime": "1周前"}, {"id": 92, "title": "LingBot-Video 发布：MoE 具身视频模型", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2074932729376870826", "date": "2026-07-08T19:04:47.000Z", "summary": "LingBot-Video 已在 Hugging Face 发布  基于 MoE 的视频基础模型，专为具身智能构建  300 亿参数，推理时仅 30 亿活跃  在大规模互联网视频预训练基础上，额外增加了 7 万小时的具身数据", "type": "model", "relTime": "1周前"}, {"id": 93, "title": "LingBot-Video开源：首个MoE视频基模型，30B仅3B激活", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2074932709516853456", "date": "2026-07-08T19:04:42.000Z", "summary": "LingBot-Video今日开源，为业界首个基于MoE的视频基础模型，专为具身智能设计。模型总参数量30B，推理时仅3B激活（稀疏MoE）。在大量互联网视频预训练基础上，额外注入70K小时具身数据。在RBench上超越Wan2.6、Seedance 1.5 Pro和Cosmos3 Super。主推文指出，该模型优化物理推理而非单纯视频质量，MoE在长上下文视频推理中显著降低计算成本。", "type": "model", "relTime": "1周前"}, {"id": 94, "title": "Pinokio让GPT-5.6用本地模型替代付费API", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2074930119173460007", "date": "2026-07-08T18:54:25.000Z", "summary": "我常使用 Pinokio 下载和使用本地开源 AI 工具/模型，它有一个很棒的特性：能将这些工具/模型无缝暴露给 Code 和 Codex。  GPT-5.6 实际上曾找到我的本地视频模型和图像模型，并将它们用作付费 API 的低成本替代方案。", "type": "model", "relTime": "1周前"}, {"id": 95, "title": "Meta AI眼镜更新：摄像头在LED被篡改时禁用，但隐私担忧仍在", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/08/meta-wants-its-ai-glasses-to-seem-less-creepy-its-ai-strategy-says-otherwise", "date": "2026-07-08T17:11:18.000Z", "summary": "Meta本周为AI眼镜推出安全更新：若LED指示灯被篡改，摄像头自动禁用。然而同日，Meta AI新增功能，可利用用户公开的Instagram照片生成图像（除非选择退出），并访问相机胶卷中从未分享的图片。公司还测试可连续收集音频并每隔数秒拍照的原型机。Meta面临多起隐私诉讼和调查，包括因外包员工审查不当内容而取消合同。消费者仍质疑Meta通过AI收集个人数据的方式。", "type": "tip", "relTime": "1周前"}, {"id": 96, "title": "Krea AI发布Seedream 5.0 Pro多模态模型", "source": "X：Krea AI (@krea_ai)", "sourceUrl": "https://x.com/krea_ai/status/2074891481832456638", "date": "2026-07-08T16:20:53.000Z", "summary": "推出 Seedream 5.0 Pro。 这款全新多模态模型带来高级推理、精确图像编辑，并支持最多10张图像参考。 立即在 Krea 上体验。", "type": "model", "relTime": "1周前"}, {"id": 97, "title": "Anthropic 研究：大语言模型控制多种机器人形态", "source": "Anthropic：Research（发表成果 · 网页）", "sourceUrl": "https://www.anthropic.com/research/claude-plays-robotics", "date": "2026-07-08T16:00:00.000Z", "summary": "Anthropic 让多个大语言模型控制多种机器人形态，包括经典控制玩具、模拟四足/人形机器人、机械臂及真实 Unitree Go2 四足机器人。模型通过不同抽象层级的接口控制机器人：从直接驱动电机扭矩，到编写控制器代码，再到用强化学习训练控制器，以及向预训练策略提供高层指令。在经典控制、运动与导航、操作三类任务中，模型表现高度依赖控制接口：直接驱动关节时大多失败，但监督预训练策略或使用简单...", "type": "paper", "relTime": "1周前"}, {"id": 98, "title": "Seedream 5.0 Pro 登陆字节云，图像编辑功能升级", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2074878971473469835", "date": "2026-07-08T15:31:10.000Z", "summary": "Seedream 5.0 Pro 现已通过字节云平台上线，主打 AI 图像生成新能力：精准编辑、可视化复杂信息、逼真图像与肖像渲染、多语言创作。该版本融合了\"香蕉\"式的替换主体与编辑主题功能，以及类似 Image-GPT-2 的分层编辑能力，将二者结合为统一的图像编辑体验。", "type": "paper", "relTime": "1周前"}, {"id": 99, "title": "字节跳动Seedream 5.0 Pro图像生成模型通过BytePlus API开放测试", "source": "X：Testing Catalog (@testingcatalog)", "sourceUrl": "https://x.com/testingcatalog/status/2074871631407628360", "date": "2026-07-08T15:02:00.000Z", "summary": "字节跳动Seedream 5.0 Pro多模态图像生成模型现已通过BytePlus API开放测试。该模型支持文本到图像、单图像到图像及多参考图像到图像三种生成模式。相比前代，在图像-文本对齐、结构连贯性、文本渲染和视觉美学等基础能力上全面提升，具备高级推理、高效内容创作和专业生产能力。新增功能包括：复杂信息可视化、交互式精确编辑、逼真图像与肖像纹理、原生多语言输入和生成。", "type": "model", "relTime": "1周前"}, {"id": 100, "title": "Seedream 5.0 图像模型上线实测", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2074862226905948549", "date": "2026-07-08T14:24:38.000Z", "summary": "归藏测试了刚上线的 Seedream 5.0 图像模型，生成效果相比之前版本进步明显。成功生成《黑神话：水浒传》游戏截图、茶叶科普图、基于参考图的 Web UI 设计稿以及《凡人修仙传：人界篇》剧情介绍图。文字细节方面，文字较多时仍偏糊，与 GPT-4o 问题类似。测试采用 2K 分辨率，分辨率表现略优于 GPT-4o，但文字细节水平相当。", "type": "model", "relTime": "1周前"}, {"id": 101, "title": "Seedream 5.0 Pro 发布 支持图层分离与精准编辑", "source": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2074855970359181521", "date": "2026-07-08T13:59:46.000Z", "summary": "Seedream 5.0 Pro 发布，官方展示效果图显示其与 GPT Image 2 接近。该版本支持高密度信息表达、交互式精准编辑、图层分离（智能拆分为独立图层）、影像与人像质感真实、原生多语种输入与生成。", "type": "paper", "relTime": "1周前"}, {"id": 102, "title": "字节跳动发布 Seedream 5.0 Pro 多模态图像生成模型", "source": "X：Testing Catalog (@testingcatalog)", "sourceUrl": "https://x.com/testingcatalog/status/2074854838320378327", "date": "2026-07-08T13:55:17.000Z", "summary": "Seedream 5.0 Pro 是字节跳动正式发布的多模态图像生成模型，具备高级推理、高效内容创作和专业制作能力。相比前代在图文对齐、结构连贯性、文本渲染和视觉美学上全面提升。支持复杂信息可视化、交互式精确编辑、逼真图像与肖像纹理、原生多语言输入生成。该模型被业界视为首个对标 GPT-Image 2 的竞品。", "type": "model", "relTime": "1周前"}, {"id": 103, "title": "字节发布多模态图像创作模型 Seedream 5.0 Pro：复杂信息可视化、交互式精准编辑", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/974/249.htm", "date": "2026-07-08T13:33:51.000Z", "summary": "字节跳动今日发布多模态图像创作模型 Seedream 5.0 Pro，在图文匹配、结构合理性、文字渲染与画面美感上全面提升。新增四大能力：复杂信息可视化（将数据、概念与密集文字转化为专业排版）、交互式精准编辑（点选、圈选、草图渲染、色彩与材质替换、图层分离、多图融合等）、真实影像与人像质感（兼顾CG与摄影质感）、原生多语种输入与生成（支持十余种语言）。目前该模型已上线火山方舟体验中心，并将在...", "type": "model", "relTime": "1周前"}, {"id": 104, "title": "Seedream 5.0 Pro API上线，让图像创作开启\"专业表达\"阶段", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/s3vYTUZHZYNpVGSK-W9neA", "date": "2026-07-08T13:30:43.000Z", "summary": "火山引擎上线豆包图像创作模型 Seedream 5.0 Pro 的 API 服务。该模型在交互式精准编辑、复杂信息可视化、影像与人像质感真实、原生多语种输入与生成等方面实现能力突破：支持点选、圈选、草图渲染、色值编辑、图层分离等像素级编辑；可稳定输出高密度信息图；强化光影、材质和皮肤肌理还原；原生支持中、英、西、葡、阿、法、德、俄、日、韩、泰等十余种语言。广泛适配电商营销、广告创意、深度教育...", "type": "model", "relTime": "1周前"}, {"id": 105, "title": "蚂蚁集团Robbyant开源机器人视觉基础模型LingBot-Vision", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2074830382353244434", "date": "2026-07-08T12:18:06.000Z", "summary": "蚂蚁集团具身AI公司Robbyant发布LingBot-Vision，一个机器人视觉基础模型。该模型在161M张图像上训练（从2B原始网络图像筛选），无需人工标注、边缘检测或深度传感器，直接从原始像素学习物体边缘。训练数据约为DINOv3的十分之一，训练量不到其三倍。1B参数版本在NYU-Depth深度估计任务上超越7B模型。模型驱动LingBot-Depth 2.0，可处理玻璃和镜面，室内...", "type": "paper", "relTime": "1周前"}, {"id": 106, "title": "ClickUp Brain AI 将支持视频生成", "source": "X：Testing Catalog (@testingcatalog)", "sourceUrl": "https://x.com/testingcatalog/status/2074821741029847238", "date": "2026-07-08T11:43:46.000Z", "summary": "ClickUp 正在为 Brain AI 开发视频生成功能！  > 基于项目上下文，Brain 将能够生成视频。 > 视频反映真实的工作空间数据，包括实际项目、任务和指标的名称。 > 输出为可播放文件，带有下载选项。 借助视频生成，Brain 可以将 Q3 发布计划或 Sprint 更新转变为短视频概览！  工作空间到视频 👀", "type": "paper", "relTime": "1周前"}, {"id": 107, "title": "Meta Muse Image 上线：AI 智能体式图像生成，但 Instagram 照片功能引隐私争议", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/muse-image-is-technically-impressive-but-metas-use-of-instagram-photos-raises-questions", "date": "2026-07-08T11:16:37.000Z", "summary": "Meta 旗下 Superintelligence Labs 发布首个图像模型 Muse Image，以 AI 智能体方式运作，通过调用代码生成、网页搜索等外部工具自动修正输出，并在强化学习中出现自我优化行为。在 Image Arena 上，Muse Image 文本到图像及编辑评分位列第二，仅次于 OpenAI 的 GPT Image 2；同期预览的 Muse Video 排名第三。该模型...", "type": "model", "relTime": "1周前"}, {"id": 108, "title": "Codex连接Figma MCP自动生成录视频板书", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2074800241178808456", "date": "2026-07-08T10:18:20.000Z", "summary": "用户 @op7418 透露，过去录视频需要自己在 Figma Jam 中手动搭建大纲，现在借助 Codex 连接 Figma MCP，系统基于其宣传文章自动生成板书，自动精简内容并嵌入案例图片，稍作调整即可用于录制。此外，他还开源了一个文章配图 Skill，目前适配 GPT-Image-2.0 模型，支持将文档或文案生成带标签的 3D 材质配图。", "type": "tip", "relTime": "1周前"}, {"id": 109, "title": "WAIC 京东论坛将于 7 月 18 日探讨 AI 进入物理世界", "source": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/J9kmFcZ634SdyehSVP4nDg", "date": "2026-07-08T10:10:53.000Z", "summary": "7 月 18 日，WAIC 现场京东将举办论坛，讨论 AI 从\"理解与生成\"走向\"感知、决策与行动\"的下一阶段。议题涵盖大模型、具身智能、真实场景数据与智能终端，聚焦 AI 进入仓库、道路、终端、家庭等产业与生活场景，探讨如何改变产业与日常生活。", "type": "industry", "relTime": "1周前"}, {"id": 110, "title": "华为Pura X Max获HarmonyOS 6.1.0.130升级，图库新增一句话图片处理能力", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/974/149.htm", "date": "2026-07-08T09:09:57.000Z", "summary": "华为Pura X Max横向阔折叠手机获推HarmonyOS 6.1.0.130 SP16版本升级，系统包大小约4.63GB。新版本新增前置相机自动添加水印功能；图库支持一句话图片处理（涵盖图片编辑、一键成片、图片清理），AI沾色可为逆光人物图生成剪影效果并增强光影对比。智慧多窗新增分屏窗口替换功能，并同步更新系统扩展特性。", "type": "paper", "relTime": "1周前"}, {"id": 111, "title": "SharpaWave灵巧手每秒超4次循环", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074763667321622926", "date": "2026-07-08T07:53:00.000Z", "summary": "灵巧机器人手的一个工程挑战是平衡力量和速度。 这里，SharpaWave以超过4次/秒的速度执行快速手部循环。动态触觉阵列使用视觉触觉传感：指尖集成了摄像头和1000多个触觉像素。", "type": "industry", "relTime": "1周前"}, {"id": 112, "title": "开源一个非常漂亮的文章配图 Skill", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2074758348264833131", "date": "2026-07-08T07:31:52.000Z", "summary": "歸藏 （@op7418） 开源了一款文章配图 Skill，目前仅适配 GPT-Image-2.0 模型。该 Skill 可将用户输入的文档或文案，自动生成干净漂亮、带标签的 3D 材质配图。其灵感来源于作者昨天为 Claude 社交媒体卡片生成配图时意外获得的视觉效果，因反响热烈而被整理成独立 Skill 并开源。", "type": "tip", "relTime": "1周前"}, {"id": 113, "title": "特斯拉在新奥尔良启动Robotaxi测试，测试车队已上路", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/974/051.htm", "date": "2026-07-08T07:10:39.000Z", "summary": "特斯拉已在新奥尔良启动Robotaxi测试，车队为挂得克萨斯州厂商牌照的Model Y，搭载一体式后置摄像头清洗装置和四组独立摄像 }, {"id": 122, "title": "LaMem-VLA：面向机器人操作的双潜记忆视觉-语言-动作模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.07608", "date": "2026-07-08T00:00:00.000Z", "summary": "针对主流VLA模型因马尔可夫假设难以处理长程时序任务的问题，LaMem-VLA将历史经验重建为潜记忆token，直接与VLA推理交织。其核心包含四个组件：策展器组织历史经验为短期和长期记忆库；搜索器利用多模态认知检索相关证据；压缩器将证据压缩为紧凑的潜记忆token；编织器将这些token与当前观测和指令注入连续嵌入序列。记忆在统一潜空间内表示、检索和消费，直接参与VLA推理并指导动作生成。...", "type": "paper", "relTime": "1周前"}, {"id": 123, "title": "MedPMC：面向基础模型的高保真医学多模态数据规模化框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.07673", "date": "2026-07-08T00:00:00.000Z", "summary": "MedPMC是一个自动化、可持续更新的框架，将PMC开放获取文献转化为高保真医学多模态基础设施。基于610万篇PMC文章，筛选出1100万对医学图像-文本数据。人工审核显示95.3%的图像具有医学相关性，远超此前数据集的19.7%。在覆盖11个专科的26项基准测试中，基于MedPMC训练的CLIP风格模型平均零样本AUC比最强基线提升7.1个百分点，且使用的图像-文本对不足其一半。作为多模态...", "type": "paper", "relTime": "1周前"}, {"id": 124, "title": "Flow-ERD：面向多样化交通仿真的智能体类型感知流匹配与熵正则化蒸馏", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06957", "date": "2026-07-08T00:00:00.000Z", "summary": "现有自动驾驶交通仿真基准主要奖励真实性，导致多样性未被充分探索。Flow-ERD 是一个多智能体仿真器，联合优化真实性与多样性。其主干 Agent-Type Aware Flow Matching （AFM） 将流匹配的多模态表达能力与类型特定的运动学执行相结合，在保持各智能体类型运动一致性的同时保留细粒度多样性。第二阶段 Entropy-Regularized Distillation （...", "type": "paper", "relTime": "1周前"}, {"id": 125, "title": "Meta 发布自研图像生成模型 Muse Image，免费登陆 Instagram 与 WhatsApp", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/973/820.htm", "date": "2026-07-07T23:17:26.000Z", "summary": "7 月 7 日，Meta 推出自研图像生成模型 Muse Image，免费通过 Meta AI 应用及 Instagram、WhatsApp 提供。支持对话生成、擦除背景、生成二维码、渲染清晰文字；内置预设可修复老照片、将自拍转为黏土动画或游戏角色，并可整合 Facebook Marketplace 重新设计房间。与 Muse Spark 配合多步骤规划，支持 @提及 Instagram 公...", "type": "model", "relTime": "1周前"}, {"id": 126, "title": "Seedance 2.0 Mini 现已登陆 Luma", "source": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2074626433561821514", "date": "2026-07-07T22:47:41.000Z", "summary": "Seedance 2.0 Mini 现已在 Luma 中可用。  生 语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05722", "date": "2026-07-07T00:00:00.000Z", "summary": "Nemotron-Labs-Diffusion 是一种三模式语言模型，通过联合自回归（AR）和扩散损失训练，在单一架构中统一了 AR、扩散和自我推测解码。研究显示 AR 与扩散目标互补：扩散增强前瞻规划，AR 提供从左至右的语言先验。自我推测模式下，扩散充当草稿模型、AR 负责验证，其接受率和实际设备效率均优于多 token 预测（MTP）。在最优化采样器下，单次前向传播产出 token 数...", "type": "model", "relTime": "1周前"}, {"id": 164, "title": "AlayaWorld：长程可玩视频世界生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06291", "date": "2026-07-07T00:00:00.000Z", "summary": "AlayaWorld 是一个全栈开源框架，用于构建交互式生成世界。该框架支持开放式实时交互，用户可自由导航并执行战斗、施法、召唤怪物等多种动作。AlayaWorld 将数据准备、模型架构、训练、推理加速和部署统一在模块化可扩展的架构中，并发布了可复现流程、参考实现、评估工具和完整文档，为生成世界模型的未来研究与实时应用奠定基础。", "type": "model", "relTime": "1周前"}, {"id": 165, "title": "在LLM中选择最佳图像输入细节级别", "source": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/image-detail-low-cost", "date": "2026-07-07T00:00:00.000Z", "summary": "在5个模型上测试了1730道视觉推理题，发现将图像细节降至\"low\"会损失准确率，且在gpt-5.5上费用反而上升。真正可靠降低成本的手段是调节推理努力（reasoning effort）。", "type": "tip", "relTime": "1周前"}, {"id": 166, "title": "MT-EditFlow：基于流匹配的多轮图像编辑强化学习", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/mt-editflow-image-editing", "date": "2026-07-07T00:00:00.000Z", "summary": "针对单轮图像编辑模型在多轮交互中因单轮失败导致序列中断、误差累积的问题，提出 MT-EditFlow 流匹配强化学习框架。该框架整合多轮视角与多奖励公式，统一支持 GRPO 和 NFT 类强化学习方法，并系统分析轮次聚合评分策略、VLM 推理模式（权衡奖励偏差与方差）以及优势融合层级（防止奖励黑客行为）。研究发现将聚合优势广播至整个编辑轨迹能弥合局部规划与全局多轮任务成功之间的差距。实验表明...", "type": "paper", "relTime": "1周前"}, {"id": 167, "title": "LensVLM：压缩文本图像的选择性上下文展开", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/lensvlm-context-expansion", "date": "2026-07-07T00:00:00.000Z", "summary": "LensVLM 是一种推理框架与后训练方法，使视觉语言模型扫描压缩文本图像后，通过学到的工具仅展开相关区域。基于 Qwen3.5-9B-Base，在 7 个文本 QA 基准上，4.3× 有效压缩时准确率与全文本上限相当，在 10.1× 有效压缩时优于检索、文本压缩和视觉压缩基线。该方法还可泛化至多模态文档和代码理解任务。分析表明视觉压缩对渲染选择更鲁棒，随压缩增大模型更依赖展开内容；文本展开...", "type": "paper", "relTime": "1周前"}, {"id": 168, "title": "通过先进模态条件与交互驯服文本到有声视频生成", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/sounding-video-generation", "date": "2026-07-07T00:00:00.000Z", "summary": "苹果与中国人民大学联合研究聚焦文本到有声视频生成任务，提出Cross-Referential Rewriter（CRR）caption框架。该框架采用双agent管线：Semantic Checker提取有依据的语义锚点，Cross-Modal Rewriter生成解耦的TV和TA caption对，消除模态干扰并弥合密集训练caption与简洁用户提示之间的差距，解决了联合音视频训练中的文...", "type": "paper", "relTime": "1周前"}, {"id": 169, "title": "VaseMuseum：面向古希腊陶器的数字智能博物馆框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06374", "date": "2026-07-07T00:00:00.000Z", "summary": "针对视觉语言模型（VLM）在文化遗产领域开源解释证据不可靠、证据不完整时产生自信但无依据回答的问题，研究者提出VaseMuseum--一个轻量级模块化多模态智能体框架。该框架结合交互式虚拟博物馆与VaseAgent，支持2D图像和3D文物多模态感知、3D感知推理、外部知识检索及推理时可靠性控制。VaseAgent从权威网站和博物馆知识源检索证据，通过源级控制选择多样且可验证的证据；响应级控制...", "type": "paper", "relTime": "1周前"}, {"id": 170, "title": "BestBlogs早报07-07：腾讯混元Hy3 / Claude J-space / AI自我验证等10条", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2074273466837324220", "date": "2026-07-06T23:25:07.000Z", "summary": "本期涵盖10条AI重点：腾讯混元Hy3正式版发布，经270位专家盲测，幻觉率下降，Apache 2.0开源并降价，侧重Agent与生产力场景；Anthropic发现Claude内部J-space，可监控隐藏操纵等安全信号；AI自我进化最快半年可完成首次闭环，关键在自我验证；Cloudflare推出Workers Cache分层缓存；AutoResearch-LLM实现三阶段自动化微调，在16...", "type": "industry", "relTime": "1周前"}, {"id": 171, "title": "Nature发表乳腺癌AI复发风险测试，准确率71%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074264588640804954", "date": "2026-07-06T22:49:50.000Z", "summary": "新发表于《自然-通讯》的研究开发了一种多模态AI测试，通过常规H&E染色切片和临床数据来评估侵袭性乳腺癌亚型的复发风险，正确率约71%。系统使用预训练图像引擎Kestrel，该模型从4亿个病理组织图像块中学习，无需人工标注即可对肿瘤形态进行评分，在传统指标（肿瘤大小、淋巴结、受体、分级、基因检测）基础上补充了常规组织结构中隐藏的复发风险视觉线索。", "type": "paper", "relTime": "1周前"}, {"id": 172, "title": "苹果 iOS 27 家庭 App 新增 AI 摄像头功能：需 iCloud+ 2TB 起步", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/973/316.htm", "date": "2026-07-06T22:34:59.000Z", "summary": "苹果在第三个 macOS Golden Gate 测试版说明中确认，iOS 27、iPadOS 27 和 macOS 27 家庭 App 的 Apple Intelligence 摄像头功能需订阅 2TB 或更高容量 iCloud+ 计划。AI 特性包括为 HomeKit 安全视频的运动警报生成文字摘要、整合多摄像头画面为活动概览并提取片段，以及自然语言搜索。2TB 套餐每月 9.99 美元...", "type": "product", "relTime": "1周前"}, {"id": 173, "title": "Grok Imagine 现可生成15秒视频", "source": "X：cb_doge (@cb_doge)", "sourceUrl": "https://x.com/cb_doge/status/2074238399318540482", "date": "2026-07-06T21:05:46.000Z", "summary": "Grok Imagine 现在可以创建最长15秒的视频。  只需从 App Store 更新到最新的 Grok 应用版本。", "type": "product", "relTime": "1周前"}, {"id": 174, "title": "LingBot-Depth 2.0 发布：深度误差减半，12/16 基准第一", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074216188964634804", "date": "2026-07-06T19:37:31.000Z", "summary": "深度补全模型 LingBot-Depth 2.0 发布，专攻玻璃、镜面、透明物体等传统深度相机失效的场景。训练数据从 3M 扩展到 150M（50 倍），在 12/16 个深度补全基准中排名第一，最难室内场景 RMSE 从 0.132 降至 0.062（误差减半）。模型基于视觉基础模型 LingBot-Vision 构建，后者已完全开源，训练时利用物体边缘几何信息且无需人工边界标签。", "type": "model", "relTime": "1周前"}, {"id": 175, "title": "艾米丽·本德澄清\"随机鹦鹉\"比喻：专指大语言模型，非所有AI", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://spectrum.ieee.org/stochastic-parrot", "date": "2026-07-06T16:55:28.979Z", "summary": "2021年，四位研究者（含被谷歌解雇的Timnit Gebru和Margaret Mitchell）发表论文《论随机鹦鹉的危险》，用\"随机鹦鹉\"比喻大语言模型仅靠统计预测生成文字，不具备真正理解。五年后，第一作者、华盛顿大学计算语言学教授Emily M. Bender发文澄清常见误解：该比喻专指LLM，并非泛指所有AI系统（如AlphaFold或图像识别）；旨在描述系统本质，而非侮辱。Ben...", "type": "tip", "relTime": "1周前"}, {"id": 176, "title": "Meta无Ray-Ban品牌智能眼镜发布，隐私争议与面部识别筹划浮出水面", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/column/961707/smart-glasses-ai-wearables-meta-surveillance-privacy", "date": "2026-07-06T16:00:00.000Z", "summary": "Meta推出更便宜的智能眼镜（无Ray-Ban品牌），并与Kylie Jenner合作，在Threads上引发激烈隐私争议。纽约时报和Wired调查发现Meta正考虑为眼镜加入面部识别功能。电池续航不足1小时--连续视频或录制约10个3K视频即耗尽。有用户称眼镜\"是为变态准备的\"，也有用户辩护用于无障碍和记录家庭视频。文章作者同时测试了Ray-Ban Meta Optics、新款Meta G...", "type": "tip", "relTime": "1周前"}, {"id": 177, "title": "TokHub：开源AI API中转站监控与专属网关管理系统", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2074155419392684101", "date": "2026-07-06T15:36:02.000Z", "summary": "TokHub是面向AI API中转站的开源监控及网关管理系统，提供公开通道详情（状态、成功率、延迟、模型、价格、健康评分）和L1/L2/L3分层探测：L1检查DNS/TCP/TLS/HTTP连通性，L2检查API Key与模型可用性，L3执行最小真实生成以检测\"入口正常但模型不可用\"。用户可收藏公开通道或接入自有Endpoint和API Key（加密保存、组织隔离），一键聚合多平台通道与私有...", "type": "model", "relTime": "1周前"}, {"id": 178, "title": "商汤开源 SenseNova-U1-8B-Infographic-V2 模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2074145772216648143", "date": "2026-07-06T14:57:42.000Z", "summary": "商汤科技开源 SenseNova-U1-8B-MoT-Infographic-V2，这是一个8B参数的信息图生成模型。相比V1，V2改进包括：小文本渲染更清晰、复杂密集布局更稳定、海报/仪表盘/报告的美学效果提升、减少黑色背景伪影。模型已上传至HuggingFace，代码和文档在GitHub开放。", "type": "model", "relTime": "1周前"}, {"id": 179, "title": "Google DeepMind COrigami：用Gemini与RL协同设计折纸", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2074132987365482883", "date": "2026-07-06T14:06:54.000Z", "summary": "Google DeepMind 推出 COrigami--端到端折纸协同设计 pipeline。系统调用 Gemini 生成语义骨架（JSON 代码），经视觉反馈循环优化，再调用自定义打包、求解、塑形及模拟工具，结合自改进强化学习（RL）循环，最终输出 SVG 折痕图。折纸艺术家可据此折叠出实物（示例由 @brandon_w0ng 完成）。论文见 arxiv.org/abs/2606.26299。", "type": "paper", "relTime": "1周前"}, {"id": 180, "title": "AHA-WAM：异步快慢系统架构让世界模型\"慢思考、快执行\"", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/CCQ75IgWdtWofTTQ_oZCAw", "date": "2026-07-06T11:53:07.000Z", "summary": "上海交通大学穆尧团队与百度智能云合作推出AHA-WAM，采用异步快慢系统架构，将视频生成（慢系统）与动作生成（快系统）解耦。通过OVCR机制用实时观测修正旧视频推演的KV Cache，使机器人闭环推理频率达到56Hz，控制频率提升近10倍。模型基座约5B参数，Flash版本将去噪步数从10步压缩至2步。百度百舸团队将单步推理延迟从415ms压缩到41ms。方案不依赖端侧硬件加速，通过端云协同...", "type": "tip", "relTime": "1周前"}, {"id": 181, "title": "昆仑万维在2026全球数字经济大会荣获双项殊荣", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/5UQFAy5FiRFMc78zCdFpWg", "date": "2026-07-06T11:30:00.000Z", "summary": "昆仑万维在2026全球数字经济大会上获\"特别鸣谢合作伙伴\"与\"特别贡献奖\"双项荣誉。开幕式上，其天工AI全流程自研的AI短剧《给未来的一封回信》亮相，依托SkyProduction平台实现全链路AI生成，跨越5个全球场景。昆仑万维董事长方汉在人工智能融合应用发展论坛上提出AIGC Agent是被系统性低估的结构性机会，并以音乐Agent产品Mureka Co为例拆解多模态内容行业智能化转型路径。", "type": "industry", "relTime": "1周前"}, {"id": 182, "title": "乔帮主（qiaomu-design）开源 AI 设计 Skill", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2074078579445661750", "date": "2026-07-06T10:30:42.000Z", "summary": "乔帮主（qiaomu-design）开源自用 AI 设计 Skill，整合 8 个主流设计 Skill 优点。特色：风格试衣间（一句话生成四个 Demo）；专攻中文排版，消除紫蓝渐变等廉价风格；自进化记录审美偏好；内置 58 套网站文档。建议用 GLM 5.2 或 Claude。安装：\\`npx skills add joeseesun/qiaomu-design\\`。可调整视觉冒险度、动效...", "type": "tip", "relTime": "1周前"}, {"id": 183, "title": "Claude Code 可直接观看完整视频的开源项目", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2074031575696629844", "date": "2026-07-06T07:23:55.000Z", "summary": "开源项目让 Claude Code 直接观看完整视频，用户提供链接后后台自动处理。采用 FFmpeg 场景检测截取关键帧，YouTube 用官方字幕，Zoom/Loom 用 Whisper 转写。分析完毕询问是否存入知识库。作者计划将本周咨询通话录音输入，称会议未结束即可自动整理行动项。", "type": "tip", "relTime": "1周前"}, {"id": 184, "title": "荣耀MagicOS七月版本升级预告：YOYO新增支持一语微信，远程协助应用上线", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/973/101.htm", "date": "2026-07-06T07:20:23.000Z", "summary": "荣耀MagicOS七月版本升级，YOYO新增一语微信功能（YOYO≥90.10.30.063，微信≥8.0.72），支持语音发消息或音视频通话。新增漫画故事玩法（照片转漫画加对话框）和Live盲盒玩法。远程协助应用上线，可一键连接亲友设备。其他更新：丝滑动效优化、灵动胶囊滑动交互与多胶囊自定义堆叠、锁屏3D照片及小组件（蓝牙耳机电量、YOYO帮记等）、无线投屏单应用投屏、屏幕共享120Fps...", "type": "paper", "relTime": "1周前"}, {"id": 185, "title": "Claude Code 成员 Thariq 分享 Fable 5 使用秘诀", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2074019009226322078", "date": "2026-07-06T06:33:59.000Z", "summary": "Thariq 分享用 Fable 5 的三个变化：1 将 Claude 当作思维伙伴，实施前让它\"面试提问\"或制作 HTML 原型，提供上下文而非简单约束；2 利用 /goal（目标指令）和 workflows（工作流）设定完整实现目标并自动验证各环节，生成差异报告；3 更有野心，尝试大语言模型过去做不到的事（如用 Fable 剪辑视频）。他指出 Fable 能运行数小时、自主测试并写出更优...", "type": "tip", "relTime": "1周前"}, {"id": 186, "title": "Yann LeCun：LLM 为何缺乏现实世界智能", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074011164917612880", "date": "2026-07-06T06:02:49.000Z", "summary": "Yann LeCun 在 Bloomberg 采访中指出，语言只是世界的粗略量化描述，LLM 只能处理离散符号序列。最大 LLM 预训练约 20 万亿词（30 万亿 tokens，1014 字节文本），相当于四岁儿童四年视觉接收的数据量，但阅读需 40 万年。儿童通过视觉、触觉、运动等感官获取密集反馈，文本则剥离了真实世界信息，导致 LLM 能流畅谈论物理却无触觉等原生感知。Moravec\\...", "type": "tip", "relTime": "1周前"}, {"id": 187, "title": "Google DeepMind 论文：自主 AI 智能体面临 6 种安全威胁首次分类", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074006931509842082", "date": "2026-07-06T05:46:00.000Z", "summary": "Google DeepMind 最新论文首次系统分类了自主 AI 智能体的 6 种攻击类型：隐藏在 HTML 注释或白色文本中的指令、图像像素隐写术、PDF/元数据/演讲者备注中的覆盖命令、跨会话持久化记忆中毒、多智能体系统中的目标劫持与级联攻击。基准测试显示，隐藏提示注入在 86% 场景中部分控制智能体；子智能体劫持成功率 58-90%；数据泄露攻击在五种架构中成功率超 80%；利用 RA...", "type": "tip", "relTime": "1周前"}, {"id": 188, "title": "可灵AI NEXTGEN颁奖典礼7月7日首尔举行", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2073965813770358825", "date": "2026-07-06T03:02:37.000Z", "summary": "可灵AI（Kling AI）宣布将于2026年7月7日14：00-18：00在首尔电影中心举办\"Kling AI NEXTGEN Awards Ceremony\"。典礼将颁发三项大奖，表彰新一代视觉创作者，展映获奖AI视频作品，并邀请跨国导演、学者及媒体专业人士担任评审与演讲嘉宾。活动旨在汇聚亚洲及全球创作者，展示AI驱动的新叙事与视觉表达。", "type": "industry", "relTime": "1周前"}, {"id": 189, "title": "日本 TURING 目标最早 2028 年推出基于 AMD 硬件的 Robotaxi 软件", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/972/938.htm", "date": "2026-07-06T02:58:04.000Z", "summary": "日本智驾初创公司TURING完成7900万美元延展融资，A轮融资总额达1.74亿美元，资方包括AMD Ventures、三菱商事等，另获三菱日联3600万美元信贷额度。该公司已在东京郊区完成30分钟自动驾驶测试，计划最早2028年将Robotaxi软件推向市场。其智驾软件将运行于AMD芯片，目前约10%训练负载已转向AMD GPU。", "type": "industry", "relTime": "1周前"}, {"id": 190, "title": "Sky Computing Lab 在 ICML 2026 展示多项加速与推理研究", "source": "X：Sky Computing Lab (@haoailab)", "sourceUrl": "https://x.com/haoailab/status/2073941724897140967", "date": "2026-07-06T01:26:53.000Z", "summary": "Sky Computing Lab 在 ICML 2026 首尔发布五项研究：MADQA 基准（2250 道人工问题、800 份 PDF）评估多模态智能体；d3LLM 通过伪轨迹蒸馏实现扩散 LLM 最高 10 倍速、自回归模型 5 倍速；Jacobi Forcing 将预训练自回归模型转为因果并行解码器，编码/数学任务达 4 倍真实加速；OnlineSpec 利用验证反馈在线调整草稿模型，...", "type": "paper", "relTime": "1周前"}, {"id": 191, "title": "日本经产省公布AI机器人战略修订版，目标2040年部署1000万台机器人", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/972/895.htm", "date": "2026-07-06T01:07:30.000Z", "summary": "日本经济产业省6月30日公布《人工智能机器人战略》修订版，计划到2040年在18个领域部署1000万台AI机器人，以应对人口老龄化与低出生率导致的劳动力短缺。经产省表示将构建能发挥日本优势的物理AI与机器人数据基础架构。未来5年将向软银、NEC、本田、索尼等创立的Noetra提供合计1万亿日元资金，用于多模态平台开发，其中2026财年拨款3873亿日元。", "type": "industry", "relTime": "1周前"}, {"id": 192, "title": "HunyuanOCR-1.5：让轻量级OCR视觉语言模型更快更好", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04884", "date": "2026-07-06T00:00:00.000Z", "summary": "HunyuanOCR-1.5是一款轻量级端到端OCR视觉语言模型，统一文档解析、文本检测、信息提取、文本图像翻译及多图像文档理解。通过将DFlash适配到OCR解码，实现6.37倍Transformer推理加速和2.14倍vLLM加速，成为轻量级OCR VLM中推理最快的模型。新提出的Agentic Data Flow系统将模型弱点转化为数据需求，自主完成素材搜索、质量验证和pipeline...", "type": "paper", "relTime": "1周前"}, {"id": 193, "title": "CanvasAgent：通过视觉工具编排实现复杂图像创建与编辑", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05465", "date": "2026-07-06T00:00:00.000Z", "summary": "CanvasCraft数据集包含14万条完整标注的可执行轨迹和1万条强化学习任务规格。CanvasAgent是一个工具增强的多模态智能体，通过多轮交互编排异构视觉工具，先使用SFT学习可执行推理-动作轨迹，再通过GRPO结合结果与过程混合奖励进行优化。实验评估了最终图像质量和轨迹行为，证明了CanvasAgent在复杂多工具图像创建工作流中的有效性。", "type": "paper", "relTime": "1周前"}, {"id": 194, "title": "Light-Omni：智能体视频理解中的反射式推理与长期记忆", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05511", "date": "2026-07-06T00:00:00.000Z", "summary": "Light-Omni 是一个多模态智能体框架，通过维护持续合并多模态事件脚本的全局状态和基于全局上下文生成的参数化潜状态，在单次前向传播中构建所需上下文，驱动自主动作并产生检索嵌入，避免了迭代推理的高昂成本与延迟。在多个视频基准测试中，Light-Omni 平均准确率超越 M3-Agent 2.4%，推理速度提升 12.1 倍，GPU 内存效率提升 2.6 倍。该框架还可作为记忆系统增强现有...", "type": "paper", "relTime": "1周前"}, {"id": 195, "title": "GaP：用于变分自动化任务的图即策略多智能体自学习框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05369", "date": "2026-07-06T00:00:00.000Z", "summary": "GaP（Graph-as-Policy）是一个多智能体编码框架，针对机器人变分自动化任务（物体几何与姿态变化大）设计。它从模块化开放机器人技能库（MORSL）生成含感知、规划和控制节点的有向计算图，并通过内部模拟环境并行排练任务实例，迭代优化图结构与参数以提升成功率和吞吐量。在8个新开放变分自动化任务基准（4个模拟、4个真实世界）上的评估显示，GaP的成功率显著优于基线。代码与数据已公开。", "type": "paper", "relTime": "1周前"}, {"id": 196, "title": "SynCity 3000：自举场景级3D扩散", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05392", "date": "2026-07-06T00:00:00.000Z", "summary": "SynCity 3000是一个生成全局一致且细粒度布局可控的3D场景框架。它将图像转3D生成器微调后作为卷积操作符，应用于由用户提示生成的全场景二轴测图，从而输出任意大小和复杂度的3D场景。为缓解3D场景训练数据稀缺的问题，该框架还引入了一个新的合成数据引擎，用于生成场景级训练数据。", "type": "paper", "relTime": "1周前"}, {"id": 197, "title": "MV-Forcing：基于4D接地时空自强迫的长多视角视频生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05376", "date": "2026-07-06T00:00:00.000Z", "summary": "MV-Forcing在单一扩散模型中组合时序与视角自回归，通过引入4D几何桥接连接连续生成的视角，实现动态场景的长序列多视角一致视频生成。关键思路：自回归3D重建模型从已完成视角重建3D结构并渲染下一目标视角的几何先验，由扩散模型精化为高质量视频。通过联合去噪机制（训练时两个视角槽均从噪声初始化）实现不受限时序延展，并利用Distribution Matching Distillation与...", "type": "paper", "relTime": "1周前"}, {"id": 198, "title": "SaMer：保留对象证据的图像侧token合并用于视觉语言检索", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04605", "date": "2026-07-06T00:00:00.000Z", "summary": "多向量视觉语言检索利用后期交互保留细粒度证据，但图像侧大量token导致成本高昂。现有压缩方法可能丢失对象或区域级证据。SaMer是一种对象感知token合并框架，训练时使用对象标注作为合并先验，推理时无需边界框或检测器，仅调整共享投影层并冻结视觉与语言骨干。它将投影后的token压缩为K个代表性质心，保留原有后期交互接口。设置K=64时，SaMer移除93%以上的图像侧token，使Col...", "type": "paper", "relTime": "1周前"}, {"id": 199, "title": "LLM-as-a-Verifier：一种通用验证框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05391", "date": "2026-07-06T00:00:00.000Z", "summary": "LLM-as-a-Verifier 是一种无需额外训练的通用验证框架，通过计算评分 token logits 分布的期望生成连续分数，实现细粒度反馈。该框架在 Terminal-Bench V2（86.5%）、SWE-Bench Verified（78.2%）、RoboRewardBench（87.4%）和 MedAgentBench（73.3%）上取得 SOTA 性能。其细粒度信号可用于 ...", "type": "paper", "relTime": "1周前"}, {"id": 200, "title": "InternVLA-A1.5：统一理解、潜在预知与动作的组合泛化", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04988", "date": "2026-07-06T00:00:00.000Z", "summary": "InternVLA-A1.5 将机器人策略构建在原生 VLM 骨干上，持续训练 VQA 和子任务预测，并附加轻量级统一专家生成连续动作。未来预测被重构为潜在查询，通过可学习预知 token 在冻结视频生成模型监督下将任务相关未来压缩为紧凑潜在代码；推理时丢弃视频分支以保持实时控制。模型在 1.2M 机器人片段和 3M 多模态样本上预训练，在全部 6 个仿真基准上取得最佳整体结果。真实世界中保...", "type": "paper", "relTime": "1周前"}, {"id": 201, "title": "面向密集空间感知的视觉预训练", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05247", "date": "2026-07-06T00:00:00.000Z", "summary": "针对物理智能所需的密集空间感知，本文提出掩码边界建模（masked boundary modeling）自监督预训练范式，动态学习亚像素边界表示并将边界token作为掩码目标，促进密集视觉token学习。基于该框架的LingBot-Vision在多项下游视觉任务上超越DINOv3，并推动深度完成模型从LingBot-Depth 1.0升级至2.0，显著提升深度估计性能--具身智能的关键支柱。...", "type": "paper", "relTime": "1周前"}, {"id": 202, "title": "PixWorld：在像素空间中统一3D场景生成与重建", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05373", "date": "2026-07-06T00:00:00.000Z", "summary": "PixWorld 是一个在像素空间中统一 3D 场景生成与重建的单一扩散模型。它直接在渲染图像上执行扩散监督，避免了潜空间方法的信息损失和对预训练 VAE/RAE 的依赖。通过引入几何感知损失，在预训练 3D 基础模型的特征空间中对其渲染视图与真实视图，提供 3D 结构监督。PixWorld 在生成任务上超越先前潜空间方法，在重建任务上匹配 SOTA 方法的性能。", "type": "paper", "relTime": "1周前"}, {"id": 203, "title": "Deform360：用于可变形世界模型的大规模多视角视触觉数据集", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05390", "date": "2026-07-06T00:00:00.000Z", "summary": "Deform360 是一个大规模多视角视触觉数据集，包含 198 个日常物品、1，980 个交互序列和超过 215 小时观测数据，来自 41 个环绕摄像头与双手触觉夹爪。该数据集通过无标记视触觉 3D 追踪管线提取稠密几何与运动信息，并系统评估了当前最先进的 2D 视频模型与 3D 粒子模型。初步演示展示了数据集在机器人规划任务中的应用，揭示了结构先验与可扩展性之间的权衡，为可变形物体中心的...", "type": "paper", "relTime": "1周前"}, {"id": 204, "title": "多玩家交互世界模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05352", "date": "2026-07-06T00:00:00.000Z", "summary": "研究团队提出首个面向高动态物理交互环境的多玩家世界模型。该5B参数潜扩散模型在Rocket League中用10，000小时玩家对战数据训练，可在单张Nvidia B200 GPU上以20帧/秒实时生成四玩家对战画面。虽仅用短片段训练，其滚动生成的分布质量在5分钟内保持稳定，实测可持续数小时不崩溃。研究分析了视频编解码器、生成目标和多玩家条件机制等设计，并刻画了模型和数据规模对行为的影响。数...", "type": "model", "relTime": "1周前"}, {"id": 2 function fmtDate(iso){ var d=new Date(iso); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
