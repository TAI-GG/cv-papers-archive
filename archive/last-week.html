source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077472478499053846", "date": "2026-07-15T19:16:51.000Z", "summary": "Thinking Machines Lab 发布其首个完全训练并开源权重的基座模型 Inkling。该模型总参数量 975B，每 token 激活 41B，支持文本、图像、音频推理，上下文窗口达 1M token，并支持可控推理成本。完整权重已开放，开发者可通过 Tinker 平台进行微调。", "type": "model", "relTime": "1周前"}, {"id": 11, "title": "Thinking Machines 开源多模态模型 Inkling", "source": "X：Lilian Weng (@lilianweng)", "sourceUrl": "https://x.com/lilianweng/status/2077471903032528912", "date": "2026-07-15T19:14:33.000Z", "summary": "Thinking Machines 发布开源权重模型 Inkling，支持文本、图像和音频模态的高效推理。完整权重已开放，可在 Tinker 平台进行微调。", "type": "model", "relTime": "1周前"}, {"id": 12, "title": "Thinking Machines发布975B MoE开源模型Inkling", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2077470616832127423", "date": "2026-07-15T19:09:27.000Z", "summary": "Thinking Machines发布开源多模态MoE模型Inkling，总参数量975B（41B激活），原生支持文本、图像和音频模态，提供64K和256K两种上下文长度。完整权重已开放，可在Tinker平台微调并在Inkling Playground体验。", "type": "model", "relTime": "1周前"}, {"id": 13, "title": "Gemini东南亚报告：用户翻倍，多模态占比42%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077465612226531586", "date": "2026-07-15T18:49:34.000Z", "summary": "Google 发布首份 Gemini 东南亚报告，该地区用户量在过去 12 个月翻倍，新加坡人均采用率全球最高，用户日均交互约 10 次。42% 的提示词已包含语音、图像、视频等多模态输入，70% 的提示词使用本地语言撰写。印尼 82% 的提示词来自手机，越南每月超 16 万学生使用 Exam Prep 功能。", "type": "industry", "relTime": "1周前"}, {"id": 14, "title": "Thinking Machines 发布生产级语言模型 Inkling，成美国实验室最强开源模型", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077461348079001716", "date": "2026-07-15T18:32:37.000Z", "summary": "Thinking Machines 发布首个生产级语言模型 Inkling，总参数量 975B，激活 41B，支持文本、图像和音频多模态输入。该模型在 Artificial Analysis Intelligence Index 上以 41 分成为美国实验室最强开源模型，超越 Nemotron 3 Ultra（38 分）和 Gemma 4 31B（29 分）。", "type": "model", "relTime": "1周前"}, {"id": 15, "title": "Thinky 发布开源多模态模型 Inkling", "source": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2077455354594836834", "date": "2026-07-15T18:08:48.000Z", "summary": "Thinky 发布 Inkling，一个高效处理文本、图像和音频的多模态推理模型，并开放完整权重。该模型即日起可在 Tinker 平台微调，并可通过 Inkling Playground 体验。Nathan Lambert 称赞这种开源发布方式，认为其有望取得类似 Tinker 的成功。", "type": "model", "relTime": "1周前"}, {"id": 16, "title": "Thinking Machines 发布多模态模型 Inkling", "source": "X：Thinking Machines (@thinkymachines)", "sourceUrl": "https://x.com/thinkymachines/status/2077454609551921208", "date": "2026-07-15T18:05:50.000Z", "summary": "今天，我们推出 Inkling。  Inkling 能高效地对文本、图像和音频模态进行推理。我们将提供完整权重。  https://thinkingmachines.ai/news/introducing-inkling/  即日起可在 Tinker 上进行微调。在 Inkling Playground 中试用。🧵", "type": "model", "relTime": "1周前"}, {"id": 17, "title": "阶跃星辰 Step 3.7 Flash 上线 Baseten", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077447198728659223", "date": "2026-07-15T17:36:23.000Z", "summary": "阶跃星辰的 Step 3.7 Flash 模型已上线 Baseten 模型库。该模型为 198B 参数稀疏 MoE 架构（每 token 激活 11B），原生支持图像和视频输入，拥有 256K 上下文窗口，专为视觉推理、智能体编程和长上下文任务设计。", "type": "industry", "relTime": "1周前"}, {"id": 18, "title": "Moonshot AI 发布 PerceptionBench：多模态模型视觉感知能力诊断基准", "source": "Moonshot AI：Kimi Blog", "sourceUrl": "https://www.kimi.com/blog/perception-bench", "date": "2026-07-15T16:00:00.000Z", "summary": "Moonshot AI 发布 PerceptionBench，一个从 40 多个现有基准中模型实际失败案例归纳出的视觉感知基准，包含 10 项原子感知能力和 3000 道验证题。所有测试模型准确率均未超过 60%，且大量正确答案在重复提问时无法复现，表明模型更多是猜测而非真正感知。PerceptionBench 旨在精确诊断多模态 AI 的视觉感知断裂点，推动其实现忠实、一致的视觉理解。", "type": "paper", "relTime": "1周前"}, {"id": 19, "title": "预训练MLLM零样本奖励模型用于文生图", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2077420923410358343", "date": "2026-07-15T15:51:59.000Z", "summary": "Read It Back  预训练多模态大语言模型是文生图的零样本奖励模型", "type": "paper", "relTime": "1周前"}, {"id": 20, "title": "Apple Intelligence 获准在华上线，将集成阿里巴巴 Qwen 大模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai", "date": "2026-07-15T15:29:33.000Z", "summary": "中国网信办批准 Apple Intelligence 在华上线，苹果将把阿里巴巴的 Qwen 大模型集成至 iOS、iPadOS、macOS 及 visionOS 系统。该合作此前传闻已久，标志着苹果在关键市场的 AI 布局取得重要进展。阿里巴巴确认 Qwen 将被\"整合到 Apple Intelligence 体验中\"，提供文本与图像理解及生成等 AI 能力。", "type": "industry", "relTime": "1周前"}, {"id": 21, "title": "英伟达 Jim Fan 团队发布 RoboTTT，原生支持 8000 时间步上下文", "source": "X：Jim Fan (@DrJimFan)", "sourceUrl": "https://x.com/DrJimFan/status/2077414142340988962", "date": "2026-07-15T15:25:02.000Z", "summary": "英伟达高级科学家 Jim Fan 团队发布 RoboTTT，将机器人模型的原生上下文窗口扩展至 8000 个时间步（约 5 分钟肌肉记忆），推理成本不变。8K 上下文预训练性能比 1K 提升 62%，且性能随上下文增长持续提升无饱和迹象，支持从人类视频进行一次性上下文学习。", "type": "model", "relTime": "1周前"}, {"id": 22, "title": "Gemini 东南亚报告：用户翻倍，多模态驱动增长", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2077411104775406045", "date": "2026-07-15T15:12:58.000Z", "summary": "我们刚刚发布了首份 Gemini 东南亚报告（如下），3 个洞察：  1/ 活跃用户在过去一年翻了一番多 2/ 70% 的提示词以本地语言提交 3/ 40% 的提示词仅使用语音、图像或视频  Gemini 的本地语言能力 + 多模态功能 + 移动应用正在推动增长，我们很快将为该地区带来更多更新！  🇮🇩🇲🇾🇵🇭🇸🇬🇹🇭🇻🇳", "type": "industry", "relTime": "1周前"}, {"id": 23, "title": "PixVerse 推出 AI Game Engine 游戏引擎", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077405097546362919", "date": "2026-07-15T14:49:06.000Z", "summary": "PixVerse 发布 AI Game Engine，通过 PixVerse Game 将实时生成视频、AI 智能体、游戏机制与用户定义世界结合，探索视频模型融入交互式游戏的可能性。该项目目前为早期技术实验，并非成熟平台，已开放体验地址并发放少量邀请码。", "type": "model", "relTime": "1周前"}, {"id": 24, "title": "Viggle AI 新游戏支持自定义对战场景", "source": "X：Viggle AI (@ViggleAI)", "sourceUrl": "https://x.com/ViggleAI/status/2077402970015015234", "date": "2026-07-15T14:40:38.000Z", "summary": "我们的游戏 Fight Anyone 3D 新增功能：场景 ⚔️  选择一个著名对决。挑选你的战士。然后观看竞技场、技能和特殊招式围绕这场对决生成。  埼玉 vs 悟空。C罗 vs 梅西。你 vs 你的朋友。开始对战 → → https://viggle.ai/games/app/", "type": "product", "relTime": "1周前"}, {"id": 25, "title": "Withings Body Scan 2 体重秤上市：可测高血压风险与细胞健康等 60 项指标，599.95 美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/216.htm", "date": "2026-07-15T11:57:37.000Z", "summary": "Withings Body Scan 2 体重秤正式上市，定价 599.95 美元，可测量包括高血压风险检测和细胞健康评估在内的 60 项人体指标。新机型将显示屏移至可拉出式把手上，新增阻抗心动描记技术（ICG）与生物电阻抗光谱分析（BIS）功能。所有数据由经临床验证的 AI 模型分析，生成高血压风险评估、血糖调节能力分析等健康洞察。", "type": "model", "relTime": "1周前"}, {"id": 26, "title": "阿里 Qwen 将集成至 Apple Intelligence，为中国用户提供 AI 功能", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077360556156309530", "date": "2026-07-15T11:52:06.000Z", "summary": "阿里巴巴的 Qwen 模型将集成至 Apple Intelligence，为中国用户提供 iOS、iPadOS、macOS 及 visionOS 上的文本与图像理解、内容生成等 AI 功能。中国网信办已公布包括 Apple Intelligence 在内的七项移动端生成式 AI 服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在评估多家中国公司后选择了阿里。", "type": "industry", "relTime": "1周前"}, {"id": 27, "title": "阿里千问将集成至苹果智能，服务中国用户", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077357348293939259", "date": "2026-07-15T11:39:21.000Z", "summary": "阿里千问将作为AI能力集成至Apple智能，为iOS、iPadOS、macOS和visionOS的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可使用。网信办同日发布7款手机端侧生成式AI服务备案信息，包括苹果智能、华为小艺大模型、OPPO AndesGPT大模型等。", "type": "industry", "relTime": "1周前"}, {"id": 28, "title": "阿里Qwen将集成至Apple Intelligence服务中国用户", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077346752219521469", "date": "2026-07-15T10:57:15.000Z", "summary": "阿里巴巴的Qwen模型将被集成到Apple Intelligence中，为中国的iOS、iPadOS、macOS和visionOS用户提供文本与图像理解、内容生成等AI功能。中国网信办已公布包括Apple Intelligence、华为小艺大模型、OPPO AndesGPT在内的七项移动端生成式AI服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在选定阿里前曾与多家中国公司洽谈。", "type": "industry", "relTime": "1周前"}, {"id": 29, "title": "Booster T2 人形机器人算力达 2070 TFLOPS", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077344548234391719", "date": "2026-07-15T10:48:30.000Z", "summary": "Booster T2 作为旗舰级具身开发平台，提供高达 2070 TFLOPS 算力，为双足人形机器人同类最高。开发者可将更多算力用于本地推理，运行更复杂的视觉与策略模型，同时消除网络延迟与连接中断风险。", "type": "model", "relTime": "1周前"}, {"id": 30, "title": "MengTo 开源 75 个 AI 智能体技能包，含设计指令与工作流", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2077335188666044426", "date": "2026-07-15T10:11:18.000Z", "summary": "设计师与开发者 MengTo 开源了包含 75 个 Skills 的项目，将设计指令、工作流和风格系统沉淀为可复用的 AI 智能体技能包。项目涵盖 10 个 Codex 工作流（如从参考视频一键生成 HTML）和 62 个网页设计技能，并提供\"design-first-ui-prompting\"方法论，通过固定 prompt 骨架和变体迭代提升输出质量。", "type": "tip", "relTime": "1周前"}, {"id": 31, "title": "豆包用户分享AI工作实践：项目经理、博物馆管理员、科研工作者等案例", "source": "公众号：豆包（字节）", "sourceUrl": "https://mp.weixin.qq.com/s/9KViDnf0pUAkm618wAyDbQ", "date": "2026-07-15T09:59:20.000Z", "summary": "不同行业从业者用豆包辅助工作，效果显著。项目经理处理项目文档和代码时修改量最小；自然博物馆管理员用豆包鉴定出化石具体属名，复查确认无误；数学老师用豆包生成3D几何模型和可缩放地图教具，备课时间减半。", "type": "tip", "relTime": "1周前"}, {"id": 32, "title": "消息称百度为苹果 Apple 智能提供 AI 搜索功能，阿里千问也将集成", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/164.htm", "date": "2026-07-15T09:54:50.000Z", "summary": "知情人士透露，百度正为苹果 Apple 智能开发基于 AI 的搜索功能，可处理图像和文本，并升级中国版 Siri。同时，阿里巴巴宣布阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等体验。Apple 智能大模型已于 2026 年 7 月 8 日备案，适用场景为苹果手机。", "type": "industry", "relTime": "1周前"}, {"id": 33, "title": "Airtap 定时任务：AI Agent 自动生成日报", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077324930698313985", "date": "2026-07-15T09:30:32.000Z", "summary": "Airtap 通过 iMessage 实现定时 Routine 功能，每天早九点自动在云手机中打开 TikTok，扫描八个中英赛道关键词、刷七十多条热门视频，输出包含赛道趋势、高价值创作者清单和内容技巧的结构化日报。用户无需再发指令，AI Agent 从单次执行升级为常驻的初级信息岗位，替用户完成机械重复的信息搜集工作，只留决策环节。", "type": "tip", "relTime": "1周前"}, {"id": 34, "title": "国行 Apple 智能完成备案，阿里千问将集成至苹果 AI 能力", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/109.htm", "date": "2026-07-15T08:41:23.000Z", "summary": "苹果技术开发（上海）有限公司的\"Apple 智能\"大模型已于 2026 年 7 月 8 日完成备案，适用场景为苹果手机。阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可直接体验。", "type": "industry", "relTime": "1周前"}, {"id": 35, "title": "火山引擎发布 Seedance 2.5，AI 视频生成支持 30 秒直出与 50 份全模态素材输入", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/tSfAoa30uuwPsR7XhVA2VA", "date": "2026-07-15T08:04:37.000Z", "summary": "Seedance 2.5 大幅提升多人运动场景下的人物一致性与动态表现，支持图片、音频、视频等全模态素材最高 50 份同时导入。模型新增二次编辑能力，可对已生成画面进行定向修改而无需整段重做；指令遵循支持时间戳精准响应，按秒对齐 Prompt 中的画面动作。Seedance 2.5 单段原生视频最长 30 秒，火山引擎将于近日上线其 API。", "type": "model", "relTime": "1周前"}, {"id": 36, "title": "阶跃星辰 WAIC 2026 展区亮点：Step 系列模型矩阵、Step AOS 及智能体手机 STEPX Neo 亮相", "source": "公众号：阶跃星辰（Step）", "sourceUrl": "https://mp.weixin.qq.com/s/WG8XxNHddjEblHCPgleWpw", "date": "2026-07-15T07:08:22.000Z", "summary": "阶跃星辰将在 WAIC 2026 展出 Step 系列模型矩阵，覆盖云端与端侧、多模态理解与生成能力。全球首个智能体原生操作系统 Step AOS 及荣获本届 WAIC\"镇馆之宝\"的智能体手机 STEPX Neo 首次线下公开亮相。此外，阶跃还携手吉利、千里科技升级汽车智能体，并与原力灵机发起 6 台机器人连续协作 15 小时拼装 8 万余块积木的极限挑战。", "type": "model", "relTime": "1周前"}, {"id": 37, "title": "小米开源 Xiaomi-Robotics-U0：380 亿参数多模态具身生成模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/012.htm", "date": "2026-07-15T06:52:33.000Z", "summary": "小米发布并开源 Xiaomi-Robotics-U0，一个 380 亿参数的多模态自回归具身生成基础模型，是具身领域首个\"通吃\"场景生成、具身迁移、机器人交互视频生成和通用文生图/图像编辑四类任务的统一模型。该模型在 WorldArena 评测基准上以匿名代号 UNIS 取得全球 126 个模型中的总分第一名，并通过 FlashAR+ 推理加速方案将生成效率提升近 83 倍。", "type": "model", "relTime": "1周前"}, {"id": 38, "title": "谷歌图片服务 25 周年，AI 概览新增 Nano Banana 生图功能", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/980.htm", "date": "2026-07-15T06:26:45.000Z", "summary": "谷歌庆祝图片服务上线 25 周年，在 AI 概览中新增图像生成功能，用户可直接调用最新的 Nano Banana 模型，将文本提示转化为原创的高质量自定义图像。该功能将在未来几周内陆续在英文版中推出，面向所有目前支持 AI 模式图像创建的地区。", "type": "model", "relTime": "1周前"}, {"id": 39, "title": "Airtap iMessage 新功能：发条短信让 AI 替你操作手机", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077217295504490992", "date": "2026-07-15T02:22:50.000Z", "summary": "Airtap 推出 iMessage 新功能，用户只需给美国号码发一条 iMessage，其云手机上的 AI Agent 就能通过视觉模拟点击，替用户完成 TikTok 刷视频、星巴克点单等操作，无需安装对应 App。其架构分为三层：大脑（理解指令）、AutoPilot（视觉操控屏幕）、云手机（24小时在线）。但支付等敏感操作仍需用户手动完成，信任与授权仍是所有 Agent 厂商的难题。", "type": "tip", "relTime": "1周前"}, {"id": 40, "title": "OpenMOSS 开源 MOSS-VL-Realtime 实时视频流多模态模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077187667025125579", "date": "2026-07-15T00:25:06.000Z", "summary": "OpenMOSS 开源了 11B 参数的 MOSS-VL-Realtime 模型，支持在视频持续输入时同步感知与生成，可边处理新帧边回复，并在场景变化时主动修改或中断回答。该模型采用 Cross-Attention 架构与 XRoPE 时空位置编码，支持 256K 上下文窗口，已以 Apache-2.0 协议开源。", "type": "model", "relTime": "1周前"}, {"id": 41, "title": "离散扩散模型统一框架：从分词到生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13431", "date": "2026-07-15T00:00:00.000Z", "summary": "离散去噪扩散模型（DDM）近期成为自回归建模的有力替代方案，支持并行生成与迭代全局精炼。该研究提出一个统一概念框架，通过底层离散状态空间的构建（分词方案、词汇拓扑、领域特定结构字母表）审视DDM，将转移矩阵、掩码/吸收态、评分/比率等方法纳入同一设计空间。框架揭示了训练目标、推理算法、扩展行为、系统优化与评估协议中的常见设计权衡，并指出若干未来研究方向。", "type": "paper", "relTime": "1周前"}, {"id": 42, "title": "Hallo4D：面向一致时空生成的多模态幻觉缓解框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12752", "date": "2026-07-15T00:00:00.000Z", "summary": "Hallo4D 提出一种无需重训练或修改架构的生成-检测-修正范式，利用大语言模型识别多视角渲染中的时空不一致性，并通过多模型投票引导图像空间一致性优化。该方法引入运动感知关键帧采样与外观对齐，在多种3D和4D生成设置中持续优于强基线，提供可扩展的泛化解。", "type": "paper", "relTime": "1周前"}, {"id": 43, "title": "GigaWorld-Policy-0.5：一种更快速、更强的高效世界动作模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13960", "date": "2026-07-15T00:00:00.000Z", "summary": "GigaWorld-Policy-0.5 是一种面向机器人控制的高效世界动作模型，训练时利用未来视觉动态，推理时仅解码动作，避免生成未来视频的计算开销。该模型采用混合训练策略与 Mixture-of-Transformers 架构，在本地 RTX 4090 上实现 85 ms 推理延迟。", "type": "paper", "relTime": "1周前"}, {"id": 44, "title": "仅需一层适配层：将预训练视觉编码器用于扩散模型图像生成", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/adapting-pretrained-visual-encoders", "date": "2026-07-15T00:00:00.000Z", "summary": "Apple 研究提出在预训练视觉编码器后添加一个轻量级适配层，即可直接用于扩散模型图像生成，无需重新训练整个编码器。该方法在 ImageNet 无条件生成任务上达到 1 FID，性能与专用编码器相当，且大幅降低计算成本。", "type": "paper", "relTime": "1周前"}, {"id": 45, "title": "VideoRAE：利用表示自编码器驯服视频基础模型进行生成建模", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14088", "date": "2026-07-15T00:00:00.000Z", "summary": "VideoRAE 提出统一视频自编码框架，直接使用冻结的 V-JEPA 2 等视频基础模型作为编码器，通过轻量级投影器将多尺度特征压缩为紧凑潜空间，同时支持扩散 Transformer 和自回归模型的表示。在 UCF-101 上，其自回归和 DiT 生成器分别取得 40 和 93 的类到视频 gFVD，训练速度比竞争基线快约 5 倍。", "type": "paper", "relTime": "1周前"}, {"id": 46, "title": "Chat2Scenic：面向自动驾驶场景生成的迭代RAG框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14387", "date": "2026-07-15T00:00:00.000Z", "summary": "Chat2Scenic提出首个迭代检索增强框架，将法规描述自动转化为自动驾驶测试场景的可执行脚本。在包含123个场景的开放基准上，该框架实现76.42%编译成功率和58.17%框架准确率，显著超越现有方法。代码已开源。", "type": "paper", "relTime": "1周前"}, {"id": 47, "title": "Hy-Embodied-RxBrain：具身认知基础模型融合语言与视觉推理想象", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14187", "date": "2026-07-15T00:00:00.000Z", "summary": "Hy-Embodied-RxBrain 是一个具身认知基础模型，将语言与视觉想象融合到单一规划序列中，语言提供任务分解与决策逻辑，视觉想象则通过世界状态预测将抽象结构具象化。该模型采用统一的 Mixture-of-Transformers 架构，支持语言、图像和视频的理解与生成，并在连续机器人动作生成中无需大规模动作数据预训练即可展现有前景的实机表现。", "type": "paper", "relTime": "1周前"}, {"id": 48, "title": "从像素到状态：将交互式世界模型重新构想为游戏引擎", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14076", "date": "2026-07-15T00:00:00.000Z", "summary": "该论文提出将交互式世界模型视为游戏引擎，并沿玩家动作控制、游戏状态动态、状态-观察持久性和实时交互生成四个维度审视现有方法。论文还发布了《黑神话：悟空》可扩展数据引擎，包含超过90小时游戏画面、帧对齐的玩家动作、真实游戏状态及视觉观察，并配有结构化与语义标注，用于支持状态感知的世界模型研究。", "type": "paper", "relTime": "1周前"}, {"id": 49, "title": "KeyFrame-Compass：关键帧条件视频生成的首个系统评估基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14202", "date": "2026-07-15T00:00:00.000Z", "summary": "KeyFrame-Compass 是首个系统评估关键帧条件视频生成的基准，包含 386 个样本，覆盖三种应用领域与四种关键帧密度。测试九个系统后发现，当前模型在忠实执行关键帧与自然视频合成之间存在明显权衡，且多数开源模型无法将分镜网格输入理解为时序关键帧序列。", "type": "paper", "relTime": "1周前"}, {"id": 50, "title": "MultiRef-Compass：多参考音视频生成统一评测基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14189", "date": "2026-07-15T00:00:00.000Z", "summary": "MultiRef-Compass 基准推出，填补多参考音视频生成（MR2AV）缺乏统一评测的空白。该基准包含 350 个样本，从基础质量、参考一致性等四个维度，采用 14 项子指标评测 8 个代表性系统，结果显示各维度均有显著提升空间。", "type": "paper", "relTime": "1周前"}, {"id": 51, "title": "Thinking Machines 发布开源多模态 MoE 模型 Inkling，1T 参数支持 1M 上下文", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/thinkingmachines-inkling", "date": "2026-07-15T00:00:00.000Z", "summary": "Thinking Machines 在 Hugging Face 开源 Inkling，一个约 1T 参数的原生多模态 MoE 模型，支持图像、文本和音频输入，拥有 1M 上下文窗口。", "type": "model", "relTime": "1周前"}, {"id": 52, "title": "阿里开源14B音乐舞蹈视频模型Wan-Dancer", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077177242107727986", "date": "2026-07-14T23:43:41.000Z", "summary": "阿里巴巴开源14B参数模型Wan-Dancer-14B，可本地运行，上传角色和歌曲即可生成与节拍同步的舞蹈视频。支持街舞、踢踏、拉丁、K-Pop、中式古典等多种风格，并能实现较长时间连贯输出。该模型将\"音乐→节奏→精准舞蹈动作\"的垂直能力做到可本地部署，大幅降低了内容创作者的使用门槛。", "type": "model", "relTime": "1周前"}, {"id": 53, "title": "Atomic Chat 将腾讯 Hy3 模型压缩至 1-bit 本地运行，速度超云 API 2.2 倍", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077166650697388052", "date": "2026-07-14T23:01:36.000Z", "summary": "Atomic Chat 将腾讯开源 295B 参数 MoE（21B 活跃参数）模型 Hy3 极端压缩至 1-bit，生成 92GB GGUF 文件。在 4 块 RTX 5090（128GB VRAM）上本地运行，速度达同模型云 API 的 2.2 倍。测试中，本地版与云 API 版均能通过单次提示词生成 Flappy Bird、Arkanoid 和 Snake 游戏，无崩溃或明显视觉差异。输...", "type": "model", "relTime": "1周前"}, {"id": 54, "title": "Simon Willison 在 Codex Desktop 中创建自定义宠物\"Pedalican\"", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/14/pedalican", "date": "2026-07-14T22:29:45.000Z", "summary": "Simon Willison 在 Codex Desktop 中意外激活了一个类似 Clippy 的动画机器人\"宠物\"，随后发现可以自定义创建。他通过 GPT-5.6 Sol xhigh 模型描述需求，并借助 gpt-image-2 多轮生成精灵素材，最终制作出一只骑自行车的小鹈鹕\"Pedalican\"，在桌面上弹跳并更新 Codex 任务状态。关键实现细节已开源，包括 openai/ski...", "type": "tip", "relTime": "1周前"}, {"id": 55, "title": "阿里Qwen-Audio-3.0-TTS-Plus登顶Artificial Analysis语音竞技场排行榜", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077140161335631957", "date": "2026-07-14T21:16:20.000Z", "summary": "阿里巴巴最新文本转语音模型Qwen-Audio-3.0-TTS-Plus在Artificial Analysis语音竞技场排行榜上以1，236 Elo分（±17）超越Simba 3.2（1，234分）、Gemini 3.1 Flash TTS（1，214分）和Sonic 3.5（1，207分），成为提供商语音类别新领头羊。该模型生成速度为每秒16个字符，低于竞品；定价为每百万字符27.59美...", "type": "model", "relTime": "1周前"}, {"id": 56, "title": "Bonsai 27B：首款可在手机上运行的27B级多模态模型", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://prismml.com/news/bonsai-27b", "date": "2026-07-14T19:51:19.560Z", "summary": "Bonsai 27B 基于 Qwen3.6 27B，提供三元（1.71 有效比特/权重，5.9 GB）和 1-bit（1.125 有效比特/权重，3.9 GB）两个变体，后者首次将 27B 级模型装入 iPhone 17 Pro。模型支持多步推理、结构化工具调用、视觉任务和计算机使用智能体循环，拥有 262K token 上下文窗口，支持推测解码加速。在 15 项基准测试中，三元变体保留全精...", "type": "model", "relTime": "1周前"}, {"id": 57, "title": "Google 在 I/O Connect India 展示由 Tensor SoC 和 TPU 驱动的 Pixel 10 端侧 AI 未来", "source": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/unlocking-the-next-era-of-on-device-ai-with-google-tensor-and-pixel", "date": "2026-07-14T16:51:42.219Z", "summary": "在 Google I/O Connect India 上，Google 展示了由定制 Tensor SoC 和 TPU 驱动的 Pixel 10 系列所支持的 100% 私有端侧 AI 未来。活动首次推出轻量级 Gemma 4 E2B 模型，该模型原生运行于设备端，可实现完全离线的多模态功能，包括 AI 聊天、实时图像识别和个人智能体任务。开发者即日起可通过新发布的 Tensor SDK b...", "type": "model", "relTime": "1周前"}, {"id": 58, "title": "Google 为 25 周年改版图片搜索：用 AI 根据\"独特兴趣\"生成动态画廊", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/google/2026/07/google-revamps-image-search-for-its-25th-anniversary-with-more-images-and-more-ai", "date": "2026-07-14T16:28:14.000Z", "summary": "Google 在其图片搜索上线 25 周年之际推出改版，新版将利用 AI 根据用户的\"独特兴趣\"生成一个持续更新的个性化图片画廊。该功能旨在让搜索结果更贴合个人偏好，而非仅依赖传统关键词匹配。此次更新是 Google 搜索持续融入 AI 能力的一部分，但目前尚未公布具体的技术实现细节、可用地区或上线时间表。", "type": "paper", "relTime": "1周前"}, {"id": 59, "title": "Google 搜索 AI Overviews 集成图像生成功能", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/google-search-now-generates-ai-images-when-it-cant-find-what-youre-looking-for-on-the-web", "date": "2026-07-14T16:20:58.000Z", "summary": "Google 在搜索的 AI Overviews 中直接集成 AI 图像生成功能。当网络不存在匹配图片时，用户可在搜索栏输入文本提示词生成图像。该功能基于 Google 新推出的 Nano Banana 2 Lite 图像模型，优先考虑速度和成本而非质量。未来几周内，所有已支持 AI 模式图像生成的地区将率先上线英文版。此举意味着开放网络的点击量可能减少，AI 生成结果将进一步蚕食图片搜索带...", "type": "model", "relTime": "1周前"}, {"id": 60, "title": "360 AI 研究院 MoSA：让 AI 通过视频运动学习识别物体，无需人工标注", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077064067102253536", "date": "2026-07-14T16:13:58.000Z", "summary": "360 AI 研究院在 ECCV 2026 发表的 MoSA（Motion-Grounded Segment Anything）论文，提出让 AI 通过视频中物体的运动来学习识别，无需人工标注。该方法从约 10，000 小时无标签视频中自动生成了超过 2，100 万个伪标签，突破了 Meta 的 SAM 模型依赖数百万手工标注图像的限制。MoSA 属于该研究院 H1 2026 系列论文中\"精...", "type": "paper", "relTime": "1周前"}, {"id": 61, "title": "Seedance 实用心得：提示词只需四部分，720p 响应最好", "source": "X：卡兹克 (@Khazix0918)", "sourceUrl": "https://x.com/Khazix0918/status/2077063527467278363", "date": "2026-07-14T16:11:49.000Z", "summary": "卡兹克分享海辛与阿文高强度使用 Seedance 后的心得：X 和小红书上大部分提示词无效。有效 prompt 只需四部分：主体（图生图生成角色参考后 @）、场景（上传场景图）、音乐（只生成音效）、镜头（言简意赅）。其他心得：无需分镜故事板；prompt 非越长越好；不要加时间戳；720p 对提示词响应最好，定稿后用 Topaz 放大到 4K。省下的时间应花在构思分镜和故事上。", "type": "tip", "relTime": "1周前"}, {"id": 62, "title": "Google Images 25周年：推出可浏览图片主页与AI Overviews图像生成功能", "source": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/search/google-images-25th-anniversary", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Images迎来25周年，推出两项新功能：一是全新的可浏览图片主页，展示来自网络的动态沉浸式图片画廊，实时更新并根据用户兴趣智能定制，支持收藏夹标签页，未来几周在美国桌面端英文上线；二是将图像生成直接引入AI Overviews，基于最新的Nano Banana模型，将文本提示词转化为高质量定制图像，未来几周在英文区域逐步推出。回顾了2001年上线、2009年相似图片、2011...", "type": "model", "relTime": "1周前"}, {"id": 63, "title": "Google Images 改版：类似 Pinterest 的动态画廊与 AI 图像生成", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/14/google-images-gets-a-pinterest-like-redesign-focused-on-discovery", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Images 迎来重大改版，界面转向类似 Pinterest 的可浏览动态画廊，新增\"For You\"个性化推荐和\"collections\"收藏功能，旨在将图片搜索变为发现与灵感平台。同时，Google 在 AI Overviews 中直接集成图像生成能力，基于最新的 Nano Banana 模型将文本提示词转化为定制图像，帮助用户可视化房间装修等创意。桌面端英文版改版将在未来...", "type": "model", "relTime": "1周前"}, {"id": 64, "title": "Google Research 揭示扩散模型创造力的数学根源：分数平滑导致数据插值", "source": "Google Research：Blog（网页）", "sourceUrl": "https://research.google/blog/towards-demystifying-the-creativity-of-diffusion-models", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Research 在 ICLR 2026 发表的论文证明，扩散模型的创造力并非偶然，而是神经网络训练中\"分数平滑\"的数学结果。正则化使神经网络学习到训练数据分数函数的平滑近似，导致去噪过程在训练数据点之间插值，从而生成新颖样本。实验表明，即使不显式使用权重衰减，梯度下降算法的隐式正则化也能产生分数平滑效应。", "type": "paper", "relTime": "1周前"}, {"id": 65, "title": "黑芝麻智能与百度智能云深化合作，加速智能驾驶研发体系升级", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/8lgLKpfQf01rcefYopZKEg", "date": "2026-07-14T15:36:58.000Z", "summary": "黑芝麻智能与百度智能云在WAIC 2026上宣布深化合作，依托百度百舸·AI计算平台打造智能算力底座，支持智能驾驶模型训练、多模态模型开发及大模型推理。双方合作旨在提升模型训练与推理效率，加速车规级计算芯片研发及算法迭代。百度智能云在2025年自动驾驶研发解决方案市场以7.54亿元份额排名第一。", "type": "industry", "relTime": "1周前"}, {"id": 66, "title": "Kimi K3 预计明日发布，K2.6 开源模型表现强劲", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077049588356178269", "date": "2026-07-14T15:16:26.000Z", "summary": "Kimi K3 预计于 7 月 15 日发布，Kimi 开放平台已提前上线限时充值活动。K2.6 作为开源模型，支持 256K 上下文和原生视觉，可生成全栈应用并协调多达 300 个子智能体。其在长会话、工具调用可靠性及成本控制上表现突出：月之暗面展示过持续 12-13 小时的自主编码，Vercel 报告 Next.js 基准测试提升超 50%，CodeBuddy 工具调用成功率达 96.6...", "type": "tip", "relTime": "1周前"}, {"id": 67, "title": "商汤 SenseTime 发布 SenseNova Token Plan 限时免费试用", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077045462088163355", "date": "2026-07-14T15:00:02.000Z", "summary": "商汤 SenseTime 推出 SenseNova Token Plan，新用户首月每 5 小时可获每个模型 1，500 次免费 API 调用。该计划包含 SenseNova-Skills 办公自动化技能套件（兼容主流 Agent 框架与开源工具，支持图像生成、PPT 制作、多维数据分析与研究）、原生多模态架构的 SenseNova 6.7 Flash-Lite（可直接解析网页、文档与金融图...", "type": "model", "relTime": "1周前"}, {"id": 68, "title": 单张 50...", "type": "model", "relTime": "1周前"}, {"id": 77, "title": "Mistral AI 发布 Robostral Navigate：8B 参数单 RGB 摄像头具身导航模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/14/mistral-ai-releases-robostral-navigate-an-8b-model-enabling-robots-to-navigate-complex-environments-using-a-single-rgb-camera", "date": "2026-07-14T07:20:38.000Z", "summary": "Mistral AI 推出首个具身导航模型 Robostral Navigate。该 8B 参数模型仅使用单 RGB 摄像头，即可根据自然语言指令在办公室、住宅等复杂环境中自主移动。在 R2R-CE 基准的 validation unseen 分项上达到 76.6% 成功率，比最佳单摄像头方案高 9.7 个百分点。模型采用\"指向\"决策方法预测目标图像坐标，目标出视野时回退到位移指令。训练数据...", "type": "model", "relTime": "1周前"}, {"id": 78, "title": "SSD：空间推测解码加速自回归图像生成", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2076929618280661101", "date": "2026-07-14T07:19:43.000Z", "summary": "新方法 Spatially Speculative Decoding （SSD） 通过并行预测图像行，将自回归图像模型加速最高 13.28 倍。SSD 不逐个预测 token，而是利用附近空间信息整行草拟。它添加小型辅助网络，可同时向右和向下查看，预测更易学习的内部特征而非精确视觉 token 标签。主模型并行审查每个草拟块并纠正错误。Janus-Pro、Lumina-mGPT 和 Emu3...", "type": "paper", "relTime": "1周前"}, {"id": 79, "title": "蚂蚁集团推出 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-9B-GGUF", "date": "2026-07-14T04:06:31.000Z", "summary": "蚂蚁集团 AI 安全实验室发布 SingGuard-NSFA，一种结合生成式推理与轻量分类头的双模式护栏框架，用于检测智能体操作威胁。四个模型尺寸（0.8B/2B/4B/9B）均基于 Qwen3.5 微调，在多语言基准上 F1 超过 94%，比最强竞品高出 6-12 个绝对 F1 点。实时分类模式在单张 A100 GPU 上每样本仅需约 45-57 毫秒。", "type": "model", "relTime": "1周前"}, {"id": 80, "title": "腾讯元宝发布\"办事大厅\"使用指南，覆盖旅行规划、修图、总结等九大委托场景", "source": "公众号：腾讯元宝", "sourceUrl": "https://mp.weixin.qq.com/s/egmzYMcM7q1hdSFvZ6JmIg", "date": "2026-07-14T04:00:00.000Z", "summary": "腾讯元宝发布《元宝办事大厅使用指南》，针对用户高频需求推出九类委托场景。用户可通过一句话指令完成旅行攻略制定、图片修图（如去路人）、减肥计划生成、运势查询与起名、多链接内容总结（Hy3 模型支持）、学习计划制定、外语翻译（支持微信元宝好友）、歌曲识别以及长视频总结。指南强调所有功能均通过自然语言对话完成，并鼓励用户分享更多宝藏功能。", "type": "tip", "relTime": "1周前"}, {"id": 81, "title": "蚂蚁集团推出 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-4B-GGUF", "date": "2026-07-14T03:55:11.000Z", "summary": "蚂蚁集团 AI 安全实验室发布 SingGuard-NSFA，一个结合生成式推理与轻量分类头的双模式护栏框架，用于检测提示注入、敏感信息窃取等 Agent 操作威胁。四个模型尺寸（0.8B-9B）均基于 Qwen3.5 微调，在自建多语言基准上 F1 超过 94%，比最强竞品高出 6-12 个绝对 F1 点，实时检测延迟约 50 毫秒。模型以 Apache 2.0 许可证开源。", "type": "model", "relTime": "1周前"}, {"id": 82, "title": "蚂蚁集团发布 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-2B-GGUF", "date": "2026-07-14T03:46:45.000Z", "summary": "蚂蚁集团发布 SingGuard-NSFA，一种保护 AI 智能体系统免受提示注入、敏感信息窃取等威胁的双模式护栏框架。该框架结合基于 SFT 的生成式推理（用于可解释离线审计）和轻量级判别分类头（约 50 毫秒实时检测），提供 0.8B 至 9B 四种模型尺寸，在专用多语言基准测试中 F1 均超 94%，比最强竞品高 6-12 个绝对 F1 点。", "type": "model", "relTime": "1周前"}, {"id": 83, "title": "蚂蚁集团发布 SingGuard-NSFA：面向智能体 AI 的双模式护栏框架，支持生成式推理与实时分类", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-0.8B-GGUF", "date": "2026-07-14T03:41:47.000Z", "summary": "蚂蚁集团 AI 安全实验室推出 SingGuard-NSFA，一个基于 NSFA 分类法（覆盖 185 种风险变体）的双模式护栏框架，用于检测提示注入、敏感信息窃取等智能体操作威胁。", "type": "paper", "relTime": "1周前"}, {"id": 84, "title": "阿里云EMR StarRocks发布多模态混合检索引擎", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2076852043210277270", "date": "2026-07-14T02:11:27.000Z", "summary": "阿里云EMR Serverless StarRocks推出湖仓多模态混合检索功能，统一全文、向量与标量搜索于单一SQL引擎。支持直接查询Paimon/Iceberg/Lance等湖格式，无需数据迁移；通过列级写入更新嵌入向量或标签；内置SQL AI函数生成嵌入向量。Serverless架构按查询付费。适用于自动驾驶场景挖掘、RAG知识库及多模态电商搜索等场景。", "type": "paper", "relTime": "1周前"}, {"id": 85, "title": "特斯拉正开发轮椅无障碍自动驾驶汽车", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/289.htm", "date": "2026-07-14T01:21:54.000Z", "summary": "特斯拉高级政策顾问英迪娅·赫德曼在华盛顿特区听证会上证实，公司正在得州开发一款专门面向轮椅乘客的自动驾驶汽车，旨在解决无障碍接送服务不便的问题。现有自动驾驶车队采用Model Y，轮椅乘客无法直接使用；Cybercab虽有无障碍设计，但同样无法让轮椅直接进入车内。特斯拉去年已在Robotaxi应用中增加无障碍出行入口，但当前仅引导至其他服务商。美国目前尚无无人驾驶出租车公司能为轮椅乘客提供全...", "type": "industry", "relTime": "1周前"}, {"id": 86, "title": "Uber 产品负责人谈酒店预订、自动驾驶出租车及公司为何不想成为\"万能应用\"", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/ubers-product-chief-on-hotels-robotaxis-and-why-the-company-doesnt-want-to-be-everything-for-everyone", "date": "2026-07-14T00:45:00.000Z", "summary": "Uber 首席产品官 Sachin Kansal 透露，Uber 正通过与 Expedia 合作推出酒店预订、欧洲船艇租赁及\"shop for me\"代购服务，将旅行定位为继出行与外卖后的第三大业务支柱。Uber 已成立六个月的新业务部门 AV Labs，开发配备传感器的车队以采集驾驶数据，强化与 Waymo 等自动驾驶合作伙伴的关系并保留自身筹码。Uber Pro 借记卡面向司机与骑手开放...", "type": "tip", "relTime": "1周前"}, {"id": 87, "title": "商汤开源 SenseNova-Vision-7B-MoT 多任务视觉模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2076828658531262619", "date": "2026-07-14T00:38:32.000Z", "summary": "商汤发布并完全开源 SenseNova-Vision-7B-MoT，一个统一处理检测、OCR、GUI、深度与法线估计、分割、多视图等主要视觉任务的模型。该模型支持通过自然语言定义新的视觉任务变体，跨传统任务边界重组视觉能力。开源内容包括模型权重及 SenseNova-Vision Corpus（含 5000 万示例子集及复现剩余公开数据的完整工具包）。", "type": "model", "relTime": "1周前"}, {"id": 88, "title": "视频生成创企 PixVerse 完成 4.39 亿美元 C 轮扩展融资，估值超 20 亿美元", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/video-generation-startup-pixverse-raises-439m-valuation-soars-past-2b", "date": "2026-07-14T00:00:00.000Z", "summary": "新加坡视频生成初创公司 PixVerse 完成 C 轮扩展融资，共筹集 4.39 亿美元，估值突破 20 亿美元。公司提供 V 系列（消费者及 API）、C 系列（专业影视）及今年初发布的 R 系列世界模型（游戏开发）。用户可生成最高 4k 分辨率并自带音频的视频，消费端注册用户超 1.5 亿，月活超 1500 万，图生视频每分钟 4.80 美元。本轮投资者包括阿里巴巴等。公司计划今年推出新...", "type": "industry", "relTime": "1周前"}, {"id": 89, "title": "RINO：让RGB成为视觉的通用语言--统一视觉任务为RGB图像编辑问题", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12450", "date": "2026-07-14T00:00:00.000Z", "summary": "一项新研究提出RINO（RGB In and RGB Out）框架，将掩码、深度图等各类结构化视觉信号统一表示为RGB图像，并将分割、深度估计、姿态生成等视觉任务转化为通用的RGB到RGB图像编辑问题。该模型基于通用图像编辑骨干，无需任务特定微调即可在零样本条件下完成密集理解与条件生成任务，性能具有竞争力。代码已开源。", "type": "paper", "relTime": "1周前"}, {"id": 90, "title": "SIS-Bench 发布：首个评估无人机具身智能中自我意识与空间认知的基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12477", "date": "2026-07-14T00:00:00.000Z", "summary": "研究团队推出 SIS-Bench，一个专门评估无人机（UAV）场景下具身空间智能的基准。该基准包含来自 1，646 段真实无人机视频的 4，856 个问答对，覆盖 13 项任务，从感知、记忆与推理三个层级评估空间与自我两个维度。评测发现当前多模态大语言模型（MLLM）在建模动态与智能体中心过程上存在根本局限，空间认知与自我意识间存在明显失衡。", "type": "paper", "relTime": "1周前"}, {"id": 91, "title": "AffectFlow-DINO：基于条件整流流的不确定性感知多任务情感估计", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13250", "date": "2026-07-14T00:00:00.000Z", "summary": "AffectFlow-DINO 用条件整流流头替代确定性架构，从静态人脸图像联合估计效价-唤醒度、分类八种表情并检测十二个动作单元。整流流解码将效价-唤醒度 CCC-V 提升 0.058，后验阈值校准使 Fear 类识别率从 3.8% 恢复至 33.1%，最终 P_MTL 达 1.177，远超官方基线 0.45。", "type": "paper", "relTime": "1周前"}, {"id": 92, "title": "Boogu-Image-0.1 发布：开源统一多模态理解与生成模型，训练成本仅约 40 万美元", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13125", "date": "2026-07-14T00:00:00.000Z", "summary": "Boogu-Image-0.1 系列开源统一多模态理解与生成模型发布，包含 Base、Turbo、Edit 和 Edit-Turbo 四个变体，支持高质量文生图、快速推理、指令编辑及中英双语文本渲染。", "type": "model", "relTime": "1周前"}, {"id": 93, "title": "ShortOPD：用短到长在线策略蒸馏恢复剪枝后的大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13124", "date": "2026-07-14T00:00:00.000Z", "summary": "ShortOPD提出一种短到长的在线策略蒸馏调度，通过检测并跳过教师模型确认的重复后缀，仅对有效前缀进行训练，从而恢复结构化剪枝后的大语言模型。在数学、代码和开放生成任务中，该方法将压缩模型得分提升至未恢复时的约9倍，是标准恢复方法的1.6-4.4倍，且仅用固定8192-token rollout四分之一的训练时间（8.5小时 vs. 35.9小时）即达到相近效果。", "type": "paper", "relTime": "1周前"}, {"id": 94, "title": "UniVR：在视觉空间中思考，实现统一视觉推理", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12800", "date": "2026-07-14T00:00:00.000Z", "summary": "UniVR 首次探索从纯视觉演示中同时学习复杂推理、细粒度物理动力学和长期规划。其核心 VR-GRPO 是一种强化学习范式，通过全局和步骤级互补奖励确保推理过程的逻辑连贯性与物理一致性，无需任务特定启发式或图文对。在包含 16 个来源的 VR-X 基准上，UniVR 取得最高 25% 的提升，并提升了多项多模态理解基准的性能，所有代码、数据和模型均已开源。", "type": "paper", "relTime": "1周前"}, {"id": 95, "title": "自校正耦合马尔可夫跳跃过程（SC-CMJP）框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13188", "date": "2026-07-14T00:00:00.000Z", "summary": "研究团队提出SC-CMJP框架，让Masked Diffusion Models在生成时通过跨模态注意力实时交换置信度，并在证据冲突时撤回承诺。基于该框架的CO2Jump无需训练，在图像理解、编辑及视觉推理任务上取得最佳联合性能，且性能随去噪步数单调提升。团队将发布JEdit-1M、JMaze-200K、JNono-200K三个大规模联合多模态语料库及基准。", "type": "paper", "relTime": "1周前"}, {"id": 96, "title": "Hermes 智能体开发商 Nous Research 正以 15 亿美元估值完成新一轮融资", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/hermes-agent-maker-nous-research-in-talks-for-new-funding-at-1-5b-valuation", "date": "2026-07-13T23:31:18.000Z", "summary": "开源 AI 智能体 Hermes 的开发商 Nous Research 正由 Robot Ventures 领投、USV 等参投，以 15 亿美元估值完成新一轮融资，至少筹集 7500 万美元。该公司成立于 2023 年，此前已累计融资 7000 万美元。Hermes 是开源 AI 智能体，内置网页搜索、编程和图像理解等\"技能\"，并能自动从用户使用中学习构建新技能。用户可在 Telegram...", "type": "industry", "relTime": "1周前"}, {"id": 97, "title": "蚂蚁集团旗下Robbyant发布LingBot-VA 2.0视频动作基础模型", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2076808536294887547", "date": "2026-07-13T23:18:34.000Z", "summary": "蚂蚁集团旗下具身AI公司Robbyant发布LingBot-VA 2.0，这是一款从零训练的视频动作基础模型，专为机器人控制设计。模型采用稀疏MoE架构，约13B总参数，每token激活约1.9B参数。通过前瞻推理及系统加速，峰值异步执行频率达225Hz。高层视觉语言规划器分解长任务，底层视频动作策略处理连续运动。模型仅需10-15次演示即可适应，支持跨机器人本体迁移及零样本新任务。在Rob...", "type": "model", "relTime": "1周前"}, {"id": 98, "title": "15款已停产NVIDIA企业级GPU在现代AI工作负载下的性能基准测试", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://esologic.com/benchmarking-tesla-gpus", "date": "2026-07-13T23:10:30.336Z", "summary": "一项针对15款已停产NVIDIA企业级GPU（包括K80、P100-16GB、V100-16GB等）的基准测试项目，评估其在现代AI工作负载下的实际表现。测试涵盖ResNet50训练与推理、Vision Transformer、llama.cpp运行Qwen2.5 1.5B、Llama 3 8B及Qwen1.5 MoE模型的提示词处理与生成、Whisper语音识别等任务。K80（24GB G...", "type": "tip", "relTime": "1周前"}, {"id": 99, "title": "Google Gemini Omni Flash 登顶 Artificial Analysis 文生图与图生视频双榜", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2076747075036045645", "date": "2026-07-13T19:14:21.000Z", "summary": "Google 在 , "summary": "世界模型旨在构建能模拟物理世界因果关系的AI系统，被视为通向通用人工智能的关键路径。专家指出，当前世界模型在游戏、机器人仿真等可控环境中表现突出，能预测物体交互与场景演变，但面临计算成本高昂、长程预测失准、对复杂现实世界建模不完整等核心局限。模型在封闭系统内可生成合理推演，却难以处理开放世界的突发变量与常识推理。该领域仍处于早期探索阶段，尚未形成统一理论框架，其能力边界与通用性争议持续。", "type": "tip", "relTime": "1周前"}, {"id": 114, "title": "Seedream 5.0 Pro 图像精细编辑能力实测", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2076605296416530647", "date": "2026-07-13T09:50:58.000Z", "summary": "歸藏分享 Seedream 5.0 Pro 的图像精细编辑能力，可实现精准区域编辑与颜色完美融合、不溢出。该功能结合模型能力与产品交互，用户可对图像进行局部精确修改。作者还发布了详细教程，指导如何在 Lumion 中使用这套工具，推荐体验。", "type": "tip", "relTime": "1周前"}, {"id": 115, "title": "Seedream 5.0 Pro 测评：图像编辑门槛爆降", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2076604797202161800", "date": "2026-07-13T09:48:59.000Z", "summary": "字节跳动发布 Seedream 5.0 Pro，图像质量与提示词理解追平 GPT-Image 2.0，综合能力仅次于后者。核心亮点是\"可编辑\"交互：用户可在图上打点、画框、涂鸦，提示词中直接 @ 标记，实现精准局部编辑（如换沙发、改墙面颜色），其他区域不变。实测案例涵盖家装改造（一次替换六件家具）、商品图制作（键盘爆炸拆解图、标注卖点）、海报排版（框定位置生成文字）等场景，支持色卡配色和 S...", "type": "tip", "relTime": "1周前"}, {"id": 116, "title": "微软：Windows 团队正全面利用 AI 挖掘漏洞，后续 Patch Tuesday 安全更新将包含更多修复补丁", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/101.htm", "date": "2026-07-13T08:52:42.000Z", "summary": "微软 Windows 与设备部门执行副总裁 Pavan Davuluri 透露，Windows 团队正全面利用 AI 挖掘漏洞。今年 5 月，微软内部引入多模态 AI 安全系统 MDASH，自动扫描 Windows 关键二进制文件，结合多个 AI 模型分析潜在漏洞，并通过专用验证流程过滤误报，最后由工程师人工确认。AI 还用于协助分析漏洞成因、生成候选修补方案及挑选回归测试项目，所有修补程序...", "type": "industry", "relTime": "1周前"}, {"id": 117, "title": "腾讯低调发布Hy3，21B激活参数MoE模型，定位Agent底座", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2076573388970004919", "date": "2026-07-13T07:44:11.000Z", "summary": "腾讯低调发布Hy3，295B总参数、21B激活的MoE架构，推理效率打平参数2-5倍的旗舰模型。Hy3定位Agent向LLM，非聊天模型。从preview到正式版，基于50+真实业务反馈迭代，内部WorkBuddy任务成功率从72%提升至90%，耗时降低34%，幻觉与常识错误持续下降。Hy3已直接塞进微信10亿+用户手中，核心优势在coding、办公、复杂任务规划，纯视觉仍是短板。作者认为大...", "type": "tip", "relTime": "1周前"}, {"id": 118, "title": "米哈游 AI 陪伴互动软件《BSide： Olivia Lin》在 Steam 开启抢先体验", " 23, "title": "ChatCut AI剪辑工具安装教程：Codex插件+MCP授权", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2076494081207992657", "date": "2026-07-13T02:29:03.000Z", "summary": "AI剪辑工具 ChatCut 近期大火。安装方法：1. 发给 Codex，安装 GitHub 上的 agent-plugin；2. 安装 MCP 和 Skill，完成一次 OAuth 授权；3. 与 Codex 对话，用 ChatCut 的 MCP 和 Skill 为指定网址生成图文并茂、带配音解读的功能演示视频。效果虽粗糙，但比纯文字生动。", "type": "tip", "relTime": "1周前"}, {"id": 124, "title": "Flowith Matrix 推出\"0人OPC\"概念，AI模拟内容团队完成多平台发布", "source": "公众号：卡尔的AI沃茨", "sourceUrl": "https://mp.weixin.qq.com/s/pkSiqCnjNE8O1l33WuuUSg", "date": "2026-07-13T01:51:00.000Z", "summary": "Flowith新产品Matrix提出\"0人OPC\"概念，让AI像内容团队一样完成从创意到多平台发布的完整流程。用户创建Workspace后，Matrix自动配置包含CEO Office、受众信号室等多个部门的Agent团队。Matrix支持主动模式，引入OKR追踪关键结果，可全自动完成内容制作分发，也可step by step模式逐项确认。实测中，Matrix能生成Switch2宣传短片和M...", "type": "product", "relTime": "1周前"}, {"id": 125, "title": "密歇根大学发布 NeuroVFM：基于 Vol-JEPA 的通用神经影像基础模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/12/meet-neurovfm-a-new-neuroimaging-foundation-model-trained-with-vol-jepa-on-uncurated-clinical-mri-and-ct-volumes", "date": "2026-07-13T00:35:36.000Z", "summary": "密歇根大学在《自然·医学》发表 NeuroVFM，一种基于 Vol-JEPA 的通用神经影像视觉基础模型。该模型在包含 524 万份临床 MRI 与 CT 容积影像的 UM-NeuroImages 数据集上训练，采用自监督、仅视觉的潜在空间预测方法，无需标签或放射报告。在 156 项诊断任务中，NeuroVFM 在 CT 上达到 92.68 AUROC，在 MRI 上达到 92.49 AUR...", "type": "paper", "relTime": "1周前"}, {"id": 126, "title": "中国电信联合北邮、鹏城实验室完成高轨卫星跨模态语义通信试验，传输效率较 H.265 提升 3.5 倍", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/855.htm", "date": "2026-07-13T00:20:06.000Z", "summary": "中国电信研究院联合北京邮电大学、鹏城实验室，基于亚洲九号卫星完成高轨卫星跨模态语义通信试验。该方案融合语义知识库与信源信道联合编码（JSCC）技术，将星地链路传输效率提升至 H.265 方案的 3.5 倍、H.264 方案的 5.5 倍，同时保持相近视频质量（FID<50）。试验还通过生成式语义恢复与多模态融合对齐，使多模态传输质量较传统方案提升 70% 以上。", "type": "industry", "relTime": "1周前"}, {"id": 127, "title": "LightMem-Ego：面向日常生活的轻量级流式多模态记忆系统", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11487", "date": "2026-07-13T00:00:00.000Z", "summary": "针对移动和可穿戴设备上个人AI助手难以持续积累、组织和检索长期多模态经验的问题，研究者提出LightMem-Ego。该系统持续捕获第一人称视角的视觉和音频流，将其对齐到统一时间线，并组织为当前、短期和长期三级层次化记忆。面对用户查询时，系统动态路由到相应记忆层级，基于多模态证据生成回答。该系统可部署于智能手机和AI眼镜，支持物品查找、对话回忆、生活总结、日常规律发现及个性化辅助。代码已开源。", "type": "paper", "relTime": "1周前"}, {"id": 128, "title": "AdvancedMathBench：面向高等数学证明生成与验证的基准套件", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11849", "date": "2026-07-13T00:00:00.000Z", "summary": "大语言模型在高中及奥数级别数学上表现优异，但在高等数学领域能力尚不明确。现有基准在学科覆盖与评估粒度上存在不足。为此，研究者推出AdvancedMathBench基准套件，其核心证明生成基准ProverBench包含296道涵盖本科至博士资格考试水平的问题。配套自动验证流程基于大规模专家标注训练，可输出正确性判定与细粒度错误评估。另一子集VerifierBench包含888条模型生成的证明轨...", "type": "paper", "relTime": "1周前"}, {"id": 129, "title": "SpectraReward：将预训练多模态大模型用作零样本奖励模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11886", "date": "2026-07-13T00:00:00.000Z", "summary": "研究者提出 SpectraReward，一种无需训练的奖励函数，通过单次前向传播计算图像对原始提示词的重建似然作为奖励，直接利用预训练多模态大模型的图文对齐能力。实验覆盖两个扩散模型、三种强化学习算法及九个多模态大模型骨干（4B至235B参数），结果表明该方法显著优于此前基于多模态大模型的奖励训练方法，且更大规模的奖励模型并非总是更优。", "type": "paper", "relTime": "1周前"}, {"id": 130, "title": "MetaView：单图大视角新视角合成框架，融合隐式几何先验与度量深度", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12000", "date": "2026-07-13T00:00:00.000Z", "summary": "MetaView 提出一种扩散模型驱动的单目新视角合成框架，结合隐式几何先验与度量深度锚定，在单张图像的大视角变化下实现几何一致性与精确可控渲染。实验表明，MetaView 在挑战性大视角变化任务上显著优于现有方法，并展现出更强的泛化能力。代码已开源。", "type": "paper", "relTime": "1周前"}, {"id": 131, "title": "Pangram分析：社交媒体超四分之一长文为AI生成，LinkedIn成重灾区", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/842.htm", "date": "2026-07-12T23:26:09.000Z", "summary": "Pangram分析显示，社交媒体超250词的长文中，每四篇就有一篇由AI生成。LinkedIn的AI内容占比最高，41%长文被判定为AI撰写，贡献了近三分之二的AI内容。X平台近一半长文为AI生成或辅助完成。Substack的AI内容比例最低（约10%），Reddit回复几乎全为真人撰写（98%）。数据来自Pangram Chrome扩展，2026年4月至6月扫描五大平台超100万篇帖子。其...", "type": "tip", "relTime": "1周前"}, {"id": 132, "title": "特斯拉奥斯汀 Robotaxi 枢纽清洁机器人已投入运行", "source": "IT之家（RSS）", "sourceUrl": "ht 人动作。Orca-4B 在 MVBench 等四项文本基准上平均得...", "type": "model", "relTime": "1周前"}, {"id": 160, "title": "蚂蚁集团 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/11/ant-groups-robbyant-unveils-lingbot-va-2-0", "date": "2026-07-11T07:56:11.000Z", "summary": "蚂蚁集团旗下具身智能团队 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型。该模型采用因果 DiT 架构，视频专家约 13.0B 参数（约 1.9B 激活），训练规模约 15.3B 参数，推理时每 token 约 2.5B 激活。模型引入多块预测（MCP）实现 2.3 倍训练加速，并通过前瞻推理将推理延迟降至 142 ms/chunk。在 RoboTwin 2.0 ...", "type": "model", "relTime": "1周前"}, {"id": 161, "title": "Rohan Paul 介绍 LingBot-World 2.0：开源交互式视频世界模型，单次60分钟无质量衰减", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2075768163892134386", "date": "2026-07-11T02:24:30.000Z", "summary": "Rohan Paul 介绍了 @robbyant_brain 新发布的 LingBot-World 2.0（也称 LingBot-World-Infinity），这是一个开源交互式视频世界模型。它仅需1张起始帧，结合实时摄像头移动或文本指令，即可持续生成用户在其中移动和操作的场景。该模型实现了单次60分钟、横跨20个不同场景的连续生成，全程无感知质量衰减，输出为720p/60fps实时画面。...", "type": "model", "relTime": "1周前"}, {"id": 162, "title": "路透社实测：Meta AI图像检测工具在裁剪后失灵", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/402.htm", "date": "2026-07-11T02:19:46.000Z", "summary": "路透社测试显示，Meta本周推出的AI图像检测工具存在局限。该工具配合Muse Image模型使用，通过隐形水印Content Seal识别AI生成图片。Meta声称即使图片经过裁剪，工具仍可识别。但路透社用Muse Image生成40张图片测试发现，工具成功识别全部原图，而图片被裁剪至原图约三分之一至二分之一大小后，55%的图片无法通过验证。Meta回应称该工具仍是预览版本，大幅裁剪可能导...", "type": "industry", "relTime": "1周前"}, {"id": 163, "title": "邵猛用1分钟视频演示13类常见Motion动效名称，解决AI Agent动画描述难题", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2075764484027932963", "date": "2026-07-11T02:09:53.000Z", "summary": "针对AI Agent难以理解模糊动画描述的问题，邵猛整理了一段不到1分钟的视频，演示了13类常见Motion动效的中英文名称与直观示例，包括：Push Slide（页面切换）、Staggered Entrance（元素进入）、State Morph（状态变化）、Press+Ripple（操作反馈）、Scroll-driven Transform（滚动动画）、Sliding Indicator...", "type": "tip", "relTime": "1周前"}, {"id": 164, "title": "ABot-N1：迈向通用视觉语言导航基础模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.10383", "date": "2026-07-11T00:00:00.000Z", "summary": "ABot-N1 提出一种慢-快架构，通过双视觉-语言信号将认知与控制解耦。慢速视觉语言推理器执行显式链式推理并生成像素目标，作为点目标、物体目标、POI 目标、指令跟随和人员跟随等任务的通用接口；快速动作专家结合文本线索与像素引导，以原生控制频率生成连续航点。该方法在仿真和真实世界基准上实现可泛化、可解释的导航，在城市级导航中取得显著提升：POI 到达率提高 35.0%（达 77.3%），复...", "type": "paper", "relTime": "1周前"}, {"id": 165, "title": "SynthDocBench：长上下文视觉文档理解可控基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.10400", "date": "2026-07-11T00:00:00.000Z", "summary": "研究团队推出全合成基准 SynthDocBench，通过组合设计系统控制文档长度、布局、模态和问题类型，以分析长上下文视觉文档理解中的模型失败原因。评估七款前沿 VLM 发现三种失效模式：文档长度增加时性能急剧下降、五款模型对文档中间三分之一区域存在系统性位置敏感（最陡下降达 8.3 个百分点）、以及长文档场景下图理解能力崩溃。", "type": "paper", "relTime": "1周前"}, {"id": 166, "title": "Meta 移除 Instagram 上引发争议的 AI 图片修改功能", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/10/meta-removes-controversial-ai-feature-on-instagram-after-backlash", "date": "2026-07-10T23:55:07.000Z", "summary": "Meta 本周早些时候随 Muse Image 生成器推出的功能，允许用户通过 @ 提及公开 Instagram 账户来生成图片，且不会通知被引用的用户。该功能立即引发用户和包括 CAA 在内的经纪公司强烈反对。Meta 周五发布博客称该功能\"未达预期\"，现已下架。公司表示其初衷是提供有用的创意工具并让用户控制公开内容是否被引用，但已听取反馈并移除该功能。", "type": "industry", "relTime": "1周前"}, {"id": 167, "title": "Meta 关闭 Instagram 用户可基于公开账户生成 AI 深度伪造图片的功能", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/964416/meta-instagram-ai-muse-image-deepfakes", "date": "2026-07-10T23:49:50.000Z", "summary": "在遭到强烈反对后，Meta 关闭了本周早些时候推出的一项 Instagram 功能。该功能允许用户通过 @ 提及公开 Instagram 账户，基于其内容生成 AI 图片，且无需账户所有者许可。Meta 在关于其新 Muse Image AI 模型的博客文章更新中表示，其初衷是提供有用的创意工具并给予用户认可，但用户反馈表明该功能可能被滥用。", "type": "industry", "relTime": "1周前"}, {"id": 168, "title": "构建 T4 友好的自主数据科学智能体：DeepAnalyze-8B + 沙盒代码执行", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/10/how-to-build-a-t4-friendly-autonomous-data-science-agent-with-deepanalyze-8b-sandboxed-code-execution-and-iterative-analysis", "date": "2026-07-10T19:24:00.000Z", "summary": "本教程演示如何围 ype": "model", "relTime": "1周前"}, {"id": 211, "title": "Perceptron Egocentric 新型机器人视频标注系统发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2075286203583398181", "date": "2026-07-09T18:29:22.000Z", "summary": "Perceptron Egocentric 旨在解决机器人训练数据瓶颈--录制演示容易，但手动标注每个抓取、握持、移动等耗时昂贵。输入原始机器人摄像头或第一人称视频，输出结构化标签：时间戳、子任务边界、每手动作、逐帧手部位置及左右手识别。系统在基于 Gemini 3.5 Flash 和 Gemini Robotics-ER 1.6 的标注流程上达到 SOTA 水平。早期访问现已向合作伙伴开放。", "type": "paper", "relTime": "1周前"}, {"id": 212, "title": "BytePlus 推出 Seedream 5.0 Pro 图像模型，专注可编辑设计", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2075281603396583592", "date": "2026-07-09T18:11:05.000Z", "summary": "BytePlus 发布 Seedream 5.0 Pro 图像模型，定位\"超越生成，理解设计\"。该模型专攻可编辑设计工作，支持高密度信息图、空间注释、基于草图的编辑、图层分离、逼真肖像纹理，以及 10+ 种语言原生生成（含中文、英文、法文、德文、俄文、日文、韩文、西班牙文、阿拉伯文等，并支持从右至左文本和重音符号）。示例涵盖 16 格电影故事板、复杂 RPG 角色 UI、多语言公共安全通知、...", "type": "model", "relTime": "1周前"}, {"id": 213, "title": "如何阻止Meta的AI图像生成器使用你的Instagram照片", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/09/how-to-stop-metas-ai-image-generator-from-using-your-instagram-photos", "date": "2026-07-09T17:56:47.000Z", "summary": "Meta推出AI图像生成功能Muse Image，允许用户利用公开Instagram账户的照片生成AI图像，只有私密账户和18岁以下用户自动排除。用户可在个人资料中选择\"分享和复用\"，关闭\"允许他人使用和复用你的内容\"以退出。该功能引发隐私担忧，此前Meta因剑桥分析事件被FTC罚款50亿美元，涉及8700万用户数据泄露。Pew调查显示35%受访者对AI增长担忧多于兴奋。", "type": "tip", "relTime": "1周前"}, {"id": 214, "title": "Meta 发布 Muse Spark 1.1，API 定价低于 Grok 4.5，挤压 OpenAI 和 Anthropic", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/metas-muse-spark-1-1-api-pricing-squeezes-openai-and-anthropic-as-the-ai-price-war-heats-up", "date": "2026-07-09T16:58:44.000Z", "summary": "Meta 推出多模态推理模型 Muse Spark 1.1，专为智能体任务、编程和计算机使用设计，支持多智能体编排与百万 token 上下文窗口。其 API 定价为输入 1.25 美元、输出 4.25 美元、缓存 0.15 美元（每百万 token），低于昨日发布的 xAI Grok 4.5，且远低于 OpenAI 和 Anthropic 竞品。该模型在 VALS-AI 榜单排名第四，Vib...", "type": "model", "relTime": "1周前"}, {"id": 215, "title": "M 频扩散先验，联合处理基于稀疏事件流的视频重建、预测与帧插值三项任务。通过微调基础视频模型，该方法实现了高数据效率和优越感知质量。引入自回归展开与自适应上下文切换机制，缓解极长序列中的时间漂移；提出带交叉残差校正的重编码对齐，确保帧插值时的精确双向一致性；事件体素密度增强则提升了跨不同传感器分辨率的鲁棒性。在真实世界基准测试中，LongE2V 在三项任务上均超越...", "type": "paper", "relTime": "1周前"}, {"id": 239, "title": "OpenCoF：通过视频生成学习推理", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08763", "date": "2026-07-09T00:00:00.000Z", "summary": "视频生成模型提供了一种不同于链式思维（CoT）的推理路径--链式帧（CoF）推理，即通过时间上连续的帧展开推理过程。然而现有视频生成器缺乏针对CoF推理的多样化监督与专用设计。为此，OpenCoF框架被提出，包含覆盖11个任务族的推理视频数据集OpenCoF-17K，以及基于Wan2.2-I2V-A14B微调的视频模型Wan-CoF。在四个视频推理基准上，Wan-CoF相比基线取得显著提升。...", "type": "paper", "relTime": "1周前"}, {"id": 240, "title": "ARDY：面向交互式人体运动生成的混合表示自回归扩散模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08741", "date": "2026-07-09T00:00:00.000Z", "summary": "ARDY提出流式生成框架，通过在线文本提示和灵活的运动学约束实现高保真运动生成。其混合表示结合显式根特征与隐式身体嵌入，平衡轨迹控制与生成学习效率。两阶段自回归Transformer去噪器支持可变历史上下文和长程运动学约束条件。在HumanML3D和Bones Rigplay数据集上的评估验证了ARDY的高运动质量和约束遵循能力。交互式演示支持动态文本控制、关键帧姿态约束、路径跟随及鼠标键盘...", "type": "paper", "relTime": "1周前"}, {"id": 241, "title": "OPSD-V：少步自回归视频扩散模型的后训练在线策略自蒸馏范式", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.08766", "date": "2026-07-09T00:00:00.000Z", "summary": "研究者提出 OPSD-V，一种用于少步自回归（AR）视频扩散模型后训练的在线策略自蒸馏范式。该方法引入真实长视频数据作为时间上下文，提供密集轨迹级监督：学生模型遵循推理时展开路径，基于自身生成的 KV 缓存逐块生成；教师模型在同一去噪状态下评估，但使用更干净的 AR 一致时间缓存。应用于 Self-Forcing 和 LongLive 等模型后，视觉质量、运动动态和 VBenchLong 分...", "type": "paper", "relTime": "1周前"}, {"id": 242, "title": "TGPO：通过可验证奖励强化学习激励第一人称视频时序感知", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/incentivizing-temporal-awareness-egocentric", "date": "2026-07-09T00:00:00.000Z", "summary": "多模态大语言模型（MLLM）在第一人称视频理解中缺乏时序感知，常依赖空间捷径。为此，研究者提出 Temporal Global Policy Optimization（TGPO），一种基于可验证奖励的强化学习算法。TGPO 通过对比模型在时序有序与打乱帧上的输出，生成全局归一化奖励信号，明确奖励时序连贯推理。TGPO 可集成 GRPO 和 GSPO，支持冷启动 RL 训练，抑制 MLLM 的...", "type": "paper", "relTime": "1周前"}, {"id": 243, "title": "ReChannel：从 RGB 生成到密集场读出--基于文生图模型的像素空间密集预测", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06553", "date": "2026-07-09T00:00:00.000Z", "summary": "现有方法将深度、法线等标注编码为 RGB 图像再解码，继承了不必要的生成式输出接口。ReChannel 提出新思路：预训练 DiT 已将 RGB 输入组织为 patch-to-token-to-patch 网格，每个 token 索引固定输出 patch，其通道可直接承载任务原生数值。ReChannel 保留 VAE 编码器，移除目标侧解码器，用任务 LoRA 适配冻结的 DiT，通过共享 ...", "type": "paper", "relTime": "1周前"}, {"id": 244, "title": "SearchGen：揭示视觉生成模型的知识边界与搜索增强框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05382", "date": "2026-07-09T00:00:00.000Z", "summary": "研究团队构建了含20，839条提示词的SearchGen-20K数据集与基准，发现前沿开源视觉生成模型得分仅21-28分（满分100），比现有基准骤降40分。简单接入搜索工具会引入噪声，而\"先教学后搜索\"的协同训练框架可发现生成器动态知识边界，实现单调改进。", "type": "paper", "relTime": "1周前"}];
