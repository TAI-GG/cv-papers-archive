oboCasa 和 LIBERO10 的多样化操作...", "type": "paper", "relTime": "5天前"}, {"id": 66, "title": "WildCity：真实世界城市规模渲染、模拟与空间智能测试平台", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06838", "date": "2026-07-07T00:00:00.000Z", "summary": "WildCity是一个真实世界城市规模多模态数据集，由自动驾驶车队在复杂城市环境中采集，包含18条轨迹，平均每条长83.7公里，保留了动态物体、光照变化和相机位姿偏差等野外感知挑战。基于该数据集建立了面向城市的重建基线，并将重建环境转换为闭环模拟器，旨在推动城市尺度渲染以及能够像人类一样在数十平方公里范围内感知、记忆和推理空间信息的AI研究。", "type": "paper", "relTime": "5天前"}, {"id": 67, "title": "Image2Sim：通过生成式神经模拟器扩展具身导航", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05765", "date": "2026-07-07T00:00:00.000Z", "summary": "Image2Sim 是一个实时神经模拟框架，从带位姿的 RGB-D 图像序列构建高质量交互环境。其核心是将 3D 空间锚定与逼真观测合成解耦：场景构建使用前馈特征高斯模型，单次前向将 RGB-D 观测提升为 3D 特征高斯表征；渲染采用几何感知一步像素流模型，将稀疏高斯投影转化为高质量全景 RGB-D 观测。Image2Sim 还作为全自动具身数据引擎，从视频和图像生成了近 20K 交互场景...", "type": "paper", "relTime": "5天前"}, {"id": 68, "title": "LingBot-VLA 2.0：从基础到应用的VLA模型改进实践", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06403", "date": "2026-07-07T00:00:00.000Z", "summary": "LingBot-VLA 2.0 在前代基础上实现三项改进：数据管道升级，预训练数据达约6万小时（含5万小时覆盖20种机器人构型的轨迹和1万小时第一人称人类视频），提升了跨任务与跨本体泛化能力；动作空间扩展至头、腰、移动底座、灵巧手等多自由度，支持双臂硬件平台处理更复杂任务；引入预测动力学建模作为代理任务，借助视频表征模型和深度估计模型增强时序推理。在通用设置下的GM-100基准评测验证了改进...", "type": "paper", "relTime": "5天前"}, {"id": 69, "title": "SenseNova-Vision：将计算机视觉表述为统一多模态生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06560", "date": "2026-07-07T00:00:00.000Z", "summary": "SenseNova-Vision 将计算机视觉表述为统一多模态生成，无需任务特定架构，直接用自然语言指令和可选视觉提示指定检测、分割、深度估计等任务，输出文本、图像或混合结果。配套的 SenseNova-Vision Corpus 涵盖文本、图像与混合目标的指令-响应对，用于训练预训练统一多模态模型。实验表明单个模型在结构化理解、密集几何预测、分割及多视图几何上可匹配领先的任务专用系统。模型...", "type": "model", "relTime": "5天前"}, {"id": 70, "title": "RynnWorld-4D：用于机器人操作的4D具身世界模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06559", "date": "2026-07-07T00:00:00.000Z", "summary": "机器人在开放世界操作需感知场景并预测其3D结构变化。RynnWorld-4D是一个生成模型，从单张RGB-D图像和语言指令出发，在统一扩散过程中联合生成未来RGB帧、深度图和光流（RGB-DF）。采用三分支架构，融合跨模态注意力与帧级3D RoPE，确保外观、几何与运动一致性。为支撑训练，团队整理了Rynn4DDataset 1.0，包含超过2.544亿帧第一人称操作视频，配有深度与光流伪标...", "type": "paper", "relTime": "5天前"}, {"id": 71, "title": "RynnWorld-Teleop：面向数字遥操作的动作条件世界模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06558", "date": "2026-07-07T00:00:00.000Z", "summary": "数字遥操作范式用生成式世界模型替代真实机器人，手部姿态流驱动机器人中心的世界模型，从单张参考图像合成第一人称视频。姿态流作为具身无关的动作标签，可重定向至任意目标机器人。系统RynnWorld-Teleop集成深度感知骨骼条件、渐进式人-机器人训练（视频扩散Transformer）及流式自回归蒸馏，在单块H100 GPU上实现40+ FPS实时生成。仅用其生成数据训练的策略可零样本完成灵巧双...", "type": "paper", "relTime": "5天前"}, {"id": 72, "title": "Nemotron-Labs-Diffusion：统一自回归、扩散与自我推测解码的三模式语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05722", "date": "2026-07-07T00:00:00.000Z", "summary": "Nemotron-Labs-Diffusion 是一种三模式语言模型，通过联合自回归（AR）和扩散损失训练，在单一架构中统一了 AR、扩散和自我推测解码。研究显示 AR 与扩散目标互补：扩散增强前瞻规划，AR 提供从左至右的语言先验。自我推测模式下，扩散充当草稿模型、AR 负责验证，其接受率和实际设备效率均优于多 token 预测（MTP）。在最优化采样器下，单次前向传播产出 token 数...", "type": "model", "relTime": "5天前"}, {"id": 73, "title": "AlayaWorld：长程可玩视频世界生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.06291", "date": "2026-07-07T00:00:00.000Z", "summary": "AlayaWorld 是一个全栈开源框架，用于构建交互式生成世界。该框架支持开放式实时交互，用户可自由导航并执行战斗、施法、召唤怪物等多种动作。AlayaWorld 将数据准备、模型架构、训练、推理加速和部署统一在模块化可扩展的架构中，并发布了可复现流程、参考实现、评估工具和完整文档，为生成世界模型的未来研究与实时应用奠定基础。", "type": "model", "relTime": "5天前"}, {"id": 74, "title": "在LLM中选择最佳图像输入细节级别", "source": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/image-detail-low-cost", "date": "2026-07-07T00:00:00.000Z", "summary": "在5个模型上测试了1730道视觉推理题，发现将图像细节降至\"low\"会损失准确率，且在gpt-5.5上费用反而上升。真正可靠降低成本的手段是调节推理努力（reasoning effort）。", "type": "tip", "relTime": "5天前"}, {"id": 75, "title": "MT-EditFlow：基于流匹配的多轮图像编辑强化学习", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/mt-editflow-image-editing", "date": "2026-07-07T00:00:00.000Z", "summary": "针对单轮图像编辑模型在多轮交互中因单轮失败导致序列中断、误差累积的问题，提出 MT-EditFlow 流匹配强化学习框架。该框架整合多轮视角与多奖励公式，统一支持 GRPO 和 NFT 类强化学习方法，并系统分析轮次聚合评分策略、VLM 推理模式（权衡奖励偏差与方差）以及优势融合层级（防止奖励黑客行为）。研究发现将聚合优势广播至整个编辑轨迹能弥合局部规划与全局多轮任务成功之间的差距。实验表明...", "type": "paper", "relTime": "5天前"}, {"id": 76, "title": "LensVLM：压缩文本图像的选择性上下文展开", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/lensvlm-context-expansion", "date": "2026-07-07T00:00:00.000Z", "summary": "LensVLM 是一种推理框架与后训练方法，使视觉语言模型扫描压缩文本图像后，通过学到的工具仅展开相关区域。基于 Qwen3.5-9B-Base，在 7 个文本 QA 基准上，4.3× 有效压缩时准确率与全文本上限相当，在 10.1× 有效压缩时优于检索、文本压缩和视觉压缩基线。该方法还可泛化至多模态文档和代码理解任务。分析表明视觉压缩对渲染选择更鲁棒，随压缩增大模型更依赖展开内容；文本展开...", "type": "paper", "relTime": "5天前"}, {"id": 77, "title": "通过先进模态条件与交互驯服文本到有声视频生成", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/sounding-video-generation", "date": "2026-07-07T00:00:00.000Z", "summary": "苹果与中国人民大学联合研究聚焦文本到有声视频生成任务，提出Cross-Referential Rewriter（CRR）caption框架。该框架采用双agent管线：Semantic Checker提取有依据的语义锚点，Cross-Modal Rewriter生成解耦的TV和TA caption对，消除模态干扰并弥合密集训练caption与简洁用户提示之间的差距，解决了联合音视频训练中的文...", "type": "paper", "relTime": "5天前"}, {"id": 78, "title": "BestBlogs早报07-07：腾讯混元Hy3 / Claude J-space / AI自我验证等10条", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2074273466837324220", "date": "2026-07-06T23:25:07.000Z", "summary": "本期涵盖10条AI重点：腾讯混元Hy3正式版发布，经270位专家盲测，幻觉率下降，Apache 2.0开源并降价，侧重Agent与生产力场景；Anthropic发现Claude内部J-space，可监控隐藏操纵等安全信号；AI自我进化最快半年可完成首次闭环，关键在自我验证；Cloudflare推出Workers Cache分层缓存；AutoResearch-LLM实现三阶段自动化微调，在16...", "type": "industry", "relTime": "5天前"}, {"id": 79, "title": "Nature发表乳腺癌AI复发风险测试，准确率71%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074264588640804954", "date": "2026-07-06T22:49:50.000Z", "summary": "新发表于《自然-通讯》的研究开发了一种多模态AI测试，通过常规H&E染色切片和临床数据来评估侵袭性乳腺癌亚型的复发风险，正确率约7 , {"id": 89, "title": "昆仑万维在2026全球数字经济大会荣获双项殊荣", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/5UQFAy5FiRFMc78zCdFpWg", "date": "2026-07-06T11:30:00.000Z", "summary": "昆仑万维在2026全球数字经济大会上获\"特别鸣谢合作伙伴\"与\"特别贡献奖\"双项荣誉。开幕式上，其天工AI全流程自研的AI短剧《给未来的一封回信》亮相，依托SkyProduction平台实现全链路AI生成，跨越5个全球场景。昆仑万维董事长方汉在人工智能融合应用发展论坛上提出AIGC Agent是被系统性低估的结构性机会，并以音乐Agent产品Mureka Co为例拆解多模态内容行业智能化转型路径。", "type": "industry", "relTime": "5天前"}, {"id": 90, "title": "乔帮主（qiaomu-design）开源 AI 设计 Skill", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2074078579445661750", "date": "2026-07-06T10:30:42.000Z", "summary": "乔帮主（qiaomu-design）开源自用 AI 设计 Skill，整合 8 个主流设计 Skill 优点。特色：风格试衣间（一句话生成四个 Demo）；专攻中文排版，消除紫蓝渐变等廉价风格；自进化记录审美偏好；内置 58 套网站文档。建议用 GLM 5.2 或 Claude。安装：\\`npx skills add joeseesun/qiaomu-design\\`。可调整视觉冒险度、动效...", "type": "tip", "relTime": "6天前"}, {"id": 91, "title": "Claude Code 可直接观看完整视频的开源项目", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2074031575696629844", "date": "2026-07-06T07:23:55.000Z", "summary": "开源项目让 Claude Code 直接观看完整视频，用户提供链接后后台自动处理。采用 FFmpeg 场景检测截取关键帧，YouTube 用官方字幕，Zoom/Loom 用 Whisper 转写。分析完毕询问是否存入知识库。作者计划将本周咨询通话录音输入，称会议未结束即可自动整理行动项。", "type": "tip", "relTime": "6天前"}, {"id": 92, "title": "荣耀MagicOS七月版本升级预告：YOYO新增支持一语微信，远程协助应用上线", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/973/101.htm", "date": "2026-07-06T07:20:23.000Z", "summary": "荣耀MagicOS七月版本升级，YOYO新增一语微信功能（YOYO≥90.10.30.063，微信≥8.0.72），支持语音发消息或音视频通话。新增漫画故事玩法（照片转漫画加对话框）和Live盲盒玩法。远程协助应用上线，可一键连接亲友设备。其他更新：丝滑动效优化、灵动胶囊滑动交互与多胶囊自定义堆叠、锁屏3D照片及小组件（蓝牙耳机电量、YOYO帮记等）、无线投屏单应用投屏、屏幕共享120Fps...", "type": "paper", "relTime": "6天前"}, {"id": 93, "title": "Claude Code 成员 Thariq 分享 Fable 5 使用秘诀", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2074019009226322078", "date": "2026-07-06T06:33:59.000Z", "summary": "Thariq 分享用 Fable 5 的三个变化：1 将 Claude 当作思维伙伴，实施前让它\"面试提问\"或制作 HTML 原型，提供上下文而非简单约束；2 利用 /goal（目标指令）和 workflows（工作流）设定完整实现目标并自动验证各环节，生成差异报告；3 更有野心，尝试大语言模型过去做不到的事（如用 Fable 剪辑视频）。他指出 Fable 能运行数小时、自主测试并写出更优...", "type": "tip", "relTime": "6天前"}, {"id": 94, "title": "Yann LeCun：LLM 为何缺乏现实世界智能", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074011164917612880", "date": "2026-07-06T06:02:49.000Z", "summary": "Yann LeCun 在 Bloomberg 采访中指出，语言只是世界的粗略量化描述，LLM 只能处理离散符号序列。最大 LLM 预训练约 20 万亿词（30 万亿 tokens，1014 字节文本），相当于四岁儿童四年视觉接收的数据量，但阅读需 40 万年。儿童通过视觉、触觉、运动等感官获取密集反馈，文本则剥离了真实世界信息，导致 LLM 能流畅谈论物理却无触觉等原生感知。Moravec\\...", "type": "tip", "relTime": "6天前"}, {"id": 95, "title": "Google DeepMind 论文：自主 AI 智能体面临 6 种安全威胁首次分类", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2074006931509842082", "date": "2026-07-06T05:46:00.000Z", "summary": "Google DeepMind 最新论文首次系统分类了自主 AI 智能体的 6 种攻击类型：隐藏在 HTML 注释或白色文本中的指令、图像像素隐写术、PDF/元数据/演讲者备注中的覆盖命令、跨会话持久化记忆中毒、多智能体系统中的目标劫持与级联攻击。基准测试显示，隐藏提示注入在 86% 场景中部分控制智能体；子智能体劫持成功率 58-90%；数据泄露攻击在五种架构中成功率超 80%；利用 RA...", "type": "tip", "relTime": "6天前"}, {"id": 96, "title": "可灵AI NEXTGEN颁奖典礼7月7日首尔举行", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2073965813770358825", "date": "2026-07-06T03:02:37.000Z", "summary": "可灵AI（Kling AI）宣布将于2026年7月7日14：00-18：00在首尔电影中心举办\"Kling AI NEXTGEN Awards Ceremony\"。典礼将颁发三项大奖，表彰新一代视觉创作者，展映获奖AI视频作品，并邀请跨国导演、学者及媒体专业人士担任评审与演讲嘉宾。活动旨在汇聚亚洲及全球创作者，展示AI驱动的新叙事与视觉表达。", "type": "industry", "relTime": "6天前"}, {"id": 97, "title": "日本 TURING 目标最早 2028 年推出基于 AMD 硬件的 Robotaxi 软件", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/972/938.htm", "date": "2026-07-06T02:58:04.000Z", "summary": "日本智驾初创公司TURING完成7900万美元延展融资，A轮融资总额达1.74亿美元，资方包括AMD Ventures、三菱商事等，另获三菱日联3600万美元信贷额度。该公司已在东京郊区完成30分钟自动驾驶测试，计划最早2028年将Robotaxi软件推向市场。其智驾软件将运行于AMD芯片，目前约10%训练负载已转向AMD GPU。", "type": "industry", "relTime": "6天前"}, {"id": 98, "title": "Sky Computing Lab 在 ICML 2026 展示多项加速与推理研究", "source": "X：Sky Computing Lab (@haoailab)", "sourceUrl": "https://x.com/haoailab/status/2073941724897140967", "date": "2026-07-06T01:26:53.000Z", "summary": "Sky Computing Lab 在 ICML 2026 首尔发布五项研究：MADQA 基准（2250 道人工问题、800 份 PDF）评估多模态智能体；d3LLM 通过伪轨迹蒸馏实现扩散 LLM 最高 10 倍速、自回归模型 5 倍速；Jacobi Forcing 将预训练自回归模型转为因果并行解码器，编码/数学任务达 4 倍真实加速；OnlineSpec 利用验证反馈在线调整草稿模型，...", "type": "paper", "relTime": "6天前"}, {"id": 99, "title": "日本经产省公布AI机器人战略修订版，目标2040年部署1000万台机器人", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/972/895.htm", "date": "2026-07-06T01:07:30.000Z", "summary": "日本经济产业省6月30日公布《人工智能机器人战略》修订版，计划到2040年在18个领域部署1000万台AI机器人，以应对人口老龄化与低出生率导致的劳动力短缺。经产省表示将构建能发挥日本优势的物理AI与机器人数据基础架构。未来5年将向软银、NEC、本田、索尼等创立的Noetra提供合计1万亿日元资金，用于多模态平台开发，其中2026财年拨款3873亿日元。", "type": "industry", "relTime": "6天前"}, {"id": 100, "title": "HunyuanOCR-1.5：让轻量级OCR视觉语言模型更快更好", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04884", "date": "2026-07-06T00:00:00.000Z", "summary": "HunyuanOCR-1.5是一款轻量级端到端OCR视觉语言模型，统一文档解析、文本检测、信息提取、文本图像翻译及多图像文档理解。通过将DFlash适配到OCR解码，实现6.37倍Transformer推理加速和2.14倍vLLM加速，成为轻量级OCR VLM中推理最快的模型。新提出的Agentic Data Flow系统将模型弱点转化为数据需求，自主完成素材搜索、质量验证和pipeline...", "type": "paper", "relTime": "6天前"}, {"id": 101, "title": "CanvasAgent：通过视觉工具编排实现复杂图像创建与编辑", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05465", "date": "2026-07-06T00:00:00.000Z", "summary": "CanvasCraft数据集包含14万条完整标注的可执行轨迹和1万条强化学习任务规格。CanvasAgent是一个工具增强的多模态智能体，通过多轮交互编排异构视觉工具，先使用SFT学习可执行推理-动作轨迹，再通过GRPO结合结果与过程混合奖励进行优化。实验评估了最终图像质量和轨迹行为，证明了CanvasAgent在复杂多工具图像创建工作流中的有效性。", "type": "paper", "relTime": "6天前"}, {"id": 102, "title": "Light-Omni：智能体视频理解中的反射式推理与长期记忆", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05511", "date": "2026-07-06T00:00:00.000Z", "summary": "Light-Omni 是一个多模态智能体框架，通过维护持续合并多模态事件脚本的全局状态和基于全局上下文生成的参数化潜状态，在单次前向传播中构建所需上下文，驱动自主动作并产生检索嵌入，避免了迭代推理的高昂成本与延迟。在多个视频基准测试中，Light-Omni 平均准确率超越 M3-Agent 2.4%，推理速度提升 12.1 倍，GPU 内存效率提升 2.6 倍。该框架还可作为记忆系统增强现有...", "type": "paper", "relTime": "6天前"}, {"id": 103, "title": "GaP：用于变分自动化任务的图即策略多智能体自学习框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05369", "date": "2026-07-06T00:00:00.000Z", "summary": "GaP（Graph-as-Policy）是一个多智能体编码框架，针对机器人变分自动化任务（物体几何与姿态变化大）设计。它从模块化开放机器人技能库（MORSL）生成含感知、规划和控制节点的有向计算图，并通过内部模拟环境并行排练任务实例，迭代优化图结构与参数以提升成功率和吞吐量。在8个新开放变分自动化任务基准（4个模拟、4个真实世界）上的评估显示，GaP的成功率显著优于基线。代码与数据已公开。", "type": "paper", "relTime": "6天前"}, {"id": 104, "title": "SynCity 3000：自举场景级3D扩散", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05392", "date": "2026-07-06T00:00:00.000Z", "summary": "SynCity 3000是一个生成全局一致且细粒度布局可控的3D场景框架。它将图像转3D生成器微调后作为卷积操作符，应用于由用户提示生成的全场景二轴测图，从而输出任意大小和复杂度的3D场景。为缓解3D场景训练数据稀缺的问题，该框架还引入了一个新的合成数据引擎，用于生成场景级训练数据。", "type": "paper", "relTime": "6天前"}, {"id": 105, "title": "MV-Forcing：基于4D接地时空自强迫的长多视角视频生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05376", "date": "2026-07-06T00:00:00.000Z", "summary": "MV-Forcing在单一扩散模型中组合时序与视角自回归，通过引入4D几何桥接连接连续生成的视角，实现动态场景的长序列多视角一致视频生成。关键思路：自回归3D重建模型从已完成视角重建3D结构并渲染下一目标视角的几何先验，由扩散模型精化为高质量视频。通过联合去噪机制（训练时两个视角槽均从噪声初始化）实现不受限时序延展，并利用Distribution Matching Distillation与...", "type": "paper", "relTime": "6天前"}, {"id": 106, "title": "SaMer：保留对象证据的图像侧token合并用于视觉语言检索", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04605", "date": "2026-07-06T00:00:00.000Z", "summary": "多向量视觉语言检索利用后期交互保留细粒度证据，但图像侧大量token导致成本高昂。现有压缩方法可能丢失对象或区域级证据。SaMer是一种对象感知token合并框架，训练时使用对象标注作为合并先验，推理时无需边界框或检测器，仅调整共享投影层并冻结视觉与语言骨干。它将投影后的token压缩为K个代表性质心，保留原有后期交互接口。设置K=64时，SaMer移除93%以上的图像侧token，使Col...", "type": "paper", "relTime": "6天前"}, {"id": 107, "title": "LLM-as-a-Verifier：一种通用验证框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05391", "date": "2026-07-06T00:00:00.000Z", "summary": "LLM-as-a-Verifier 是一种无需额外训练的通用验证框架，通过计算评分 token logits 分布的期望生成连续分数，实现细粒度反馈。该框架在 Terminal-Bench V2（86.5%）、SWE-Bench Verified（78.2%）、RoboRewardBench（87.4%）和 MedAgentBench（73.3%）上取得 SOTA 性能。其细粒度信号可用于 ...", "type": "paper", "relTime": "6天前"}, {"id": 108, "title": "InternVLA-A1.5：统一理解、潜在预知与动作的组合泛化", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.04988", "date": "2026-07-06T00:00:00.000Z", "summary": "InternVLA-A1.5 将机器人策略构建在原生 VLM 骨干上，持续训练 VQA 和子任务预测，并附加轻量级统一专家生成连续动作。未来预测被重构为潜在查询，通过可学习预知 token 在冻结视频生成模型监督下将任务相关未来压缩为紧凑潜在代码；推理时丢弃视频分支以保持实时控制。模型在 1.2M 机器人片段和 3M 多模态样本上预训练，在全部 6 个仿真基准上取得最佳整体结果。真实世界中保...", "type": "paper", "relTime": "6天前"}, {"id": 109, "title": "面向密集空间感知的视觉预训练", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05247", "date": "2026-07-06T00:00:00.000Z", "summary": "针对物理智能所需的密集空间感知，本文提出掩码边界建模（masked boundary modeling）自监督预训练范式，动态学习亚像素边界表示并将边界token作为掩码目标，促进密集视觉token学习。基于该框架的LingBot-Vision在多项下游视觉任务上超越DINOv3，并推动深度完成模型从LingBot-Depth 1.0升级至2.0，显著提升深度估计性能--具身智能的关键支柱。...", "type": "paper", "relTime": "6天前"}, {"id": 110, "title": "PixWorld：在像素空间中统一3D场景生成与重建", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05373", "date": "2026-07-06T00:00:00.000Z", "summary": "PixWorld 是一个在像素空间中统一 3D 场景生成与重建的单一扩散模型。它直接在渲染图像上执行扩散监督，避免了潜空间方法的信息损失和对预训练 VAE/RAE 的依赖。通过引入几何感知损失，在预训练 3D 基础模型的特征空间中对其渲染视图与真实视图，提供 3D 结构监督。PixWorld 在生成任务上超越先前潜空间方法，在重建任务上匹配 SOTA 方法的性能。", "type": "paper", "relTime": "6天前"}, {"id": 111, "title": "Deform360：用于可变形世界模型的大规模多视角视触觉数据集", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05390", "date": "2026-07-06T00:00:00.000Z", "summary": "Deform360 是一个大规模多视角视触觉数据集，包含 198 个日常物品、1，980 个交互序列和超过 215 小时观测数据，来自 41 个环绕摄像头与双手触觉夹爪。该数据集通过无标记视触觉 3D 追踪管线提取稠密几何与运动信息，并系统评估了当前最先进的 2D 视频模型与 3D 粒子模型。初步演示展示了数据集在机器人规划任务中的应用，揭示了结构先验与可扩展性之间的权衡，为可变形物体中心的...", "type": "paper", "relTime": "6天前"}, {"id": 112, "title": "多玩家交互世界模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.05352", "date": "2026-07-06T00:00:00.000Z"
