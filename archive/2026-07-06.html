y": "7月3日，京东物流联合中国重汽、嬴彻科技在北京高级别自动驾驶示范区开启快递行业首个L4级自动驾驶重卡载货示范。首批L4重卡从京东物流北京魏永集货分拣中心驶出，单程31公里，车挂总重43吨，达真实满载标准。车辆搭载嬴彻科技全栈自研L4自动驾驶系统，融合激光雷达、毫米波雷达与多目视觉感知，可应对高速主干通行、匝道汇入汇出等场景，构建\"车端自主决策+云端实时监控+远程应急处置\"三级安全保障，主驾配...", "type": "industry", "relTime": "3天前"}, {"id": 25, "title": "生数科技发布 Vidu S1，推动视频生成迈向\"实时交互\"新时代", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/RuukpnoOA2tI0ERCNrLgtQ", "date": "2026-07-03T11:17:47.000Z", "summary": "7月3日，生数科技在2026全球数字经济大会上发布Vidu S1实时交互模型，支持实时视频通话和语音控制视频走向，实现无限时长连续互动。模型采用自回归扩散路线，基于已生成画面和语音指令持续预测后续内容；无需传统建模，一张图片即可创建角色并自定义音色。Vidu S1在540P分辨率下实现25FPS（最高42FPS）实时生成，通过TurboDiffusion等技术降低计算成本，已开启内测。", "type": "model", "relTime": "3天前"}, {"id": 26, "title": "C罗参演、可灵助阵：葡萄牙国家队世界杯出征视频的幕后故事", "source": "公众号：可灵AI（快手·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/RjgGlGJk7Sb76U1c_erJNw", "date": "2026-07-03T11:12:22.000Z", "summary": "葡萄牙国家队2026世界杯出征视频采用\"实拍+AI\"混合制作，C罗实拍参演，可灵AI（可灵3.0）用于生成海上风浪、船舱内、从葡萄牙驶向纽约的跨洋场景等关键画面。视频海外播放量超7000万，AI导演João Seiça表示可灵AI质感自然，让影片在预算可控下实现宏大视觉隐喻，且实拍与AI生成画面融合统一。他强调技术服务于故事，人是内容的灵魂。", "type": "industry", "relTime": "3天前"}, {"id": 27, "title": "JoyAI App 上线 UGC 数字人功能，用户可\"捏\"出专属虚拟玩伴", "source": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/XfpxdblzNWa5HxahRoT9pg", "date": "2026-07-03T10:03:25.000Z", "summary": "JoyAI App 近日上线 UGC 数字人功能，用户只需上传一张照片即可生成专属虚拟数字分身，支持一键复刻写实形象或通过模板重塑为卡通风格，搭配用户自己的语音即可解锁专属陪伴。该功能复用\"万能博士\"技术底座，集成 JoyAI 语言、语音、数字人大模型，实现行业领先的全双工对话，支持随时打断、自然接话。数字人兼具情绪陪伴与全能助手属性，可提供点外卖、金融咨询、学英语、规划行程等生活服务。", "type": "model", "relTime": "3天前"}, {"id": 28, "title": "阿里百度腾讯参投可灵20亿融资", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2072979634682228747", "date": "2026-07-03T09:43:53.000Z", "summary": "阿里巴巴已加入快手旗下AI视频部门可灵（Kling）的20亿美元融资轮，投前估值约150亿美元。该轮融资还包括百度与腾讯，并可能扩大至30亿美元。可灵正崛起为中国最强的生成视频挑战者之一，与字节跳动旗下Seedance及生数科技等初创公司竞争。其ARR据称从1月的3亿美元增至3月的5亿美元，受益于可灵3.0。", "type": "industry", "relTime": "3天前"}, {"id": 29, "title": "Wan Video 推出\"音乐伴舞\"新功能", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2072967570441834771", "date": "2026-07-03T08:55:57.000Z", "summary": "Wan Video 新功能：**音乐伴舞** 💃 上传一个角色，添加一首歌曲，让 Wan Video 生成与节奏同步的舞蹈视频。 可用舞种： • 街舞 • 踢踏舞 • 拉丁舞 • K-Pop • 中国古典舞 从节拍至动作，你的角色随音乐起舞。  前往 wan.video 体验音乐伴舞 👉 https://int.alibabacloud.com/m/1000412428/", "type": "paper", "relTime": "3天前"}, {"id": 30, "title": "谷歌 Gemini Omni Flash 登顶 Video Arena 盲测榜，领先字节 Seedance 2.0 Mini 模型 101 Elo", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/972/253.htm", "date": "2026-07-03T06:41:56.000Z", "summary": "谷歌 DeepMind 推出的文生视频模型 Gemini Omni Flash 以 1404 Elo 的成绩登顶 Video Arena 盲测排行榜，领先字节跳动 Seedance 2.0 Mini 模型 101 Elo。谷歌旗下视频模型的排名较 Veo 时期提升了 7 位。Video Arena 根据用户盲测投票生成排名，此前字节 Seedance 系列模型长期占据榜前。", "type": "tip", "relTime": "3天前"}, {"id": 31, "title": "claude-real-video ─ 让任何大语言模型（LLM）都能观看视频", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/HUANGCHIHHUNGLeo/claude-real-video", "date": "2026-07-03T04:56:06.814Z", "summary": "claude-real-video 是一个开源工具，让大语言模型基于视频画面而非字幕进行理解。它通过场景变化检测提取关键帧、滑动窗口去重并转录音频，生成干净的本地文件夹供模型读取。支持 YouTube 链接或本地文件，依赖 ffmpeg 和 Whisper，通过 pip 安装。全部处理在本地完成，不上传云端。", "type": "tip", "relTime": "3天前"}, {"id": 32, "title": "昆仑万维WAIC发布四大AI模型：世界模型、视频、音乐、机器人", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/1k2iJmwRiBJ4MMr-vi0xYA", "date": "2026-07-03T04:05:31.000Z", "summary": "7月19日，昆仑万维在WAIC举办\"世界模型与多模态范式革命\"论坛，全球首发Matrix-3.5世界模型、SkyReels v4.5视频大模型、Mureka v9.5音乐大模型、Riemann-1.0机器人模型。周志华院士、黄晓明、王珞丹等嘉宾出席。四大模型覆盖世界模型、视频生成、音乐创作、具身智能，落地游戏工业化、短剧量产、平民化音乐创作等场景。", "type": "model", "relTime": "3天前"}, {"id": 33, "title": "Orca论文：用\"预测下一个状态\"替代预测token/帧/动作", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2072875308345360825", "date": "2026-07-03T02:49:20.000Z", "summary": "Orca论文提出\"预测下一个状态\"新范式，取代GPT式\"预测下一个token\"、视频\"预测下一帧\"和机器人\"预测下一个动作\"。它从125K小时视频和1.6亿事件标注中学习统一世界潜在表示，通过无意识学习（连续视频物理状态）和有意识学习（事件描述/VQA）捕获状态转换。冻结主干后，该潜在表示可同时读出文 服...", "type": "paper", "relTime": "5天前"}, {"id": 57, "title": "GACR：面向解译的云去除--基于观测锚定残差流与地理上下文对齐", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02471", "date": "2026-07-02T00:00:00.000Z", "summary": "现有云去除方法只重视觉真实感，忽视下游解译性能。GACR 提出统一框架，兼顾忠实重建与鲁棒可解译性。其核心 OAR-Flow 将云去除重构为物理残差反演过程，以含云观测而非纯噪声锚定生成轨迹，实现快速稳定重建。Geo-Contextual Prior Alignment （GCPA） 利用视觉基础模型 （VFM） 约束重建于语义流形内，保持复杂地物的空间-语义完整性。在六个云去除数据集和十二...", "type": "paper", "relTime": "5天前"}, {"id": 58, "title": "VLA-Corrector：轻量级检测-纠正推理框架实现自适应动作视野", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.01804", "date": "2026-07-02T00:00:00.000Z", "summary": "VLA模型采用固定动作视野开环执行多个未来动作，但在接触密集交互中微小扰动会在开环盲区内放大导致复合错误。VLA-Corrector提出轻量级纠正推理框架，通过潜空间视觉监控器持续比较预测与实际视觉特征演化，在线检测视觉动态偏差；一旦发现持续偏差，触发截断并丢弃剩余陈旧动作，通过在线梯度引导进行纠正重规划。该机制自然产生事件触发的自适应动作视野，在保持长视野执行效率的同时提升鲁棒性，可无缝集...", "type": "paper", "relTime": "5天前"}, {"id": 59, "title": "AGVBench：面向可靠性的静脉识别数据增强基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02271", "date": "2026-07-02T00:00:00.000Z", "summary": "AGVBench 在五个掌静脉与指静脉公开数据集上，以七种骨干网络（经典 CNN、视觉 Transformer、静脉专用模型）评估了 30 种代表性数据增强策略。结果表明，多图像混合方法（如 MixUp、PuzzleMix、StarMixup）识别性能最优，但校准性差且易受对抗扰动攻击，干净准确率与对抗安全性不一致。剧烈几何变换常因特征错位或空间裁剪导致识别下降，且增强效果在掌静脉与指静脉数...", "type": "paper", "relTime": "5天前"}, {"id": 60, "title": "从 SRA 到 Self-Flow：数据增强还是自监督？", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02508", "date": "2026-07-02T00:00:00.000Z", "summary": "本研究重新审视扩散 Transformer 中自表示对齐方法从 SRA 到 Self-Flow 的改进机制。Self-Flow 采用双时间步调度，声称增益来自不同噪声层级 token 的交互。作者引入 Attention Separation，在保留双时间步输入的同时阻断跨噪声层注意力，发现去除交互不仅不会降低性能甚至有所提升，表明改进主要源于沿噪声维度的数据增强。Attention Sep...", "type": "paper", "relTime": "5天前"}, {"id": 61, "title": "表示分布匹配（RDM）用于一步视觉生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02375", "date": "2026-07-02T00:00:00.000Z", "summary": "表示分布匹配（RDM）通过匹配冻结预训练编码器下的生成与参考特征分布来训练一步图像生成器。三个发现：经典MMD正确估计后成为可扩展目标；生成批次大小最优超过2048；单一表示可被欺骗，需匹配平衡编码器组合并采用独立于训练损失的SW_r14评估。改进的iRDM在ImageNet上以SW_r14 1.30达一步生成SOTA，PickScore在71.2%样本上偏好iRDM。该方法将四步FLUX....", "type": "paper", "relTime": "5天前"}, {"id": 62, "title": "基于分布奖励优化视觉生成模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02291", "date": "2026-07-02T00:00:00.000Z", "summary": "针对传统强化学习使用样本级奖励易导致奖励黑客、多样性降低等问题，提出基于分布奖励的微调框架。该分布奖励考虑样本数据分布，避免模式崩溃；采用子集替换策略高效计算奖励。同时用RL优化后验模型合并系数，缓解引入SDE导致的训练-推理不一致。在SiT和EDM2上，FID-50K分别从8.30降至5.77、从3.74降至3.52，定性评估显示感知质量提升并保持多样性。", "type": "paper", "relTime": "5天前"}, {"id": 63, "title": "AnyGroundBench：面向视觉-语言模型视频定位的专业领域基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02269", "date": "2026-07-02T00:00:00.000Z", "summary": "AnyGroundBench是为评估视觉-语言模型（VLM）在时空视频定位（STVG）中的领域自适应能力而设计的基准。它覆盖动物行为、工业、体育、手术和公共安全五个专业领域，汇集新拍摄视频与已有数据集，提供密集高保真时空标注，并包含训练子集用于衡量领域适应性。对15个最新VLM的零样本泛化和上下文学习（ICL）评估显示，当前模型在专业领域零样本和ICL适应均失败，暴露出时空推理中的关键缺陷。", "type": "paper", "relTime": "5天前"}, {"id": 64, "title": "WorldDirector：构建具备持久动态记忆的可控世界模拟器", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.02517", "date": "2026-07-02T00:00:00.000Z", "summary": "WorldDirector 提出高度可控的视频世界模型框架，支持持久动态对象记忆和不受限制的视点探索。其核心思路是将语义运动编排与视觉生成解耦：先利用 LLM 协调 3D 物体轨迹与摄像机运动，再将编排后的轨迹作为控制信号驱动视频生成。这确保了严格的物理逻辑和外观稳定性--即使动态实体长时间离开视野再重新进入，也能保留精确的视觉身份。实验表明，该方法能合成复杂、扩展的事件，具备前所未有的可控...", "type": "paper", "relTime": "5天前"}, {"id": 65, "title": "MrFlow：基于分阶段采样的训练无关扩散加速多分辨率匹配策略", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.01642", "date": "2026-07-02T00:00:00.000Z", "summary": "MrFlow是一种训练无关的多分辨率加速策略，采用分阶段低到高分辨率流程：先在低分辨率快速生成主结构，再用轻量预训练GAN模型在像素空间超分，注入低强度噪声以高频重采样，最后在高分辨率细化细节。在FLUX.1-dev和Qwen-Image上，MrFlow利用低分辨率采样的二次token缩减和步数减少，实现10倍端到端加速，同时将OneIG保持在加速前的1%差距内，显著优于其他训练无关加速方法...", "type": "paper", "relTime": "5天前"}, {"id": 66, "title": "学习扩散语言模型的去掩码策略", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/unmasking", "date": "2026-07-02T00:00:00.000Z", "summary": "研究人员提出使用强化学习训练扩散语言模型（dLLM）的采样策略。该方法将掩码扩散采样形式化为马尔可夫决策过程，以 dLLM 为环境，采用单层 Transformer 策略网络将 token 置信度映射为去掩码决策。实验表明，在半自回归（块）生成中，该策略匹配了最先进的启发式方法，在全扩散设置中则超越后者。", "type": "paper", "relTime": "5天前"}, {"id": 67, "title": "RL微调VLM的鲁棒性与思维链一致性研究", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/robustness-chain-thought-consistency", "date": "2026-07-02T00:00:00.000Z", "summary": "强化学习（RL）微调被扩展至视觉语言模型（VLM）。研究发现，简单的文本扰动--误导性标题或错误思维链（CoT）--会显著降低模型鲁棒性和置信度，且开源模型衰退更明显。闭源模型呈现类似失败模式，但鲁棒性和推理一致性更强。进一步分析揭示准确性与忠实性的权衡：微调提升基准准确率，但同时侵蚀CoT的可靠性及对上下文变化的鲁棒性；对抗性增强可改善鲁棒性，却无法阻止忠实性漂移。引入忠实性感知奖励能恢复...", "type": "paper", "relTime": "5天前"}, {"id": 68, "title": "VideoFlexTok：可变长度粗到细视频分词", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/videoflextok", "date": "2026-07-02T00:00:00.000Z", "summary": "VideoFlexTok提出一种可变长度token序列的视频表示方法，采用粗到细结构--首个token捕捉语义和运动等抽象信息，后续token添加精细细节，生成流解码器支持任意token数量的视频重建。相比传统3D网格分词，该结构允许根据下游需求调整token数，在相同预算下编码更长视频。在类别和文本到视频生成任务中，VideoFlexTok以1.1B参数（5.2B的1/5）达到可比生成质量...", "type": "paper", "relTime": "5天前"}, {"id": 69, "title": "Seedance 2.0 生成逼真韩国社区生活视频", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2072468362467082719", "date": "2026-07-01T23:52:16.000Z", "summary": "Seedance 2.0 通过详细 prompt 生成一段超真实视频，以 2000 年代初 DV 摄像机美学展示韩国女性日常：手持抖动、自动对焦搜索、曝光波动、运动模糊等不完美感，配合环境自然音（鸟鸣、风声、社区闲聊），实现家庭录像般的独特说服力。", "type": "tip", "relTime": "5天前"}, {"id": 70, "title": "Reve 2.0 文生图模型发布，排行榜第二", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2072443180004544909", "date": "2026-07-01T22:12:12.000Z", "summary": "Reve 2.0 文生图模型发布，在 Artificial Analysis 文生图排行榜上位列第二，仅次于 OpenAI 的 GPT Image 2。该模型将原始文本提示转换为结构化布局提示，生成原生 4K 图像，支持对布局中单个元素进行移动、编辑、替换和重新渲染，同时保留其他元素不变。目前可通过 Reve 应用使用，API 平台即将上线。", "type": "model", "relTime": "5天前"}, {"id": 71, "title": "PixVerse APP 推出 Lip-Sync 功能", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2072394900923097149", "date": "2026-07-01T19:00:22.000Z", "summary": "多数内容无法发布的首要原因？ 就是需要自己出镜拍摄。  试试 PixVerse APP 上的 Lip-Sync。  添加图片或视频，输入脚本（或上传音频），即可生成。 使用内置声音、克隆自己的声音，或用任何音频文件驱动。  转推 + 关注 + 回复 = 150 积分私信发放（仅限 72 小时）", "type": "product", "relTime": "5天前"}, {"id": 72, "title": "部署零售AI以扩展个性化和客户洞察", "source": "Artificial Intelligence News（RSS）", "sourceUrl": "https://www.artificialintelligence-news.com/news/deploying-retail-ai-to-scale-personalisation-customer-insight", "date": "2026-07-01T15:58:43.000Z", "summary": "零售AI通过生成式UI实时定制页面布局、文案和交互组件，将购买频率提升35%、平均订单价值提高21%。多模态社交倾听系统处理视频、音频和未标记图像，覆盖82%的互联网流量，全球市场本财年达28.3亿美元，76%的分析师报告可见投资回报。基于大语言模型的合成用户模拟可在沙箱环境中执行数千次自动化访谈和内容测试。边缘计算硬件支持无收银台结账、实时货架跟踪等物理自动化，该市场预计2040年超370...", "type": "tip", "relTime": "5天前"}, {"id": 73, "title": "Osaurus：Mac本地AI工作台，自动切换模型原生图像生成", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2072348913559015852", "date": "2026-07-01T15:57:38.000Z", "summary": "Osaurus AI App 推出 Mac 原生 AI 工作台，不是浏览器套壳，而是用 Swift 在本地运行图像生成。用户生成图片时自动卸载当前聊天模型，加载本地图像模型（支持任意 MLX 模型），在 GPU 上生成并保存真实文件后再切回聊天模型，全程无需联网。目前 6k GitHub Stars、15.5 万次下载，MIT 开源，适合在 Mac 上本地跑多模型切换。", "type": "model", "relTime": "5天前"}, {"id": 74, "title": "6个PPT Skill处理GEO入门文档对比测试", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2072342230384463983", "date": "2026-07-01T15:31:04.000Z", "summary": "用户用Codex将GEO入门文档整理后，分别交给6个顶流PPT Skill生成演示内容。部分Skill输出HTML，宝玉走生图路线，PPT Master可直接生成PPT和PDF便于编辑。归藏版本留白较多，适合演讲类内容，而非知识点密集的培训课件。测试仅反映默认表现，不代表各Skill能力上限。用户根据本次交付暂时更倾向PPT Master。", "type": "tip", "relTime": "5天前"}, {"id": 75, "title": "Jim Fan团队推出ASPIRE：机器人自我进化的技能库系统", "source": "X：Jim Fan (@DrJimFan)", "sourceUrl": "https://x.com/DrJimFan/status/2072337488782475390", "date": "2026-07-01T15:12:14.000Z", "summary": "继EMPIRE后，Jim Fan团队发布ASPIRE，为机器人构建可自我进化、无限累积的技能库。编码智能体观察仿真和真实机器人的多模态感官轨迹，对控制程序进行进化搜索，将最佳策略蒸馏进不断扩展的库中。ASPIRE无需梯度下降或端到端策略，而是通过传递\"技能知识\"绕过sim2real和跨本体迁移难题，相比从头训练实现约10倍迁移学习token缩减。已在150+任务和90+技能上验证，计划开源全栈。", "type": "paper", "relTime": "5天前"}, {"id": 76, "title": "Boogu-Image-0.1-Edit-Turbo 开源：4步蒸馏图像编辑模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2072326538926969225", "date": "2026-07-01T14:28:43.000Z", "summary": "ModelScope 上开源了 Boogu-Image-0.1-Edit-Turbo，一个 4 步蒸馏的 image-to-image 编辑模型，主打快速视觉编辑。支持物体替换、风格迁移、场景/背景修改，以及带文字感知的图像变换。", "type": "model", "relTime": "5天前"}, {"id": 77, "title": "Google DeepMind SynthID 水印技术进展", "source": "X：Google AI (@GoogleAI)", "sourceUrl": "https://x.com/GoogleAI/status/2072318809277390940", "date": "2026-07-01T13:58:00.000Z", "summary": "Google DeepMind 2023 年推出 SynthID 数字水印，已覆盖图像、视频、音频和文本，累计标记超 1000 亿图像视频及 6 万年音频。用户可在 Google 搜索、Chrome 内 Gemini 及 Gemini App 验证内容，使用超 5000 万次。同时采用 C2PA Content Credentials 标准，可查内容来源与修改历史。已开源文本水印技术，并与 ...", "type": "model", "relTime": "5天前"}, {"id": 78, "title": "可灵 Kling AI 在 2026 戛纳狮子奖斩获银狮铜狮", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2072296943666016418", "date": "2026-07-01T12:31:07.000Z", "summary": "可灵 Kling AI 宣布，由 Lipstick 制作、Sebastian Strasser 执导的短片《L\\'Ultimo Uomo Reale》（最后的真人）在 2026 年戛纳狮子奖上获奖：电影 - 消费品类银狮奖和新增的电影工艺 - AI 工艺类铜狮奖。片中大部分镜头由可灵 Kling AI 生成，展示出行业领先的角色一致性、电影级视觉效果和动作质量，成为导演创意的完美伙伴。", "type": "industry", "relTime": "5天前"}, {"id": 79, "title": "日本应对劳动力短缺：为1000万台机器人开发的AI模型", "source": "Artificial Intelligence News（RSS）", "sourceUrl": "https://www.artificialintelligence-news.com/news/japan-ai-robots-2040-national-ai-model", "date": "2026-07-01T11:00:00.000Z", "summary": "日本经济产业省与NEDO正式委托Noetra和AIST开发\"物理AI\"多模态基础模型，可同时理解语言、图像、视频和传感器数据，使机器人自主解读环境并行动。初始版本计划本财年发布，随后每年升级。政府目标到2040年在18个行业部署1000万台AI机器人，资金上限1万亿日元（约61亿美元），但仅前两年锁定，之后每年通过阶段门审查决定续投。Noetra由软银、NEC、索尼和本田控股，富士通和乐天正...", "type": "industry", "relTime": "5天前"}, {"id": 80, "title": "Nano Banana 2 Lite：任意替换动物头部为物体，无缝融合", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2072272472049586461", "date": "2026-07-01T10:53:52.000Z", "summary": "Nano Banana 2 Lite 是一款图像生成工具，支持将动物头部替换为任意物体，并自动匹配颜色与纹理，实现无缝、自然的融合（如阿拉伯眼镜蛇头部替换为订书机，物体特征巧妙构成面部，原始动物面部完全不可见）。用户可快速迭代不同动物与物体组合，快速探索创意。", "type": "tip", "relTime": "5天前"}, {"id": 81, "title": "阿里云Happy Horse助力短片《CLOCKWORKS》获AI电影节亚军", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2072265540618342813", "date": "2026-07-01T10:26:20.000Z", "summary": "阿里云AI视频生成工具Happy Horse支撑短片《CLOCKWORKS》在AI电影节摩纳哥黑客马拉松中夺得第二名。影片由Jeni To创作，讲述一个女孩在冰冷齿轮世界中面对压抑的另一个自我，领悟到完美只能复制而无法创造，真正的创造力源自伤痕、焦虑与泪水。该片使用festival-grade AI工具将原始情感转化为视觉艺术，阿里云Happy Horse是背后的创意引擎。", "type": "industry", "relTime": "5天前"}, {"id": 82, "title": "2026 BAIR Graduate Showcase", "source": "BAIR：Berkeley AI Research Blog", "sourceUrl": "http://bair.berkeley.edu/blog/2026/07/01/grads-2026", "date": "2026-07-01T09:00:00.000Z", "summary": "BAIR 实验室庆祝 2026 届博士毕业生。他们的研究涵盖机器人、大语言模型、计算机视觉、生成模型、AI 安全、人机交互、AI for Science 等领域。毕业生将前往高校教职、博士后、企业研究实验室（如 OpenAI、Mistral AI、Amazon、Physical Intelligence）或创办自己的初创公司。", "type": "industry", "relTime": "5天前"}, {"id": 83, "title": "Wayve 启动 8500 万美元员工股权收购要约，估值 85 亿美元", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/30/wayve-launches-85m-employee-tender-offer-at-8-5b-valuation", "date": "2026-07-01T02:04:40.000Z", "summary": "英国自动驾驶初创公司 Wayve 允许员工出售部分既得股权，现有和新投资者主导了这笔 8500 万美元的股权收购要约，公司估值 85 亿美元。该估值基于今年 2 月完成的 12 亿美元 D 轮融资，领投方包括 Eclipse、Balderton 和软银愿景基金 2，微软、英伟达、Uber 等参与。这是 Wayve 第二次员工流动性事件，此前曾在 2024 年 5 月的 10.5 亿美元 C ...", "type": "industry", "relTime": "5天前"}, {"id": 84, "title": "Tenstorrent 发布 RISC-V CPU 内核 TT-Ascalon S，单位面积性能达旗舰 IP 的 140%", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/970/866.htm", "date": "2026-07-01T01:42:48.000Z", "summary": "Tenstorrent 发布 RISC-V CPU 内核 TT-Ascalon S，以旗舰核心 Ascalon X 一半面积实现其 70% 性能
