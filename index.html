小时具身视频（机器人...", "type": "model", "relTime": "2天前"}, {"id": 62, "title": "Perceptron Egocentric 新型机器人视频标注系统发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2075286203583398181", "date": "2026-07-09T18:29:22.000Z", "summary": "Perceptron Egocentric 旨在解决机器人训练数据瓶颈--录制演示容易，但手动标注每个抓取、握持、移动等耗时昂贵。输入原始机器人摄像头或第一人称视频，输出结构化标签：时间戳、子任务边界、每手动作、逐帧手部位置及左右手识别。系统在基于 Gemini 3.5 Flash 和 Gemini Robotics-ER 1.6 的标注流程上达到 SOTA 水平。早期访问现已向合作伙伴开放。", "type": "paper", "relTime": "2天前"}, {"id": 63, "title": "BytePlus 推出 Seedream 5.0 Pro 图像模型，专注可编辑设计", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2075281603396583592", "date": "2026-07-09T18:11:05.000Z", "summary": "BytePlus 发布 Seedream 5.0 Pro 图像模型，定位\"超越生成，理解设计\"。该模型专攻可编辑设计工作，支持高密度信息图、空间注释、基于草图的编辑、图层分离、逼真肖像纹理，以及 10+ 种语言原生生成（含中文、英文、法文、德文、俄文、日文、韩文、西班牙文、阿拉伯文等，并支持从右至左文本和重音符号）。示例涵盖 16 格电影故事板、复杂 RPG 角色 UI、多语言公共安全通知、...", "type": "model", "relTime": "2天前"}, {"id": 64, "title": "如何阻止Meta的AI图像生成器使用你的Instagram照片", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/09/how-to-stop-metas-ai-image-generator-from-using-your-instagram-photos", "date": "2026-07-09T17:56:47.000Z", "summary": "Meta推出AI图像生成功能Muse Image，允许用户利用公开Instagram账户的照片生成AI图像，只有私密账户和18岁以下用户自动排除。用户可在个人资料中选择\"分享和复用\"，关闭\"允许他人使用和复用你的内容\"以退出。该功能引发隐私担忧，此前Meta因剑桥分析事件被FTC罚款50亿美元，涉及8700万用户数据泄露。Pew调查显示35%受访者对AI增长担忧多于兴奋。", "type": "tip", "relTime": "2天前"}, {"id": 65, "title": "Meta 发布 Muse Spark 1.1，API 定价低于 Grok 4.5，挤压 OpenAI 和 Anthropic", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/metas-muse-spark-1-1-api-pricing-squeezes-openai-and-anthropic-as-the-ai-price-war-heats-up", "date": "2026-07-09T16:58:44.000Z", "summary": "Meta 推出多模态推理模型 Muse Spark 1.1，专为智能体任务、编程和计算机使用设计，支持多智能体编排与百万 token 上下文窗口。其 API 定价为输入 1.25 美元、输出 4.25 美元、缓存 0.15 美元（每百万 token），低于昨日发布的 xAI Grok 4.5，且远低于 OpenAI 和 Anthropic 竞品。该模型在 VALS-AI 榜单排名第四，Vib...", "type": "model", "relTime": "2天前"}, {"id": 66
