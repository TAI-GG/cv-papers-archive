": "5小时前"}, {"id": 6, "title": "Black Forest Labs 发布 Flux 3：可生成带原生音频的 20 秒视频，并推出机器人动作模型 Flux-mimic", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/flux-3-generates-videos-with-native-audio-up-to-20-seconds-long-a-first-for-black-forest-labs", "date": "2026-07-23T18:03:01.000Z", "summary": "德国 AI 公司 Black Forest Labs 发布多模态基础模型 Flux 3，可同时从图像、视频和音频中学习，首次支持生成带原生音频、最长 20 秒的视频。", "type": "model", "relTime": "5小时前"}, {"id": 7, "title": "Runway 推出首款生成媒体优化路由", "source": "X：Runway (@runwayml)", "sourceUrl": "https://x.com/runwayml/status/2080343130780655635", "date": "2026-07-23T17:23:47.000Z", "summary": "推出 Runway Media Router。  首个面向生成媒体的偏好优化路由。无需为每次请求手动挑选模型，你只需一次性定义\"最佳\"的标准--成本、质量或延迟--路由便会自动选择合适的视频、图像或音频模型。  现已上线 Runway Dev。", "type": "model", "relTime": "6小时前"}, {"id": 8, "title": "Grok 凭代码口喷生成 4K 视频", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2080341822686015683", "date": "2026-07-23T17:18:36.000Z", "summary": "用户仅将一篇文章喂给 Grok，并让其制作 AI 预测底层逻辑视频，Grok 直接通过纯代码口喷一口气生成 4K 高清视频。整个过程无需额外工具或复杂操作，展示了 Grok 强大的代码生成与视频制作能力。", "type": "tip", "relTime": "6小时前"}, {"id": 9, "title": "Runway 推出 Media Router，为生成式媒体自动选择最佳模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/23/runway-bets-on-ai-model-routing-as-generative-media-gets-crowded", "date": "2026-07-23T17:07:35.000Z", "summary": "Runway 通过其开发者平台 Runway Dev 推出 Media Router，该工具可根据开发者对质量、速度或成本的优先级，自动为图像、视频和音频生成请求选择最佳模型。Runway 称这是首个专为生成式媒体打造的模型路由器，其智能层基于内部创意团队对各类媒体输出的评估经验。此举标志着 Runway 从 AI 视频初创公司向生成式媒体基础设施层转型。", "type": "model", "relTime": "6小时前"}, {"id": 10, "title": "FLUX 3 统一多模态，视频已开放早期访问", "source": "X：Emad Mostaque (@EMostaque)", "sourceUrl": "https://x.com/EMostaque/status/2080326079131128056", "date": "2026-07-23T16:16:02.000Z", "summary": "Black Forest Labs 发布 FLUX 3，一个统一架构的多模态模型，支持图像、视频、音频和动作预测。FLUX 3 Video 现已开放早期访问，模型还可扩展用于机器人动作预测。", "type": "model", "relTime": "7小时前"}, {"id": 11, "title": "社区将Kimi视觉编码器接入GLM 5.2，开源视觉版模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2080319812232941631", "date": "2026-07-23T15:51:08.000Z", "summary": "开发者将Kimi的MoonViT视觉编码器挂载到GLM 5.2上，组装出可用的视觉版本，并开源了NVFP4量化权重。该模型并非官方联合训练的多模态模型，而是将不同团队的视觉编码器与语言模型硬接，证明了\"插件式\"组装已具备实用效果。", "type": "model", "relTime": "8小时前"}, {"id": 12, "title": "Flux 3 视频生成达前沿水平，支持音频与机器人动作预测", "source": "X：Deedy Das (@deedydas)", "sourceUrl": "https://x.com/deedydas/status/2080318330913869943", "date": "2026-07-23T15:45:15.000Z", "summary": "Black Forest Labs 发布 Flux 3，一个统一架构的多模态模型，覆盖图像、视频、音频和动作预测。其视频生成能力达到 Seedance 2 / Gemini Omni 级别，可生成约 20 秒带音频的视频，并已开放早期访问。Flux 3 还可扩展用于机器人动作预测，是当前唯一达到视频生成前沿水平的初创公司。", "type": "model", "relTime": "8小时前"}, {"id": 13, "title": "Black Forest Labs 发布开源 Flux 3 视频模型", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2080317863400030312", "date": "2026-07-23T15:43:23.000Z", "summary": "Black Forest Labs 发布并开源 Flux 3 视频生成模型，支持文生视频、图生视频、视频参考生成、视频与音频延长、关键帧控制及智能剪辑等功能。Flux 3 Dev 模型已开放早期访问申请，API 将在未来几周开放，随后发布开源版本。", "type": "model", "relTime": "8小时前"}, {"id": 14, "title": "Luma AI 生成服装自主决策视频", "source": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2080287018135810315", "date": "2026-07-23T13:40:49.000Z", "summary": "穿得足够张扬，服装就会开始自己做决定。 由 Shan ul Haq 创作。使用 Luma 制作。", "type": "tip", "relTime": "10小时前"}, {"id": 15, "title": "实测多模型IMO 2026满分，Qwen3.8-Max等三模型一次性通过", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2080283187721503170", "date": "2026-07-23T13:25:36.000Z", "summary": "博主实测GPT-SOL-5.6-High、Qwen3.8-Max-Preview、KIMI K3三个模型在IMO 2026大赛中均获满分42分，一次性解决全部6道题目。速度排序：GPT-SOL-5.6-High用时14分58秒，Qwen3.8-Max-Preview用时45分钟，Kimi K3用时1小时32分6秒。去年仅两个模型勉强得35分，今年多个主流模型已能稳定一次通过IMO。", "type": "tip", "relTime": "10小时前"}, {"id": 16, "title": "马斯克：特斯拉 AI 投资越快越好，不怕部分资金浪费", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/828.htm", "date": "2026-07-23T12:14:39.000Z", "summary": "特斯拉 CEO 马斯克要求公司加快 AI 投资节奏，即使部分资金被浪费也在所不惜。特斯拉第二季度资本支出同比大增 142% 至 58 亿美元，自由现金流净流出 11 亿美元，为 2024 年以来首次转负。公司预计全年资本支出超 250 亿美元，并寻求最高 300 亿美元的借款能力以支撑 AI 算力、Cybercab 自动驾驶出租车和 Optimus 人形机器人等项目建设。", "type": "industry", "relTime": "11小时前"}, {"id": 17, "title": "FLUX 3 全模态模型预告，支持 20 秒视频生成", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2080264515682496991", "date": "2026-07-23T12:11:24.000Z", "summary": "黑森林工作室短暂上线 FLUX 3 预告，该模型支持图像、视频、音频和动作生成，是一个全模态生成模型，单条视频可一次生成 20 秒。按惯例该模型可能开源，若开源将利好整个生态。", "type": "model", "relTime": "11小时前"}, {"id": 18, "title": "腾讯设计Agent\"设计妙境 Miora\"上线，可完成品牌全案设计", "source": "公众号：卡尔的AI沃茨", "sourceUrl": "https://mp.weixin.qq.com/s/wTI00g8lar2eLSgXAFAgBQ", "date": "2026-07-23T11:47:01.000Z", "summary": "腾讯推出首个设计Agent\"设计妙境 Miora\"，覆盖品牌设计、电商广告、3D建模、App UI、TVC等13个场景。Miora具备记忆功能，能持续记住用户审美偏好，并支持将完整流程保存为可复用的Skill。实测中，Miora从Logo、品牌手册到产品外观、包装、IP周边、45平方米体验店、配套App、电商详情页及30秒TVC和带货视频，全流程自主生成。", "type": "product", "relTime": "12小时前"}, {"id": 19, "title": "谷歌推出\"自拍视频\"功能，允许用户通过自拍视频登录和恢复账号", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/806.htm", "date": "2026-07-23T10:48:47.000Z", "summary": "谷歌推出\"自拍视频（Selfie Video）\"功能，允许用户提前录制一段包含指定头部动作的短视频，在无法使用传统方式时通过人脸匹配和活体检测验证身份，以恢复账号访问权限。该功能从今天起陆续开放，暂不支持 Google Workspace 企业账号、儿童账号及高级保护计划账号。自拍视频存储时经过加密，用户可随时删除，并可自行决定是否授权谷歌使用视频数据改进身份验证技术。", "type": "paper", "relTime": "13小时前"}, {"id": 20, "title": "阿里云WAIC AI视频创作赛获奖作品发布", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2080226902942630348", "date": "2026-07-23T09:41:57.000Z", "summary": "作为 WAIC 的一部分，阿里云自豪地主办了一场 AI 视频创作者马拉松，汇聚创作者共同探索 AI 短片的边界。  我们很高兴分享首个获奖作品--完全使用我们的 AI 视频生成模型 Happyhorse 制作。其卓越的一致性和细节有力地证明了当今 AI 工具所能实现的可能。", "type": "industry", "relTime": "14小时前"}, {"id": 21, "title": "荣耀官宣全球首款机器人手机 Robot Phone，8 月见", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/754.htm", "date": "2026-07-23T09:41:13.000Z", "summary": "荣耀今日宣布全球首款机器人手机--荣耀 Robot Phone 将于 8 月发布，宣称\"打破手机固有形态\"。该机搭载第五代骁龙 8 至尊版芯片，机身顶部集成行业最小的四自由度钛合金机械云台系统，体积比主流方案缩小 70%。荣耀 Robot Phone 还将首发新一代伙伴型多模态智能体操作系统 AgenticOS 的内核。", "type": "paper", "relTime": "14小时前"}, {"id": 22, "title": "Dreamina Seedance 2.0 4K 生成 13 分钟科幻短片", "source": "X：Testing Catalog (@testingcatalog)", "sourceUrl": "https://x.com/testingcatalog/status/2080218848087679199", "date": "2026-07-23T09:09:56.000Z", "summary": "Dreamina Seedance 2.0 4K 已能生成生产级视频。导演 Neill Blomkamp 用该工具纯文本生成了 13 分钟科幻恐怖短片《Nightborne》，每帧均由提示词驱动，并使用了 32 人的授权肖像与声音。Blomkamp 称这是长片测试，并预期 Seedance 2.5 将带来质的飞跃。", "type": "tip", "relTime": "14小时前"}, {"id": 23, "title": "阿里云发布Qwen-Image-3.0：主打\"真实\"的图像生成模型", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2080218126264778781", "date": "2026-07-23T09:07:04.000Z", "summary": "阿里云推出第三代图像生成基础模型Qwen-Image-3.0，核心关键词为\"真实\"。该模型支持4.5k token长提示词，可一次性生成复杂版面（如报纸、考卷、3×3信息图），文字清晰至10px，并支持12种语言原生渲染、100+艺术风格及实时网络检索。", "type": "model", "relTime": "14小时前"}, {"id": 24, "title": "特斯拉 App 代码暗示已开始为 Optimus 人形机器人上线做准备", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/629.htm", "date": "2026-07-23T07:08:36.000Z", "summary": "特斯拉手机 App 中首次出现多项与 Optimus 项目相关的代码，包括专门面向机器人的蓝牙低功耗（BLE）身份认证机制，以及适用于家庭场景的数据采集功能。用户可将手机添加至机器人设备授权白名单，只有经过授权的设备才能与 Optimus 通信和控制。未来 Optimus 执行家务任务时，App 将弹出页面征求用户授权，采集视频和空间环境数据用于优化智能模型。", "type": "industry", "relTime": "16小时前"}, {"id": 25, "title": "荣耀发布全新品牌标识\"荣耀之环\"及主张\"敢想，敢不同\"，阿尔法战略508天后公布Robot Phone等进展", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/627.htm", "date": "2026-07-23T07:01:35.000Z", "summary": "荣耀终端CEO李健今日正式揭晓全新品牌图形标识\"荣耀之环\"及品牌主张\"敢想，敢不同\"。508天前开启的阿尔法战略已取得进展：打造了荣耀Robot Phone，使智能体手机迈向三维物理世界；在具身智能领域推出机器人闪电和元气仔，超越人类半马世界纪录；并与阿莱展开影像战略合作。", "type": "industry", "relTime": "16小时前"}, {"id": 26, "title": "Grok Build v0.2.111 更新：开发者控制增强", "source": "X：Elon Musk (@elonmusk, xAI)", "sourceUrl": "https://x.com/elonmusk/status/2080170228554903796", "date": "2026-07-23T05:56:44.000Z", "summary": "xAI 发布 Grok Build v0.2.111 更新，开发者现可通过 config.toml 或环境变量禁用图像与视频生成工具。新版本在 TUI 内直接支持 \\`grok doctor fix\\` 诊断命令，\\`/session-info\\` 可显示 OAuth 或 API key 账户信息。此外修复了多项会话可靠性问题，并降低了 macOS 语音模式的显存占用。", "type": "product", "relTime": "17小时前"}, {"id": 27, "title": "DeepSeek 梁文锋：产品是AGI副产品，代码与通用Agent优先", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2080160617667985438", "date": "2026-07-23T05:18:33.000Z", "summary": "DeepSeek 创始人梁文锋在投资者会议上阐述其核心原则：产品只是通往 AGI 路上的副产品，当前不以营收为重心；3D/视频生成及世界模型不在主计划内，多模态仅作为产品组件而非核心智能。公司优先投入代码与通用 AI 智能体，行业专用智能体可暂缓，模型幻觉被视为长期产品问题而非当前重点。", "type": "tip", "relTime": "18小时前"}, {"id": 28, "title": "马斯克宣布用 AI 工具 Grok Imagine 拍摄《奥德赛》长篇电影，全白人班底确保\"符合史实\"", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/391.htm", "date": "2026-07-23T01:37:04.000Z", "summary": "埃隆·马斯克在 X 上表示，计划在 2026 年底前用自家 AI 视频生成工具 Grok Imagine 制作一部完整的《奥德赛》长篇电影。他称影片将\"符合史实，并忠于荷马的艺术作品\"，并转发了一段 AI 生成的场景视频。马斯克未公布具体制作方式、影片时长或 Grok Imagine 如何维持长片一致性等细节。", "type": "industry", "relTime": "22小时前"}, {"id": 29, "title": "Muse Spark 1.1 3D游戏生成成本仅为Gemini 3.6三分之一", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2080086690660851837", "date": "2026-07-23T00:24:47.000Z", "summary": "Meta的Muse Spark 1.1在生成自运行3D街机游戏任务中，以31.3K token、0.026美元的成本击败Gemini 3.6（28.8K token、0.073美元），成本仅为后者三分之一。Muse Spark 1.1完美生成了台球、冰球和桌上足球三款游戏，细节丰富；而Gemini 3.6的冰球出现故障，桌上足球则卡顿成静态画面。", "type": "tip", "relTime": "23小时前"}, {"id": 30, "title": "Qwen-Image-3.0 发布：主打\"真实\"与细腻人像", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2080074549761028386", "date": "2026-07-22T23:36:33.000Z", "summary": "阿里通义千问发布第三代图像生成模型 Qwen-Image-3.0，核心关键词为\"实\"。模型支持 4.5k token 提示词，可一次生成复杂排版（报纸、试卷、3×3 信息图），文字清晰度达 10px，并具备 12 种语言原生渲染与实时网页检索能力。博主 Berry Xia 实测认为其人像和古典美学表现非常符合国人审美。", "type": "model", "relTime": "1天前"}, {"id": 31, "title": "马斯克：Optimus 将是史上最大产品，量产难度极高", "source": "X：cb_doge (@cb_doge)", "sourceUrl": "https://x.com/cb_doge/status/2080065417473905040", "date": "2026-07-22T23:00:15.000Z", "summary": "马斯克称，Optimus 人形机器人将成为史上最大产品，但实现无需编程、仅靠指令或视频即可执行任务的自主机器人是前所未有的难题。机器人需具备极高灵巧性、可靠性及耐用性，而特斯拉需从零建立供应链，所有部件均为全新设计，量产爬坡难度远超以往任何产品。", "type": "tip", "relTime": "1天前"}, {"id": 32, "title": "梁文锋投资人会议语录：AGI路线图与持续学习", "source": "X：Oran Ge (@oran_ge)", "sourceUrl": "https://x.com/oran_ge/status/2080050390868119750", "date": "2026-07-22T22:00:33.000Z", "summary": "梁文锋在投资人会议上阐述 DeepSeek 的 AGI 路线图，认为当前阶段最重要的是 Coding Agent，而多模态、3D 生成等并非智能核心。他指出下一代模型必须具备持续学习能力，这是实现 AGI 的关键阶梯。DeepSeek 坚持低利润、开源与克制战略，认为中国 AI 的差距主要在资源而非人才，并预测国内模型公司最终将收敛至两三家。", "type": "tip", "relTime": "1天前"}, {"id": 33, "title": "Grok Build 上线，可调用 Grok 4.5 构建 3D 场景", "source": "X：Elon Musk (@elonmusk, xAI)", "sourceUrl": "https://x.com/elonmusk/status/2080049853036728541", "date": "2026-07-22T21:58:25.000Z", "summary": "Elon Musk 宣布推出 Grok Build，用户可通过该工具在终端中调用 Grok 4.5 模型。开发者 Daniel Farinax 利用 Grok Build 安装了 Unity 免费 CLI，成功构建 3D 场景并导出视频，还在同一会话中创建了可玩的 macOS 岛屿探索游戏。Unity CLI 支持 MCP 模式且免费，无并发限制。", "type": "model", "relTime": "1天前"}, {"id": 34, "title": "七款前沿模型\"鹈鹕骑自行车\"基准测试未发现针对性优化", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://dylancastillo.co/posts/pelicanmaxxing.html", "date": "2026-07-22T19:39:51.177Z", "summary": "一项针对GPT-5.6 Terra等七款模型的对比实验显示，这些模型在\"鹈鹕骑自行车\"这一知名非正式基准测试上并未表现出针对性优化。研究者生成1，008张SVG图像，经评分发现鹈鹕在8种动物中排名第6，自行车在6种交通工具中排名第5，两者组合在48个提示中仅列第42位。", "type": "tip", "relTime": "1天前"}, {"id": 35, "title": "Monday.com 裁员数百人，聚焦 AI 工作平台", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/22/monday-com-lays-off-hundreds-to-focuses-on-ai", "date": "2026-07-22T17:54:14.000Z", "summary": "以色列办公软件公司 Monday.com 宣布裁员约 630 人（占员工总数 20%），以支持更精简的运营模式，并将投资重心转向 AI 项目。其 AI Work Platform 目前包含无代码应用构建器、可定制 AI 智能体、工作流自动化工具及能生成报告、更新仪表盘的聊天机器人。公司预计此次重组将产生 4500 万至 5500 万美元的费用。", "type": "industry", "relTime": "1天前"}, {"id": 36, "title": "梁文锋四小时投资人会议实录：DeepSeek 的克制战略与 AGI 路线图", "source": "elsewhere：文章（RSS）", "sourceUrl": "https://elsewhere.news/zh/elsewhere/wenfeng-liangs-four-hour-investor-meeting-full-transcript", "date": "2026-07-22T15:33:15.000Z", "summary": "DeepSeek 创始人梁文锋在投资人会议上明确表示，公司主线只有 AGI，不做 3D、视频生成、世界模型或下一个超级 App，并坚持开源与合理定价。他认为模型竞争的核心是成本、时间与用户体验，而保持团队稳定性是做成 AGI 的关键。梁文锋称，DeepSeek 离彻底转向商业化仍很遥远，开源与克制是增加 AGI 成功概率的战略选择。", "type": "tip", "relTime": "1天前"}, {"id": 37, "title": "可灵 MCP 教程：快速打造电影级 AI 表演", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2079944555718435124", "date": "2026-07-22T15:00:00.000Z", "summary": "可灵 MCP 教程：几分钟内打造电影级 AI 表演  了解如何使用可灵 MCP 在你喜爱的智能体中构建完整的创意工作流--从角色创建、情感设计到批量视频生成。  你的下一个故事从这里开始。", "type": "tip", "relTime": "1天前"}, {"id": 38, "title": "Grok 4.5 纯代码生成视频，速度质量碾压", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079933815984689564", "date": "2026-07-22T14:17:19.000Z", "summary": "用户实测 Grok 4.5 纯代码生成视频，速度快、质量高、成本低，一次生成即输出 MP4 格式，效果媲美 Claude Code。将文章内容喂给模型后几分钟内自动完成，认为打磨后效果更惊人。", "type": "tip", "relTime": "1天前"}, {"id": 39, "title": "实测Qwen-Image-3.0：19大场景挑战GPT Image2，中文长文本与多图融合表现亮眼", "source": "公众号：卡尔的AI沃茨", "sourceUrl": "https://mp.weixin.qq.com/s/PnXGmmDYejrHBSpoRBOHkg", "date": "2026-07-22T12:34:24.000Z", "summary": "Qwen-Image-3.0上线，支持最高4.5k token输入、12种语言、20多种字体，以及多图融合、图中图和图片编辑。实测显示，其在中文长文本生成、多语言混合排版、UI设计、多图融合与图片编辑等19个场景中均能稳定输出，文字不崩且信息对应准确，图片质量已能与GPT Image2媲美。该模型在国内可直接使用，速度快且价格不贵。", "type": "tip", "relTime": "1天前"}, {"id": 40, "title": "通义千问发布Qwen-Image-3.0：主打\"真实\"的第三代图像生成模型", "source": "X：通义千问 / Qwen (@Alibaba_Qwen)", "sourceUrl": "https://x.com/Alibaba_Qwen/status/2079906336381509659", "date": "2026-07-22T12:28:08.000Z", "summary": "通义千问发布第三代图像生成模型Qwen-Image-3.0，核心关键词为\"真实\"。模型支持最长4.5k token的提示词，可一次性生成复杂布局（如报纸、试卷、3×3信息图），并能渲染10px级文字、完整LaTeX论文页面及逼真皮肤纹理。它还支持12种语言、100多种艺术风格，并具备实时网络检索能力，旨在成为设计、教育等领域的实用生产力工具。", "type": "paper", "relTime": "1天前"}, {"id": 41, "title": "Luma AI 生成舞者悲伤舞台表演视频", "source": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2079899268492743050", "date": "2026-07-22T12:00:02.000Z", "summary": "一位舞者，一个绿色舞台，一场充满悲伤的表演。随后舞台消失，雪花飘入，情感扑面而来。作者：Dinda Prasetyo。使用 Luma 制作。", "type": "industry", "relTime": "1天前"}, {"id": 42, "title": "Meta 推出 AI 检测系统 Content Seal，但可用性不及 Google 的 SynthID", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/968680/meta-ai-detection-labeling-content-seal-watermarks-synthid", "date": "2026-07-22T11:00:00.000Z", "summary": "Meta 于 7 月推出 Content Seal，为旗下 Muse 模型生成的图像添加不可见水印，但用户目前仅能通过专用网页工具检测，且不支持视频和旧模型。与 Google 已向 OpenAI 开放的 SynthID 相比，Content Seal 功能相似但可用性更差，Meta 也未将检测能力集成到 Meta AI 聊天机器人中。", "type": "tip", "relTime": "1天前"}, {"id": 43, "title": "16岁少年造出仿生海龟机器人，AI识别微塑料准确率达94%", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/247.htm", "date": "2026-07-22T10:10:00.000Z", "summary": "16岁的埃文·巴兹（Evan Budz）设计并制造了一款自主海龟机器人，搭载水下三维全息成像系统和自训练的AI模型，能以94%的准确率区分水体中的微塑料和其他微小颗粒。该机器人在2026年Regeneron国际科学与工程大奖赛（ISEF）上获得5万美元奖学金。巴兹表示，该系统可直接在水中完成检测，无需将样本送回实验室，旨在让微塑料检测更快、更普及。", "type": "tip", "relTime": "1天前"}, {"id": 44, "title": "小红书开源 BigMac：多模态大模型训练新范式", "source": "公众号：小红书技术（dots.llm）", "sourceUrl": "https://mp.weixin.qq.com/s/tNJARtn1jIayL5URg87Row", "date": "2026-07-22T10:04:51.000Z", "summary": "小红书技术团队开源 BigMac，一种针对多模态大模型训练的依赖安全嵌套流水线新范式。它以 LLM 流水线为主干，在不打乱执行顺序的前提下嵌入编码器和生成器计算，相比基线实现 1.08x-1.9x 加速，同时保持激活显存有界。BigMac 已作为 dots 多模态模型训练的核心组件投入生产。", "type": "model", "relTime": "1天前"}, {"id": 45, "title": "面壁智能与吉利联合发布具身智能体框架 RoboHarness", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/nHoaGWCusQt6WQ1xmR_W3g", "date": "2026-07-22T09:55:25.000Z", "summary": "面壁智能与吉利人工智能中心在 WAIC 2026 联合发布具身智能体框架 RoboHarness，基于 EmbodiedClaw 开发，集成 VLM 与 VLA 模型。该框架已在吉利生产仓储场景实现常态化作业，支持自主决策与失败重试，并依托吉利星睿智算中心（23.5 EFLOPS）训练。", "type": "model", "relTime": "1天前"}, {"id": 46, "title": "英伟达推出 SVD 服务，识别 AI 生成视频准确率最高达 92%", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/086.htm", "date": "2026-07-22T07:50:33.000Z", "summary": "英伟达发布合成视频检测器（SVD）服务，识别 AI 生成视频的准确率最高达 92%。该服务已整合到 NIM 中，通过逐帧分析视频，利用 Meta 的 DINOv2 和 DINOv3 模型为每帧打分，最终生成百分制评分。在 Nvidia RTX GPU 上处理一段 1080p 视频仅需 22 毫秒，50% 压缩率下仍能维持 82% 准确率。", "type": "model", "relTime": "1天前"}, {"id": 47, "title": "生数科技骆怡航：通用世界模型是连接数字与物理智能的关键基础设施", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/KCCnHyK3My9lJrK9T-blQQ", "date": "2026-07-22T07:16:42.000Z", "summary": "生数科技联合创始人骆怡航在WAIC 2026提出，通用世界模型需像大语言模型一样建立统一基座，实现感知、预测与行动的闭环。公司围绕该基座构建\"一体两翼\"产品体系：Vidu Q系列面向数字内容生成，Vidu S系列推动实时交互，Motubrain面向物理世界机器人控制。世界模型正从学术研究走向产业中心，成为AI理解并行动于真实世界的关键路径。", "type": "tip", "relTime": "1天前"}, {"id": 48, "title": "Substack 导入 AI 检测工具 Pangram：用户可了解内容 AI 生成比例", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/980/040.htm", "date": "2026-07-22T07:02:02.000Z", "summary": "独立创作者平台 Substack 导入 AI 检测工具 Pangram，读者可借此了解平台内容中真人创作与 AI 辅助撰写的比例。Substack 指出，真正的问题在于 AI 生成内容被伪装为人类创作，并将此现象称为\"Claudefishing\"。平台还推出了创作过程说明、发布前 Pangram 审核等工具，并考虑提供回复与推荐内容的 AI 偏好设置。", "type": "paper", "relTime": "1天前"}, {"id": 49, "title": "腾讯设计Agent Miora全量上线，支持品牌VI与多模型", "source": "X：卡兹克 (@Khazix0918)", "sourceUrl": "https://x.com/Khazix0918/status/2079823300466012438", "date": "2026-07-22T06:58:10.000Z", "summary": "腾讯设计Agent平台Miora正式全量开放，无需邀请码。它提供品牌设计、影视创意、电商广告、互动游戏、网页应用五大场景模式，内置Skill模板和画板编辑功能。Agent底模分Standard/Pro/Max三档，可调用GPT-image、Seedance、可灵等多模态模型，支持框选编辑、文字替换及自定义Skill发布。", "type": "tip", "relTime": "1天前"}, {"id": 50, "title": "AI游戏《奥德赛》成本仅为诺兰电影的百万分之一", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2079793236231774617", "date": "2026-07-22T04:58:42.000Z", "summary": "创作者用Yoroll平台花费约250美元、2天时间，将《奥德赛》改编成40分钟可玩的AI互动剧情游戏。相比诺兰2.5亿美元的电影制作成本，百万倍的成本差距正改变内容创作的门槛。游戏支持对话式选择生成不同剧情走向，画面宏大，适合边玩边学英语。", "type": "paper", "relTime": "1天前"}, {"id": 51, "title": "用 GPT-5.6、Claude、Gemini 和 Grok \"绘制\"《蒙娜丽莎》--AI 图像生成能力实测", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.tryai.dev/blog/ai-drawing-arena-colored-pencils-claude-gpt-grok", "date": "2026-07-22T04:52:13.376Z", "summary": "开发者使用 GPT-5.6、Claude、Gemini 和 Grok 分别尝试\"绘制\"《蒙娜丽莎》，对比各模型的图像生成效果。测试展示了不同 AI 在艺术风格还原、细节处理上的差异，GPT-5.6 在构图准确性上表现突出，而 Claude 和 Gemini 各有侧重。该实验为评估多模态模型的视觉创作能力提供了直观参考。", "type": "tip", "relTime": "1天前"}, {"id": 52, "title": "商汤 SenseNova-Vision 开源统一视觉模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2079784489199518131", "date": "2026-07-22T04:23:57.000Z", "summary": "商汤发布 SenseNova-Vision，一个通过自然语言提示词即可完成检测、分割、深度估计、OCR、3D 重建等多项视觉任务的统一模型，无需串联多个专用工具。该模型在关键基准上超越近期统一视觉方案，并已完全开源（权重、数据、代码、Demo、论文）。", "type": "paper", "relTime": "1天前"}, {"id": 53, "title": "通义发布 Qwen-Image-3.0，支持多语言与复杂指令渲染", "source": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2079762971123953976", "date": "2026-07-22T02:58:27.000Z", "summary": "通义千问发布 Qwen-Image-3.0 图像生成模型。该模型支持 12 国语言原生渲染、100+ 艺术风格，并能根据 4.5k token 的复杂指令一次性生成九张信息图或一整版报纸。它还具备网页、游戏、直播界面仿真能力，并可联网获取最新世界知识。", "type": "model", "relTime": "1天前"}, {"id": 54, "title": "三菱电机与索尼半导体将设立制造业 AI 视觉传感器合资企业 Advanced Vision Solutions", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/935.htm", "date": "2026-07-22T02:40:18.000Z", "summary": "三菱电机与索尼半导体解决方案宣布达成最终协议，共同设立合资企业 Advanced Vision Solutions，瞄准制造业 AI 视觉传感器解决方案领域。该合资企业计划于 2026 年 10 月开始运营，将结合索尼的图像传感器与边缘 AI 技术，以及三菱电机的自动化控制系统经验，开发集成在图像传感器上的 AI 分析系统，以加速制造业决策和控制流程。", "type": "industry", "relTime": "1天前"}, {"id": 55, "title": "ENTRAP-VL：面向视觉语言模型双重上下文牵引的分类探测工具", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.20092", "date": "2026-07-22T00:00:00.000Z", "summary": "研究团队提出ENTRAP-VL，一个手动标注的1，500项数据集，按八类上下文条件组织，用于探测视觉语言模型（VLM）中的双重上下文牵引现象--即模型被输入中辅助上下文（无论是否相关、真实或有意义）拉偏输出的倾向。该工具覆盖文本牵引（八种条件）和视觉牵引（三种条件）两个流，并引入\"矛盾性\"与\"反事实\"的区分，这是纯文本基准无法捕捉的。数据集及文档将公开发布。", "type": "paper", "relTime": "1天前"}, {"id": 56, "title": "Trace：基于分类学引导的多领域视觉推理环境", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19790", "date": "2026-07-22T00:00:00.000Z", "summary": "研究团队提出Trace，一种通过场景语法与可执行任务程序分离视觉实现与答案计算的视觉推理环境，覆盖277个场景语法、11个视觉领域共1000项任务。在64，000个Trace实例上进行RLVR训练后，Qwen2.5-VL-3B在24个外部基准上的宏平均提升3.51个百分点，Qwen2.5-VL-7B提升4.06个百分点，证明广泛的过程性训练可迁移至生成任务分布之外。", "type": "paper", "relTime": "1天前"}, {"id": 57, "title": "Self Gradient Forcing：原生长视频外推方法", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.20368", "date": "2026-07-22T00:00:00.000Z", "summary": "研究者提出Self Gradient Forcing（SGF）双阶段训练策略，通过并行上下文梯度重建，让未来帧损失监督历史KV缓存写入，解决了自回归视频扩散训练中的历史上下文梯度缺口。仅用5秒训练窗口，SGF即可外推生成持续数分钟的视频，在主体身份、背景一致性和时间稳定性上显著优于Self Forcing。", "type": "paper", "relTime": "1天前"}, {"id": 58, "title": "SeededGrasp：面向复杂场景与多机械臂的语言引导抓取框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.20207", "date": "2026-07-22T00:00:00.000Z", "summary": "研究者提出 SeededGrasp，一种数据高效的模块化框架，利用 VLM 零样本预测抓取种子点，再交由轻量级流匹配模型生成具体抓取姿态，将高层语义推理与底层几何执行解耦。该方法无需端到端训练即可支持多机械臂，在 610 个杂乱场景、334 个物体、3 种夹爪的合成数据集（含 256 万次抓取）上训练，仿真成功率达 72%，真实实验成功率达 78%。项目已开源代码与数据。", "type": "paper", "relTime": "1天前"}, {"id": 59, "title": "G-MAD：基于Arma3的多视角RGB-T航空目标检测数据生成框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19942", "date": "2026-07-22T00:00:00.000Z", "summary": "G-MAD是一个开源框架，利用游戏Arma3生成同步的多视角RGB-T（可见光-热成像）数据，用于航空目标检测。该框架支持结构化场景配置、可控多视角相机部署、同步可见光/热成像捕获，并利用引擎级几何元数据自动生成边界框标注。基于G-MAD构建的AMOD基准数据集已开源发布，可用于视角变化、多模态融合及合成到真实迁移的研究。", "type": "paper", "relTime": "1天前"}, {"id": 60, "title": "ATSplat：自适应 token 扩展的紧凑前馈 3D 高斯泼溅", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.20417", "date": "2026-07-22T00:00:00.000Z", "summary": "ATSplat 提出一种前馈 3D 高斯泼溅框架，通过自适应 3D token 恢复场景级容量分配能力。该方法从稀疏 3D 锚点 token 出发，根据渲染误差选择性扩张高不确定性区域。在 RealEstate10K 和 DL3DV 数据集上，ATSplat 以仅 311K 高斯体实现 SOTA 渲染质量，12 张输入图像下重建耗时不到 1 秒，渲染速度达 1136 FPS。", "type": "paper", "relTime": "1天前"}, {"id": 61, "title": "《第九区》导演 Blomkamp 发布 AI 短片《Nightborne》，全片由字节跳动 Seedance 2.0 生成", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/entertainment/968703/neill-blomkamps-nightborne-barley-studios-seedance", "date": "2026-07-21T22:06:43.000Z", "summary": "《第九区》导演 Neill Blomkamp 发布 13 分钟科幻短片《Nightborne》，所有镜头均由字节跳动 Seedance 2.0 文生视频模型生成，并使用了 32 位人类演员肖像。影片因画面细节混乱、角色表演缺乏真实感而被广泛批评为\"AI 垃圾\"，Blomkamp 的创作风格几乎消失。", "type": "tip", "relTime": "2天前"}, {"id": 62, "title": "Substack 上线 AI 检测工具，可识别\"Claudefishing\"式 AI 生成内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/968855/substack-pangram-ai-detecting-tool", "date": "2026-07-21T19:22:28.000Z", "summary": "Substack 推出由 AI 检测公司 Pangram 驱动的新工具，可扫描帖子、评论、笔记和回复，估算其中有多少文本可能由 AI 生成或辅助完成。读者在超过 100 字的内容右上角菜单中选择\"Scan for AI text\"即可使用。Substack 同时允许创作者添加\"How I make this\"声明说明写作过程，并可扫描草稿及报告不准确结果。", "type": "paper", "relTime": "2天前"}, {"id": 63, "title": "Google 3.6 Flash 模型生成可3D打印数学艺术", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2079614730034127100", "date": "2026-07-21T17:09:23.000Z", "summary": "我们的一位工程师使用新的 3.6 Flash 模型构建了一个交互式数学艺术生成器。你可以实时自定义速度、颜色和几何参数，然后将设计直接导出为可 3D 打印的 STL 文件。观看视频，看看实物打印效果如何！", "type": "model", "relTime": "2天前"}, {"id": 64, "title": "Meta 模型助力伯克利实验室加速科学发现", "source": "X：AI at Meta (@AIatMeta)", "sourceUrl": "https://x.com/AIatMeta/status/2079614176725442912", "date": "2026-07-21T17:07:11.000Z", "summary": "为加速科学发现并支持 @ENERGY 的 Genesis 任务，由 @BerkeleyLab 领导的 SYNAPS-I 项目正使用 SAM 3 和 DINOv3 来自动化图像分割。  通过将 DINOv3 的全局语义上下文和细粒度空间定位与 SAM 3 的像素级边界提取相结合，研究人员能够将 3D 体积标注从一个月的人工工作量压缩到约 15 分钟。  了解更多他们的工作：https://go...", "type": "industry", "relTime": "2天前"}, {"id": 65, "title": "Claude Cowork 新增\"录制技能\"功能", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2079606576751526027", "date": "2026-07-21T16:36:59.000Z", "summary": "Claude Cowork 推出\"录制技能\"功能：用户录制屏幕并口述操作步骤，Claude 即可将其转化为可复用的技能。该功能支持文本、截图、音频、视频和注释等多模态输入，已在 Claude 桌面端上线，面向 Pro、Max 和 Team 计划用户开放。", "type": "paper", "relTime": "2天前"}, {"id": 66, "title": "Qwen 3.8 Max 改版 UI，轻松生成 3D 台球与显微镜项目", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2079601160638615853", "date": "2026-07-21T16:15:28.000Z", "summary": "Qwen 3.8 Max 强制改版 UI，摆脱了此前饱受吐槽的 AI 模板感设计。用户用它生成儿童显微镜项目页面和 3D 台球游戏，后者自动添加了桌子腿和灯光，音效与画面交互丝滑，完整度很高。", "type": "tip", "relTime": "2天前"}, {"id": 67, "title": "Qwen3.8 Max 3D能力实测：台球与放映机", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2079597189937217665", "date": "2026-07-21T15:59:41.000Z", "summary": "用户用Qwen3.8 Max生成3D台球项目，完整度高，自动添加桌子腿和灯光，光影效果与交互丝滑。此前用户还用它制作了3D幻灯片放映机，支持本地上传PDF、MP4、PPT等文件，动画交互与细节刻画表现不错。", "type": "tip", "relTime": "2天前"}, {"id": 68, "title": "阿里通义千问发布 Qwen-Image-3.0：单次生成可读十像素文字与复杂信息图", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/alibabas-qwen-image-3-0-renders-full-infographic-grids-and-readable-ten-pixel-text-in-a-single-pass", "date": "2026-07-21T15:55:09.000Z", "summary": "阿里通义千问团队发布 Qwen-Image-3.0，该图像生成模型支持最长 4500 token 的输入，可单次生成包含可读十像素文字、数学公式及十二种语言的复杂排版，如 3×3 信息图网格和嵌套界面。模型目前仅通过邀请制 API 开放，后续将集成至 Qwen Chat 等自有应用，但不太可能像初版 Qwen-Image 那样开源权重。", "type": "model", "relTime": "2天前"}, {"id": 69, "title": "荣耀 Robot Phone 拍照页面曝光，将支持大师电影模式与四自由度机械云台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/801.htm", "date": "2026-07-21T15:33:36.000Z", "summary": "荣耀 Robot Phone 已开启预约，机身顶部集成行业最小的四自由度（4DoF）钛合金机械云台系统，体积比主流方案缩小 70%。拍照页面显示快门键改为摇杆按钮，预计可调节云台角度，并支持与阿莱 ARRI 合作的\"大师电影\"模式。该机搭载第五代骁龙 8 至尊版芯片，预计今年 8 月发布，将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 内核。", "type": "paper", "relTime": "2天前"}, {"id": 70, "title": "ABot-World-0：单张桌面级GPU实现无限交互式世界生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19191", "date": "2026-07-21T15:26:50.000Z", "summary": "ABot-World-0是一个动作条件视频世界模型，能在单张NVIDIA RTX 5090 GPU上以720P分辨率、最高16 FPS、1.2秒动作到首帧延迟和约19 GiB峰值显存预算运行无限交互式世界生成。该模型采用统一的帧同步键盘动作接口，通过LongForcing分布匹配阶段解决长程自回归漂移问题，并集成轻量级VAE解码器、低比特DiT推理和局部上下文KV缓存等系统级优化。", "type": "paper", "relTime": "2天前"}, {"id": 71, "title": "通义千问发布 Qwen Image 3 模型", "source": "X：swyx (@swyx)", "sourceUrl": "https://x.com/swyx/status/2079580673086730701", "date": "2026-07-21T14:54:03.000Z", "summary": "Qwen Image 3 发布。 这些图片不是截图。全部单次生成。 最后一张（图像标注）我认为可以催生十几个教育科技/工业培训初创公司。 【引用 @swyx】：顺便一提，Qwen Image 2 是 7B 模型……从 Image 1 的 20B 降下来……并且在 Elo 评分中击败了 Nano Banana。 恭喜 @JustinLin610 等人！！", "type": "model", "relTime": "2天前"}, {"id": 72, "title": "特斯拉将 Robotaxi 自动驾驶出租车服务扩展至美国奥兰多和坦帕", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/786.htm", "date": "2026-07-21T14:40:49.000Z", "summary": "特斯拉将 Robotaxi 自动驾驶出租车服务扩展至美国佛罗里达州的奥兰多和坦帕。该服务去年6月从得州奥斯汀起步，今年已先后进入达拉斯、休斯敦和迈阿密。此次扩张正值特斯拉公布第二季度财报前夕，华尔街密切关注其自动驾驶业务进展。", "type": "industry", "relTime": "2天前"}, {"id": 73, "title": "Deezer：AI 生成音乐已占每日上传量的 50% 以上", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/21/music-streamer-deezer-says-more-than-50-of-daily-uploads-are-ai-generated", "date": "2026-07-21T13:27:42.000Z", "summary": "音乐流媒体平台 Deezer 称，AI 生成音乐目前占其每日上传量的 50% 以上，2026 年 6 月日均上传量达 9 万首。Deezer 将下架过去六个月无播放量或涉及刷量欺诈的 AI 曲目，并已向其他平台开放其 AI 检测技术，该技术可识别 Suno 和 Udio 生成的音乐。", "type": "industry", "relTime": "2天前"}, {"id": 74, "title": "Qwen-Image-3.0 发布：支持 4.5k token 输入与 10px 小字渲染", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://qwen.ai/blog?id=qwen-image-3.0", "date": "2026-07-21T10:38:03.030Z", "summary": "阿里通义千问推出第三代基础图像生成模型 Qwen-Image-3.0，核心能力聚焦\"真实\"，支持最长 4.5k token 的指令输入，可一次性生成包含 9 个复杂信息图的 3×3 网格布局。模型能精确渲染小至 10px 的文字，并原生支持 12 种语言，可模拟网页、游戏、直播等主流界面，在学术论文、报纸等密集排版场景中保持可读性。", "type": "paper", "relTime": "2天前"}, {"id": 75, "title": "阿里云HappyHorse 1.1获AI视频黑客松卓越奖", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079507022345650415", "date": "2026-07-21T10:01:24.000Z", "summary": "阿里云旗下HappyHorse 1.1在东京AI视频黑客松中荣获卓越奖。获奖作品《连接现实的工程师》仅用一晚完成，以15秒短片展现工程创新与人文关怀的结合。用户可通过链接免费试用该视频生成模型。", "type": "industry", "relTime": "2天前"}, {"id": 76, "title": "阿里云东京AI视频黑客松落幕，HappyHorse 1.1助力创作", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079499930159247403", "date": "2026-07-21T09:33:13.000Z", "summary": "阿里云在东京举办AI视频黑客松，50多位创作者使用全球排名第一的AI视频生成模型HappyHorse，在一夜内完成15秒电影级广告片。大奖作品利用通勤列车离心力烘干衣物的创意，由HappyHorse 1.1生成。", "type": "industry", "relTime": "2天前"}, {"id": 77, "title": "阿里云 WonderClip 实现脚本到视频全自动生成", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079479299157930471", "date": "2026-07-21T08:11:14.000Z", "summary": "Script in. Video out.  📅 2026 年 7 月 23 日 | 上午 10：00-10：30（UTC+8）| 阿里云直播  注册 → https://int.alibabacloud.com/m/1000415408/  WonderClip 正在企业级规模上实现 AI 驱动的视频制作--从脚本到成片，全自动化。  在 #AgenticTalks 第 1 集中了解其工作...", "type": "paper", "relTime": "2天前"}, {"id": 78, "title": "NVIDIA 发布 Cosmos 3 Edge：40 亿参数开放世界模型，可在设备端推理并生成机器人动作", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/21/nvidia-releases-cosmos-3-edge-a-4b-parameter-open-world-model-that-reasons-and-generates-robot-actions-on-device", "date": "2026-07-21T07:48:28.000Z", "summary": "NVIDIA 发布 Cosmos 3 Edge，一款 40 亿参数的开放世界模型，专为设备端运行设计。该模型可帮助机器人和视觉 AI 智能体理解环境、实时推理并在本地生成机器人动作。Cosmos 3 系列此前已于 2026 年 5 月 31 日在 GTC Taipei 推出 Cosmos 3 Nano（160 亿参数）和 Cosmos 3 Super（640 亿参数）。", "type": "model", "relTime": "2天前"}, {"id": 79, "title": "英伟达推出合成视频检测器NIM，逐帧识别AI生成视频准确率达92%", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/594.htm", "date": "2026-07-21T07:37:36.000Z", "summary": "英伟达发布合成视频检测器NIM服务，可逐帧分析视频并给出分类评分，判断内容是否由AI生成。内部测试显示，该工具对无压缩视频检测准确率达92%，15%压缩率下为85%，50%压缩率下为82%。在RTX GPU系统上分析一段1080P视频最快仅需22毫秒，企业级L40 GPU上约需30毫秒。", "type": "paper", "relTime": "2天前"}, {"id": 80, "title": "荣耀 Robot Phone 首日预约量超历代旗舰，搭载第五代骁龙 8 至尊版与 4DoF 钛合金机械云台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/555.htm", "date": "2026-07-21T07:07:46.000Z", "summary": "荣耀 Robot Phone 首日预约量已超越荣耀历代旗舰产品。该机搭载第五代骁龙 8 至尊版芯片，机身顶部集成行业最小的四自由度（4DoF）钛合金机械云台系统，体积比主流方案缩小 70%，200Mp 云台影像的核心机构件、电机、模组均为自研。行业预测 1TB 版本售价约 15999 元，预计今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 内核。", "type": "product", "relTime": "2天前"}, {"id": 81, "title": "谷歌 DeepMind 发布 GenCeption：基于阿里 Wan2.1，打破计算机视觉桎梏", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/535.htm", "date": "2026-07-21T07:00:10.000Z", "summary": "谷歌 DeepMind 发布 GenCeption 模型，将预训练视频生成器逆向改造成单一模型，可同时完成深度估计、图像分割等核心视觉任务。该模型基于阿里 Wan2.1 训练，一次前向传播即可输出结果，小模型处理 81 帧视频约需 6 秒。", "type": "paper", "relTime": "2天前"}, {"id": 82, "title": "阿里千问发布 Qwen-Image-3.0 图像生成基础模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/530.htm", "date": "2026-07-21T06:56:42.000Z", "summary": "阿里发布 Qwen-Image-3.0 图像生成模型，核心主线为\"实\"。模型支持 4.5k token 超长输入，可一次生成含公式、几何图形的知识图解和复杂 UI，并支持 12 国语言及 20 多款字体原生渲染。阿里云百炼、千问 AI 平台已开通 API 邀测，Qwen Studio 和千问 APP 即将上线免费体验。", "type": "model", "relTime": "2天前"}, {"id": 83, "title": "Momenta Robotaxi 获深圳智能网联汽车道路测试许可", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/458.htm", "date": "2026-07-21T05:18:29.000Z", "summary": "Momenta Robotaxi 正式获得深圳市智能网联汽车道路测试许可，将于近期在深圳开展实地测试。其 R7 强化学习世界模型已投入 L4 级自动驾驶实际应用，上汽大众 ID.ERA 9X 为首款搭载该模型的量产车型。", "type": "industry", "relTime": "2天前"}, {"id": 84, "title": "生数科技朱军：通用世界模型是连接数字与物理世界的新基础设施", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/8MaTdfpAmZSg3zYbrJuFAg", "date": "2026-07-21T05:09:19.000Z", "summary": "生数科技创始人朱军在WAIC 2026上提出，通用世界模型需具备理解、想象与行动一体化能力，并发布全球首个MoT统一架构。该架构将理解、生成与行动专家统一于同一模型，支撑Vidu Q3等视频生成模型及具身智能机器人控制。最新模型可驱动多种异构机器人完成长程任务，在跨场景泛化上取得行业领先效果。", "type": "tip", "relTime": "2天前"}, {"id": 85, "title": "为了科普 AI 知识，写了一个视频生成Skill。 计划每天生成一个大模型知识解读视频。 今天是第一期，用最浅显的话解读\"蒸馏\"。 以后千万别说我蒸馏了一个Skill，会显得很外行。", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2079423337369887004", "date": "2026-07-21T04:28:52.000Z", "summary": "为了科普 AI 知识，写了一个视频生成Skill。  计划每天生成一个大模型知识解读视频。  今天是第一期，用最浅显的话解读\"蒸馏\"。  以后千万别说我蒸馏了一个Skill，会显得很外行。", "type": "tip", "relTime": "2天前"}, {"id": 86, "title": "小鹏集团发布 TuringViT 高效视觉编码器", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/451.htm", "date": "2026-07-21T04:23:59.000Z", "summary": "小鹏集团发布面向 VLM/VLA 时代的 TuringViT 视觉编码器，推出 18L 和 24L 两个规格。该编码器在 1536×1536 分辨率下推理吞吐量达 Seed1.5-ViT 的 3.04 倍，仅用 0.85B 图文对便在六项零样本分类基准上取得 83.6% 平均准确率，超越使用 10B 数据的基线。", "type": "paper", "relTime": "2天前"}, {"id": 87, "title": "腾讯混元发布科学发现智能体 Hyra，能够递归自我改进", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/440.htm", "date": "2026-07-21T03:43:22.000Z", "summary": "腾讯混元推出 Hyra-1.0，一个专为研究与工程任务打造的、能递归自我改进的智能体。在多轮 3D 建模测试中，Hyra 生成的模型相比 Claude Code goal 模式更接近参考图像且更符合人类审美。", "type": "model", "relTime": "2天前"}, {"id": 88, "title": "导演陆川称 AI 生成像预制菜，正利用 AI 同时推进五部电影筹备", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/311.htm", "date": "2026-07-21T01:18:17.000Z", "summary": "导演陆川表示，AI 生成的影像像预制菜，能弥补新手与老手的技术代差，但可能抹杀艺术创作中\"错误\"带来的迷人之处。他正利用 AI 同时推进五部电影的筹备，AI 已替代概念设计、分镜和部分剪辑等环节，大幅降低试错成本。陆川透露，在视觉商业领域，短片和广告已有 95% 以上被 AI 替代。", "type": "tip", "relTime": "2天前"}, {"id": 89, "title": "一个随机数就能识别AI模型身份：行为指纹技术可检测API中转站偷换模型", "source": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weixin.qq.com/s/pqFZreEZj8kB4KDirl4MSQ", "date": "2026-07-21T01:10:49.000Z", "summary": "布拉格经济大学研究员托马什·布鲁克纳发现，通过让模型反复输出1到100的随机数，可生成独一无二的\"行为指纹\"。对165个模型各问30次后发现，GPT-4o偏爱42和37，Claude Sonnet 5疯狂输出47，Qwen3-Max则30次全部回答42。该方法仅需约120条请求即可识别模型身份，错误率约10.6%，为验证API是否被偷换模型提供了轻量级方案。", "type": "tip", "relTime": "2天前"}, {"id": 90, "title": "GAMUT：面向事实完整性的双层元评分基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19322", "date": "2026-07-21T00:00:00.000Z", "summary": "GAMUT 引入双层元评分框架，将所需内容的结构化元评分自动编译为 LLM 可评分的二元检查清单，用于评估长文本生成的事实完整性。基准包含 1，813 个基于真实可穿戴图像的问题，覆盖 10 个领域。14 个模型中 Gemini 3.1 Pro 得分最高（58.7%），表明该基准极具挑战性。", "type": "paper", "relTime": "2天前"}, {"id": 91, "title": "文本模板Token是扩散Transformer中的隐式语义寄存器", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19139", "date": "2026-07-21T00:00:00.000Z", "summary": "南京大学与阿里巴巴团队提出因果可解释性框架，发现扩散Transformer（DiT）中来自聊天模板的结构性token虽不含提示语义，却成为图像到文本的注意力汇聚点，并因果性地维持物体身份，充当隐式语义寄存器。", "type": "paper", "relTime": "2天前"}, {"id": 92, "title": "Appearance Pointers：扩散Transformer的多模态区域控制新方法", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19344", "date": "2026-07-21T00:00:00.000Z", "summary": "研究人员提出Appearance Pointers，一种紧凑型token，通过将文本或图像输入与用户指定的掩码对齐，引导扩散Transformer（DiT）在正确空间位置生成正确外观。该方法由区域对应网络生成token，经空间聚合机制优化，无需从头重新训练基础模型即可实现多区域描述控制。在多项指标上，该单一模型达到或超越了特定模态的现有最优方法。", "type": "paper", "relTime": "2天前"}, {"id": 93, "title": "Masked Visual Actions：统一世界模型的掩码视觉动作接口", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19343", "date": "2026-07-21T00:00:00.000Z", "summary": "斯坦福大学李飞飞团队提出 Masked Visual Actions，将机器人动作表示为视频中实体轨迹的像素空间掩码。仅用15小时真实与仿真数据微调，单个视频模型即可同时作为前向动力学模型和逆向模型，用于策略评估与基于模型的规划。", "type": "paper", "relTime": "2天前"}, {"id": 94, "title": "Mage-Flow：面向图像生成与编辑的高效原生分辨率基础模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19064", "date": "2026-07-21T00:00:00.000Z", "summary": "研究人员推出Mage-Flow，一个40亿参数的高效生成栈，用于文本到图像生成和指令式图像编辑。其核心包括轻量级高保真潜在分词器Mage-VAE和原生分辨率多模态扩散Transformer，通过协同设计将分词成本降低一个数量级以上，端到端训练吞吐量提升约2.5倍。", "type": "paper", "relTime": "2天前"}, {"id": 95, "title": "CalibAtt：无需训练的稀疏注意力方法，将文生视频速度提升至 1.58 倍", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/calibrated-sparse-attention", "date": "2026-07-21T00:00:00.000Z", "summary": "Apple 与特拉维夫大学联合提出 CalibAtt，一种无需训练的校准稀疏注意力方法，通过离线识别 token 间可跳过的低分连接并编译为优化操作，在推理时跳过无关计算。在 Wan 2.1 14B、Mochi 1 及少步蒸馏模型上，CalibAtt 实现最高 1.58 倍端到端加速，在保持视频质量和文本-视频对齐的同时优于现有免训练方法。", "type": "paper", "relTime": "2天前"}, {"id": 96, "title": "Hugging Face 发布 Grabette：开源手持夹爪系统，无需机器人即可录制操作数据", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/grabette", "date": "2026-07-21T00:00:00.000Z", "summary": "Hugging Face 推出 Grabette，一套开源低成本系统，用户手持夹爪即可在几分钟内录制操作演示，并自动生成机器人可用的数据集。Grabette 配备鱼眼相机与 RGBD 相机，通过 SLAM 恢复 6-DoF 轨迹，硬件物料成本约 490 欧元。所有硬件设计、处理流程与训练代码均开源，数据以标准 LeRobot 格式上传至 Hugging Face Hub，支持任意机器人后端。", "type": "model", "relTime": "2天前"}, {"id": 97, "title": "多模态大模型理解幽默为何困难：方法、数据集、评估与挑战综述", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19011", "date": "2026-07-21T00:00:00.000Z", "summary": "一篇综述系统梳理了多模态大语言模型（MLLM）在理解 meme、漫画、讽刺图像等视觉幽默上的结构性盲区：核心困难不在于多模态对齐，而在于对非字面机制、共享文化知识和交际意图的推理。该综述按识别、解释与推理、生成三个递进能力层级组织文献，指出当前进展受限于捷径式评估、文化覆盖不足、证据基础薄弱以及安全与所有权问题。", "type": "paper", "relTime": "2天前"}, {"id": 98, "title": "Moving Alphabet 研究：训练数据分布与标注质量对文生视频模型的关键影响", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18789", "date": "2026-07-21T00:00:00.000Z", "summary": "研究团队提出 Moving Alphabet 可控测试平台，通过渲染不同字体、颜色、大小、位置和运动速度的字母，精确控制视频数据分布与标注质量。实验发现：视频内容与时长分布的多样性和均衡性对模型泛化能力至关重要；标注精度（正确性）比召回率（完整性）对模型性能影响更大，低质量标注下模型需消耗更多算力才能达到同等验证损失；无分类器引导（CFG）和高质数据微调无法完全弥补预训练数据缺陷。", "type": "paper", "relTime": "2天前"}, {"id": 99, "title": "Nativ：在 Mac 上本地运行前沿开放模型", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://blaizzy.github.io/nativ", "date": "2026-07-20T21:55:08.620Z", "summary": "Nativ 发布 macOS 桌面应用，让用户在 Apple Silicon（M1+）上本地运行 Google、Cohere、Liquid AI 等开放模型，无需账户或订阅。应用支持语言、视觉、视频、代码、音频等多模态交互，并提供实时 token/秒、内存压力等性能指标。Nativ 完全开源（MIT 许可），内置本地端点，可对接 Claude Code、Codex 等编码智能体。", "type": "model", "relTime": "3天前"}, {"id": 100, "title": "《第九区》导演Neill Blomkamp发布首部完全由AI生成的短片《Nightborne》", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/district-9-director-neill-blomkamp-releases-first-short-film-made-entirely-with-ai-video-generation", "date": "2026-07-20T17:32:41.000Z", "summary": "Neill Blomkamp发布了13分钟科幻恐怖短片《Nightborne》，完全使用Seedance 2.0视频生成模型通过文本提示逐帧创作。影片采用纪录片风格，使用了32位真实人物的面部和声音（已获授权），人类艺术家负责概念艺术。Blomkamp表示计划以相同格式拍摄一部长片，并已创立AI电影工作室Barley Studios。", "type": "industry", "relTime": "3天前"}, {"id": 101, "title": "AlayaWorld：交互式长程视频世界模型技术报告发布，15B参数开源模型实现540p/720p 24fps生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18367", "date": "2026-07-20T17:15:41.000Z", "summary": "AlayaWorld 是一个交互式长程视频世界模型，基于15B视频扩散Transformer架构，可生成540p和720p分辨率、24fps的视频。该模型通过自回归生成短潜变量块，结合持久锚定帧、压缩时序历史、几何对齐空间记忆和近期帧条件化来维持长程一致性，并将推理从约30步蒸馏至每块4步。在iWorld-Bench基准上，AlayaWorld取得长程生成最佳性能，项目以全栈开源形式发布。", "type": "paper", "relTime": "3天前"}, {"id": 102, "title": "Grok 视频生成吊打 Seedance，开源世界模型 Alaya 引热议", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079240587404870038", "date": "2026-07-20T16:22:41.000Z", "summary": "用户对比发现 Grok 视频生成效果已完全超越 Seedance，后者降智严重且价格昂贵，呼吁停止充值。同时，开源世界模型 Alaya World 引发讨论，其核心价值在于将游戏可玩原型的搭建成本从\"几周\"压缩到\"一分钟\"，通过 Error Bank 误差回灌等技术让模型学会在\"脏历史\"上继续预测，但精确碰撞、多人同步等 3A 核心功能尚未涉及。", "type": "tip", "relTime": "3天前"}, {"id": 103, "title": "NVIDIA 发布 Cosmos 3 Edge：4B 参数开源世界模型，为机器人及边缘 AI 提供实时推理与动作生成", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/cosmos3edge", "date": "2026-07-20T15:58:51.000Z", "summary": "NVIDIA 在 Hugging Face 上开源了 Cosmos 3 Edge，一个 40 亿参数的世界模型，旨在帮助机器人和视觉 AI 智能体在边缘设备上理解环境、实时推理并生成动作。", "type": "model", "relTime": "3天前"}, {"id": 104, "title": "开源世界模型Alaya World颠覆游戏原型成本", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079230005419065670", "date": "2026-07-20T15:40:38.000Z", "summary": "开源世界模型Alaya World通过显式3D空间缓存、压缩帧历史记忆和Error Bank误差回灌技术，将游戏可玩原型的制作成本从\"几周\"压缩到\"一分钟\"。输入一张图、一条相机轨迹和几句prompt即可生成可探索场景，大幅降低独立团队和UGC的创作门槛。但精确碰撞、多人同步、数值平衡等3A核心骨架未被触及，短期与3D资产化引擎管线互补。", "type": "tip", "relTime": "3天前"}, {"id": 105, "title": "YouTube 更新政策，明确三类 AI 低质内容不得变现", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/20/youtube-clarifies-policies-around-ai-slop-and-upsetting-videos", "date": "2026-07-20T15:23:06.000Z", "summary": "YouTube 于 7 月 16 日更新变现政策，将\"不真实内容\"细分为三类：重复/模板化内容、令人不适或情绪操纵内容、以及使用 AI 数字人讨论健康/金融等敏感话题的内容。拥有过多此类内容的频道将被移出 YouTube 合作伙伴计划（YPP），无法通过广告和订阅创收。YouTube 信任与安全主管 Matt Halprin 表示，此举旨在打击利用 AI 快速生成低质视频的\"内容农场\"行为。", "type": "industry", "relTime": "3天前"}, {"id": 106, "title": "昆仑万维发布并开源可交互世界模型 Matrix-Game 3.5", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/TUVv2wvp4RixsblDLrvSGg", "date": "2026-07-20T13:45:18.000Z", "summary": "昆仑万维在 WAIC 2026 发布并开源新一代可交互世界模型 Matrix-Game 3.5。该模型通过 Patch Memory 与 Warped PRoPE 实现长期记忆与几何一致性建模，可在单张 GPU 上以 720P 分辨率、约 20FPS 实时生成流式视频。", "type": "model", "relTime": "3天前"}, {"id": 107, "title": "OpenRouter 上线 Grok Imagine Video 1.5", "source": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2079200618498191407", "date": "2026-07-20T13:43:51.000Z", "summary": "Grok Imagine Video 1.5 来自 @SpaceXAI，现已登陆 OpenRouter！  让任何静态图像活起来，可附加文字提示。塑造运动和镜头运作。通过内置声音和对话设定氛围与物理效果。  试用：https://openrouter.ai/x-ai/grok-imagine-video-1.5", "type": "paper", "relTime": "3天前"}, {"id": 108, "title": "Alaya World 开源：Error Bank 让模型学会带错前行", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079178289751470467", "date": "2026-07-20T12:15:08.000Z", "summary": "开源世界模型 Alaya World 的核心创新是 Error Bank--故意将积累的伪影回灌进训练，让模型在\"脏历史\"上继续正确预测，而非追求每一步完美。这一机制解决了长程生成中错误级联崩溃的难题，将验证一个世界想法的成本从几周压缩到几分钟。Alaya World 目前未涉及碰撞体、多人同步等 3A 游戏核心骨架，但其技术哲学对具身智能仿真等长时自主系统同样适用。", "type": "tip", "relTime": "3天前"}, {"id": 109, "title": "WAIC 2026 现场：MiniMax、智平方、星尘智能等十余家云启被投展示模型与机器人落地进展", "source": "elsewhere：文章（RSS）", "sourceUrl": "https://elsewhere.news/zh/author-1779868954078/waic-ai", "date": "2026-07-20T11:10:00.000Z", "summary": "2026 年 WAIC 首次铺开至\"三地四馆\"，超 1100 家企业参展。MiniMax 预热多模态生成模型 H3，智平方展示搭载 NeuroVLA 的 AlphaBot 2，星尘智能发布第二代具身基座模型 Lumo-2 及售价 8.99 万元起的 T1 机器人。机器人从演示走向真实场景，在药房、工厂、零售等岗位执行长任务，行业重心从\"参数竞赛\"转向\"价值验证\"。", "type": "industry", "relTime": "3天前"}, {"id": 110, "title": "宇树发布 UnifoLM-OminiA-0.3 模型，支持全模态交互理解", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/032.htm", "date": "2026-07-20T07:22:09.000Z", "summary": "宇树科技发布 UnifoLM-OminiA-0.3 模型，单模型统筹家居康养多任务，支持全模态交互理解，全程自主执行抗干扰。该模型在人形机器人 G1 上实现从感知到行动的闭环，可完成物品搬运、视觉识别与回答、精细操作及设备控制等任务。", "type": "model", "relTime": "3天前"}, {"id": 111, "title": "上海科学智能研究院开放科学多模态基础模型\"神珍\"", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/017.htm", "date": "2026-07-20T07:00:15.000Z", "summary": "上海科学智能研究院开放科学多模态基础模型\"神珍\"，总参数约110亿，可处理DNA、RNA、蛋白质、小分子、地球系统和医学影像六类数据。在生物序列20项任务中，该模型9项取得最优结果；医学影像分割平均Dice得分91.20，在7种参评方法中最优。模型权重及代码已在星河启智、Hugging Face和GitHub开放。", "type": "model", "relTime": "3天前"}, {"id": 112, "title": "欧莱雅中国与火山引擎达成战略合作，豆包大模型进入美妆经营一线", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/ZwGtT_T20p7FxJ5sTBC_ig", "date": "2026-07-20T06:08:05.000Z", "summary": "欧莱雅（中国）与火山引擎于7月19日达成战略合作，将围绕AIGC创意内容生产、经营策略分析和消费者智能服务三大场景，探索豆包大模型在电商运营素材生成、智能客服、智能助播及内容审核等环节的应用。双方将利用火山引擎的多模态生成、AI Agent和自动化流程能力，提升素材制作效率、消费者服务响应速度及营销策略洞察转化。", "type": "industry", "relTime": "3天前"}, {"id": 113, "title": "VITURE 发布 Auto Immersive 3D 技术，实现安卓系统实时 3D 立体化", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/931.htm", "date": "2026-07-20T03:45:49.000Z", "summary": "XR 眼镜品牌 VITURE 在 2026 世界人工智能大会上发布 Auto Immersive 3D 技术，依托颈环端侧算力实现安卓全系统实时 3D 立体化。该技术可将任意视频一键转为 3D 效果、增强非原生 3D 游戏并支持 PC 游戏串流升维，同时将系统桌面与办公软件全局 3D 化，未来有望延伸至工业与医疗影像领域。", "type": "paper", "relTime": "3天前"}, {"id": 114, "title": "用随机数指纹识别AI模型是否被调包", "source": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2079037351129694309", "date": "2026-07-20T02:55:05.000Z", "summary": "布拉格经济大学研究者发现，利用AI模型无法生成真正随机数的缺陷，可通过其偏好的\"口头禅数字\"进行身份识别。例如GPT-4o偏爱42，Claude Sonnet 5只说47，Qwen3-Max在30次采样中每次都答42。该方法可用于检测OpenRouter等聚合商是否偷偷替换了用户选择的模型。", "type": "tip", "relTime": "3天前"}, {"id": 115, "title": "爱芯元智发布元曦系列大算力产品，A 系列AI推理卡算力超1000TOPS", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/841.htm", "date": "2026-07-20T01:33:16.000Z", "summary": "爱芯元智在WAIC 2026上推出元曦系列大算力产品线，专攻机房集群、多路视频分析等高并发场景。其中A系列AI推理卡搭载超1000TOPS算力，配备超大显存与高带宽。同时发布的具身智能大脑控制器拥有1500TOPS算力与约2倍行业领先带宽，支持世界模型与VLA，视觉感知芯片AX8910已规模化落地。", "type": "model", "relTime": "3天前"}, {"id": 116, "title": "LVSum 基准：评估多模态大模型的长视频时间感知摘要能力", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/lvsum-video-summarization", "date": "2026-07-20T00:00:00.000Z", "summary": "Apple 推出 LVSum，一个含细粒度时间对齐的人工标注长视频摘要基准，包含 13 个领域的 72 个视频（平均时长 16 分钟），每个视频配有最多 10 条含时间引用的人类摘要。评估显示，转录文本对摘要质量的贡献远大于视觉帧，当前多模态大模型在时间定位、指令遵循和跨模态一致性上存在系统性缺陷，与人类摘要仍有显著差距。", "type": "paper", "relTime": "3天前"}, {"id": 117, "title": "EduPanel：用于教学视频评估的三智能体LLM裁判--可靠性、互补性与人类信任校准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18529", "date": "2026-07-20T00:00:00.000Z", "summary": "EduPanel 是一个基于评分标准、面向特定学习者的多模态 LLM 裁判，将教学视频评估分解为三个专门智能体。专家研究表明，EduPanel 的可靠性达到人类专家中位数水平；其反馈将专家评分误差（MAE）从 0.87 降至 0.73，同时专家仍能检测不可靠输出（AUC = 0.77），而非盲目接受。结果表明 EduPanel 可作为教育评估的有效辅助工具，而非替代人类专家。", "type": "paper", "relTime": "3天前"}, {"id": 118, "title": "SciForma：科学示意图的结构忠实生成框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18091", "date": "2026-07-20T00:00:00.000Z", "summary": "北京大学与微软亚洲研究院提出 SciForma 框架，将科学示意图质量分解为组件、箭头和文本三个结构轴，并构建 SciFormaData-700K 训练集与 SciFormaBench-2K 评测基准。其核心方法 M-DPO 在 SFT 后强制所有轴同时正确，使 SciForma-9B 在两项基准上超越所有开源基线及 GPT-Image-1.5。", "type": "paper", "relTime": "3天前"}, {"id": 119, "title": "LLM 在空间约束下的分子生成能力：3D-Fit 基准测试揭示潜力与差距", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18144", "date": "2026-07-20T00:00:00.000Z", "summary": "一项新研究系统评估了通用 LLM 在结构药物设计（SBDD）中处理复杂 3D 空间约束的能力。研究者引入 3D-Fit 基准测试策略，对比 LLM 与专用扩散模型在蛋白口袋、锚定片段、药效团点及强制口袋-配体相互作用等多条件分子生成任务上的表现。结果显示，LLM 虽仍落后于 SOTA 方法，但已能同时处理多种空间约束，具备向异构场景扩展的潜力。", "type": "paper", "relTime": "3天前"}, {"id": 120, "title": "ReViV：从单目第一人称视频中联合重建观察者与场景的4D框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17790", "date": "2026-07-20T00:00:00.000Z", "summary": "ReViV提出首个统一框架，从单目RGB视频同时重建观察者（全身运动、手部、视线）与场景（相机轨迹、深度）的4D动态。基于掩码生成式第一人称Transformer的单前馈架构，无需预计算相机轨迹或分离建模，在HoloAssist、HOT3D、ARCTIC、Aria Digital Twin、TACO等基准上实现全身、手部、视线重建与相机追踪的SOTA精度，深度估计也具竞争力。代码与模型已完全开源。", "type": "paper", "relTime": "3天前"}, {"id": 121, "title": "ShotPlan：基于可学习规划token的电影级视频生成框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17675", "date": "2026-07-20T00:00:00.000Z", "summary": "ShotPlan提出一种显式多镜头电影级视频生成框架，通过可学习规划token（planning tokens）与分数时间旋转位置编码（FRoPE）在帧级别控制镜头切换。实验表明，该方法在镜头管理和跨镜头一致性上显著优于现有电影级视频生成方法。", "type": "paper", "relTime": "3天前"}, {"id": 122, "title": "FlowMimic：无需遮罩的在线视频编辑数据生成与模态模仿框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18227", "date": "2026-07-20T00:00:00.000Z", "summary": "FlowMimic提出像素对时序扭曲流场，直接从图像编辑样本实时生成对应视频编辑样本，无需人工遮罩标注或I2V模型合成。该方法通过模态模仿生成损失和编辑损失对齐图像与视频模态的输出分布，并引入指代表达分割等感知任务及编辑区域感知的隐层与注意力损失，使模型内化语言驱动的视觉编辑能力。", "type": "paper", "relTime": "3天前"}, {"id": 123, "title": "RynnBrain 1.1 具身基础模型家族发布", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17977", "date": "2026-07-20T00:00:00.000Z", "summary": "RynnBrain 1.1 发布 2B、9B 和 122B-A10B 三种规模的具身基础模型，新增接触点预测与 3D 定位训练任务。其中 122B-A10B 模型在 VSI-Bench、MMSI 和 RefSpatial-Bench 上超越所有评估的闭源与开源模型，基于该模型初始化的策略在真实机器人实验中优于 Qwen 基线和通用 VLA 方案。", "type": "model", "relTime": "3天前"}, {"id": 124, "title": "HOMIE：基于多模态智能增强的人-物中心视频个性化生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18217", "date": "2026-07-20T00:00:00.000Z", "summary": "HOMIE提出统一框架，同时处理跨主体与同主体参考输入的人-物中心视频个性化生成（HOCVP）任务。该方法通过全局多模态引导将MLLM语义特征与VAE token对齐，并引入模态参考嵌入以区分MLLM特征与VAE token、关联同主体参考图像token，在不牺牲文本编码器可控性且无需昂贵重对齐的前提下提取参考级关系知识。实验表明HOMIE在多项HOCVP任务上达到SOTA性能。", "type": "paper", "relTime": "3天前"}, {"id": 125, "title": "DiFA：扩散模型推理时的前向过程对齐方法", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17972", "date": "2026-07-20T00:00:00.000Z", "summary": "DiFA提出一种无需训练的推理框架，将扩散模型的数据预测精炼重构为序列状态估计问题，通过聚合历史预测构建前向对齐的时间共识。在CIFAR-10和ImageNet上，DiFA在FID、IS和FD-DINOv2等指标上均取得显著提升。", "type": "paper", "relTime": "3天前"}, {"id": 126, "title": "Qwen3.8发布，参数规模达2.4T", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2078991141673021682", "date": "2026-07-19T23:51:28.000Z", "summary": "Qwen 推出 Qwen3.8，拥有 2.4T 参数，性能媲美前沿模型，预览版已开放。Netflix CPTO 认为 AI 加速流程但未替代品味与责任。Vidu S1 将视频扩散推理压至约 4 步，在消费级 GPU 上实现 540P、25-42 FPS 的实时生成。", "type": "tip", "relTime": "4天前"}, {"id": 127, "title": "Vidu S1 实现消费级GPU实时视频生成，PPIO推Agent云架构，Netflix强调AI产品判断", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2078991088736780598", "date": "2026-07-19T23:51:15.000Z", "summary": "Vidu S1 在消费级GPU上以25-42 FPS生成540P实时视频，通过算子优化和蒸馏至约4步推理实现。PPIO提出Agent云架构，日均处理Token超1.2万亿，核心包括模型网关和冷启动低于200毫秒的沙箱。Netflix CPTO强调AI加速原型后，产品判断、数据治理与创作者选择更为关键。", "type": "tip", "relTime": "4天前"}, {"id": 128, "title": "Gemma 4 12B 视频推理可视化", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2078890520785391883", "date": "2026-07-19T17:11:38.000Z", "summary": "这是一个精彩的视觉化展示。", "type": "tip", "relTime": "4天前"}, {"id": 129, "title": "Berry Xia 实测：Claude 3D 建模与视频生成能力惊人", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078851241338401262", "date": "2026-07-19T14:35:33.000Z", "summary": "Berry Xia 实测发现，Claude 不仅能出色完成 3D 建模，还能在无任何 Skills 辅助下，一次成型生成高质量视频。他认为若配合 Skills 能力将更强大，并称\"好久没有如此的兴奋了\"。", "type": "tip", "relTime": "4天前"}, {"id": 130, "title": "生数科技朱军：从视频生成到世界模型的演进路径", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/xE3SffTQWY0yRtqUA3cY4A", "date": "2026-07-19T14:31:17.000Z", "summary": "生数科技创始人朱军阐释了从视频生成到世界模型的演进路径。公司发布的实时交互模型Vidu S1支持无限时长连续生成与语音交互，世界动作模型Motubrain在RoboTwin 2.0的50余项复杂任务中平均成功率超过95%。", "type": "tip", "relTime": "4天前"}, {"id": 131, "title": "面壁智能开源 MiniCPM-Robot 具身智能模型系列", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2078839529591759025", "date": "2026-07-19T13:49:01.000Z", "summary": "面壁智能开源首个具身AI模型系列 MiniCPM-Robot，包含 1.5B 参数的通用视觉-语言-动作（VLA）模型 MiniCPM-RobotManip 和用于目标跟踪的 MiniCPM-RobotTrack。同时发布高性能推理框架 PhyAI，旨在让机器人实现理解、记忆与行动。", "type": "model", "relTime": "4天前"}, {"id": 132, "title": "面壁智能在 WAIC 2026 发布 MiniCPM5-2B 与 VLA 具身模型", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/zs3eJ-K3HH5bwvjNfEUNhw", "date": "2026-07-19T13:12:39.000Z", "summary": "面壁智能在 WAIC 2026 端侧AI论坛上发布两款端侧大模型：20亿参数的MiniCPM5-2B文本模型在AA榜单位列2B以下第一，以及融合多模态与视觉Token压缩的VLA具身模型。其MiniCPM开源系列累计下载量突破3800万次，已落地手机、汽车等终端，并搭载于吉利银河M9等车型。", "type": "model", "relTime": "4天前"}, {"id": 133, "title": "Qwen3.8-Max-Preview 预览版发布，Token Plan 订阅方案升级", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.qwencloud.com/pricing/token-plan", "date": "2026-07-19T12:25:23.982Z", "summary": "通义千问发布 Qwen3.8-Max-Preview 预览版，并推出升级版 Token Plan 订阅方案。新方案提供 Individual 和 Team 两种计划，支持统一访问文本、视觉、语音和图像生成模型。Lite、Standard、Pro 三档月费计划分别支持 1-2、3-4、6-8 个并发智能体。", "type": "model", "relTime": "4天前"}, {"id": 134, "title": "Google DeepMind 提出 GenCeption，将视频生成模型改造为通用视觉模型", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/google-deepmind-argues-video-generators-already-contain-the-world-models-computer-vision-has-been-missing", "date": "2026-07-19T10:17:49.000Z", "summary": "Google DeepMind 提出 GenCeption，将阿里巴巴开源的 Wan2.1 视频生成模型改造为单次前向传播即可完成深度估计、分割等任务的模型。它仅用 7，500 段合成视频训练，数据量仅为竞品的 1/7 至 1/500，但在多个基准上匹配甚至超越了 DepthAnything 3 等专用模型。", "type": "paper", "relTime": "4天前"}, {"id": 135, "title": "阿里云推出个人Token计划，覆盖多模态", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2078784690534670495", "date": "2026-07-19T10:11:06.000Z", "summary": "一个计划。所有模态。超值价格。🚀  阿里云个人Token计划：✅ 文本、图像和视频的统一额度 ✅ Qwen3.8-Max-Preview · GLM-5.2 · DeepSeek-V4-Pro ✅ 用于视频生成的 Happy Horse 1.1 ✅ 首月（使用优惠券后）起价 4 美元/月  🔗 https://int.alibabacloud.com/m/1000415553/  #阿里云 ...", "type": "product", "relTime": "4天前"}, {"id": 136, "title": "Luma AI生成时尚大片：单眼串联全片", "source": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2078780132819361953", "date": "2026-07-19T09:53:00.000Z", "summary": "一部完整的时尚大片，由一只眼睛和无数细微抉择串联而成。制作团队采纳了修改意见，而视觉始终坚定不移。作者：Eli Coleman。使用 Luma 制作。", "type": "paper", "relTime": "4天前"}, {"id": 137, "title": "AI文本检测器在模仿作者风格时漏检率飙升", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/ai-text-detectors-struggle-when-language-models-mimic-an-authors-style", "date": "2026-07-19T08:35:26.000Z", "summary": "Epoch AI研究显示，Pangram、GPTZero和Originality.ai检测普通AI文本近乎完美，假阴性率最高仅0.7%。但当Claude Opus 4.8等模型模仿特定作者风格写作时，平均13%的AI文本未被检出；科学写作类别中漏检率高达24%-29%，Pangram对Gemini生成的学术文本漏检率达48%。", "type": "paper", "relTime": "4天前"}, {"id": 138, "title": "阿里云百炼上线 HappyOyster 1.0，一句话生成可互动 AI 数字世界", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/729.htm", "date": "2026-07-19T08:16:45.000Z", "summary": "阿里云百炼今日上线开放式世界模型产品 HappyOyster 1.0，用户输入一句话或一张图即可生成可互动、可探索的 AI 数字世界。该模型支持 1 分钟连续实时交互的世界探索模式和 3 分钟以上分支叙事的实时导演模式，已提供三端 SDK 并开启灰测。", "type": "model", "relTime": "4天前"}, {"id": 139, "title": "Castor：开源命令行工具，从终端向电视投屏任意网页视频", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/stupside/castor", "date": "2026-07-19T05:45:33.311Z", "summary": "Castor 是一款开源命令行工具，能从终端向电视投屏任意网页视频，支持 DLNA/UPnP 和实验性 Chromecast。它通过 headless Chrome 提取视频流、ffmpeg 转码并实时投屏，支持 IMDB/TMDB ID、直接流 URL 或网页播放器三种输入方式，可自动生成字幕。", "type": "model", "relTime": "4天前"}, {"id": 140, "title": "商汤发布旗舰原生多模态模型U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078681943680704993", "date": "2026-07-19T03:22:50.000Z", "summary": "商汤发布旗舰原生多模态基模SenseNova U1 Pro，基于NEO-Unify架构统一理解、生成与行动，并支持原生交织的视觉-语言推理。相比U1 Lite，U1 Pro支持智能体生成循环中的数十轮长程推理、8K原生分辨率输出，且渲染文字错误率极低。预览版现已开放邀请，API与定价将于2026年8月正式发布。", "type": "model", "relTime": "4天前"}, {"id": 141, "title": "Codex调用素材库一键生成视频", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078680925987291374", "date": "2026-07-19T03:18:47.000Z", "summary": "Codex 调用 Listenhub Cli + 免费视频素材库 pexels 写一个 skill，一句话生成类似视频。", "type": "tip", "relTime": "4天前"}, {"id": 142, "title": "阿里开放式世界模型快乐生蚝 HappyOyster 1.0 登陆百炼平台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/644.htm", "date": "2026-07-19T02:53:07.000Z", "summary": "阿里巴巴发布开放式世界模型 HappyOyster 1.0（快乐生蚝），已登陆阿里云百炼面向企业和开发者开启灰测。模型提供世界探索与实时导演两大模式，支持用户通过一句话或一张图生成可实时交互的开放世界，并可用文字指令操控镜头与剧情。产品提供 Android/iOS/Web 三端 SDK，支持构建可玩世界、互动剧等沉浸式应用。", "type": "model", "relTime": "4天前"}, {"id": 143, "title": "Grok视频生成进化，质感丝滑可战Seedance", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078669737194631628", "date": "2026-07-19T02:34:19.000Z", "summary": "Grok视频生成能力大幅进化，生成的视频在质感和分镜丝滑程度上已可与Seedance一战。示例中，Grok根据详细提示词生成了超现实主义纪录片风格的网球观众席片段，包含精确的首帧锁定、手持抖动、自动对焦搜索等2000年代DV质感。", "type": "tip", "relTime": "4天前"}, {"id": 144, "title": "本田推出商用自动驾驶电动割草机，售价32999美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/627.htm", "date": "2026-07-19T01:14:04.000Z", "summary": "本田发布自动驾驶纯电动割草机ProZision Autonomous ZTR，售价32999美元，已开始向经销商发货。该设备通过GPS、激光雷达和360度视觉传感器实现约3厘米误差的自主作业，提供54英寸和60英寸两种割草宽度。", "type": "paper", "relTime": "4天前"}, {"id": 145, "title": "荣耀发布伙伴型多模态智能体操作系统 AgenticOS，Robot Phone 8 月首发内核", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/621.htm", "date": "2026-07-19T00:30:21.000Z", "summary": "荣耀在 2026 世界人工智能大会上发布 AgenticOS，支持意图驱动、自然交互等四大特征，拥有行业首个系统级 Agent 架构。8 月发布的 Robot Phone 将首发其内核，Q4 的 Magic9 系列将推出尝鲜版。Robot Phone 搭载第五代骁龙 8 至尊版芯片，顶部集成行业最小四自由度钛合金机械云台，体积缩小 70%。", "type": "paper", "relTime": "4天前"}, {"id": 146, "title": "HarmoHOI：统一扩散框架实现多视角手物交互视频与3D运动联合生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17097", "date": "2026-07-19T00:00:00.000Z", "summary": "HarmoHOI提出混合多视角扩散Transformer，将RGB视频与3D点轨迹作为伪视频共同建模，弥合2D潜空间与3D几何信号的域差距。通过全局运动对齐扩散将粗糙点轨迹优化为度量尺度的全局对齐3D轨迹，在去噪过程中协同演化2D外观与3D运动。实验表明，HarmoHOI在视觉质量、运动合理性和多视角几何一致性上达到SOTA。", "type": "paper", "relTime": "4天前"}, {"id": 147, "title": "TimeLens2：面向通用视频时序定位的多模态大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17423", "date": "2026-07-19T00:00:00.000Z", "summary": "TimeLens2 将视频时间证据视为区间集合进行监督与优化，其 TimeLens2-93K 数据集通过多步骤流程构建可靠标注。模型采用时序 Wasserstein 奖励函数，为不等基数与等效碎片化预测提供无匹配的密集反馈。TimeLens2-8B 在七个基准上以 48.0 平均 mIoU 达到 SOTA，超越最高 397B 参数的开源模型。", "type": "paper", "relTime": "4天前"}, {"id": 148, "title": "无人机编队表演舞蹈与特技", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078624943021928715", "date": "2026-07-18T23:36:20.000Z", "summary": "在繁忙交通堵塞上空，小型无人机搭载舞者表演宝莱坞舞蹈，每架无人机一人，聚焦舞蹈动作。  （SD2）  啦啦队员身穿飞行服，在游乐园上空的无人机上进行特技表演，最后组成人塔，由地面业余电影人拍摄，白天。镜头稍微拉近，重新对焦。  （SD2）", "type": "tip", "relTime": "5天前"}, {"id": 149, "title": "NVIDIA 发布 DeepStream 9.1，新增 13 项智能体技能与多视角 3D 追踪", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/18/nvidia-released-deepstream-9-1-bringing-agentic-ai-to-vision-ai-with-13-skills-and-multi-view-3d-tracking", "date": "2026-07-18T19:16:22.000Z", "summary": "NVIDIA 发布 DeepStream 9.1，新增 13 项 agentic skills，支持通过自然语言描述构建多摄像头视觉管线。核心技能 MV3DT 将多摄像头检测投影至统一 3D 坐标系，为跨视角目标分配全局一致的 ID；AMC 技能可自动估算摄像头内外参，替代手动棋盘格标定。", "type": "paper", "relTime": "5天前"}, {"id": 150, "title": "商汤发布原生多模态旗舰模型SenseNova U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078510614889238997", "date": "2026-07-18T16:02:02.000Z", "summary": "商汤发布旗舰原生多模态基础模型SenseNova U1 Pro，基于NEO-Unify架构，统一理解、生成与行动能力，并支持原生交织视觉-语言推理。相比U1 Lite，U1 Pro支持数十轮智能体生成循环、8K原生分辨率输出、超低文字渲染错误率，以及超宽/超高图像生成。预览版现已开放邀请，2026年8月正式发布API及定价。", "type": "model", "relTime": "5天前"}, {"id": 151, "title": "用GPT-Image-2+剪映一键生成爆款跳舞视频", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078508800475029833", "date": "2026-07-18T15:54:49.000Z", "summary": "用户用GPT-Image-2生成游艇美女图，再导入剪映搜索\"梦的翅膀受了伤\"选剪同款，即可生成不带AI标志的跳舞视频。该方法操作简单，适合抖音、小红书快速起号。", "type": "tip", "relTime": "5天前"}, {"id": 152, "title": "央视对话生数科技朱军：AI从生成视频到理解世界", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/xLruk-2-eTG6LNC73xzHzQ", "date": "2026-07-18T12:56:36.000Z", "summary": "2026世界人工智能大会（WAIC）期间，央视总台《科技零距离》对话生数科技创始人、清华大学人工智能研究院副院长朱军，围绕世界模型、AI视频发展及未来智能展开交流。节目于今晚21：00全平台上线。", "type": "industry", "relTime": "5天前"}, {"id": 153, "title": "京东携 JoyAI 全系列大模型矩阵及 JoyInside 附身智能技术亮相 WAIC 2026", "source": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/A-Om9cK9rFnUme9l42BMLA", "date": "2026-07-18T12:29:13.000Z", "summary": "京东在 WAIC 2026 上展出 JoyAI 全系列大模型矩阵，覆盖多模态交互、具身智能等赛道，多款模型已开源。现场提供 JoyEgoCam 头戴数采设备体验机器人学习流程，并搭建 JoyInside 未来全屋 AI 样板间，实现无唤醒词的全屋语音联动。", "type": "industry", "relTime": "5天前"}, {"id": 154, "title": "Kimi 3 3D生成惊艳演示，效果绝佳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078428187768553902", "date": "2026-07-18T10:34:29.000Z", "summary": "Berry Xia 发布多个 Demo，展示 Kimi 3 在 3D 生成方面的惊艳效果，认为\"真的很绝\"。具体模型版本、参数规模、benchmark 分数等数字未在推文中提及。", "type": "tip", "relTime": "5天前"}, {"id": 155, "title": "上海发布太空算力星座工程\"星枢计划\"，首发星座含3颗卫星，商业运营阶段将完成千星部署", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/530.htm", "date": "2026-07-18T09:48:31.000Z", "summary": "上海在2026世界人工智能大会上发布\"星枢计划\"首发星座，由1颗中心算力主星、1颗伏羲气象星和1颗即时遥感星构成，通过星间激光链路实现数据贯通。主星搭载定制航天级GPU芯片，单星实现32P在轨算力，并首次引入具身智能系统用于在轨运维。该计划商业运营阶段将完成千星部署，包括800颗中心算力卫星和200颗边缘计算卫星。", "type": "industry", "relTime": "5天前"}, {"id": 156, "title": "思特威与地瓜机器人合作推出1：1方形视觉传感器", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/529.htm", "date": "2026-07-18T09:47:26.000Z", "summary": "思特威与地瓜机器人达成战略合作，基于旭日S600平台适配三款1：1方形全局快门图像传感器。该方案分辨率覆盖1080×1080至1944×1944，帧率80fps至130fps，为人形机器人等具身智能设备提供V-SLAM与主动避障等视觉支撑。", "type": "industry", "relTime": "5天前"}, {"id": 157, "title": "Claude Design 高保真原型可替代产品文档", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078388657979838830", "date": "2026-07-18T07:57:25.000Z", "summary": "开发者用 Claude Design 生成高保真可交互原型替代传统产品文档，原型包含模拟数据且修改便捷。以视频水印功能为例，先让 Opus 4.8 出原型稿，打磨确认后由 AI 实现代码，最终代码还原度可达 9 成以上。", "type": "tip", "relTime": "5天前"}, {"id": 158, "title": "荣耀 CEO 李健：AI 将脱离工具属性，迈向伙伴型类人生命体", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/476.htm", "date": "2026-07-18T07:02:32.000Z", "summary": "荣耀 CEO 李健在 2026 世界人工智能大会上表示，AI 的演进将脱离冰冷的工具属性，全面迈向伙伴型类人生命体。荣耀已将 MagicOS 升维为行业首个伙伴型、多模态智能体操作系统。首台机器人 Robot Phone 今日开启预约，搭载第五代骁龙 8 至尊版芯片与 4DoF 钛合金机械云台。", "type": "tip", "relTime": "5天前"}, {"id": 159, "title": "B站\"猫娘计划\"亮相WAIC 2026，支持自主导入模型并理解桌面内容", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/464.htm", "date": "2026-07-18T06:34:59.000Z", "summary": "哔哩哔哩在WAIC 2026上展示了开源AI数字生命生态计划\"猫娘计划\"，其核心产品为主动式全模态AI伙伴驱动器N.E.K.O.。该产品支持Live2D与VRM双引擎，用户可自由导入模型，并内置视觉多模态大模型以理解电脑屏幕内容。目前该产品已在Steam上架抢鲜体验。", "type": "model", "relTime": "5天前"}, {"id": 160, "title": "荣耀 WAIC 宣布 Robot Phone 开启预约：搭载 Agentic OS，8 月发布", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/462.htm", "date": "2026-07-18T06:30:45.000Z", "summary": "荣耀在 WAIC 2026 上正式官宣全球首台机器人手机 Robot Phone 开启全渠道预约，计划于 2026 年第三季度上市。该机搭载第五代骁龙 8 至尊版芯片与行业最小四自由度钛合金机械云台，系统层面将 MagicOS 升维为行业首个伙伴型多模态智能体操作系统 Agentic OS，并与阿里联合定义下一代 Magic 智能体大模型矩阵。", "type": "model", "relTime": "5天前"}, {"id": 161, "title": "Kimi K3 一句话生成在线视频编辑器", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078305954605772954", "date": "2026-07-18T02:28:47.000Z", "summary": "Kimi K3 通过\"乔木goal\"和\"PRD skill\"等技能，仅凭一句提示词便自动生成了一个类似剪映网页版的在线视频编辑器（cut.qiaomu.ai）。该Demo已开源，尽管功能粗糙且导出存在问题，但展示出AI从需求到产品原型的一步生成能力。", "type": "tip", "relTime": "5天前"}, {"id": 162, "title": "OCT-Bench 基准评估多模态大语言模型在 OCT 图像理解上的能力", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16609", "date": "2026-07-18T00:00:00.000Z", "summary": "研究者推出 OCT-Bench，一个评估多模态大语言模型在光学相干断层扫描图像理解能力的基准。该基准包含来自7个数据集的4，137张图像和10，076道多选题，覆盖感知、认知、推理三个维度的20项任务。对20个代表性模型的评估显示，当前模型远未达到可靠水平，且医学领域适配或增大模型规模均未带来一致提升。", "type": "paper", "relTime": "5天前"}, {"id": 163, "title": "TikTok 开始测试 AI 肖像检测工具，允许创作者举报 AI 生成内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/967486/tiktok-ai-likeness-detection-tool", "date": "2026-07-17T19:34:30.000Z", "summary": "TikTok 正在测试一项可选工具，可扫描 AI 生成的肖像并允许创作者向平台举报。该工具目前仅对\"部分\"美国创作者开放测试，创作者需先通过 Jumio 完成实时自拍扫描和身份验证。TikTok 表示不会保留身份证件和面部信息。", "type": "paper", "relTime": "6天前"}, {"id": 164, "title": "宝玉：Agent 应用和开发首选 Mac", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078195610696482895", "date": "2026-07-17T19:10:19.000Z", "summary": "宝玉指出，当前主流 Agent 应用（如 Computer Use）在 Mac 上支持最好，开发者开发 App 也应优先 Mac。他推荐 Mac Mini 或 Mac Studio，但强调内存至少 16G 以上、硬盘 1T 起步。其开源工具 BaoCut 可转录 YouTube 视频并生成双语字幕，但仅支持 Mac。", "type": "tip", "relTime": "6天前"}, {"id": 165, "title": "Epoch AI 测试：AI 检测器易被模仿误导", "source": "X：Epoch AI (@EpochAIResearch)", "sourceUrl": "https://x.com/EpochAIResearch/status/2078195357599813723", "date": "2026-07-17T19:09:18.000Z", "summary": "我们对一些 AI 检测器进行了压力测试，发现它们很少将人类文本误判为 AI 生成。但要求大语言模型模仿特定作者时，检测器约 13% 的情况下会将文本误分类为人类生成。对于科学写作，假阴性率上升至约 26%。", "type": "paper", "relTime": "6天前"}, {"id": 166, "title": "免费AI视频素材库：低成本空镜头方案", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078183471831277778", "date": "2026-07-17T18:22:05.000Z", "summary": "针对AI生成视频成本过高的问题，有网站提供无版权免费的AI素材库。作者提议编写CLI工具自动搜索下载，并交由Codex进行AI自动剪辑，至少可作为空镜头使用。", "type": "tip", "relTime": "6天前"}, {"id": 167, "title": "VideoChat3：全开源视频理解模型发布", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2078179727529877506", "date": "2026-07-17T18:07:12.000Z", "summary": "VideoChat3  完全开源的视频多模态大语言模型，用于高效且通用的视频理解。", "type": "paper", "relTime": "6天前"}, {"id": 168, "title": "Astribot Lumo-2：4B参数机器人基础模型发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2078171810403950614", "date": "2026-07-17T17:35:44.000Z", "summary": "Astribot发布Lumo-2，一个4B参数的机器人基础模型，采用行业首个Latent World-Action Model（LWAM）架构。该模型在22项真实世界操作任务中取得最佳综合表现，总推理速度提升2.71倍，支持人类视频与多种机器人本体，并在105个未见物体上表现更强。结果已在20+复杂家庭任务中通过真实机器人验证。", "type": "model", "relTime": "6天前"}, {"id": 169, "title": "人形机器人供应链比炫技视频更重要", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2078149200701977050", "date": "2026-07-17T16:05:54.000Z", "summary": "中国每周涌现人形机器人炫技视频，但真正关键的是背后的工业生态系统。机器人本体正快速商品化，Unitree G1售价仅¥99，000（$14，625），而核心零部件供应商利润率可达30-50%，本体制造商仅10-15%。随着量产推进，利润将向上游AI算法、软件和数据转移。", "type": "tip", "relTime": "6天前"}, {"id": 170, "title": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 为 Diffusers 模型提供分布式扩散训练", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/scale-diffusers-finetuning-nemo-automodel", "date": "2026-07-17T15:57:54.000Z", "summary": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 开源库为任意 Diffusers 格式模型提供生产级分布式扩散训练，无需检查点转换或模型重写。该集成支持 Wan 2.1、FLUX.1-dev 等模型的完整微调与 LoRA 微调，可在一到数百 GPU 上灵活扩展，所有检查点可直接加载回 Diffusers 管线进行推理。", "type": "model", "relTime": "6天前"}, {"id": 171, "title": "面壁智能在 WAIC 2026 发布具身智能模型 MiniCPM-Robot", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/7ZUoWndvYXCVmt7SmljnVQ", "date": "2026-07-17T15:21:18.000Z", "summary": "面壁智能在 WAIC 2026 发布具身智能模型系列 MiniCPM-Robot，并展示端侧智能在汽车、机器人等领域的落地。其 MiniCPM 系列已覆盖文本、视觉、全模态和语音四大方向，其中 MiniCPM-o 4.5 实现离线全模态即时自由对话。该系列开源模型累计下载量突破 3800 万，已搭载于长安马自达 EZ-60 等车型量产上市。", "type": "industry", "relTime": "6天前"}, {"id": 172, "title": "可灵AI首尔颁奖礼表彰新一代创作者", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2078132620873929184", "date": "2026-07-17T15:00:01.000Z", "summary": "🏆 来自首尔可灵AI NextGen颁奖典礼的精彩瞬间。  我们自豪地分享本次典礼的回顾，该典礼表彰了新一代创作者们使用可灵AI重新定义视觉叙事边界的杰出成就。  衷心感谢所有参与者、评委和合作伙伴，让这个鼓舞人心的首尔之夜成为可能。我们正在共同塑造AI艺术的未来。  观看下方完整回顾视频。", "type": "industry", "relTime": "6天前"}, {"id": 173, "title": "用户用Kimi 3一次生成咖啡机设计", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078132577668637146", "date": "2026-07-17T14:59:51.000Z", "summary": "用户@berryxia 用Kimi 3一次成型手搓咖啡机，兴奋表示被Kimi 3\"硬控\"。视频剪辑存在小问题，但成品效果出色，评论区将补充细节图。", "type": "tip", "relTime": "6天前"}, {"id": 174, "title": "程序员用 Codex 搞定视频下载，众筹到每月 $100 订阅费", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2078120758967251092", "date": "2026-07-17T14:12:53.000Z", "summary": "一位程序员用 Codex 在 8-10 分钟内下载了微信视频号视频，并为其生成字幕。他借机说服妻子将每月 $200 的订阅费分摊一半，成功众筹到 $100。Codex 的 /Goal 指令让原本需要搜索第三方网站的任务变得简单高效。", "type": "tip", "relTime": "6天前"}, {"id": 175, "title": "百度智能云发布\"AI+时尚\"全链路方案，百度搭子串联设计、生产与营销", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/QjAdiDm7fjudol2J46mOEA", "date": "2026-07-17T12:47:12.000Z", "summary": "7月17日，百度智能云在首届全球\"AI+时尚\"创新应用大赛上宣布，其通用智能体\"百度搭子\"已串联设计、3D虚拟样衣、数字人直播、营销素材生成等环节，推动AI时尚从单点内容生成走向全链路产业落地。百度百舸、千帆、一镜及Hogee等平台为高清渲染、模型调用和品牌出海提供支撑。大赛验证了中小品牌和独立设计师可基于成熟平台低成本参与AI时尚应用。", "type": "industry", "relTime": "6天前"}, {"id": 176, "title": "抖音严打 AI 生成虚假灾害画面，发布防汛期涉灾信息治理公告", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/291.htm", "date": "2026-07-17T12:37:04.000Z", "summary": "抖音发布防汛期涉灾信息治理公告，重点打击利用 AI 生成虚假灾害画面、翻炒旧闻编造灾情等行为。平台通过 AI 技术识别、人工复核及权威信息交叉比对，已累计核验典型涉灾谣言 71 起，处置相关谣言内容 1.9 万余条，清理评论区谣言 1.6 万余条，并对 20 个违规账号进行处罚。抖音同时上线 39 则求真卡，视频底部求真条累计曝光超 11.9 亿次。", "type": "industry", "relTime": "6天前"}, {"id": 177, "title": "LLM cliché highlighter：一款识别AI写作套话的检测工具", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/17/llm-cliche-highlighter", "date": "2026-07-17T12:11:11.000Z", "summary": "Simon Willison 用 Fable 5 开发了一款 LLM cliché highlighter 应用，用于高亮 LLM 生成文本中常见的十种套话模式，例如\"no fluff， no filler， no jargon\"这类陈词滥调。该工具旨在帮助读者快速识别并过滤掉充斥在文章中的 AI 写作风格化表达。", "type": "tip", "relTime": "6天前"}, {"id": 178, "title": "TapNow Creative OS：AI原生影视工作流操作系统", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2078084102448713931", "date": "2026-07-17T11:47:13.000Z", "summary": "TapNow Creative OS 正式上线，定位为面向影视制作全流程的 AI 原生操作系统，覆盖从创意开发、内容生成到后期制作。主推文将其类比为\"视觉领域的 Claude Code\"，认为它像 Codex 和 Claude Code 为 LLM 封装真实工具一样，将参考素材、创作方法和项目上下文围绕模型整合进统一工作空间。", "type": "model", "relTime": "6天前"}, {"id": 179, "title": "Omni 原型演示交互式实时视频生成", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078063863346483431", "date": "2026-07-17T10:26:48.000Z", "summary": "我使用 Omni 原型演示了通过直接操控实现的交互式实时视频生成可能的样子。", "type": "tip", "relTime": "6天前"}, {"id": 180, "title": "Kimi 3 语音建模：一张嘴搞定细腻 3D 模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078052528147804502", "date": "2026-07-17T09:41:45.000Z", "summary": "Kimi 3 支持仅靠语音指令直接生成细腻的 3D 模型，交互一气呵成，无需复杂提示词。用户感叹其质感和细节到位，认为它直接吊打头部 3D 建模模型。", "type": "tip", "relTime": "6天前"}, {"id": 181, "title": "腾讯发布具身 VLM 基座模型 Hy-Embodied-VLM-1.0，A3B 规模性能接近上一代 A32B 模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/080.htm", "date": "2026-07-17T07:22:18.000Z", "summary": "腾讯 Robotics X 实验室与福田实验室联合发布第二代具身 VLM 基座模型 Hy-Embodied-VLM-1.0。该模型仅采用 A3B 规模，在 37 个评测任务中综合平均得分 65.6，整体性能接近上一代 A32B 旗舰模型。模型已开源。", "type": "model", "relTime": "6天前"}, {"id": 182, "title": "文远知行发布物理 AI 大模型 WITT，引入\"最小物理事实单元\"概念", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/055.htm", "date": "2026-07-17T07:01:04.000Z", "summary": "文远知行发布自研物理 AI 认知基础大模型 WeRide WITT，首次引入\"最小物理事实单元\"概念，将真实场景拆解为可验证的事实单元。WITT 具备事实提取、推理、验证与编排四大能力，在自动驾驶垂类场景中平均每片段事实错误率仅为通用大模型的三分之一。相比百B级通用大模型，WITT 可节省 98% 的 Token 成本，单卡单日处理 1 万分钟视频，实现 200 倍数据处理效率提升。", "type": "model", "relTime": "6天前"}, {"id": 183, "title": "Kimi多模态能力令人惊喜", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077997593142132939", "date": "2026-07-17T06:03:28.000Z", "summary": "Kimi 的多模态能力让我惊讶。图像识别和推理能力相当不错。", "type": "tip", "relTime": "6天前"}, {"id": 184, "title": "谷歌 Google Vids 新增数字分身功能，Gemini Omni 模型同步登陆", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/022.htm", "date": "2026-07-17T05:42:59.000Z", "summary": "谷歌为 Google Vids 加入个人数字分身功能，用户上传自拍照和语音录音即可生成外貌与声音模仿本人的虚拟形象。多模态 AI 模型 Gemini Omni 同步登陆，支持文字提示词与参考图片整合生成视频 格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上验证用户开启 Alpha 测试，未来将推出免费基础版和付费高级版。", "type": "model", "relTime": "6天前"}, {"id": 190, "title": "Kimi 自动复刻官网宣传视频，制作还原度高", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077918765371826656", "date": "2026-07-17T00:50:14.000Z", "summary": "用户让Kimi 自行复刻官网宣传视频，次日发现Kimi 已完成制作，并生成了快闪版、沉浸版等多个版本，还解释了部分画面缺失的原因。视频的还原度与配乐节奏均由Kimi 自主完成。", "type": "tip", "relTime": "6天前"}, {"id": 191, "title": "S1-Omni：统一多模态科学推理模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15686", "date": "2026-07-17T00:00:00.000Z", "summary": "S1-Omni 将科学理解、预测与生成能力整合到单一架构中，在 200 个科学任务的 S1-Omni-Corpus 上训练。在超过 60 个科学基准上，该模型多数测试超越 GPT-5.5 和 Gemini-3.1-Pro，并在多个基准上达到或超越领域专用模型。", "type": "paper", "relTime": "6天前"}, {"id": 192, "title": "NVIDIA 发布 Audio-Visual Flamingo：面向长视频的开放音频-视觉大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16107", "date": "2026-07-17T00:00:00.000Z", "summary": "NVIDIA 推出 Nemotron-Labs-Audio-Visual Flamingo（AV-Flamingo），一个完全开源的音频-视觉大语言模型，专为理解和推理长视频中的音频、图像与复杂场景设计。", "type": "model", "relTime": "6天前"}, {"id": 193, "title": "Apple 研究：Show Me Examples - 从图像集推断视觉概念", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/visual-concept-inference", "date": "2026-07-17T00:00:00.000Z", "summary": "Apple 机器学习研究团队提出一种方法，让视觉语言模型（VLM）仅从图像集示例中推断视觉概念，无需文本指令。该方法通过对比示例图像与候选图像，使模型捕捉颜色、纹理等视觉规律，在多个概念推理基准上提升准确率。该研究目前为学术论文，未公布模型或 API 可用性。", "type": "paper", "relTime": "6天前"}, {"id": 194, "title": "FVAttn：面向视频生成的运行时负载均衡自适应稀疏注意力系统", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16190", "date": "2026-07-17T00:00:00.000Z", "summary": "腾讯微信团队提出FVAttn，一种无需训练的自适应稀疏注意力系统，通过运行时负载均衡解决多GPU序列并行下Top-路由导致的注意力头负载不均问题。在步蒸馏Wan2.2 I2V上，FVAttn将平均负载不均衡从1.34降至1.08，注意力计算相比FlashAttention实现加速，并保持竞争性视频质量。", "type": "paper", "relTime": "6天前"}];

function fmtDate(iso){ var d=new Date(iso); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function render(){

    var nextDate=PAPERS[i+1]?PAPERS[i+1].date.slice(0,10):null;

  c.innerHTML=html;
}
