      '      <div class="card-meta">','        <span class="badge" style="background:'+color+'18;color:'+color+'">'+label+'</span>',
      '        <span class="badge badge-source" title="'+_e(p.source)+'">'+_e(p.source)+'</span>',
      '        <span class="badge badge-time">'+p.relTime+'</span>','      </div>','    </div>','  </div>',
      '  <div class="card-summary">'+_e(p.summary)+'</div>',
      '  <a class="card-link" href="'+p.sourceUrl+'" target="_blank" rel="noopener">阅读原文 →</a>','</div>'].join("\n");
    var nextDate=PAPERS[i+1]?PAPERS[i+1].date.slice(0,10):null;
    if(dk!==nextDate){ html+='</div>'; }
  });
  c.innerHTML=html;
}
