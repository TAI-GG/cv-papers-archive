.6、Claude、Gemini 和 Grok \"绘制\"《蒙娜丽莎》--AI 图像生成能力实测", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.tryai.dev/blog/ai-drawing-arena-colored-pencils-claude-gpt-grok", "date": "2026-07-22T04:52:13.376Z", "summary": "开发者使用 GPT-5.6、Claude、Gemini 和 Grok 分别尝试\"绘制\"《蒙娜丽莎》，对比各模型的图像生成效果。测试展示了不同 AI 在艺术风格还原、细节处理上的差异，GPT-5.6 在构图准确性上表现突出，而 Claude 和 Gemini 各有侧重。该实验为评估多模态模型的视觉创作能力提供了直观参考。", "type": "tip", "relTime": "4小时前"}, {"id": 7, "title": "商汤 SenseNova-Vision 开源统一视觉模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2079784489199518131", "date": "2026-07-22T04:23:57.000Z", "summary": "商汤发布 SenseNova-Vision，一个通过自然语言提示词即可完成检测、分割、深度估计、OCR、3D 重建等多项视觉任务的统一模型，无需串联多个专用工具。该模型在关键基准上超越近期统一视觉方案，并已完全开源（权重、数据、代码、Demo、论文）。", "type": "paper", "relTime": "4小时前"}, {"id": 8, "title": "通义发布 Qwen-Image-3.0，支持多语言与复杂指令渲染", "source": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2079762971123953976", "date": "2026-07-22T02:58:27.000Z", "summary": "通义千问发布 Qwen-Image-3.0 图像生成模型。该模型支持 12 国语言原生渲染、100+ 艺术风格，并能根据 4.5k token 的复杂指令一次性生成九张信息图或一整版报纸。它还具备网页、游戏、直播界面仿真能力，并可联网获取最新世界知识。", "type": "model", "relTime": "5小时前"}, {"id": 9, "title": "三菱电机与索尼半导体将设立制造业 AI 视觉传感器合资企业 Advanced Vision Solutions", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/935.htm", "date": "2026-07-22T02:40:18.000Z", "summary": "三菱电机与索尼半导体解决方案宣布达成最终协议，共同设立合资企业 Advanced Vision Solutions，瞄准制造业 AI 视觉传感器解决方案领域。该合资企业计划于 2026 年 10 月开始运营，将结合索尼的图像传感器与边缘 AI 技术，以及三菱电机的自动化控制系统经验，开发集成在图像传感器上的 AI 分析系统，以加速制造业决策和控制流程。", "type": "industry", "relTime": "6小时前"}, {"id": 10, "title": "《第九区》导演 Blomkamp 发布 AI 短片《Nightborne》，全片由字节跳动 Seedance 2.0 生成", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/entertainment/968703/neill-blomkamps-nightborne-barley-studios-seedance", "date": "2026-07-21T22:06:43.000Z", "summary": "《第九区》导演 Neill Blomkamp 发布 13 分钟科幻短片《Nightborne》，所有镜头均由字节跳动 Seedance 2.0 文生视频模型生成，并使用了 32 位人类演员肖像。影片因画面细节混乱、角色表演缺乏真实感而被广泛批评为\"AI 垃圾\"，Blomkamp 的创作风格几乎消失。", "type": "tip", "relTime": "10小时前"}, {"id": 11, "title": "Substack 上线 AI 检测工具，可识别\"Claudefishing\"式 AI 生成内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/968855/substack-pangram-ai-detecting-tool", "date": "2026-07-21T19:22:28.000Z", "summary": "Substack 推出由 AI 检测公司 Pangram 驱动的新工具，可扫描帖子、评论、笔记和回复，估算其中有多少文本可能由 AI 生成或辅助完成。读者在超过 100 字的内容右上角菜单中选择\"Scan for AI text\"即可使用。Substack 同时允许创作者添加\"How I make this\"声明说明写作过程，并可扫描草稿及报告不准确结果。", "type": "paper", "relTime": "13小时前"}, {"id": 12, "title": "Google 3.6 Flash 模型生成可3D打印数学艺术", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2079614730034127100", "date": "2026-07-21T17:09:23.000Z", "summary": "我们的一位工程师使用新的 3.6 Flash 模型构建了一个交互式数学艺术生成器。你可以实时自定义速度、颜色和几何参数，然后将设计直接导出为可 3D 打印的 STL 文件。观看视频，看看实物打印效果如何！", "type": "model", "relTime": "15小时前"}, {"id": 13, "title": "Meta 模型助力伯克利实验室加速科学发现", "source": "X：AI at Meta (@AIatMeta)", "sourceUrl": "https://x.com/AIatMeta/status/2079614176725442912", "date": "2026-07-21T17:07:11.000Z", "summary": "为加速科学发现并支持 @ENERGY 的 Genesis 任务，由 @BerkeleyLab 领导的 SYNAPS-I 项目正使用 SAM 3 和 DINOv3 来自动化图像分割。  通过将 DINOv3 的全局语义上下文和细粒度空间定位与 SAM 3 的像素级边界提取相结合，研究人员能够将 3D 体积标注从一个月的人工工作量压缩到约 15 分钟。  了解更多他们的工作：https://go...", "type": "industry", "relTime": "15小时前"}, {"id": 14, "title": "Claude Cowork 新增\"录制技能\"功能", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2079606576751526027", "date": "2026-07-21T16:36:59.000Z", "summary": "Claude Cowork 推出\"录制技能\"功能：用户录制屏幕并口述操作步骤，Claude 即可将其转化为可复用的技能。该功能支持文本、截图、音频、视频和注释等多模态输入，已在 Claude 桌面端上线，面向 Pro、Max 和 Team 计划用户开放。", "type": "paper", "relTime": "16小时前"}, {"id": 15, "title": "Qwen 3.8 Max 改版 UI，轻松生成 3D 台球与显微镜项目", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2079601160638615853", "date": "2026-07-21T16:15:28.000Z", "summary": "Qwen 3.8 Max 强制改版 UI，摆脱了此前饱受吐槽的 AI 模板感设计。用户用它生成儿童显微镜项目页面和 3D 台球游戏，后者自动添加了桌子腿和灯光，音效与画面交互丝滑，完整度很高。", "type": "tip", "relTime": "16小时前"}, {"id": 16, "title": "Qwen3.8 Max 3D能力实测：台球与放映机", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2079597189937217665", "date": "2026-07-21T15:59:41.000Z", "summary": "用户用Qwen3.8 Max生成3D台球项目，完整度高，自动添加桌子腿和灯光，光影效果与交互丝滑。此前用户还用它制作了3D幻灯片放映机，支持本地上传PDF、MP4、PPT等文件，动画交互与细节刻画表现不错。", "type": "tip", "relTime": "16小时前"}, {"id": 17, "title": "阿里通义千问发布 Qwen-Image-3.0：单次生成可读十像素文字与复杂信息图", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/alibabas-qwen-image-3-0-renders-full-infographic-grids-and-readable-ten-pixel-text-in-a-single-pass", "date": "2026-07-21T15:55:09.000Z", "summary": "阿里通义千问团队发布 Qwen-Image-3.0，该图像生成模型支持最长 4500 token 的输入，可单次生成包含可读十像素文字、数学公式及十二种语言的复杂排版，如 3×3 信息图网格和嵌套界面。模型目前仅通过邀请制 API 开放，后续将集成至 Qwen Chat 等自有应用，但不太可能像初版 Qwen-Image 那样开源权重。", "type": "model", "relTime": "16小时前"}, {"id": 18, "title": "荣耀 Robot Phone 拍照页面曝光，将支持大师电影模式与四自由度机械云台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/801.htm", "date": "2026-07-21T15:33:36.000Z", "summary": "荣耀 Robot Phone 已开启预约，机身顶部集成行业最小的四自由度（4DoF）钛合金机械云台系统，体积比主流方案缩小 70%。拍照页面显示快门键改为摇杆按钮，预计可调节云台角度，并支持与阿莱 ARRI 合作的\"大师电影\"模式。该机搭载第五代骁龙 8 至尊版芯片，预计今年 8 月发布，将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 内核。", "type": "paper", "relTime": "17小时前"}, {"id": 19, "title": "ABot-World-0：单张桌面级GPU实现无限交互式世界生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19191", "date": "2026-07-21T15:26:50.000Z", "summary": "ABot-World-0是一个动作条件视频世界模型，能在单张NVIDIA RTX 5090 GPU上以720P分辨率、最高16 FPS、1.2秒动作到首帧延迟和约19 GiB峰值显存预算运行无限交互式世界生成。该模型采用统一的帧同步键盘动作接口，通过LongForcing分布匹配阶段解决长程自回归漂移问题，并集成轻量级VAE解码器、低比特DiT推理和局部上下文KV缓存等系统级优化。", "type": "paper", "relTime": "17小时前"}, {"id": 20, "title": "通义千问发布 Qwen Image 3 模型", "source": "X：swyx (@swyx)", "sourceUrl": "https://x.com/swyx/status/2079580673086730701", "date": "2026-07-21T14:54:03.000Z", "summary": "Qwen Image 3 发布。 这些图片不是截图。全部单次生成。 最后一张（图像标注）我认为可以催生十几个教育科技/工业培训初创公司。 【引用 @swyx】：顺便一提，Qwen Image 2 是 7B 模型……从 Image 1 的 20B 降下来……并且在 Elo 评分中击败了 Nano Banana。 恭喜 @JustinLin610 等人！！", "type": "model", "relTime": "18小时前"}, {"id": 21, "title": "特斯拉将 Robotaxi 自动驾驶出租车服务扩展至美国奥兰多和坦帕", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/786.htm", "date": "2026-07-21T14:40:49.000Z", "summary": "特斯拉将 Robotaxi 自动驾驶出租车服务扩展至美国佛罗里达州的奥兰多和坦帕。该服务去年6月从得州奥斯汀起步，今年已先后进入达拉斯、休斯敦和迈阿密。此次扩张正值特斯拉公布第二季度财报前夕，华尔街密切关注其自动驾驶业务进展。", "type": "industry", "relTime": "18小时前"}, {"id": 22, "title": "Deezer：AI 生成音乐已占每日上传量的 50% 以上", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/21/music-streamer-deezer-says-more-than-50-of-daily-uploads-are-ai-generated", "date": "2026-07-21T13:27:42.000Z", "summary": "音乐流媒体平台 Deezer 称，AI 生成音乐目前占其每日上传量的 50% 以上，2026 年 6 月日均上传量达 9 万首。Deezer 将下架过去六个月无播放量或涉及刷量欺诈的 AI 曲目，并已向其他平台开放其 AI 检测技术，该技术可识别 Suno 和 Udio 生成的音乐。", "type": "industry", "relTime": "19小时前"}, {"id": 23, "title": "Qwen-Image-3.0 发布：支持 4.5k token 输入与 10px 小字渲染", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://qwen.ai/blog?id=qwen-image-3.0", "date": "2026-07-21T10:38:03.030Z", "summary": "阿里通义千问推出第三代基础图像生成模型 Qwen-Image-3.0，核心能力聚焦\"真实\"，支持最长 4.5k token 的指令输入，可一次性生成包含 9 个复杂信息图的 3×3 网格布局。模型能精确渲染小至 10px 的文字，并原生支持 12 种语言，可模拟网页、游戏、直播等主流界面，在学术论文、报纸等密集排版场景中保持可读性。", "type": "paper", "relTime": "22小时前"}, {"id": 24, "title": "阿里云HappyHorse 1.1获AI视频黑客松卓越奖", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079507022345650415", "date": "2026-07-21T10:01:24.000Z", "summary": "阿里云旗下HappyHorse 1.1在东京AI视频黑客松中荣获卓越奖。获奖作品《连接现实的工程师》仅用一晚完成，以15秒短片展现工程创新与人文关怀的结合。用户可通过链接免费试用该视频生成模型。", "type": "industry", "relTime": "22小时前"}, {"id": 25, "title": "阿里云东京AI视频黑客松落幕，HappyHorse 1.1助力创作", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079499930159247403", "date": "2026-07-21T09:33:13.000Z", "summary": "阿里云在东京举办AI视频黑客松，50多位创作者使用全球排名第一的AI视频生成模型HappyHorse，在一夜内完成15秒电影级广告片。大奖作品利用通勤列车离心力烘干衣物的创意，由HappyHorse 1.1生成。", "type": "industry", "relTime": "23小时前"}, {"id": 26, "title": "阿里云 WonderClip 实现脚本到视频全自动生成", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2079479299157930471", "date": "2026-07-21T08:11:14.000Z", "summary": "Script in. Video out.  📅 2026 年 7 月 23 日 | 上午 10：00-10：30（UTC+8）| 阿里云直播  注册 → https://int.alibabacloud.com/m/1000415408/  WonderClip 正在企业级规模上实现 AI 驱动的视频制作--从脚本到成片，全自动化。  在 #AgenticTalks 第 1 集中了解其工作...", "type": "paper", "relTime": "1天前"}, {"id": 27, "title": "NVIDIA 发布 Cosmos 3 Edge：40 亿参数开放世界模型，可在设备端推理并生成机器人动作", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/21/nvidia-releases-cosmos-3-edge-a-4b-parameter-open-world-model-that-reasons-and-generates-robot-actions-on-device", "date": "2026-07-21T07:48:28.000Z", "summary": "NVIDIA 发布 Cosmos 3 Edge，一款 40 亿参数的开放世界模型，专为设备端运行设计。该模型可帮助机器人和视觉 AI 智能体理解环境、实时推理并在本地生成机器人动作。Cosmos 3 系列此前已于 2026 年 5 月 31 日在 GTC Taipei 推出 Cosmos 3 Nano（160 亿参数）和 Cosmos 3 Super（640 亿参数）。", "type": "model", "relTime": "1天前"}, {"id": 28, "title": "英伟达推出合成视频检测器NIM，逐帧识别AI生成视频准确率达92%", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/594.htm", "date": "2026-07-21T07:37:36.000Z", "summary": "英伟达发布合成视频检测器NIM服务，可逐帧分析视频并给出分类评分，判断内容是否由AI生成。内部测试显示，该工具对无压缩视频检测准确率达92%，15%压缩率下为85%，50%压缩率下为82%。在RTX GPU系统上分析一段1080P视频最快仅需22毫秒，企业级L40 GPU上约需30毫秒。", "type": "paper", "relTime": "1天前"}, {"id": 29, "title": "荣耀 Robot Phone 首日预约量超历代旗舰，搭载第五代骁龙 8 至尊版与 4DoF 钛合金机械云台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/555.htm", "date": "2026-07-21T07:07:46.000Z", "summary": "荣耀 Robot Phone 首日预约量已超越荣耀历代旗舰产品。该机搭载第五代骁龙 8 至尊版芯片，机身顶部集成行业最小的四自由度（4DoF）钛合金机械云台系统，体积比主流方案缩小 70%，200Mp 云台影像的核心机构件、电机、模组均为自研。行业预测 1TB 版本售价约 15999 元，预计今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 内核。", "type": "product", "relTime": "1天前"}, {"id": 30, "title": "谷歌 DeepMind 发布 GenCeption：基于阿里 Wan2.1，打破计算机视觉桎梏", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/535.htm", "date": "2026-07-21T07:00:10.000Z", "summary": "谷歌 DeepMind 发布 GenCeption 模型，将预训练视频生成器逆向改造成单一模型，可同时完成深度估计、图像分割等核心视觉任务。该模型基于阿里 Wan2.1 训练，一次前向传播即可输出结果，小模型处理 81 帧视频约需 6 秒。", "type": "paper", "relTime": "1天前"}, {"id": 31, "title": "阿里千问发布 Qwen-Image-3.0 图像生成基础模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/530.htm", "date": "2026-07-21T06:56:42.000Z", "summary": "阿里发布 Qwen-Image-3.0 图像生成模型，核心主线为\"实\"。模型支持 4.5k token 超长输入，可一次生成含公式、几何图形的知识图解和复杂 UI，并支持 12 国语言及 20 多款字体原生渲染。阿里云百炼、千问 AI 平台已开通 API 邀测，Qwen Studio 和千问 APP 即将上线免费体验。", "type": "model", "relTime": "1天前"}, {"id": 32, "title": "Momenta Robotaxi 获深圳智能网联汽车道路测试许可", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/458.htm", "date": "2026-07-21T05:18:29.000Z", "summary": "Momenta Robotaxi 正式获得深圳市智能网联汽车道路测试许可，将于近期在深圳开展实地测试。其 R7 强化学习世界模型已投入 L4 级自动驾驶实际应用，上汽大众 ID.ERA 9X 为首款搭载该模型的量产车型。", "type": "industry", "relTime": "1天前"}, {"id": 33, "title": "生数科技朱军：通用世界模型是连接数字与物理世界的新基础设施", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/8MaTdfpAmZSg3zYbrJuFAg", "date": "2026-07-21T05:09:19.000Z", "summary": "生数科技创始人朱军在WAIC 2026上提出，通用世界模型需具备理解、想象与行动一体化能力，并发布全球首个MoT统一架构。该架构将理解、生成与行动专家统一于同一模型，支撑Vidu Q3等视频生成模型及具身智能机器人控制。最新模型可驱动多种异构机器人完成长程任务，在跨场景泛化上取得行业领先效果。", "type": "tip", "relTime": "1天前"}, {"id": 34, "title": "为了科普 AI 知识，写了一个视频生成Skill。 计划每天生成一个大模型知识解读视频。 今天是第一期，用最浅显的话解读\"蒸馏\"。 以后千万别说我蒸馏了一个Skill，会显得很外行。", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2079423337369887004", "date": "2026-07-21T04:28:52.000Z", "summary": "为了科普 AI 知识，写了一个视频生成Skill。  计划每天生成一个大模型知识解读视频。  今天是第一期，用最浅显的话解读\"蒸馏\"。  以后千万别说我蒸馏了一个Skill，会显得很外行。", "type": "tip", "relTime": "1天前"}, {"id": 35, "title": "小鹏集团发布 TuringViT 高效视觉编码器", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/451.htm", "date": "2026-07-21T04:23:59.000Z", "summary": "小鹏集团发布面向 VLM/VLA 时代的 TuringViT 视觉编码器，推出 18L 和 24L 两个规格。该编码器在 1536×1536 分辨率下推理吞吐量达 Seed1.5-ViT 的 3.04 倍，仅用 0.85B 图文对便在六项零样本分类基准上取得 83.6% 平均准确率，超越使用 10B 数据的基线。", "type": "paper", "relTime": "1天前"}, {"id": 36, "title": "腾讯混元发布科学发现智能体 Hyra，能够递归自我改进", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/440.htm", "date": "2026-07-21T03:43:22.000Z", "summary": "腾讯混元推出 Hyra-1.0，一个专为研究与工程任务打造的、能递归自我改进的智能体。在多轮 3D 建模测试中，Hyra 生成的模型相比 Claude Code goal 模式更接近参考图像且更符合人类审美。", "type": "model", "relTime": "1天前"}, {"id": 37, "title": "导演陆川称 AI 生成像预制菜，正利用 AI 同时推进五部电影筹备", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/311.htm", "date": "2026-07-21T01:18:17.000Z", "summary": "导演陆川表示，AI 生成的影像像预制菜，能弥补新手与老手的技术代差，但可能抹杀艺术创作中\"错误\"带来的迷人之处。他正利用 AI 同时推进五部电影的筹备，AI 已替代概念设计、分镜和部分剪辑等环节，大幅降低试错成本。陆川透露，在视觉商业领域，短片和广告已有 95% 以上被 AI 替代。", "type": "tip", "relTime": "1天前"}, {"id": 38, "title": "一个随机数就能识别AI模型身份：行为指纹技术可检测API中转站偷换模型", "source": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weixin.qq.com/s/pqFZreEZj8kB4KDirl4MSQ", "date": "2026-07-21T01:10:49.000Z", "summary": "布拉格经济大学研究员托马什·布鲁克纳发现，通过让模型反复输出1到100的随机数，可生成独一无二的\"行为指纹\"。对165个模型各问30次后发现，GPT-4o偏爱42和37，Claude Sonnet 5疯狂输出47，Qwen3-Max则30次全部回答42。该方法仅需约120条请求即可识别模型身份，错误率约10.6%，为验证API是否被偷换模型提供了轻量级方案。", "type": "tip", "relTime": "1天前"}, {"id": 39, "title": "GAMUT：面向事实完整性的双层元评分基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19322", "date": "2026-07-21T00:00:00.000Z", "summary": "GAMUT 引入双层元评分框架，将所需内容的结构化元评分自动编译为 LLM 可评分的二元检查清单，用于评估长文本生成的事实完整性。基准包含 1，813 个基于真实可穿戴图像的问题，覆盖 10 个领域。14 个模型中 Gemini 3.1 Pro 得分最高（58.7%），表明该基准极具挑战性。", "type": "paper", "relTime": "1天前"}, {"id": 40, "title": "文本模板Token是扩散Transformer中的隐式语义寄存器", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19139", "date": "2026-07-21T00:00:00.000Z", "summary": "南京大学与阿里巴巴团队提出因果可解释性框架，发现扩散Transformer（DiT）中来自聊天模板的结构性token虽不含提示语义，却成为图像到文本的注意力汇聚点，并因果性地维持物体身份，充当隐式语义寄存器。", "type": "paper", "relTime": "1天前"}, {"id": 41, "title": "Appearance Pointers：扩散Transformer的多模态区域控制新方法", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19344", "date": "2026-07-21T00:00:00.000Z", "summary": "研究人员提出Appearance Pointers，一种紧凑型token，通过将文本或图像输入与用户指定的掩码对齐，引导扩散Transformer（DiT）在正确空间位置生成正确外观。该方法由区域对应网络生成token，经空间聚合机制优化，无需从头重新训练基础模型即可实现多区域描述控制。在多项指标上，该单一模型达到或超越了特定模态的现有最优方法。", "type": "paper", "relTime": "1天前"}, {"id": 42, "title": "Masked Visual Actions：统一世界模型的掩码视觉动作接口", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19343", "date": "2026-07-21T00:00:00.000Z", "summary": "斯坦福大学李飞飞团队提出 Masked Visual Actions，将机器人动作表示为视频中实体轨迹的像素空间掩码。仅用15小时真实与仿真数据微调，单个视频模型即可同时作为前向动力学模型和逆向模型，用于策略评估与基于模型的规划。", "type": "paper", "relTime": "1天前"}, {"id": 43, "title": "Mage-Flow：面向图像生成与编辑的高效原生分辨率基础模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.19064", "date": "2026-07-21T00:00:00.000Z", "summary": "研究人员推出Mage-Flow，一个40亿参数的高效生成栈，用于文本到图像生成和指令式图像编辑。其核心包括轻量级高保真潜在分词器Mage-VAE和原生分辨率多模态扩散Transformer，通过协同设计将分词成本降低一个数量级以上，端到端训练吞吐量提升约2.5倍。", "type": "paper", "relTime": "1天前"}, {"id": 44, "title": "CalibAtt：无需训练的稀疏注意力方法，将文生视频速度提升至 1.58 倍", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/calibrated-sparse-attention", "date": "2026-07-21T00:00:00.000Z", "summary": "Apple 与特拉维夫大学联合提出 CalibAtt，一种无需训练的校准稀疏注意力方法，通过离线识别 token 间可跳过的低分连接并编译为优化操作，在推理时跳过无关计算。在 Wan 2.1 14B、Mochi 1 及少步蒸馏模型上，CalibAtt 实现最高 1.58 倍端到端加速，在保持视频质量和文本-视频对齐的同时优于现有免训练方法。", "type": "paper", "relTime": "1天前"}, {"id": 45, "title": "Hugging Face 发布 Grabette：开源手持夹爪系统，无需机器人即可录制操作数据", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/grabette", "date": "2026-07-21T00:00:00.000Z", "summary": "Hugging Face 推出 Grabette，一套开源低成本系统，用户手持夹爪即可在几分钟内录制操作演示，并自动生成机器人可用的数据集。Grabette 配备鱼眼相机与 RGBD 相机，通过 SLAM 恢复 6-DoF 轨迹，硬件物料成本约 490 欧元。所有硬件设计、处理流程与训练代码均开源，数据以标准 LeRobot 格式上传至 Hugging Face Hub，支持任意机器人后端。", "type": "model", "relTime": "1天前"}, {"id": 46, "title": "Nativ：在 Mac 上本地运行前沿开放模型", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://blaizzy.github.io/nativ", "date": "2026-07-20T21:55:08.620Z", "summary": "Nativ 发布 macOS 桌面应用，让用户在 Apple Silicon（M1+）上本地运行 Google、Cohere、Liquid AI 等开放模型，无需账户或订阅。应用支持语言、视觉、视频、代码、音频等多模态交互，并提供实时 token/秒、内存压力等性能指标。Nativ 完全开源（MIT 许可），内置本地端点，可对接 Claude Code、Codex 等编码智能体。", "type": "model", "relTime": "1天前"}, {"id": 47, "title": "《第九区》导演Neill Blomkamp发布首部完全由AI生成的短片《Nightborne》", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/district-9-director-neill-blomkamp-releases-first-short-film-made-entirely-with-ai-video-generation", "date": "2026-07-20T17:32:41.000Z", "summary": "Neill Blomkamp发布了13分钟科幻恐怖短片《Nightborne》，完全使用Seedance 2.0视频生成模型通过文本提示逐帧创作。影片采用纪录片风格，使用了32位真实人物的面部和声音（已获授权），人类艺术家负责概念艺术。Blomkamp表示计划以相同格式拍摄一部长片，并已创立AI电影工作室Barley Studios。", "type": "industry", "relTime": "1天前"}, {"id": 48, "title": "AlayaWorld：交互式长程视频世界模型技术报告发布，15B参数开源模型实现540p/720p 24fps生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18367", "date": "2026-07-20T17:15:41.000Z", "summary": "AlayaWorld 是一个交互式长程视频世界模型，基于15B视频扩散Transformer架构，可生成540p和720p分辨率、24fps的视频。该模型通过自回归生成短潜变量块，结合持久锚定帧、压缩时序历史、几何对齐空间记忆和近期帧条件化来维持长程一致性，并将推理从约30步蒸馏至每块4步。在iWorld-Bench基准上，AlayaWorld取得长程生成最佳性能，项目以全栈开源形式发布。", "type": "paper", "relTime": "1天前"}, {"id": 49, "title": "Grok 视频生成吊打 Seedance，开源世界模型 Alaya 引热议", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079240587404870038", "date": "2026-07-20T16:22:41.000Z", "summary": "用户对比发现 Grok 视频生成效果已完全超越 Seedance，后者降智严重且价格昂贵，呼吁停止充值。同时，开源世界模型 Alaya World 引发讨论，其核心价值在于将游戏可玩原型的搭建成本从\"几周\"压缩到\"一分钟\"，通过 Error Bank 误差回灌等技术让模型学会在\"脏历史\"上继续预测，但精确碰撞、多人同步等 3A 核心功能尚未涉及。", "type": "tip", "relTime": "1天前"}, {"id": 50, "title": "NVIDIA 发布 Cosmos 3 Edge：4B 参数开源世界模型，为机器人及边缘 AI 提供实时推理与动作生成", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/cosmos3edge", "date": "2026-07-20T15:58:51.000Z", "summary": "NVIDIA 在 Hugging Face 上开源了 Cosmos 3 Edge，一个 40 亿参数的世界模型，旨在帮助机器人和视觉 AI 智能体在边缘设备上理解环境、实时推理并生成动作。", "type": "model", "relTime": "1天前"}, {"id": 51, "title": "开源世界模型Alaya World颠覆游戏原型成本", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079230005419065670", "date": "2026-07-20T15:40:38.000Z", "summary": "开源世界模型Alaya World通过显式3D空间缓存、压缩帧历史记忆和Error Bank误差回灌技术，将游戏可玩原型的制作成本从\"几周\"压缩到\"一分钟\"。输入一张图、一条相机轨迹和几句prompt即可生成可探索场景，大幅降低独立团队和UGC的创作门槛。但精确碰撞、多人同步、数值平衡等3A核心骨架未被触及，短期与3D资产化引擎管线互补。", "type": "tip", "relTime": "1天前"}, {"id": 52, "title": "YouTube 更新政策，明确三类 AI 低质内容不得变现", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/20/youtube-clarifies-policies-around-ai-slop-and-upsetting-videos", "date": "2026-07-20T15:23:06.000Z", "summary": "YouTube 于 7 月 16 日更新变现政策，将\"不真实内容\"细分为三类：重复/模板化内容、令人不适或情绪操纵内容、以及使用 AI 数字人讨论健康/金融等敏感话题的内容。拥有过多此类内容的频道将被移出 YouTube 合作伙伴计划（YPP），无法通过广告和订阅创收。YouTube 信任与安全主管 Matt Halprin 表示，此举旨在打击利用 AI 快速生成低质视频的\"内容农场\"行为。", "type": "industry", "relTime": "1天前"}, {"id": 53, "title": "昆仑万维发布并开源可交互世界模型 Matrix-Game 3.5", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/TUVv2wvp4RixsblDLrvSGg", "date": "2026-07-20T13:45:18.000Z", "summary": "昆仑万维在 WAIC 2026 发布并开源新一代可交互世界模型 Matrix-Game 3.5。该模型通过 Patch Memory 与 Warped PRoPE 实现长期记忆与几何一致性建模，可在单张 GPU 上以 720P 分辨率、约 20FPS 实时生成流式视频。", "type": "model", "relTime": "1天前"}, {"id": 54, "title": "OpenRouter 上线 Grok Imagine Video 1.5", "source": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2079200618498191407", "date": "2026-07-20T13:43:51.000Z", "summary": "Grok Imagine Video 1.5 来自 @SpaceXAI，现已登陆 OpenRouter！  让任何静态图像活起来，可附加文字提示。塑造运动和镜头运作。通过内置声音和对话设定氛围与物理效果。  试用：https://openrouter.ai/x-ai/grok-imagine-video-1.5", "type": "paper", "relTime": "1天前"}, {"id": 55, "title": "Alaya World 开源：Error Bank 让模型学会带错前行", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2079178289751470467", "date": "2026-07-20T12:15:08.000Z", "summary": "开源世界模型 Alaya World 的核心创新是 Error Bank--故意将积累的伪影回灌进训练，让模型在\"脏历史\"上继续正确预测，而非追求每一步完美。这一机制解决了长程生成中错误级联崩溃的难题，将验证一个世界想法的成本从几周压缩到几分钟。Alaya World 目前未涉及碰撞体、多人同步等 3A 游戏核心骨架，但其技术哲学对具身智能仿真等长时自主系统同样适用。", "type": "tip", "relTime": "1天前"}, {"id": 56, "title": "宇树发布 UnifoLM-OminiA-0.3 模型，支持全模态交互理解", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/032.htm", "date": "2026-07-20T07:22:09.000Z", "summary": "宇树科技发布 UnifoLM-OminiA-0.3 模型，单模型统筹家居康养多任务，支持全模态交互理解，全程自主执行抗干扰。该模型在人形机器人 G1 上实现从感知到行动的闭环，可完成物品搬运、视觉识别与回答、精细操作及设备控制等任务。", "type": "model", "relTime": "2天前"}, {"id": 57, "title": "上海科学智能研究院开放科学多模态基础模型\"神珍\"", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/979/017.htm", "date": "2026-07-20T07:00:15.000Z", "summary": "上海科学智能研究院开放科学多模态基础模型\"神珍\"，总参数约110亿，可处理DNA、RNA、蛋白质、小分子、地球系统和医学影像六类数据。在生物序列20项任务中，该模型9项取得最优结果；医学影像分割平均Dice得分91.20，在7种参评方法中最优。模型权重及代码已在星河启智、Hugging Face和GitHub开放。", "type": "model", "relTime": "2天前"}, {"id": 58, "title": "欧莱雅中国与火山引擎达成战略合作，豆包大模型进入美妆经营一线", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/ZwGtT_T20p7FxJ5sTBC_ig", "date": "2026-07-20T06:08:05.000Z", "summary": "欧莱雅（中国）与火山引擎于7月19日达成战略合作，将围绕AIGC创意内容生产、经营策略分析和消费者智能服务三大场景，探索豆包大模型在电商运营素材生成、智能客服、智能助播及内容审核等环节的应用。双方将利用火山引擎的多模态生成、AI Agent和自动化流程能力，提升素材制作效率、消费者服务响应速度及营销策略洞察转化。", "type": "industry", "relTime": "2天前"}, {"id": 59, "title": "VITURE 发布 Auto Immersive 3D 技术，实现安卓系统实时 3D 立体化", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/931.htm", "date": "2026-07-20T03:45:49.000Z", "summary": "XR 眼镜品牌 VITURE 在 2026 世界人工智能大会上发布 Auto Immersive 3D 技术，依托颈环端侧算力实现安卓全系统实时 3D 立体化。该技术可将任意视频一键转为 3D 效果、增强非原生 3D 游戏并支持 PC 游戏串流升维，同时将系统桌面与办公软件全局 3D 化，未来有望延伸至工业与医疗影像领域。", "type": "paper", "relTime": "2天前"}, {"id": 60, "title": "用随机数指纹识别AI模型是否被调包", "source": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2079037351129694309", "date": "2026-07-20T02:55:05.000Z", "summary": "布拉格经济大学研究者发现，利用AI模型无法生成真正随机数的缺陷，可通过其偏好的\"口头禅数字\"进行身份识别。例如GPT-4o偏爱42，Claude Sonnet 5只说47，Qwen3-Max在30次采样中每次都答42。该方法可用于检测OpenRouter等聚合商是否偷偷替换了用户选择的模型。", "type": "tip", "relTime": "2天前"}, {"id": 61, "title": "爱芯元智发布元曦系列大算力产品，A 系列AI推理卡算力超1000TOPS", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/841.htm", "date": "2026-07-20T01:33:16.000Z", "summary": "爱芯元智在WAIC 2026上推出元曦系列大算力产品线，专攻机房集群、多路视频分析等高并发场景。其中A系列AI推理卡搭载超1000TOPS算力，配备超大显存与高带宽。同时发布的具身智能大脑控制器拥有1500TOPS算力与约2倍行业领先带宽，支持世界模型与VLA，视觉感知芯片AX8910已规模化落地。", "type": "model", "relTime": "2天前"}, {"id": 62, "title": "LVSum 基准：评估多模态大模型的长视频时间感知摘要能力", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/lvsum-video-summarization", "date": "2026-07-20T00:00:00.000Z", "summary": "Apple 推出 LVSum，一个含细粒度时间对齐的人工标注长视频摘要基准，包含 13 个领域的 72 个视频（平均时长 16 分钟），每个视频配有最多 10 条含时间引用的人类摘要。评估显示，转录文本对摘要质量的贡献远大于视觉帧，当前多模态大模型在时间定位、指令遵循和跨模态一致性上存在系统性缺陷，与人类摘要仍有显著差距。", "type": "paper", "relTime": "2天前"}, {"id": 63, "title": "EduPanel：用于教学视频评估的三智能体LLM裁判--可靠性、互补性与人类信任校准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18529", "date": "2026-07-20T00:00:00.000Z", "summary": "EduPanel 是一个基于评分标准、面向特定学习者的多模态 LLM 裁判，将教学视频评估分解为三个专门智能体。专家研究表明，EduPanel 的可靠性达到人类专家中位数水平；其反馈将专家评分误差（MAE）从 0.87 降至 0.73，同时专家仍能检测不可靠输出（AUC = 0.77），而非盲目接受。结果表明 EduPanel 可作为教育评估的有效辅助工具，而非替代人类专家。", "type": "paper", "relTime": "2天前"}, {"id": 64, "title": "SciForma：科学示意图的结构忠实生成框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18091", "date": "2026-07-20T00:00:00.000Z", "summary": "北京大学与微软亚洲研究院提出 SciForma 框架，将科学示意图质量分解为组件、箭头和文本三个结构轴，并构建 SciFormaData-700K 训练集与 SciFormaBench-2K 评测基准。其核心方法 M-DPO 在 SFT 后强制所有轴同时正确，使 SciForma-9B 在两项基准上超越所有开源基线及 GPT-Image-1.5。", "type": "paper", "relTime": "2天前"}, {"id": 65, "title": "LLM 在空间约束下的分子生成能力：3D-Fit 基准测试揭示潜力与差距", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18144", "date": "2026-07-20T00:00:00.000Z", "summary": "一项新研究系统评估了通用 LLM 在结构药物设计（SBDD）中处理复杂 3D 空间约束的能力。研究者引入 3D-Fit 基准测试策略，对比 LLM 与专用扩散模型在蛋白口袋、锚定片段、药效团点及强制口袋-配体相互作用等多条件分子生成任务上的表现。结果显示，LLM 虽仍落后于 SOTA 方法，但已能同时处理多种空间约束，具备向异构场景扩展的潜力。", "type": "paper", "relTime": "2天前"}, {"id": 66, "title": "ReViV：从单目第一人称视频中联合重建观察者与场景的4D框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17790", "date": "2026-07-20T00:00:00.000Z", "summary": "ReViV提出首个统一框架，从单目RGB视频同时重建观察者（全身运动、手部、视线）与场景（相机轨迹、深度）的4D动态。基于掩码生成式第一人称Transformer的单前馈架构，无需预计算相机轨迹或分离建模，在HoloAssist、HOT3D、ARCTIC、Aria Digital Twin、TACO等基准上实现全身、手部、视线重建与相机追踪的SOTA精度，深度估计也具竞争力。代码与模型已完全开源。", "type": "paper", "relTime": "2天前"}, {"id": 67, "title": "ShotPlan：基于可学习规划token的电影级视频生成框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17675", "date": "2026-07-20T00:00:00.000Z", "summary": "ShotPlan提出一种显式多镜头电影级视频生成框架，通过可学习规划token（planning tokens）与分数时间旋转位置编码（FRoPE）在帧级别控制镜头切换。实验表明，该方法在镜头管理和跨镜头一致性上显著优于现有电影级视频生成方法。", "type": "paper", "relTime": "2天前"}, {"id": 68, "title": "FlowMimic：无需遮罩的在线视频编辑数据生成与模态模仿框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18227", "date": "2026-07-20T00:00:00.000Z", "summary": "FlowMimic提出像素对时序扭曲流场，直接从图像编辑样本实时生成对应视频编辑样本，无需人工遮罩标注或I2V模型合成。该方法通过模态模仿生成损失和编辑损失对齐图像与视频模态的输出分布，并引入指代表达分割等感知任务及编辑区域感知的隐层与注意力损失，使模型内化语言驱动的视觉编辑能力。", "type": "paper", "relTime": "2天前"}, {"id": 69, "title": "RynnBrain 1.1 具身基础模型家族发布", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17977", "date": "2026-07-20T00:00:00.000Z", "summary": "RynnBrain 1.1 发布 2B、9B 和 122B-A10B 三种规模的具身基础模型，新增接触点预测与 3D 定位训练任务。其中 122B-A10B 模型在 VSI-Bench、MMSI 和 RefSpatial-Bench 上超越所有评估的闭源与开源模型，基于该模型初始化的策略在真实机器人实验中优于 Qwen 基线和通用 VLA 方案。", "type": "model", "relTime": "2天前"}, {"id": 70, "title": "HOMIE：基于多模态智能增强的人-物中心视频个性化生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.18217", "date": "2026-07-20T00:00:00.000Z", "summary": "HOMIE提出统一框架，同时处理跨主体与同主体参考输入的人-物中心视频个性化生成（HOCVP）任务。该方法通过全局多模态引导将MLLM语义特征与VAE token对齐，并引入模态参考嵌入以区分MLLM特征与VAE token、关联同主体参考图像token，在不牺牲文本编码器可控性且无需昂贵重对齐的前提下提取参考级关系知识。实验表明HOMIE在多项HOCVP任务上达到SOTA性能。", "type": "paper", "relTime": "2天前"}, {"id": 71, "title": "DiFA：扩散模型推理时的前向过程对齐方法", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17972", "date": "2026-07-20T00:00:00.000Z", "summary": "DiFA提出一种无需训练的推理框架，将扩散模型的数据预测精炼重构为序列状态估计问题，通过聚合历史预测构建前向对齐的时间共识。在CIFAR-10和ImageNet上，DiFA在FID、IS和FD-DINOv2等指标上均取得显著提升。", "type": "paper", "relTime": "2天前"}, {"id": 72, "title": "Qwen3.8发布，参数规模达2.4T", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2078991141673021682", "date": "2026-07-19T23:51:28.000Z", "summary": "Qwen 推出 Qwen3.8，拥有 2.4T 参数，性能媲美前沿模型，预览版已开放。Netflix CPTO 认为 AI 加速流程但未替代品味与责任。Vidu S1 将视频扩散推理压至约 4 步，在消费级 GPU 上实现 540P、25-42 FPS 的实时生成。", "type": "tip", "relTime": "2天前"}, {"id": 73, "title": "Vidu S1 实现消费级GPU实时视频生成，PPIO推Agent云架构，Netflix强调AI产品判断", "source": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2078991088736780598", "date": "2026-07-19T23:51:15.000Z", "summary": "Vidu S1 在消费级GPU上以25-42 FPS生成540P实时视频，通过算子优化和蒸馏至约4步推理实现。PPIO提出Agent云架构，日均处理Token超1.2万亿，核心包括模型网关和冷启动低于200毫秒的沙箱。Netflix CPTO强调AI加速原型后，产品判断、数据治理与创作者选择更为关键。", "type": "tip", "relTime": "2天前"}, {"id": 74, "title": "Gemma 4 12B 视频推理可视化", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2078890520785391883", "date": "2026-07-19T17:11:38.000Z", "summary": "这是一个精彩的视觉化展示。", "type": "tip", "relTime": "2天前"}, {"id": 75, "title": "Berry Xia 实测：Claude 3D 建模与视频生成能力惊人", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078851241338401262", "date": "2026-07-19T14:35:33.000Z", "summary": "Berry Xia 实测发现，Claude 不仅能出色完成 3D 建模，还能在无任何 Skills 辅助下，一次成型生成高质量视频。他认为若配合 Skills 能力将更强大，并称\"好久没有如此的兴奋了\"。", "type": "tip", "relTime": "2天前"}, {"id": 76, "title": "生数科技朱军：从视频生成到世界模型的演进路径", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/xE3SffTQWY0yRtqUA3cY4A", "date": "2026-07-19T14:31:17.000Z", "summary": "生数科技创始人朱军阐释了从视频生成到世界模型的演进路径。公司发布的实时交互模型Vidu S1支持无限时长连续生成与语音交互，世界动作模型Motubrain在RoboTwin 2.0的50余项复杂任务中平均成功率超过95%。", "type": "tip", "relTime": "2天前"}, {"id": 77, "title": "面壁智能开源 MiniCPM-Robot 具身智能模型系列", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2078839529591759025", "date": "2026-07-19T13:49:01.000Z", "summary": "面壁智能开源首个具身AI模型系列 MiniCPM-Robot，包含 1.5B 参数的通用视觉-语言-动作（VLA）模型 MiniCPM-RobotManip 和用于目标跟踪的 MiniCPM-RobotTrack。同时发布高性能推理框架 PhyAI，旨在让机器人实现理解、记忆与行动。", "type": "model", "relTime": "2天前"}, {"id": 78, "title": "面壁智能在 WAIC 2026 发布 MiniCPM5-2B 与 VLA 具身模型", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/zs3eJ-K3HH5bwvjNfEUNhw", "date": "2026-07-19T13:12:39.000Z", "summary": "面壁智能在 WAIC 2026 端侧AI论坛上发布两款端侧大模型：20亿参数的MiniCPM5-2B文本模型在AA榜单位列2B以下第一，以及融合多模态与视觉Token压缩的VLA具身模型。其MiniCPM开源系列累计下载量突破3800万次，已落地手机、汽车等终端，并搭载于吉利银河M9等车型。", "type": "model", "relTime": "2天前"}, {"id": 79, "title": "Qwen3.8-Max-Preview 预览版发布，Token Plan 订阅方案升级", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.qwencloud.com/pricing/token-plan", "date": "2026-07-19T12:25:23.982Z", "summary": "通义千问发布 Qwen3.8-Max-Preview 预览版，并推出升级版 Token Plan 订阅方案。新方案提供 Individual 和 Team 两种计划，支持统一访问文本、视觉、语音和图像生成模型。Lite、Standard、Pro 三档月费计划分别支持 1-2、3-4、6-8 个并发智能体。", "type": "model", "relTime": "2天前"}, {"id": 80, "title": "Google DeepMind 提出 GenCeption，将视频生成模型改造为通用视觉模型", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/google-deepmind-argues-video-generators-already-contain-the-world-models-computer-vision-has-been-missing", "date": "2026-07-19T10:17:49.000Z", "summary": "Google DeepMind 提出 GenCeption，将阿里巴巴开源的 Wan2.1 视频生成模型改造为单次前向传播即可完成深度估计、分割等任务的模型。它仅用 7，500 段合成视频训练，数据量仅为竞品的 1/7 至 1/500，但在多个基准上匹配甚至超越了 DepthAnything 3 等专用模型。", "type": "paper", "relTime": "2天前"}, {"id": 81, "title": "阿里云推出个人Token计划，覆盖多模态", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2078784690534670495", "date": "2026-07-19T10:11:06.000Z", "summary": "一个计划。所有模态。超值价格。🚀  阿里云个人Token计划：✅ 文本、图像和视频的统一额度 ✅ Qwen3.8-Max-Preview · GLM-5.2 · DeepSeek-V4-Pro ✅ 用于视频生成的 Happy Horse 1.1 ✅ 首月（使用优惠券后）起价 4 美元/月  🔗 https://int.alibabacloud.com/m/1000415553/  #阿里云 ...", "type": "product", "relTime": "2天前"}, {"id": 82, "title": "Luma AI生成时尚大片：单眼串联全片", "source": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2078780132819361953", "date": "2026-07-19T09:53:00.000Z", "summary": "一部完整的时尚大片，由一只眼睛和无数细微抉择串联而成。制作团队采纳了修改意见，而视觉始终坚定不移。作者：Eli Coleman。使用 Luma 制作。", "type": "paper", "relTime": "2天前"}, {"id": 83, "title": "AI文本检测器在模仿作者风格时漏检率飙升", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/ai-text-detectors-struggle-when-language-models-mimic-an-authors-style", "date": "2026-07-19T08:35:26.000Z", "summary": "Epoch AI研究显示，Pangram、GPTZero和Originality.ai检测普通AI文本近乎完美，假阴性率最高仅0.7%。但当Claude Opus 4.8等模型模仿特定作者风格写作时，平均13%的AI文本未被检出；科学写作类别中漏检率高达24%-29%，Pangram对Gemini生成的学术文本漏检率达48%。", "type": "paper", "relTime": "3天前"}, {"id": 84, "title": "阿里云百炼上线 HappyOyster 1.0，一句话生成可互动 AI 数字世界", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/729.htm", "date": "2026-07-19T08:16:45.000Z", "summary": "阿里云百炼今日上线开放式世界模型产品 HappyOyster 1.0，用户输入一句话或一张图即可生成可互动、可探索的 AI 数字世界。该模型支持 1 分钟连续实时交互的世界探索模式和 3 分钟以上分支叙事的实时导演模式，已提供三端 SDK 并开启灰测。", "type": "model", "relTime": "3天前"}, {"id": 85, "title": "Castor：开源命令行工具，从终端向电视投屏任意网页视频", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/stupside/castor", "date": "2026-07-19T05:45:33.311Z", "summary": "Castor 是一款开源命令行工具，能从终端向电视投屏任意网页视频，支持 DLNA/UPnP 和实验性 Chromecast。它通过 headless Chrome 提取视频流、ffmpeg 转码并实时投屏，支持 IMDB/TMDB ID、直接流 URL 或网页播放器三种输入方式，可自动生成字幕。", "type": "model", "relTime": "3天前"}, {"id": 86, "title": "商汤发布旗舰原生多模态模型U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078681943680704993", "date": "2026-07-19T03:22:50.000Z", "summary": "商汤发布旗舰原生多模态基模SenseNova U1 Pro，基于NEO-Unify架构统一理解、生成与行动，并支持原生交织的视觉-语言推理。相比U1 Lite，U1 Pro支持智能体生成循环中的数十轮长程推理、8K原生分辨率输出，且渲染文字错误率极低。预览版现已开放邀请，API与定价将于2026年8月正式发布。", "type": "model", "relTime": "3天前"}, {"id": 87, "title": "Codex调用素材库一键生成视频", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078680925987291374", "date": "2026-07-19T03:18:47.000Z", "summary": "Codex 调用 Listenhub Cli + 免费视频素材库 pexels 写一个 skill，一句话生成类似视频。", "type": "tip", "relTime": "3天前"}, {"id": 88, "title": "阿里开放式世界模型快乐生蚝 HappyOyster 1.0 登陆百炼平台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/644.htm", "date": "2026-07-19T02:53:07.000Z", "summary": "阿里巴巴发布开放式世界模型 HappyOyster 1.0（快乐生蚝），已登陆阿里云百炼面向企业和开发者开启灰测。模型提供世界探索与实时导演两大模式，支持用户通过一句话或一张图生成可实时交互的开放世界，并可用文字指令操控镜头与剧情。产品提供 Android/iOS/Web 三端 SDK，支持构建可玩世界、互动剧等沉浸式应用。", "type": "model", "relTime": "3天前"}, {"id": 89, "title": "Grok视频生成进化，质感丝滑可战Seedance", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078669737194631628", "date": "2026-07-19T02:34:19.000Z", "summary": "Grok视频生成能力大幅进化，生成的视频在质感和分镜丝滑程度上已可与Seedance一战。示例中，Grok根据详细提示词生成了超现实主义纪录片风格的网球观众席片段，包含精确的首帧锁定、手持抖动、自动对焦搜索等2000年代DV质感。", "type": "tip", "relTime": "3天前"}, {"id": 90, "title": "本田推出商用自动驾驶电动割草机，售价32999美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/627.htm", "date": "2026-07-19T01:14:04.000Z", "summary": "本田发布自动驾驶纯电动割草机ProZision Autonomous ZTR，售价32999美元，已开始向经销商发货。该设备通过GPS、激光雷达和360度视觉传感器实现约3厘米误差的自主作业，提供54英寸和60英寸两种割草宽度。", "type": "paper", "relTime": "3天前"}, {"id": 91, "title": "荣耀发布伙伴型多模态智能体操作系统 AgenticOS，Robot Phone 8 月首发内核", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/621.htm", "date": "2026-07-19T00:30:21.000Z", "summary": "荣耀在 2026 世界人工智能大会上发布 AgenticOS，支持意图驱动、自然交互等四大特征，拥有行业首个系统级 Agent 架构。8 月发布的 Robot Phone 将首发其内核，Q4 的 Magic9 系列将推出尝鲜版。Robot Phone 搭载第五代骁龙 8 至尊版芯片，顶部集成行业最小四自由度钛合金机械云台，体积缩小 70%。", "type": "paper", "relTime": "3天前"}, {"id": 92, "title": "HarmoHOI：统一扩散框架实现多视角手物交互视频与3D运动联合生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17097", "date": "2026-07-19T00:00:00.000Z", "summary": "HarmoHOI提出混合多视角扩散Transformer，将RGB视频与3D点轨迹作为伪视频共同建模，弥合2D潜空间与3D几何信号的域差距。通过全局运动对齐扩散将粗糙点轨迹优化为度量尺度的全局对齐3D轨迹，在去噪过程中协同演化2D外观与3D运动。实验表明，HarmoHOI在视觉质量、运动合理性和多视角几何一致性上达到SOTA。", "type": "paper", "relTime": "3天前"}, {"id": 93, "title": "TimeLens2：面向通用视频时序定位的多模态大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.17423", "date": "2026-07-19T00:00:00.000Z", "summary": "TimeLens2 将视频时间证据视为区间集合进行监督与优化，其 TimeLens2-93K 数据集通过多步骤流程构建可靠标注。模型采用时序 Wasserstein 奖励函数，为不等基数与等效碎片化预测提供无匹配的密集反馈。TimeLens2-8B 在七个基准上以 48.0 平均 mIoU 达到 SOTA，超越最高 397B 参数的开源模型。", "type": "paper", "relTime": "3天前"}, {"id": 94, "title": "无人机编队表演舞蹈与特技", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078624943021928715", "date": "2026-07-18T23:36:20.000Z", "summary": "在繁忙交通堵塞上空，小型无人机搭载舞者表演宝莱坞舞蹈，每架无人机一人，聚焦舞蹈动作。  （SD2）  啦啦队员身穿飞行服，在游乐园上空的无人机上进行特技表演，最后组成人塔，由地面业余电影人拍摄，白天。镜头稍微拉近，重新对焦。  （SD2）", "type": "tip", "relTime": "3天前"}, {"id": 95, "title": "NVIDIA 发布 DeepStream 9.1，新增 13 项智能体技能与多视角 3D 追踪", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/18/nvidia-released-deepstream-9-1-bringing-agentic-ai-to-vision-ai-with-13-skills-and-multi-view-3d-tracking", "date": "2026-07-18T19:16:22.000Z", "summary": "NVIDIA 发布 DeepStream 9.1，新增 13 项 agentic skills，支持通过自然语言描述构建多摄像头视觉管线。核心技能 MV3DT 将多摄像头检测投影至统一 3D 坐标系，为跨视角目标分配全局一致的 ID；AMC 技能可自动估算摄像头内外参，替代手动棋盘格标定。", "type": "paper", "relTime": "3天前"}, {"id": 96, "title": "商汤发布原生多模态旗舰模型SenseNova U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078510614889238997", "date": "2026-07-18T16:02:02.000Z", "summary": "商汤发布旗舰原生多模态基础模型SenseNova U1 Pro，基于NEO-Unify架构，统一理解、生成与行动能力，并支持原生交织视觉-语言推理。相比U1 Lite，U1 Pro支持数十轮智能体生成循环、8K原生分辨率输出、超低文字渲染错误率，以及超宽/超高图像生成。预览版现已开放邀请，2026年8月正式发布API及定价。", "type": "model", "relTime": "3天前"}, {"id": 97, "title": "用GPT-Image-2+剪映一键生成爆款跳舞视频", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078508800475029833", "date": "2026-07-18T15:54:49.000Z", "summary": "用户用GPT-Image-2生成游艇美女图，再导入剪映搜索\"梦的翅膀受了伤\"选剪同款，即可生成不带AI标志的跳舞视频。该方法操作简单，适合抖音、小红书快速起号。", "type": "tip", "relTime": "3天前"}, {"id": 98, "title": "央视对话生数科技朱军：AI从生成视频到理解世界", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/xLruk-2-eTG6LNC73xzHzQ", "date": "2026-07-18T12:56:36.000Z", "summary": "2026世界人工智能大会（WAIC）期间，央视总台《科技零距离》对话生数科技创始人、清华大学人工智能研究院副院长朱军，围绕世界模型、AI视频发展及未来智能展开交流。节目于今晚21：00全平台上线。", "type": "industry", "relTime": "3天前"}, {"id": 99, "title": "京东携 JoyAI 全系列大模型矩阵及 JoyInside 附身智能技术亮相 WAIC 2026", "source": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/A-Om9cK9rFnUme9l42BMLA", "date": "2026-07-18T12:29:13.000Z", "summary": "京东在 WAIC 2026 上展出 JoyAI 全系列大模型矩阵，覆盖多模态交互、具身智能等赛道，多款模型已开源。现场提供 JoyEgoCam 头戴数采设备体验机器人学习流程，并搭建 JoyInside 未来全屋 AI 样板间，实现无唤醒词的全屋语音联动。", "type": "industry", "relTime": "3天前"}, {"id": 100, "title": "Kimi 3 3D生成惊艳演示，效果绝佳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078428187768553902", "date": "2026-07-18T10:34:29.000Z", "summary": "Berry Xia 发布多个 Demo，展示 Kimi 3 在 3D 生成方面的惊艳效果，认为\"真的很绝\"。具体模型版本、参数规模、benchmark 分数等数字未在推文中提及。", "type": "tip", "relTime": "3天前"}, {"id": 101, "title": "上海发布太空算力星座工程\"星枢计划\"，首发星座含3颗卫星，商业运营阶段将完成千星部署", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/530.htm", "date": "2026-07-18T09:48:31.000Z", "summary": "上海在2026世界人工智能大会上发布\"星枢计划\"首发星座，由1颗中心算力主星、1颗伏羲气象星和1颗即时遥感星构成，通过星间激光链路实现数据贯通。主星搭载定制航天级GPU芯片，单星实现32P在轨算力，并首次引入具身智能系统用于在轨运维。该计划商业运营阶段将完成千星部署，包括800颗中心算力卫星和200颗边缘计算卫星。", "type": "industry", "relTime": "3天前"}, {"id": 102, "title": "思特威与地瓜机器人合作推出1：1方形视觉传感器", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/529.htm", "date": "2026-07-18T09:47:26.000Z", "summary": "思特威与地瓜机器人达成战略合作，基于旭日S600平台适配三款1：1方形全局快门图像传感器。该方案分辨率覆盖1080×1080至1944×1944，帧率80fps至130fps，为人形机器人等具身智能设备提供V-SLAM与主动避障等视觉支撑。", "type": "industry", "relTime": "3天前"}, {"id": 103, "title": "Claude Design 高保真原型可替代产品文档", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078388657979838830", "date": "2026-07-18T07:57:25.000Z", "summary": "开发者用 Claude Design 生成高保真可交互原型替代传统产品文档，原型包含模拟数据且修改便捷。以视频水印功能为例，先让 Opus 4.8 出原型稿，打磨确认后由 AI 实现代码，最终代码还原度可达 9 成以上。", "type": "tip", "relTime": "4天前"}, {"id": 104, "title": "荣耀 CEO 李健：AI 将脱离工具属性，迈向伙伴型类人生命体", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/476.htm", "date": "2026-07-18T07:02:32.000Z", "summary": "荣耀 CEO 李健在 2026 世界人工智能大会上表示，AI 的演进将脱离冰冷的工具属性，全面迈向伙伴型类人生命体。荣耀已将 MagicOS 升维为行业首个伙伴型、多模态智能体操作系统。首台机器人 Robot Phone 今日开启预约，搭载第五代骁龙 8 至尊版芯片与 4DoF 钛合金机械云台。", "type": "tip", "relTime": "4天前"}, {"id": 105, "title": "B站\"猫娘计划\"亮相WAIC 2026，支持自主导入模型并理解桌面内容", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/464.htm", "date": "2026-07-18T06:34:59.000Z", "summary": "哔哩哔哩在WAIC 2026上展示了开源AI数字生命生态计划\"猫娘计划\"，其核心产品为主动式全模态AI伙伴驱动器N.E.K.O.。该产品支持Live2D与VRM双引擎，用户可自由导入模型，并内置视觉多模态大模型以理解电脑屏幕内容。目前该产品已在Steam上架抢鲜体验。", "type": "model", "relTime": "4天前"}, {"id": 106, "title": "荣耀 WAIC 宣布 Robot Phone 开启预约：搭载 Agentic OS，8 月发布", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/462.htm", "date": "2026-07-18T06:30:45.000Z", "summary": "荣耀在 WAIC 2026 上正式官宣全球首台机器人手机 Robot Phone 开启全渠道预约，计划于 2026 年第三季度上市。该机搭载第五代骁龙 8 至尊版芯片与行业最小四自由度钛合金机械云台，系统层面将 MagicOS 升维为行业首个伙伴型多模态智能体操作系统 Agentic OS，并与阿里联合定义下一代 Magic 智能体大模型矩阵。", "type": "model", "relTime": "4天前"}, {"id": 107, "title": "Kimi K3 一句话生成在线视频编辑器", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078305954605772954", "date": "2026-07-18T02:28:47.000Z", "summary": "Kimi K3 通过\"乔木goal\"和\"PRD skill\"等技能，仅凭一句提示词便自动生成了一个类似剪映网页版的在线视频编辑器（cut.qiaomu.ai）。该Demo已开源，尽管功能粗糙且导出存在问题，但展示出AI从需求到产品原型的一步生成能力。", "type": "tip", "relTime": "4天前"}, {"id": 108, "title": "OCT-Bench 基准评估多模态大语言模型在 OCT 图像理解上的能力", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16609", "date": "2026-07-18T00:00:00.000Z", "summary": "研究者推出 OCT-Bench，一个评估多模态大语言模型在光学相干断层扫描图像理解能力的基准。该基准包含来自7个数据集的4，137张图像和10，076道多选题，覆盖感知、认知、推理三个维度的20项任务。对20个代表性模型的评估显示，当前模型远未达到可靠水平，且医学领域适配或增大模型规模均未带来一致提升。", "type": "paper", "relTime": "4天前"}, {"id": 109, "title": "TikTok 开始测试 AI 肖像检测工具，允许创作者举报 AI 生成内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/967486/tiktok-ai-likeness-detection-tool", "date": "2026-07-17T19:34:30.000Z", "summary": "TikTok 正在测试一项可选工具，可扫描 AI 生成的肖像并允许创作者向平台举报。该工具目前仅对\"部分\"美国创作者开放测试，创作者需先通过 Jumio 完成实时自拍扫描和身份验证。TikTok 表示不会保留身份证件和面部信息。", "type": "paper", "relTime": "4天前"}, {"id": 110, "title": "宝玉：Agent 应用和开发首选 Mac", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078195610696482895", "date": "2026-07-17T19:10:19.000Z", "summary": "宝玉指出，当前主流 Agent 应用（如 Computer Use）在 Mac 上支持最好，开发者开发 App 也应优先 Mac。他推荐 Mac Mini 或 Mac Studio，但强调内存至少 16G 以上、硬盘 1T 起步。其开源工具 BaoCut 可转录 YouTube 视频并生成双语字幕，但仅支持 Mac。", "type": "tip", "relTime": "4天前"}, {"id": 111, "title": "Epoch AI 测试：AI 检测器易被模仿误导", "source": "X：Epoch AI (@EpochAIResearch)", "sourceUrl": "https://x.com/EpochAIResearch/status/2078195357599813723", "date": "2026-07-17T19:09:18.000Z", "summary": "我们对一些 AI 检测器进行了压力测试，发现它们很少将人类文本误判为 AI 生成。但要求大语言模型模仿特定作者时，检测器约 13% 的情况下会将文本误分类为人类生成。对于科学写作，假阴性率上升至约 26%。", "type": "paper", "relTime": "4天前"}, {"id": 112, "title": "免费AI视频素材库：低成本空镜头方案", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078183471831277778", "date": "2026-07-17T18:22:05.000Z", "summary": "针对AI生成视频成本过高的问题，有网站提供无版权免费的AI素材库。作者提议编写CLI工具自动搜索下载，并交由Codex进行AI自动剪辑，至少可作为空镜头使用。", "type": "tip", "relTime": "4天前"}, {"id": 113, "title": "VideoChat3：全开源视频理解模型发布", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2078179727529877506", "date": "2026-07-17T18:07:12.000Z", "summary": "VideoChat3  完全开源的视频多模态大语言模型，用于高效且通用的视频理解。", "type": "paper", "relTime": "4天前"}, {"id": 114, "title": "Astribot Lumo-2：4B参数机器人基础模型发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2078171810403950614", "date": "2026-07-17T17:35:44.000Z", "summary": "Astribot发布Lumo-2，一个4B参数的机器人基础模型，采用行业首个Latent World-Action Model（LWAM）架构。该模型在22项真实世界操作任务中取得最佳综合表现，总推理速度提升2.71倍，支持人类视频与多种机器人本体，并在105个未见物体上表现更强。结果已在20+复杂家庭任务中通过真实机器人验证。", "type": "model", "relTime": "4天前"}, {"id": 115, "title": "人形机器人供应链比炫技视频更重要", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2078149200701977050", "date": "2026-07-17T16:05:54.000Z", "summary": "中国每周涌现人形机器人炫技视频，但真正关键的是背后的工业生态系统。机器人本体正快速商品化，Unitree G1售价仅¥99，000（$14，625），而核心零部件供应商利润率可达30-50%，本体制造商仅10-15%。随着量产推进，利润将向上游AI算法、软件和数据转移。", "type": "tip", "relTime": "4天前"}, {"id": 116, "title": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 为 Diffusers 模型提供分布式扩散训练", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/scale-diffusers-finetuning-nemo-automodel", "date": "2026-07-17T15:57:54.000Z", "summary": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 开源库为任意 Diffusers 格式模型提供生产级分布式扩散训练，无需检查点转换或模型重写。该集成支持 Wan 2.1、FLUX.1-dev 等模型的完整微调与 LoRA 微调，可在一到数百 GPU 上灵活扩展，所有检查点可直接加载回 Diffusers 管线进行推理。", "type": "model", "relTime": "4天前"}, {"id": 117, "title": "面壁智能在 WAIC 2026 发布具身智能模型 MiniCPM-Robot", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/7ZUoWndvYXCVmt7SmljnVQ", "date": "2026-07-17T15:21:18.000Z", "summary": "面壁智能在 WAIC 2026 发布具身智能模型系列 MiniCPM-Robot，并展示端侧智能在汽车、机器人等领域的落地。其 MiniCPM 系列已覆盖文本、视觉、全模态和语音四大方向，其中 MiniCPM-o 4.5 实现离线全模态即时自由对话。该系列开源模型累计下载量突破 3800 万，已搭载于长安马自达 EZ-60 等车型量产上市。", "type": "industry", "relTime": "4天前"}, {"id": 118, "title": "可灵AI首尔颁奖礼表彰新一代创作者", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2078132620873929184", "date": "2026-07-17T15:00:01.000Z", "summary": "🏆 来自首尔可灵AI NextGen颁奖典礼的精彩瞬间。  我们自豪地分享本次典礼的回顾，该典礼表彰了新一代创作者们使用可灵AI重新定义视觉叙事边界的杰出成就。  衷心感谢所有参与者、评委和合作伙伴，让这个鼓舞人心的首尔之夜成为可能。我们正在共同塑造AI艺术的未来。  观看下方完整回顾视频。", "type": "industry", "relTime": "4天前"}, {"id": 119, "title": "用户用Kimi 3一次生成咖啡机设计", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078132577668637146", "date": "2026-07-17T14:59:51.000Z", "summary": "用户@berryxia 用Kimi 3一次成型手搓咖啡机，兴奋表示被Kimi 3\"硬控\"。视频剪辑存在小问题，但成品效果出色，评论区将补充细节图。", "type": "tip", "relTime": "4天前"}, {"id": 120, "title": "程序员用 Codex 搞定视频下载，众筹到每月 $100 订阅费", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2078120758967251092", "date": "2026-07-17T14:12:53.000Z", "summary": "一位程序员用 Codex 在 8-10 分钟内下载了微信视频号视频，并为其生成字幕。他借机说服妻子将每月 $200 的订阅费分摊一半，成功众筹到 $100。Codex 的 /Goal 指令让原本需要搜索第三方网站的任务变得简单高效。", "type": "tip", "relTime": "4天前"}, {"id": 121, "title": "百度智能云发布\"AI+时尚\"全链路方案，百度搭子串联设计、生产与营销", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/QjAdiDm7fjudol2J46mOEA", "date": "2026-07-17T12:47:12.000Z", "summary": "7月17日，百度智能云在首届全球\"AI+时尚\"创新应用大赛上宣布，其通用智能体\"百度搭子\"已串联设计、3D虚拟样衣、数字人直播、营销素材生成等环节，推动AI时尚从单点内容生成走向全链路产业落地。百度百舸、千帆、一镜及Hogee等平台为高清渲染、模型调用和品牌出海提供支撑。大赛验证了中小品牌和独立设计师可基于成熟平台低成本参与AI时尚应用。", "type": "industry", "relTime": "4天前"}, {"id": 122, "title": "抖音严打 AI 生成虚假灾害画面，发布防汛期涉灾信息治理公告", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/291.htm", "date": "2026-07-17T12:37:04.000Z", "summary": "抖音发布防汛期涉灾信息治理公告，重点打击利用 AI 生成虚假灾害画面、翻炒旧闻编造灾情等行为。平台通过 AI 技术识别、人工复核及权威信息交叉比对，已累计核验典型涉灾谣言 71 起，处置相关谣言内容 1.9 万余条，清理评论区谣言 1.6 万余条，并对 20 个违规账号进行处罚。抖音同时上线 39 则求真卡，视频底部求真条累计曝光超 11.9 亿次。", "type": "industry", "relTime": "4天前"}, {"id": 123, "title": "LLM cliché highlighter：一款识别AI写作套话的检测工具", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/17/llm-cliche-highlighter", "date": "2026-07-17T12:11:11.000Z", "summary": "Simon Willison 用 Fable 5 开发了一款 LLM cliché highlighter 应用，用于高亮 LLM 生成文本中常见的十种套话模式，例如\"no fluff， no filler， no jargon\"这类陈词滥调。该工具旨在帮助读者快速识别并过滤掉充斥在文章中的 AI 写作风格化表达。", "type": "tip", "relTime": "4天前"}, {"id": 124, "title": "TapNow Creative OS：AI原生影视工作流操作系统", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2078084102448713931", "date": "2026-07-17T11:47:13.000Z", "summary": "TapNow Creative OS 正式上线，定位为面向影视制作全流程的 AI 原生操作系统，覆盖从创意开发、内容生成到后期制作。主推文将其类比为\"视觉领域的 Claude Code\"，认为它像 Codex 和 Claude Code 为 LLM 封装真实工具一样，将参考素材、创作方法和项目上下文围绕模型整合进统一工作空间。", "type": "model", "relTime": "4天前"}, {"id": 125, "title": "Omni 原型演示交互式实时视频生成", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078063863346483431", "date": "2026-07-17T10:26:48.000Z", "summary": "我使用 Omni 原型演示了通过直接操控实现的交互式实时视频生成可能的样子。", "type": "tip", "relTime": "4天前"}, {"id": 126, "title": "Kimi 3 语音建模：一张嘴搞定细腻 3D 模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078052528147804502", "date": "2026-07-17T09:41:45.000Z", "summary": "Kimi 3 支持仅靠语音指令直接生成细腻的 3D 模型，交互一气呵成，无需复杂提示词。用户感叹其质感和细节到位，认为它直接吊打头部 3D 建模模型。", "type": "tip", "relTime": "4天前"}, {"id": 127, "title": "腾讯发布具身 VLM 基座模型 Hy-Embodied-VLM-1.0，A3B 规模性能接近上一代 A32B 模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/080.htm", "date": "2026-07-17T07:22:18.000Z", "summary": "腾讯 Robotics X 实验室与福田实验室联合发布第二代具身 VLM 基座模型 Hy-Embodied-VLM-1.0。该模型仅采用 A3B 规模，在 37 个评测任务中综合平均得分 65.6，整体性能接近上一代 A32B 旗舰模型。模型已开源。", "type": "model", "relTime": "5天前"}, {"id": 128, "title": "文远知行发布物理 AI 大模型 WITT，引入\"最小物理事实单元\"概念", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/055.htm", "date": "2026-07-17T07:01:04.000Z", "summary": "文远知行发布自研物理 AI 认知基础大模型 WeRide WITT，首次引入\"最小物理事实单元\"概念，将真实场景拆解为可验证的事实单元。WITT 具备事实提取、推理、验证与编排四大能力，在自动驾驶垂类场景中平均每片段事实错误率仅为通用大模型的三分之一。相比百B级通用大模型，WITT 可节省 98% 的 Token 成本，单卡单日处理 1 万分钟视频，实现 200 倍数据处理效率提升。", "type": "model", "relTime": "5天前"}, {"id": 129, "title": "Kimi多模态能力令人惊喜", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077997593142132939", "date": "2026-07-17T06:03:28.000Z", "summary": "Kimi 的多模态能力让我惊讶。图像识别和推理能力相当不错。", "type": "tip", "relTime": "5天前"}, {"id": 130, "title": "谷歌 Google Vids 新增数字分身功能，Gemini Omni 模型同步登陆", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/022.htm", "date": "2026-07-17T05:42:59.000Z", "summary": "谷歌为 Google Vids 加入个人数字分身功能，用户上传自拍照和语音录音即可生成外貌与声音模仿本人的虚拟形象。多模态 AI 模型 Gemini Omni 同步登陆，支持文字提示词与参考图片整合生成视频，并可分步修改。数字分身与谷歌账号绑定，生成内容嵌入 SynthID 隐形水印，目前仅向部分地区年满 18 岁的用户开放。", "type": "model", "relTime": "5天前"}, {"id": 131, "title": "商汤开源 SenseNova-U1-8B 信息图生成编辑模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077984439389565366", "date": "2026-07-17T05:11:12.000Z", "summary": "商汤开源 SenseNova-U1-8B-MoT-Infographic-V3 模型，将信息图生成与编辑统一于单一模型。支持局部文本/内容编辑、全局风格编辑和全局布局编辑，同时保留强生成能力，编辑时尽可能保持未修改区域不变。", "type": "model", "relTime": "5天前"}, {"id": 132, "title": "Kimi 3 视频与 3D 生成能力实测", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077974125872865742", "date": "2026-07-17T04:30:13.000Z", "summary": "用户实测 Kimi 3，称其 3D 建模质感与交互\"吊打头部模型\"，无需复杂提示词。主推文进一步展示，用户将官方宣传视频风格提炼为 Skills，让 Kimi 3 以 AI 发展为主题自动生成视频，文案、脚本、配音、音轨全部交付。", "type": "tip", "relTime": "5天前"}, {"id": 133, "title": "Kimi K3 首测：与 Opus 4.8 前端对决，有来有回", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2077969109506277602", "date": "2026-07-17T04:10:17.000Z", "summary": "Kimi K3 正式上线，采用全新 Kimi Linear 混合线性注意力架构，拥有 2.8T 参数和 1M 上下文，覆盖编程、Agent 和多模态。博主将其与 Claude Opus 4.8 进行四项前端高难度对比测试，结果显示 K3 在视频理解生成 3D 场景上明显胜出，且能自我截图修正代码；Opus 4.8 则在精细排版和一次性成功率上更稳。K3 为开源模型，定价在 Sonnet 级别。", "type": "tip", "relTime": "5天前"}, {"id": 134, "title": "用6GB显存旧显卡训练AI底鼓模型：KickWithReverb项目全解析", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.zhinit.dev/blog/training-a-kick-drum-diffusion-model", "date": "2026-07-17T02:18:03.648Z", "summary": "作者在配备7年前NVIDIA GTX 1660 SUPER（6GB显存）的Linux台式机上，从零训练并部署了一个生成式潜在扩散底鼓模型。模型基于超过13，000个个人采样库中的底鼓样本，采用VAE压缩频谱图、扩散U-Net生成潜在张量、HiFi-GAN声码器还原音频的三阶段流水线。项目代码已开源至GitHub，模型权重上传至HuggingFace。", "type": "tip", "relTime": "5天前"}, {"id": 135, "title": "Roblox 移动版将推出 AI 游戏创作工具\"Build\"，7 月 28 日开启 Alpha 测试", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/876.htm", "date": "2026-07-17T01:31:35.000Z", "summary": "Roblox 宣布移动版客户端将推出\"Build\"功能，用户通过简单提示词即可用 AI 生成基础游戏，无需编程技能。该功能由多种 AI 模型（含开源和自研模型）驱动，支持生成玩法、环境、角色、视觉风格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上验证用户开启 Alpha 测试，未来将推出免费基础版和付费高级版。", "type": "model", "relTime": "5天前"}, {"id": 136, "title": "Kimi 自动复刻官网宣传视频，制作还原度高", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077918765371826656", "date": "2026-07-17T00:50:14.000Z", "summary": "用户让Kimi 自行复刻官网宣传视频，次日发现Kimi 已完成制作，并生成了快闪版、沉浸版等多个版本，还解释了部分画面缺失的原因。视频的还原度与配乐节奏均由Kimi 自主完成。", "type": "tip", "relTime": "5天前"}, {"id": 137, "title": "S1-Omni：统一多模态科学推理模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15686", "date": "2026-07-17T00:00:00.000Z", "summary": "S1-Omni 将科学理解、预测与生成能力整合到单一架构中，在 200 个科学任务的 S1-Omni-Corpus 上训练。在超过 60 个科学基准上，该模型多数测试超越 GPT-5.5 和 Gemini-3.1-Pro，并在多个基准上达到或超越领域专用模型。", "type": "paper", "relTime": "5天前"}, {"id": 138, "title": "NVIDIA 发布 Audio-Visual Flamingo：面向长视频的开放音频-视觉大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16107", "date": "2026-07-17T00:00:00.000Z", "summary": "NVIDIA 推出 Nemotron-Labs-Audio-Visual Flamingo（AV-Flamingo），一个完全开源的音频-视觉大语言模型，专为理解和推理长视频中的音频、图像与复杂场景设计。", "type": "model", "relTime": "5天前"}, {"id": 139, "title": "Apple 研究：Show Me Examples - 从图像集推断视觉概念", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/visual-concept-inference", "date": "2026-07-17T00:00:00.000Z", "summary": "Apple 机器学习研究团队提出一种方法，让视觉语言模型（VLM）仅从图像集示例中推断视觉概念，无需文本指令。该方法通过对比示例图像与候选图像，使模型捕捉颜色、纹理等视觉规律，在多个概念推理基准上提升准确率。该研究目前为学术论文，未公布模型或 API 可用性。", "type": "paper", "relTime": "5天前"}, {"id": 140, "title": "概念锻造提示术：用卡巴拉智能体融合任意创意", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077892045172011272", "date": "2026-07-16T23:04:03.000Z", "summary": "fofr 探索了一种\"概念锻造\"图像提示技术，利用卡巴拉智能体技能将任意两个想法通过强制桥梁融合。例如输入\"evangelion/metztli\"，智能体生成融合描述：\"Metztli 的石化月球外壳作为沉睡宇宙泰坦的原始、充满液体的生物驾驶舱\"，并输出包含琥珀色液体、玉石座椅等细节的提示词。该技术基于 Nano Banana 2 Lite 模型。", "type": "tip", "relTime": "5天前"}, {"id": 141, "title": "fofr 展示概念锻造图像提示的卡巴拉智能体技能", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077874610293346385", "date": "2026-07-16T21:54:46.000Z", "summary": "fofr 展示了一种概念锻造图像提示方法，利用卡巴拉智能体技能将任意两个想法强制融合。例如输入\"evangelion/metztli\"，智能体生成一个桥梁描述，并输出融合后的详细提示词。该技能可生成高度创意且风格独特的图像提示。", "type": "tip", "relTime": "5天前"}, {"id": 142, "title": "fofrAI 用提示词生成引力波与葬送的芙莉莲风格图像", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077870441847287914", "date": "2026-07-16T21:38:12.000Z", "summary": "fofrAI 发布两条 AI 图像生成提示词。第一条以\"引力波/欢快\"为主题，用\"黄色细线球体悬浮于反射黑池之上，池面泛起同心涟漪\"的极简摄影描述视觉化引力波。第二条引用《葬送的芙莉莲》与天文摄影的共通点--像长曝光一样捕捉已消逝实体跨越时间的微弱光芒，提示词为\"精灵少女剪影在星轨巨幕下独行于黑暗平原\"。", "type": "tip", "relTime": "5天前"}, {"id": 143, "title": "fofr 展示概念锻造图像提示：融合任意两个想法", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077868904823595167", "date": "2026-07-16T21:32:06.000Z", "summary": "fofr 展示了一种概念锻造图像提示方法，使用卡巴拉智能体技能将任意两个想法融合。例如，输入\"evangelion/metztli\"会生成一个强制桥接描述，并输出对应的图像提示词。该方法通过 Nano Banana 2 Lite 实现。", "type": "tip", "relTime": "5天前"}, {"id": 144, "title": "概念锻造提示词：用卡巴拉智能体融合任意想法", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077862231950118942", "date": "2026-07-16T21:05:35.000Z", "summary": "fofr 展示了一种名为\"概念锻造\"的图像提示词方法，利用卡巴拉智能体技能将两个概念通过强制桥梁融合。例如，输入\"evangelion/metztli\"后，智能体生成了\"被石化的月球外壳 Metztli 作为沉睡宇宙巨人的原始生物驾驶舱\"这一桥梁，并据此创作出充满琥珀色液体、玉石与生物线缆的驾驶舱提示词。该方法基于 Nano Banana 2 Lite 模型运行。", "type": "tip", "relTime": "5天前"}, {"id": 145, "title": "利用经典机器学习检测LLM生成文本", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://blog.lyc8503.net/en/post/llm-classifier", "date": "2026-07-16T20:40:36.733Z", "summary": "一项研究探索使用经典机器学习方法（如逻辑回归、随机森林）检测大型语言模型生成的文本，在特定数据集上达到与深度学习模型相当的准确率。该方法计算成本更低，且对短文本和改写文本具有较强鲁棒性。研究还发现，基于字符级n-gram特征的模型在跨领域泛化上表现优于基于词级特征的模型。", "type": "tip", "relTime": "5天前"}, {"id": 146, "title": "小鹏智驾负责人谈物理AI未来方向", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077855037208859129", "date": "2026-07-16T20:37:00.000Z", "summary": "非常高兴能与小鹏汽车通用智能中心负责人、主导自动驾驶与AI研究的科学家刘宪铭坐下来交流。 我们进行了一场关于物理AI实际发展方向的精彩对话，我从中受益匪浅。完整视频即将上线，敬请期待。", "type": "tip", "relTime": "5天前"}, {"id": 147, "title": "xAI 起诉 Grok 用户制作儿童性虐待内容，不再否认模型被滥用", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/tech-policy/2026/07/xai-cant-deny-grok-makes-csam-anymore-so-its-suing-users", "date": "2026-07-16T20:26:23.000Z", "summary": "xAI 首次对一名 Grok 用户提起诉讼，指控其利用该模型制作儿童性虐待图像（CSAM）。此前 xAI 一直否认 Grok 能生成此类内容，此次诉讼标志着其立场转变。案件聚焦用户滥用行为，而非模型本身的技术缺陷。", "type": "industry", "relTime": "5天前"}, {"id": 148, "title": "Google Vids 更新：上传自拍和录音即可创建数字分身，并引入 Gemini Omni 多模态模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/google-vids-now-lets-you-star-in-your-own-ai-videos", "date": "2026-07-16T18:32:54.000Z", "summary": "Google 为 Vids 推出数字分身功能，用户上传自拍和录音即可生成外观和声音与本人一致的 AI 头像。同时，多模态模型 Gemini Omni 被引入 Vids，支持结合文字提示和参考图片生成视频，并能逐步编辑、替换背景或调整光线。新头像与 Google 账号绑定，并带有 SynthID 隐形水印，仅限 18 岁以上特定地区用户使用。", "type": "model", "relTime": "5天前"}, {"id": 149, "title": "Roblox 在移动端推出 AI 游戏创建功能\"Build\"", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/roblox-launches-an-ai-powered-game-creation-feature-in-its-mobile-app", "date": "2026-07-16T18:22:06.000Z", "summary": "Roblox 发布新功能\"Build\"，允许用户通过手机输入文字提示（如\"制作一个森林中的舒适冒险游戏\"）直接生成基础游戏，无需编程经验。该功能由开源和 Roblox 自有的 AI 模型驱动，可处理玩法、环境、角色、视觉风格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上用户开启公开 Alpha 测试，并提供免费基础版和付费选项。", "type": "model", "relTime": "5天前"}, {"id": 150, "title": "Gemini 数字头像功能上线，一键生成自拍", "source": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2077812539480748035", "date": "2026-07-16T17:48:07.000Z", "summary": "Avatar 🤝 Nano Banana  从今天起，将你自己置于不同场景、风格或时代变得更加快速和便捷。在 Gemini 中一次性设置好你的数字头像，即可无缝创建自定义个人图像，无需每次都上传自拍照。", "type": "paper", "relTime": "5天前"}, {"id": 151, "title": "商汤WAIC发布旗舰原生多模态模型SenseNova U1 PRO", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077807112273707455", "date": "2026-07-16T17:26:34.000Z", "summary": "商汤科技在WAIC发布旗舰原生多模态基础模型SenseNova U1 PRO，专为图像创作设计。现场设有40多个沉浸式技术展位，并展示搭载具身智能、具备\"大脑\"的SenseMART Go机器人。", "type": "industry", "relTime": "5天前"}, {"id": 152, "title": "德国监管机构首次将 Google AI Overviews 与 Perplexity 纳入媒体法管辖", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/germany-puts-googles-ai-overviews-and-perplexity-under-media-law-in-first-of-its-kind-ruling", "date": "2026-07-16T16:12:26.000Z", "summary": "德国媒体监管机构 ZAK 首次将 AI 搜索引擎和聊天机器人认定为内容提供者，对 Google 和 Perplexity 发布裁决。ZAK 认为《数字服务法》的责任豁免不适用于 AI 生成内容，因其属于独立创作而非第三方内容再分发。Google 被指控利用 AI 摘要的优先展示位置，将传统链接（尤其是新闻来源）推至后台，违反了媒体法中的透明度和反歧视规定。", "type": "industry", "relTime": "5天前"}, {"id": 153, "title": "Google Vids 上线 Gemini Omni 与个人数字分身功能", "source": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/workspace/gemini-omni-personal-avatars", "date": "2026-07-16T16:00:00.000Z", "summary": "Google Vids 推出两项更新：Gemini Omni 支持用户通过自然语言提示词和图片参考生成、逐步编辑高质量视频片段；个人数字分身功能允许用户上传自拍和语音录制后，输入文字即可让数字分身出镜。两项功能面向 Google AI Pro 和 Ultra 订阅者及 Google Workspace 商业客户开放，所有生成内容均含不可见的 SynthID 数字水印。", "type": "paper", "relTime": "5天前"}, {"id": 154, "title": "Runway Agent 2.0 发布：将单一创意转化为完整视频作品", "source": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/engineering/inside-building-runway-agent", "date": "2026-07-16T16:00:00.000Z", "summary": "Runway 推出 Agent 2.0，帮助用户将单一创意转化为包含视频、音频和图像的完整作品。在 Physion Labs 的 Arc 1.0 基准测试中，Agent 2.0 在六款 AI 视频智能体中排名第一，重点验证了电影质感、连贯性及信任安全。该工具内置多模型路由与技能层，可自动选择最优模型，并通过视觉优先界面支持故事板迭代，将创意控制始终保留在用户手中。", "type": "model", "relTime": "5天前"}, {"id": 155, "title": "PixVerse 推出 AI 互动直播体验 Live Party", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077784321180713352", "date": "2026-07-16T15:56:00.000Z", "summary": "PixVerse 推出 PixVerse Live Party，一种早期互动直播式体验，由 AI 粉丝主持人 Reina 驱动。该实验性项目探索 AI 视频从生成质量转向用户参与的可能性，展示了 AI 娱乐超越简单视频生成的潜在方向。", "type": "paper", "relTime": "5天前"}, {"id": 156, "title": "Kimi K3 着色器测试：生成新哥特式海洋城市", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2077783731691995348", "date": "2026-07-16T15:53:39.000Z", "summary": "Ethan Mollick 用 Kimi K3 运行着色器测试，提示词为\"生成一座部分淹没在暴风雨海洋中的新哥特式塔楼无限城\"，并追加\"让它更好\"。Kimi K3 表现优秀，虽未达到 Sol Max 或 Fable 的水平，但作为开源权重模型表现出色。", "type": "tip", "relTime": "5天前"}, {"id": 157, "title": "Kimi 3一句话生成博朗3D录音机，质感交互惊艳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077760058516238743", "date": "2026-07-16T14:19:35.000Z", "summary": "Kimi 3仅凭一句提示词即可生成博朗3D录音机模型，质感和交互一气呵成。用户称其直接吊打头部模型，无需复杂Prompt。", "type": "tip", "relTime": "5天前"}, {"id": 158, "title": "Kimi 3 3D建模能力吊打前代与竞品", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077756166353117402", "date": "2026-07-16T14:04:07.000Z", "summary": "Kimi 3在3D建模和CAD领域实现重大突破，其质感与交互流畅度直接超越头部模型。相比上一代Kimi 2.7，相同提示词下Kimi 3生成效果显著提升，用户无需复杂提示词即可获得高质量3D输出。", "type": "tip", "relTime": "5天前"}, {"id": 159, "title": "面壁智能Build Small黑客马拉松获奖项目", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2077755420610101705", "date": "2026-07-16T14:01:09.000Z", "summary": "🏆 Build Small 黑客马拉松获奖者 - OpenBMB 奖项：🥇爷爷的睡前故事 👴  恭喜以 2，500 美元奖金赢得千词木赛道第一名！🎉  图像可以捕捉瞬间，但背后的故事等待被探索。该项目利用 AI 将视觉内容转化为互动叙事体验，创造分享和体验故事的新方式。👇", "type": "industry", "relTime": "5天前"}, {"id": 160, "title": "生数科技入选工信部2025年人工智能应用典型案例", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/DUg4enEao_ltbEsy9zX5iA", "date": "2026-07-16T12:01:17.000Z", "summary": "生数科技申报的\"国产化高性能多模态通用大模型创新应用\"入选工信部《2025年人工智能应用典型案例名单》技术底座方向。在数字世界，Vidu支持文生视频、图生视频、参考生视频，实时交互模型Vidu S1实现数字角色实时交互；在物理世界，Motubrain打造具身智能通用大脑。", "type": "industry", "relTime": "5天前"}, {"id": 161, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/ex-openai-cto-muratis-thinking-machines-drops-inkling-a-975b-parameter-model-that-leads-us-labs-but-trails-china", "date": "2026-07-16T09:55:28.000Z", "summary": "Thinking Machines Lab 发布开源多模态模型 Inkling，总参数 9750 亿（活跃 410 亿），原生支持文本、图像、音频及百万 token 上下文。该模型在 Artificial Analysis Intelligence Index 上以 41 分领跑美国开源模型，但事实准确率仅 40%，幻觉率高达 63%。", "type": "model", "relTime": "5天前"}, {"id": 162, "title": "生数科技 WAIC 展区开放，可现场体验 Vidu S1 实时互动与 AI 视频生成", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/o7ZBULUpNsiCyj8AtHD_qQ", "date": "2026-07-16T08:59:33.000Z", "summary": "生数科技在 WAIC 展区（上海西岸国际会展中心 X1B-301，7 月 17 日-20 日）开放三项互动活动。参与者可现场体验 Vidu S1 与 AI 角色实时互动，或扫码注册 Vidu 账号完成视频生成并发布至社交平台，领取限量礼品。", "type": "industry", "relTime": "5天前"}, {"id": 163, "title": "华为靳玉志：L3 与 L4 规模商用预计 2027 年、2028 年实现", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/584.htm", "date": "2026-07-16T08:53:04.000Z", "summary": "华为靳玉志预计，L3 规模商用将在 2027 年实现，L4 2B（Robotaxi 部分城市试点）与 L4 2C（低速 L4 部分城市商用）同年开启；2028 年 Robotaxi 或迎来部分城市商用。工信部 6 月已就首部针对 L3/L4 的强制性国家标准公开征求意见，要求自动驾驶系统安全水平至少达到\"合格且专注驾驶人\"水平。", "type": "industry", "relTime": "6天前"}, {"id": 164, "title": "用提示词给Codex换主题，QQ皮肤历史重演", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2077660576655032678", "date": "2026-07-16T07:44:17.000Z", "summary": "用户通过提示词\"读取这个库，给我们当前codex换个主题，用Codex内置imagen生成\"，利用GitHub上的Codex-Dream-Skin库为Codex设计主题。这一操作被类比为当年QQ皮肤自定义的历史重演，做法简单，仅需一条指令即可调用内置图像生成模型完成主题更换。", "type": "tip", "relTime": "6天前"}, {"id": 165, "title": "阿里云EMR Serverless Spark推出AI Functions，SQL分析自动驾驶影像", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077611393272951202", "date": "2026-07-16T04:28:50.000Z", "summary": "阿里云在EMR Serverless Spark中推出AI Functions，将多模态AI能力集成至数据管道，无需模型工程即可用SQL分析自动驾驶摄像头画面。该功能可在数秒内分析5张高分辨率前视图像，识别环岛、警车、皮卡、起重机等目标，实现自动化分析。", "type": "model", "relTime": "6天前"}, {"id": 166, "title": "Mira Murati 新公司推出 975B 开源模型 Inkling", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2077603550868422737", "date": "2026-07-16T03:57:41.000Z", "summary": "前 OpenAI CTO Mira Murati 创立的 Thinking Machine 发布首款模型 Inkling。该模型采用 MoE 架构，总参数量 975B，激活参数 41B，拥有 1M 上下文窗口，在 45T 数据上训练，原生支持文本、图像和音频多模态理解。同时推出激活参数 12B 的 Small 预览版，模型完全开源，后训练数据从 Kimi 2.5 等开源模型蒸馏得到。", "type": "model", "relTime": "6天前"}, {"id": 167, "title": "阿里云AgenticTalks探讨企业级AI视频制作", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077603351802327458", "date": "2026-07-16T03:56:53.000Z", "summary": "大多数AI视频工具可以生成一个片段。但从原始脚本到成品视频--在企业规模上--需要什么？  #AgenticTalks 第1集--7月23日，在阿里云上直播。  注册 → https://int.alibabacloud.com/m/1000415408/  #AlibabaCloud #AIVideo #AIAgent", "type": "industry", "relTime": "6天前"}, {"id": 168, "title": "中国AI实验室收入达26亿美元，追赶美国巨头", "source": "X：Deedy Das (@deedydas)", "sourceUrl": "https://x.com/deedydas/status/2077573945759572196", "date": "2026-07-16T02:00:02.000Z", "summary": "中国五大独立AI实验室（Kimi、DeepSeek、智谱、快手可灵、MiniMax）及两大云厂商（字节Seedance、阿里Qwen）合计年化收入达26亿美元，其中4家已跻身全球AI公司收入前25。随着Kimi K3发布和Seedance 2.5即将推出，中国在LLM领域持续缩小差距，并在视频生成方面保持领先。", "type": "tip", "relTime": "6天前"}, {"id": 169, "title": "天工短剧工作台发布\"Agent智能分镜+无限画布\"双轨创作模式", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/WlGAeogkF_N5122nHA0TtQ", "date": "2026-07-16T02:00:00.000Z", "summary": "天工短剧工作台推出双轨创作模式，通过导演Agent自动解析剧本、规划站位与机位，并支持多视细节图生成，解决AI短剧角色变脸和站位漂移问题。该工具内置影视级提示词模板、720°全景图及3D导演台，实现可控生产。已有三部作品上线DramaWave 7天实现百万美元级营收。", "type": "paper", "relTime": "6天前"}, {"id": 170, "title": "xAI 起诉 Grok 用户滥用 AI 生成儿童性虐待材料", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/289.htm", "date": "2026-07-16T00:14:37.000Z", "summary": "xAI 起诉南卡罗来纳州男子特里·哈伍德，指控其滥用 Grok 生成儿童性虐待材料及未经同意的色情深度伪造内容。xAI 称 2026 年已暂停 52222 个账户，向美国国家失踪与受虐儿童中心提交 73604 份报告，促成至少 244 人被捕。xAI 要求法院判令哈伍德支付赔偿金并永久禁止其使用 Grok。", "type": "industry", "relTime": "6天前"}, {"id": 171, "title": "OpenRouter 统一多模态 API：Chat、图像生成、嵌入与转录共用同一端点", "source": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/every-modality-one-api", "date": "2026-07-16T00:00:00.000Z", "summary": "OpenRouter 将 Chat、图像生成、嵌入和转录四种模态统一到单一 base URL 下，用户只需切换模型字符串和内容类型，无需管理多个 SDK、账单和认证方案。同一套路由控制可跨所有模态复用，大幅降低多模态开发集成成本。", "type": "model", "relTime": "6天前"}, {"id": 172, "title": "小米发布 Xiaomi-Robotics-1：基于超10万小时真实轨迹训练的视觉-语言-动作基础模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15330", "date": "2026-07-16T00:00:00.000Z", "summary": "小米推出 Xiaomi-Robotics-1，一个视觉-语言-动作（VLA）基础模型，在超10万小时真实世界操控轨迹上预训练，并辅以1万小时跨本体数据后训练。该模型可直接在未见环境中执行多种移动操控任务，在 RoboCasa365 基准上以57.6%成功率超越此前最优的46.6%，在 RoboDojo 上取得20.07平均分（此前最优13.07）。代码和模型权重将开源。", "type": "paper", "relTime": "6天前"}, {"id": 173, "title": "HDR：面向多步视觉推理的分层去噪框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15278", "date": "2026-07-16T00:00:00.000Z", "summary": "HDR将分层潜变量集成到因果视频生成中，实现从粗到细的多步推理。在六项多步视频推理任务上，HDR将成功率从34.22提升至60.29（相对提升76.2%），推理速度比双向扩散快54.2倍。", "type": "paper", "relTime": "6天前"}, {"id": 174, "title": "SUFLECA：通过规模化特征学习实现零样本CAD-图像对齐", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15058", "date": "2026-07-16T00:00:00.000Z", "summary": "SUFLECA提出一种弱监督框架，利用674K张图像上的归一化对象坐标（NOCs）监督，从预训练视觉表征中规模化学习几何感知特征，并配合几何一致匹配算法，实现单张RGB图像到CAD模型的零样本9D位姿估计。在ScanNet25k上，SUFLECA以更小计算量达到33.4%/42.3%类别/实例准确率，超越最强零样本基线10.3/12.2个百分点，且首次在该基准上超过全监督方法。代码已开源。", "type": "paper", "relTime": "6天前"}, {"id": 175, "title": "VIABench：首个面向视障辅助场景的多模态视频评测基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14660", "date": "2026-07-16T00:00:00.000Z", "summary": "VIABench 是一个专门用视障人士第一人称视频评估多模态大语言模型（MLLM）的基准，定义了主动提醒、视觉问答和视觉引导交互三项核心任务。实验表明，当前 MLLM 在主动提醒任务上表现最差，难以准确预判导航事件并实时响应。该基准支持在线与离线两种评测模式，代码与数据将开源。", "type": "paper", "relTime": "6天前"}, {"id": 176, "title": "VideoChat3 发布：完全开源的高效通用视频 MLLM，4B 参数超越同规模模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14935", "date": "2026-07-16T00:00:00.000Z", "summary": "VideoChat3 是一个完全开源的视频多模态大模型（MLLM），专为高效和通用视频理解设计。它引入 Inflated 3D Vision Transformer （I3D-ViT） 和自适应帧率流式视频感知技术，降低训练与推理成本，并构建了覆盖通用、长视频和流式场景的三个高质量数据集。仅 4B 参数，VideoChat3 在多项基准测试中超越同等或更大参数量的开源模型。", "type": "paper", "relTime": "6天前"}, {"id": 177, "title": "RoboTTT：将机器人策略的视觉运动上下文窗口扩展至 8K 时间步", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15275", "date": "2026-07-16T00:00:00.000Z", "summary": "RoboTTT 将机器人策略的视觉运动上下文窗口扩展至 8K 时间步，比现有最优策略高出三个数量级，且推理延迟不增加。该模型支持从人类视频演示进行一次性上下文模仿、即时策略改进和长时程任务。在真实机器人操作任务中，RoboTTT 相比单步基线性能提升 87%，8K 上下文训练版本比 1K 版本性能高出 62%。", "type": "paper", "relTime": "6天前"}, {"id": 178, "title": "MeanFlowNFT：将前向过程强化学习引入平均速度生成器", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15273", "date": "2026-07-16T00:00:00.000Z", "summary": "MeanFlowNFT 提出一种将前向过程强化学习（RL）应用于 MeanFlow 生成器的方法。通过构建瞬时速度预测器并应用 DiffusionNFT 目标函数，MeanFlowNFT 在保持平均速度快速少步采样的同时，实现了严格的策略改进保证。", "type": "paper", "relTime": "6天前"}, {"id": 179, "title": "WanSong v1.0 技术报告发布：纯扩散模型实现5分钟双轨歌曲生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14749", "date": "2026-07-16T00:00:00.000Z", "summary": "WanSong 是一个纯扩散模型，可直接生成长达5分钟、支持多语言的高保真歌曲，并一次性输出人声和背景音乐双音轨。该框架通过步蒸馏实现更快的推理速度，并为下游编辑任务提供高效的微调和定制路径。", "type": "paper", "relTime": "6天前"}, {"id": 180, "title": "Resource2Skill：从人类创建的多模态资源中蒸馏可执行智能体技能", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.29538", "date": "2026-07-16T00:00:00.000Z", "summary": "微软研究院等机构提出 Resource2Skill 框架，能从教程视频、代码仓库、文档等多模态资源中自动蒸馏出可复用的智能体技能，并组织成层级化 Skill Wiki。该框架覆盖幻灯片设计、网页生成、Excel 表格、Blender 场景、CAD 设计、UE5 场景构建和音乐制作七个创意软件领域。实验表明，技能访问在多个模型后端和领域上持续提升了智能体性能。", "type": "paper", "relTime": "6天前"}, {"id": 181, "title": "TrajLoc 与 SeqGeo-VL 发布：轨迹感知的跨视角地理定位支持视频与文本查询", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15491", "date": "2026-07-16T00:00:00.000Z", "summary": "研究团队提出 TrajLoc 统一框架，支持通过视频片段或路线描述进行跨视角地理定位，并发布包含 38，863 个视频-文本-卫星三元组的 SeqGeo-VL 数据集。TrajLoc 引入轻量级 TrajMod 模块，利用轨迹几何信息调制查询嵌入以生成空间感知表示，在视频和文本地理定位任务上均显著超越现有方法。代码、模型权重和数据集已开源。", "type": "paper", "relTime": "6天前"}, {"id": 182, "title": "Thinking Machines Lab 发布 Inkling：975B 参数开源多模态 MoE 模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/15/thinking-machines-lab-releases-inkling-a-975b-parameter-open-weights-multimodal-moe-with-41b-active-parameters-and-controllable-thinking-effort", "date": "2026-07-15T23:48:58.000Z", "summary": "Thinking Machines Lab 于 7 月 15 日发布其首个从头训练的模型 Inkling，采用 Apache 2.0 协议开源完整权重。该模型为 975B 参数 MoE Transformer，41B 活跃参数，支持 1M token 上下文窗口及文本、图像、音频输入，核心差异化在于可控思考深度。", "type": "model", "relTime": "6天前"}, {"id": 183, "title": "苹果 Apple 智能通过备案，阿里千问将集成至国行 iPhone；小米开源具身通用模型 Xiaomi-Robotics-U0", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/275.htm", "date": "2026-07-15T23:28:20.000Z", "summary": "网信部门新增\"Apple 智能\"等7款手机端侧生成式AI服务备案，阿里千问将作为AI能力集成至Apple 智能，国行iPhone AI功能上线在即。小米开源具身领域首个统一生成模型Xiaomi-Robotics-U0，在WorldArena评测基准上以126个模型参评取得总分第一。华为2026年智能手机出货目标提升20%以上至6000万部，第二季度在华市场份额达23%。", "type": "industry", "relTime": "6天前"}, {"id": 184, "title": "英伟达与丰田扩大合作，基于NVIDIA DRIVE AGX开发L2++辅助驾驶汽车", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/272.htm", "date": "2026-07-15T23:18:27.000Z", "summary": "丰田与英伟达扩大合作，将采用搭载NVIDIA DriveOS的NVIDIA DRIVE AGX平台开发下一代汽车，实现L2++驾驶辅助功能。双方还将物理AI应用拓展至机器人、智慧城市等领域，丰田子公司Woven by Toyota使用NVIDIA H100 GPU开发了多模态视觉语言模型Woven City AI Vision Engine，用于城市交通智能分析。", "type": "industry", "relTime": "6天前"}, {"id": 185, "title": "xAI 起诉一名男子使用 Grok 生成儿童性虐待材料深度伪造内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/966293/xai-grok-user-lawsuit-csam", "date": "2026-07-15T21:33:20.000Z", "summary": "xAI 起诉南卡罗来纳州男子 Terry Wayne Harwood，指控其\"明知且故意\"使用 Grok AI 聊天机器人绕过安全措施、生成并传播儿童性虐待材料（CSAM），违反公司政策。Harwood 已于今年 2 月因涉嫌持有和传播 CSAM 被捕，面临八项重罪指控。xAI 在诉讼中称，与 Harwood 刑事指控相关的\"至少部分\"图像系使用 Grok 生成或篡改。", "type": "industry", "relTime": "6天前"}, {"id": 186, "title": "阶跃星辰 StepFun 3.7 Flash 上线 P0 平台", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077503365500874800", "date": "2026-07-15T21:19:35.000Z", "summary": "阶跃星辰与 P0 Systems 合作，将其旗舰多模态推理模型 StepFun 3.7 Flash 部署至 P0 平台。该模型支持 256K 上下文窗口、原生图像与视频理解及完整工具调用，限时免费向所有 P0 用户开放，可通过 Peezy CLI 和网关使用。", "type": "model", "relTime": "6天前"}, {"id": 187, "title": "Stanford与NVIDIA联合推出RoboTTT，原生扩展机器人策略上下文窗口至8000时间步", "source": "X：Fei-Fei Li (@drfeifei, World Labs)", "sourceUrl": "https://x.com/drfeifei/status/2077497317255737422", "date": "2026-07-15T20:55:33.000Z", "summary": "RoboTTT在模型内部嵌入微型网络，每帧传感器数据触发一次梯度更新，将历史压缩进固定大小的隐藏状态，实现持续学习且推理成本不变。8K上下文预训练性能比1K提升62%，从128到8K步的闭环性能持续爬升无饱和迹象，支持从人类视频进行一次性模仿学习。", "type": "paper", "relTime": "6天前"}, {"id": 188, "title": "Thinky发布多模态模型Inkling，训练成本约$10-20M", "source": "X：Emad Mostaque (@EMostaque)", "sourceUrl": "https://x.com/EMostaque/status/2077488972733808803", "date": "2026-07-15T20:22:23.000Z", "summary": "Thinky Machines发布Inkling模型，支持文本、图像、音频多模态推理，并开放完整权重。Emad Mostaque估算其训练算力约1e25 FLOPs（与DeepSeek V4相当），在2k块GB300芯片上运行1个月，成本约$10-20M。Lite版本算力约4倍更低，接近DeepSeek V3的3e24 FLOPs。", "type": "tip", "relTime": "6天前"}, {"id": 189, "title": "Fountain 0 用 AI 生成《奥德赛》改编电影《Odysseus： The Fall》", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/entertainment/965616/ash-koosha-odysseus-the-fall-foundtain-zero-tilly-norwood", "date": "2026-07-15T20:00:00.000Z", "summary": "电影工作室 Fountain 0 宣布正在制作一部 AI 生成的《奥德赛》改编电影《Odysseus： The Fall》，试图借克里斯托弗·诺兰新片《奥德赛》的热度吸引关注。这类 AI 生成电影被视为新时代的\"直接发行视频\"式低成本快钱项目。", "type": "tip", "relTime": "6天前"}, {"id": 190, "title": "Inkling 发布：开放权重 975B 参数多模态 MoE 模型，41B 活跃参数", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://thinkingmachines.ai/inkling", "date": "2026-07-15T19:21:30.493Z", "summary": "Inkling 是一款开放权重的 975B 总参数（41B 活跃参数）MoE 大语言模型，支持文本、图像和音频输入，上下文窗口达 1M tokens。该模型在知识、数学、科学及智能体编程任务上表现均衡，并具备可控思考时间与校准置信度预测功能。用户可通过 Tinker 平台对 Inkling 进行微调，模型权重已在 Hugging Face 开放。", "type": "model", "relTime": "6天前"}, {"id": 191, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077472478499053846", "date": "2026-07-15T19:16:51.000Z", "summary": "Thinking Machines Lab 发布其首个完全训练并开源权重的基座模型 Inkling。该模型总参数量 975B，每 token 激活 41B，支持文本、图像、音频推理，上下文窗口达 1M token，并支持可控推理成本。完整权重已开放，开发者可通过 Tinker 平台进行微调。", "type": "model", "relTime": "6天前"}, {"id": 192, "title": "Thinking Machines 开源多模态模型 Inkling", "source": "X：Lilian Weng (@lilianweng)", "sourceUrl": "https://x.com/lilianweng/status/2077471903032528912", "date": "2026-07-15T19:14:33.000Z", "summary": "Thinking Machines 发布开源权重模型 Inkling，支持文本、图像和音频模态的高效推理。完整权重已开放，可在 Tinker 平台进行微调。", "type": "model", "relTime": "6天前"}, {"id": 193, "title": "Thinking Machines发布975B MoE开源模型Inkling", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2077470616832127423", "date": "2026-07-15T19:09:27.000Z", "summary": "Thinking Machines发布开源多模态MoE模型Inkling，总参数量975B（41B激活），原生支持文本、图像和音频模态，提供64K和256K两种上下文长度。完整权重已开放，可在Tinker平台微调并在Inkling Playground体验。", "type": "model", "relTime": "6天前"}, {"id": 194, "title": "Gemini东南亚报告：用户翻倍，多模态占比42%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077465612226531586", "date": "2026-07-15T18:49:34.000Z", "summary": "Google 发布首份 Gemini 东南亚报告，该地区用户量在过去 12 个月翻倍，新加坡人均采用率全球最高，用户日均交互约 10 次。42% 的提示词已包含语音、图像、视频等多模态输入，70% 的提示词使用本地语言撰写。印尼 82% 的提示词来自手机，越南每月超 16 万学生使用 Exam Prep 功能。", "type": "industry", "relTime": "6天前"}, {"id": 195, "title": "Thinking Machines 发布生产级语言模型 Inkling，成美国实验室最强开源模型", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077461348079001716", "date": "2026-07-15T18:32:37.000Z", "summary": "Thinking Machines 发布首个生产级语言模型 Inkling，总参数量 975B，激活 41B，支持文本、图像和音频多模态输入。该模型在 Artificial Analysis Intelligence Index 上以 41 分成为美国实验室最强开源模型，超越 Nemotron 3 Ultra（38 分）和 Gemma 4 31B（29 分）。", "type": "model", "relTime": "6天前"}, {"id": 196, "title": "Thinky 发布开源多模态模型 Inkling", "source": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2077455354594836834", "date": "2026-07-15T18:08:48.000Z", "summary": "Thinky 发布 Inkling，一个高效处理文本、图像和音频的多模态推理模型，并开放完整权重。该模型即日起可在 Tinker 平台微调，并可通过 Inkling Playground 体验。Nathan Lambert 称赞这种开源发布方式，认为其有望取得类似 Tinker 的成功。", "type": "model", "relTime": "6天前"}, {"id": 197, "title": "Thinking Machines 发布多模态模型 Inkling", "source": "X：Thinking Machines (@thinkymachines)", "sourceUrl": "https://x.com/thinkymachines/status/2077454609551921208", "date": "2026-07-15T18:05:50.000Z", "summary": "今天，我们推出 Inkling。  Inkling 能高效地对文本、图像和音频模态进行推理。我们将提供完整权重。  https://thinkingmachines.ai/news/introducing-inkling/  即日起可在 Tinker 上进行微调。在 Inkling Playground 中试用。🧵", "type": "model", "relTime": "6天前"}, {"id": 198, "title": "阶跃星辰 Step 3.7 Flash 上线 Baseten", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077447198728659223", "date": "2026-07-15T17:36:23.000Z", "summary": "阶跃星辰的 Step 3.7 Flash 模型已上线 Baseten 模型库。该模型为 198B 参数稀疏 MoE 架构（每 token 激活 11B），原生支持图像和视频输入，拥有 256K 上下文窗口，专为视觉推理、智能体编程和长上下文任务设计。", "type": "industry", "relTime": "6天前"}, {"id": 199, "title": "Moonshot AI 发布 PerceptionBench：多模态模型视觉感知能力诊断基准", "source": "Moonshot AI：Kimi Blog", "sourceUrl": "https://www.kimi.com/blog/perception-bench", "date": "2026-07-15T16:00:00.000Z", "summary": "Moonshot AI 发布 PerceptionBench，一个从 40 多个现有基准中模型实际失败案例归纳出的视觉感知基准，包含 10 项原子感知能力和 3000 道验证题。所有测试模型准确率均未超过 60%，且大量正确答案在重复提问时无法复现，表明模型更多是猜测而非真正感知。PerceptionBench 旨在精确诊断多模态 AI 的视觉感知断裂点，推动其实现忠实、一致的视觉理解。", "type": "paper", "relTime": "6天前"}, {"id": 200, "title": "预训练MLLM零样本奖励模型用于文生图", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2077420923410358343", "date": "2026-07-15T15:51:59.000Z", "summary": "Read It Back  预训练多模态大语言模型是文生图的零样本奖励模型", "type": "paper", "relTime": "6天前"}, {"id": 201, "title": "Apple Intelligence 获准在华上线，将集成阿里巴巴 Qwen 大模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai", "date": "2026-07-15T15:29:33.000Z", "summary": "中国网信办批准 Apple Intelligence 在华上线，苹果将把阿里巴巴的 Qwen 大模型集成至 iOS、iPadOS、macOS 及 visionOS 系统。该合作此前传闻已久，标志着苹果在关键市场的 AI 布局取得重要进展。阿里巴巴确认 Qwen 将被\"整合到 Apple Intelligence 体验中\"，提供文本与图像理解及生成等 AI 能力。", "type": "industry", "relTime": "6天前"}, {"id": 202, "title": "英伟达 Jim Fan 团队发布 RoboTTT，原生支持 8000 时间步上下文", "source": "X：Jim Fan (@DrJimFan)", "sourceUrl": "https://x.com/DrJimFan/status/2077414142340988962", "date": "2026-07-15T15:25:02.000Z", "summary": "英伟达高级科学家 Jim Fan 团队发布 RoboTTT，将机器人模型的原生上下文窗口扩展至 8000 个时间步（约 5 分钟肌肉记忆），推理成本不变。8K 上下文预训练性能比 1K 提升 62%，且性能随上下文增长持续提升无饱和迹象，支持从人类视频进行一次性上下文学习。", "type": "model", "relTime": "6天前"}, {"id": 203, "title": "Gemini 东南亚报告：用户翻倍，多模态驱动增长", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2077411104775406045", "date": "2026-07-15T15:12:58.000Z", "summary": "我们刚刚发布了首份 Gemini 东南亚报告（如下），3 个洞察：  1/ 活跃用户在过去一年翻了一番多 2/ 70% 的提示词以本地语言提交 3/ 40% 的提示词仅使用语音、图像或视频  Gemini 的本地语言能力 + 多模态功能 + 移动应用正在推动增长，我们很快将为该地区带来更多更新！  🇮🇩🇲🇾🇵🇭🇸🇬🇹🇭🇻🇳", "type": "industry", "relTime": "6天前"}, {"id": 204, "title": "PixVerse 推出 AI Game Engine 游戏引擎", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077405097546362919", "date": "2026-07-15T14:49:06.000Z", "summary": "PixVerse 发布 AI Game Eng var TYPE_COLORS = { "paper":"#6366f1", "model":"#0ea5e9", "product":"#f59e0b", "tip":"#10b981", "industry":"#ec4899" };
var TYPE_LABELS = { "paper":"论文", "model":"模型", "product":"产品", "tip":"技巧", "industry":"行业" };
function fmtDate(iso){ var d=new Date(iso); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function render(){
  var c=document.getElementById("timeline"); var html=""; var lastDate="";
  PAPERS.forEach(function(p,i){
    var dk=p.date.slice(0,10); var label=TYPE_LABELS[p.type]||"其他"; var color=TYPE_COLORS[p.type]||"#94a3b8";
    if(dk!==lastDate){ lastDate=dk; html+='<div class="timeline-group">'; html+='<div class="timeline-dot"></div>';
      html+='<div class="timeline-date"><span class="mini-dot"></span>'+fmtDate(p.date)+'</div>'; }
    var delay=(i*0.04).toFixed(2);
    html+=['<div class="card" style="animation-delay:'+delay+'s">','  <div class="card-header">',
      '    <div class="card-num">'+p.id+'</div>','    <div class="card-title-wrap">',
      '      <div class="card-title"><a href="'+p.sourceUrl+'" target="_blank" rel="noopener">'+_e(p.title)+'</a></div>',
      '      <div class="card-meta">','        <span class="badge" style="background:'+color+'18;color:'+color+'">'+label+'</span>',
      '        <span class="badge badge-source" title="'+_e(p.source)+'">'+_e(p.source)+'</span>',
      '        <span class="badge badge-time">'+p.relTime+'</span>','      </div>','    </div>','  </div>',
      '  <div class="card-summary">'+_e(p.summary)+'</div>',
      '  <a class="card-link" href="'+p.sourceUrl+'" target="_blank" rel="noopener">阅读原文 →</a>','</div>'].join("\n");
    var nextDate=PAPERS[i+1]?PAPERS[i+1].date.slice(0,10):null;
    if(dk!==nextDate){ html+='</div>'; }
  });
  c.innerHTML=html;
}
function _e(s){ var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
render();
</script>
