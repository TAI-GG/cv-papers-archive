urceUrl": "https://blog.lyc8503.net/en/post/llm-classifier", "date": "2026-07-16T20:40:36.733Z", "summary": "一项研究探索使用经典机器学习方法（如逻辑回归、随机森林）检测大型语言模型生成的文本，在特定数据集上达到与深度学习模型相当的准确率。该方法计算成本更低，且对短文本和改写文本具有较强鲁棒性。研究还发现，基于字符级n-gram特征的模型在跨领域泛化上表现优于基于词级特征的模型。", "type": "tip", "relTime": "3小时前"}, {"id": 7, "title": "小鹏智驾负责人谈物理AI未来方向", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077855037208859129", "date": "2026-07-16T20:37:00.000Z", "summary": "非常高兴能与小鹏汽车通用智能中心负责人、主导自动驾驶与AI研究的科学家刘宪铭坐下来交流。 我们进行了一场关于物理AI实际发展方向的精彩对话，我从中受益匪浅。完整视频即将上线，敬请期待。", "type": "tip", "relTime": "3小时前"}, {"id": 8, "title": "xAI 起诉 Grok 用户制作儿童性虐待内容，不再否认模型被滥用", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/tech-policy/2026/07/xai-cant-deny-grok-makes-csam-anymore-so-its-suing-users", "date": "2026-07-16T20:26:23.000Z", "summary": "xAI 首次对一名 Grok 用户提起诉讼，指控其利用该模型制作儿童性虐待图像（CSAM）。此前 xAI 一直否认 Grok 能生成此类内容，此次诉讼标志着其立场转变。案件聚焦用户滥用行为，而非模型本身的技术缺陷。", "type": "industry", "relTime": "3小时前"}, {"id": 9, "title": "Moonshot AI 发布 PerceptionBench：多模态模型视觉感知能力诊断基准", "source": "Moonshot AI：Kimi Blog", "sourceUrl": "https://www.kimi.com/blog/perception-bench", "date": "2026-07-16T19:11:01.192Z", "summary": "Moonshot AI 发布 PerceptionBench，一个从 40 多个现有基准中模型实际失败案例归纳出的视觉感知基准，包含 10 项原子感知能力和 3000 道验证题。所有测试模型准确率均未超过 60%，且大量正确答案在重复提问时无法复现，表明模型更多是猜测而非真正感知。PerceptionBench 旨在精确诊断多模态 AI 的视觉感知断裂点，推动其实现忠实、一致的视觉理解。", "type": "paper", "relTime": "4小时前"}, {"id": 10, "title": "Google Vids 更新：上传自拍和录音即可创建数字分身，并引入 Gemini Omni 多模态模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/google-vids-now-lets-you-star-in-your-own-ai-videos", "date": "2026-07-16T18:32:54.000Z", "summary": "Google 为 Vids 推出数字分身功能，用户上传自拍和录音即可生成外观和声音与本人一致的 AI 头像。同时，多模态模型 Gemini Omni 被引入 Vids，支持结合文字提示和参考图片生成视频，并能逐步编辑、替换背景或调整光线。新头像与 Google 账号绑定，并带有 SynthID 隐形水印，仅限 18 岁以上特定地区用户使用。", "type": "model", "relTime": "5小时前"}, {"id": 11, "title": "Roblox 在移动端推出 AI 游戏创建功能\"Build\"", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/roblox-launches-an-ai-powered-game-creation-feature-in-its-mobile-app", "date": "2026-07-16T18:22:06.000Z", "summary": "Roblox 发布新功能\"Build\"，允许用户通过手机输入文字提示（如\"制作一个森林中的舒适冒险游戏\"）直接生成基础游戏，无需编程经验。该功能由开源和 Roblox 自有的 AI 模型驱动，可处理玩法、环境、角色、视觉风格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上用户开启公开 Alpha 测试，并提供免费基础版和付费选项。", "type": "model", "relTime": "5小时前"}, {"id": 12, "title": "Gemini 数字头像功能上线，一键生成自拍", "source": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2077812539480748035", "date": "2026-07-16T17:48:07.000Z", "summary": "Avatar 🤝 Nano Banana  从今天起，将你自己置于不同场景、风格或时代变得更加快速和便捷。在 Gemini 中一次性设置好你的数字头像，即可无缝创建自定义个人图像，无需每次都上传自拍照。", "type": "paper", "relTime": "6小时前"}, {"id": 13, "title": "商汤WAIC发布旗舰原生多模态模型SenseNova U1 PRO", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077807112273707455", "date": "2026-07-16T17:26:34.000Z", "summary": "商汤科技在WAIC发布旗舰原生多模态基础模型SenseNova U1 PRO，专为图像创作设计。现场设有40多个沉浸式技术展位，并展示搭载具身智能、具备\"大脑\"的SenseMART Go机器人。", "type": "industry", "relTime": "6小时前"}, {"id": 14, "title": "德国监管机构首次将 Google AI Overviews 与 Perplexity 纳入媒体法管辖", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/germany-puts-googles-ai-overviews-and-perplexity-under-media-law-in-first-of-its-kind-ruling", "date": "2026-07-16T16:12:26.000Z", "summary": "德国媒体监管机构 ZAK 首次将 AI 搜索引擎和聊天机器人认定为内容提供者，对 Google 和 Perplexity 发布裁决。ZAK 认为《数字服务法》的责任豁免不适用于 AI 生成内容，因其属于独立创作而非第三方内容再分发。Google 被指控利用 AI 摘要的优先展示位置，将传统链接（尤其是新闻来源）推至后台，违反了媒体法中的透明度和反歧视规定。", "type": "industry", "relTime": "7小时前"}, {"id": 15, "title": "Google Vids 上线 Gemini Omni 与个人数字分身功能", "source": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/workspace/gemini-omni-personal-avatars", "date": "2026-07-16T16:00:00.000Z", "summary": "Google Vids 推出两项更新：Gemini Omni 支持用户通过自然语言提示词和图片参考生成、逐步编辑高质量视频片段；个人数字分身功能允许用户上传自拍和语音录制后，输入文字即可让数字分身出镜。两项功能面向 Google AI Pro 和 Ultra 订阅者及 Google Workspace 商业客户开放，所有生成内容均含不可见的 SynthID 数字水印。", "type": "paper", "relTime": "7小时前"}, {"id": 16, "title": "PixVerse 推出 AI 互动直播体验 Live Party", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077784321180713352", "date": "2026-07-16T15:56:00.000Z", "summary": "PixVerse 推出 PixVerse Live Party，一种早期互动直播式体验，由 AI 粉丝主持人 Reina 驱动。该实验性项目探索 AI 视频从生成质量转向用户参与的可能性，展示了 AI 娱乐超越简单视频生成的潜在方向。", "type": "paper", "relTime": "7小时前"}, {"id": 17, "title": "Kimi K3 着色器测试：生成新哥特式海洋城市", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2077783731691995348", "date": "2026-07-16T15:53:39.000Z", "summary": "Ethan Mollick 用 Kimi K3 运行着色器测试，提示词为\"生成一座部分淹没在暴风雨海洋中的新哥特式塔楼无限城\"，并追加\"让它更好\"。Kimi K3 表现优秀，虽未达到 Sol Max 或 Fable 的水平，但作为开源权重模型表现出色。", "type": "tip", "relTime": "7小时前"}, {"id": 18, "title": "Kimi 3一句话生成博朗3D录音机，质感交互惊艳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077760058516238743", "date": "2026-07-16T14:19:35.000Z", "summary": "Kimi 3仅凭一句提示词即可生成博朗3D录音机模型，质感和交互一气呵成。用户称其直接吊打头部模型，无需复杂Prompt。", "type": "tip", "relTime": "9小时前"}, {"id": 19, "title": "Kimi 3 3D建模能力吊打前代与竞品", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077756166353117402", "date": "2026-07-16T14:04:07.000Z", "summary": "Kimi 3在3D建模和CAD领域实现重大突破，其质感与交互流畅度直接超越头部模型。相比上一代Kimi 2.7，相同提示词下Kimi 3生成效果显著提升，用户无需复杂提示词即可获得高质量3D输出。", "type": "tip", "relTime": "9小时前"}, {"id": 20, "title": "面壁智能Build Small黑客马拉松获奖项目", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2077755420610101705", "date": "2026-07-16T14:01:09.000Z", "summary": "🏆 Build Small 黑客马拉松获奖者 - OpenBMB 奖项：🥇爷爷的睡前故事 👴  恭喜以 2，500 美元奖金赢得千词木赛道第一名！🎉  图像可以捕捉瞬间，但背后的故事等待被探索。该项目利用 AI 将视觉内容转化为互动叙事体验，创造分享和体验故事的新方式。👇", "type": "industry", "relTime": "9小时前"}, {"id": 21, "title": "生数科技入选工信部2025年人工智能应用典型案例", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/DUg4enEao_ltbEsy9zX5iA", "date": "2026-07-16T12:01:17.000Z", "summary": "生数科技申报的\"国产化高性能多模态通用大模型创新应用\"入选工信部《2025年人工智能应用典型案例名单》技术底座方向。在数字世界，Vidu支持文生视频、图生视频、参考生视频，实时交互模型Vidu S1实现数字角色实时交互；在物理世界，Motubrain打造具身智能通用大脑。", "type": "industry", "relTime": "11小时前"}, {"id": 22, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/ex-openai-cto-muratis-thinking-machines-drops-inkling-a-975b-parameter-model-that-leads-us-labs-but-trails-china", "date": "2026-07-16T09:55:28.000Z", "summary": "Thinking Machines Lab 发布开源多模态模型 Inkling，总参数 9750 亿（活跃 410 亿），原生支持文本、图像、音频及百万 token 上下文。该模型在 Artificial Analysis Intelligence Index 上以 41 分领跑美国开源模型，但事实准确率仅 40%，幻觉率高达 63%。", "type": "model", "relTime": "13小时前"}, {"id": 23, "title": "生数科技 WAIC 展区开放，可现场体验 Vidu S1 实时互动与 AI 视频生成", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/o7ZBULUpNsiCyj8AtHD_qQ", "date": "2026-07-16T08:59:33.000Z", "summary": "生数科技在 WAIC 展区（上海西岸国际会展中心 X1B-301，7 月 17 日-20 日）开放三项互动活动。参与者可现场体验 Vidu S1 与 AI 角色实时互动，或扫码注册 Vidu 账号完成视频生成并发布至社交平台，领取限量礼品。", "type": "industry", "relTime": "14小时前"}, {"id": 24, "title": "华为靳玉志：L3 与 L4 规模商用预计 2027 年、2028 年实现", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/584.htm", "date": "2026-07-16T08:53:04.000Z", "summary": "华为靳玉志预计，L3 规模商用将在 2027 年实现，L4 2B（Robotaxi 部分城市试点）与 L4 2C（低速 L4 部分城市商用）同年开启；2028 年 Robotaxi 或迎来部分城市商用。工信部 6 月已就首部针对 L3/L4 的强制性国家标准公开征求意见，要求自动驾驶系统安全水平至少达到\"合格且专注驾驶人\"水平。", "type": "industry", "relTime": "14小时前"}, {"id": 25, "title": "用提示词给Codex换主题，QQ皮肤历史重演", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2077660576655032678", "date": "2026-07-16T07:44:17.000Z", "summary": "用户通过提示词\"读取这个库，给我们当前codex换个主题，用Codex内置imagen生成\"，利用GitHub上的Codex-Dream-Skin库为Codex设计主题。这一操作被类比为当年QQ皮肤自定义的历史重演，做法简单，仅需一条指令即可调用内置图像生成模型完成主题更换。", "type": "tip", "relTime": "16小时前"}, {"id": 26, "title": "阿里云EMR Serverless Spark推出AI Functions，SQL分析自动驾驶影像", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077611393272951202", "date": "2026-07-16T04:28:50.000Z", "summary": "阿里云在EMR Serverless Spark中推出AI Functions，将多模态AI能力集成至数据管道，无需模型工程即可用SQL分析自动驾驶摄像头画面。该功能可在数秒内分析5张高分辨率前视图像，识别环岛、警车、皮卡、起重机等目标，实现自动化分析。", "type": "model", "relTime": "19小时前"}, {"id": 27, "title": "Mira Murati 新公司推出 975B 开源模型 Inkling", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2077603550868422737", "date": "2026-07-16T03:57:41.000Z", "summary": "前 OpenAI CTO Mira Murati 创立的 Thinking Machine 发布首款模型 Inkling。该模型采用 MoE 架构，总参数量 975B，激活参数 41B，拥有 1M 上下文窗口，在 45T 数据上训练，原生支持文本、图像和音频多模态理解。同时推出激活参数 12B 的 Small 预览版，模型完全开源，后训练数据从 Kimi 2.5 等开源模型蒸馏得到。", "type": "model", "relTime": "19小时前"}, {"id": 28, "title": "阿里云AgenticTalks探讨企业级AI视频制作", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077603351802327458", "date": "2026-07-16T03:56:53.000Z", "summary": "大多数AI视频工具可以生成一个片段。但从原始脚本到成品视频--在企业规模上--需要什么？  #AgenticTalks 第1集--7月23日，在阿里云上直播。  注册 → https://int.alibabacloud.com/m/1000415408/  #AlibabaCloud #AIVideo #AIAgent", "type": "industry", "relTime": "19小时前"}, {"id": 29, "title": "中国AI实验室收入达26亿美元，追赶美国巨头", "source": "X：Deedy Das (@deedydas)", "sourceUrl": "https://x.com/deedydas/status/2077573945759572196", "date": "2026-07-16T02:00:02.000Z", "summary": "中国五大独立AI实验室（Kimi、DeepSeek、智谱、快手可灵、MiniMax）及两大云厂商（字节Seedance、阿里Qwen）合计年化收入达26亿美元，其中4家已跻身全球AI公司收入前25。随着Kimi K3发布和Seedance 2.5即将推出，中国在LLM领域持续缩小差距，并在视频生成方面保持领先。", "type": "tip", "relTime": "21小时前"}, {"id": 30, "title": "天工短剧工作台发布\"Agent智能分镜+无限画布\"双轨创作模式", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/WlGAeogkF_N5122nHA0TtQ", "date": "2026-07-16T02:00:00.000Z", "summary": "天工短剧工作台推出双轨创作模式，通过导演Agent自动解析剧本、规划站位与机位，并支持多视细节图生成，解决AI短剧角色变脸和站位漂移问题。该工具内置影视级提示词模板、720°全景图及3D导演台，实现可控生产。已有三部作品上线DramaWave 7天实现百万美元级营收。", "type": "paper", "relTime": "21小时前"}, {"id": 31, "title": "xAI 起诉 Grok 用户滥用 AI 生成儿童性虐待材料", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/289.htm", "date": "2026-07-16T00:14:37.000Z", "summary": "xAI 起诉南卡罗来纳州男子特里·哈伍德，指控其滥用 Grok 生成儿童性虐待材料及未经同意的色情深度伪造内容。xAI 称 2026 年已暂停 52222 个账户，向美国国家失踪与受虐儿童中心提交 73604 份报告，促成至少 244 人被捕。xAI 要求法院判令哈伍德支付赔偿金并永久禁止其使用 Grok。", "type": "industry", "relTime": "23小时前"}, {"id": 32, "title": "OpenRouter 统一多模态 API：Chat、图像生成、嵌入与转录共用同一端点", "source": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/every-modality-one-api", "date": "2026-07-16T00:00:00.000Z", "summary": "OpenRouter 将 Chat、图像生成、嵌入和转录四种模态统一到单一 base URL 下，用户只需切换模型字符串和内容类型，无需管理多个 SDK、账单和认证方案。同一套路由控制可跨所有模态复用，大幅降低多模态开发集成成本。", "type": "model", "relTime": "23小时前"}, {"id": 33, "title": "Thinking Machines Lab 发布 Inkling：975B 参数开源多模态 MoE 模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/15/thinking-machines-lab-releases-inkling-a-975b-parameter-open-weights-multimodal-moe-with-41b-active-parameters-and-controllable-thinking-effort", "date": "2026-07-15T23:48:58.000Z", "summary": "Thinking Machines Lab 于 7 月 15 日发布其首个从头训练的模型 Inkling，采用 Apache 2.0 协议开源完整权重。该模型为 975B 参数 MoE Transformer，41B 活跃参数，支持 1M token 上下文窗口及文本、图像、音频输入，核心差异化在于可控思考深度。", "type": "model", "relTime": "1天前"}, {"id": 34, "title": "苹果 Apple 智能通过备案，阿里千问将集成至国行 iPhone；小米开源具身通用模型 Xiaomi-Robotics-U0", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/275.htm", "date": "2026-07-15T23:28:20.000Z", "summary": "网信部门新增\"Apple 智能\"等7款手机端侧生成式AI服务备案，阿里千问将作为AI能力集成至Apple 智能，国行iPhone AI功能上线在即。小米开源具身领域首个统一生成模型Xiaomi-Robotics-U0，在WorldArena评测基准上以126个模型参评取得总分第一。华为2026年智能手机出货目标提升20%以上至6000万部，第二季度在华市场份额达23%。", "type": "industry", "relTime": "1天前"}, {"id": 35, "title": "英伟达与丰田扩大合作，基于NVIDIA DRIVE AGX开发L2++辅助驾驶汽车", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/272.htm", "date": "2026-07-15T23:18:27.000Z", "summary": "丰田与英伟达扩大合作，将采用搭载NVIDIA DriveOS的NVIDIA DRIVE AGX平台开发下一代汽车，实现L2++驾驶辅助功能。双方还将物理AI应用拓展至机器人、智慧城市等领域，丰田子公司Woven by Toyota使用NVIDIA H100 GPU开发了多模态视觉语言模型Woven City AI Vision Engine，用于城市交通智能分析。", "type": "industry", "relTime": "1天前"}, {"id": 36, "title": "xAI 起诉一名男子使用 Grok 生成儿童性虐待材料深度伪造内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/966293/xai-grok-user-lawsuit-csam", "date": "2026-07-15T21:33:20.000Z", "summary": "xAI 起诉南卡罗来纳州男子 Terry Wayne Harwood，指控其\"明知且故意\"使用 Grok AI 聊天机器人绕过安全措施、生成并传播儿童性虐待材料（CSAM），违反公司政策。Harwood 已于今年 2 月因涉嫌持有和传播 CSAM 被捕，面临八项重罪指控。xAI 在诉讼中称，与 Harwood 刑事指控相关的\"至少部分\"图像系使用 Grok 生成或篡改。", "type": "industry", "relTime": "1天前"}, {"id": 37, "title": "阶跃星辰 StepFun 3.7 Flash 上线 P0 平台", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077503365500874800", "date": "2026-07-15T21:19:35.000Z", "summary": "阶跃星辰与 P0 Systems 合作，将其旗舰多模态推理模型 StepFun 3.7 Flash 部署至 P0 平台。该模型支持 256K 上下文窗口、原生图像与视频理解及完整工具调用，限时免费向所有 P0 用户开放，可通过 Peezy CLI 和网关使用。", "type": "model", "relTime": "1天前"}, {"id": 38, "title": "Stanford与NVIDIA联合推出RoboTTT，原生扩展机器人策略上下文窗口至8000时间步", "source": "X：Fei-Fei Li (@drfeifei, World Labs)", "sourceUrl": "https://x.com/drfeifei/status/2077497317255737422", "date": "2026-07-15T20:55:33.000Z", "summary": "RoboTTT在模型内部嵌入微型网络，每帧传感器数据触发一次梯度更新，将历史压缩进固定大小的隐藏状态，实现持续学习且推理成本不变。8K上下文预训练性能比1K提升62%，从128到8K步的闭环性能持续爬升无饱和迹象，支持从人类视频进行一次性模仿学习。", "type": "paper", "relTime": "1天前"}, {"id": 39, "title": "Thinky发布多模态模型Inkling，训练成本约$10-20M", "source": "X：Emad Mostaque (@EMostaque)", "sourceUrl": "https://x.com/EMostaque/status/2077488972733808803", "date": "2026-07-15T20:22:23.000Z", "summary": "Thinky Machines发布Inkling模型，支持文本、图像、音频多模态推理，并开放完整权重。Emad Mostaque估算其训练算力约1e25 FLOPs（与DeepSeek V4相当），在2k块GB300芯片上运行1个月，成本约$10-20M。Lite版本算力约4倍更低，接近DeepSeek V3的3e24 FLOPs。", "type": "tip", "relTime": "1天前"}, {"id": 40, "title": "Fountain 0 用 AI 生成《奥德赛》改编电影《Odysseus： The Fall》", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/entertainment/965616/ash-koosha-odysseus-the-fall-foundtain-zero-tilly-norwood", "date": "2026-07-15T20:00:00.000Z", "summary": "电影工作室 Fountain 0 宣布正在制作一部 AI 生成的《奥德赛》改编电影《Odysseus： The Fall》，试图借克里斯托弗·诺兰新片《奥德赛》的热度吸引关注。这类 AI 生成电影被视为新时代的\"直接发行视频\"式低成本快钱项目。", "type": "tip", "relTime": "1天前"}, {"id": 41, "title": "Inkling 发布：开放权重 975B 参数多模态 MoE 模型，41B 活跃参数", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://thinkingmachines.ai/inkling", "date": "2026-07-15T19:21:30.493Z", "summary": "Inkling 是一款开放权重的 975B 总参数（41B 活跃参数）MoE 大语言模型，支持文本、图像和音频输入，上下文窗口达 1M tokens。该模型在知识、数学、科学及智能体编程任务上表现均衡，并具备可控思考时间与校准置信度预测功能。用户可通过 Tinker 平台对 Inkling 进行微调，模型权重已在 Hugging Face 开放。", "type": "model", "relTime": "1天前"}, {"id": 42, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077472478499053846", "date": "2026-07-15T19:16:51.000Z", "summary": "Thinking Machines Lab 发布其首个完全训练并开源权重的基座模型 Inkling。该模型总参数量 975B，每 token 激活 41B，支持文本、图像、音频推理，上下文窗口达 1M token，并支持可控推理成本。完整权重已开放，开发者可通过 Tinker 平台进行微调。", "type": "model", "relTime": "1天前"}, {"id": 43, "title": "Thinking Machines 开源多模态模型 Inkling", "source": "X：Lilian Weng (@lilianweng)", "sourceUrl": "https://x.com/lilianweng/status/2077471903032528912", "date": "2026-07-15T19:14:33.000Z", "summary": "Thinking Machines 发布开源权重模型 Inkling，支持文本、图像和音频模态的高效推理。完整权重已开放，可在 Tinker 平台进行微调。", "type": "model", "relTime": "1天前"}, {"id": 44, "title": "Thinking Machines发布975B MoE开源模型Inkling", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2077470616832127423", "date": "2026-07-15T19:09:27.000Z", "summary": "Thinking Machines发布开源多模态MoE模型Inkling，总参数量975B（41B激活），原生支持文本、图像和音频模态，提供64K和256K两种上下文长度。完整权重已开放，可在Tinker平台微调并在Inkling Playground体验。", "type": "model", "relTime": "1天前"}, {"id": 45, "title": "Gemini东南亚报告：用户翻倍，多模态占比42%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077465612226531586", "date": "2026-07-15T18:49:34.000Z", "summary": "Google 发布首份 Gemini 东南亚报告，该地区用户量在过去 12 个月翻倍，新加坡人均采用率全球最高，用户日均交互约 10 次。42% 的提示词已包含语音、图像、视频等多模态输入，70% 的提示词使用本地语言撰写。印尼 82% 的提示词来自手机，越南每月超 16 万学生使用 Exam Prep 功能。", "type": "industry", "relTime": "1天前"}, {"id": 46, "title": "Thinking Machines 发布生产级语言模型 Inkling，成美国实验室最强开源模型", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077461348079001716", "date": "2026-07-15T18:32:37.000Z", "summary": "Thinking Machines 发布首个生产级语言模型 Inkling，总参数量 975B，激活 41B，支持文本、图像和音频多模态输入。该模型在 Artificial Analysis Intelligence Index 上以 41 分成为美国实验室最强开源模型，超越 Nemotron 3 Ultra（38 分）和 Gemma 4 31B（29 分）。", "type": "model", "relTime": "1天前"}, {"id": 47, "title": "Thinky 发布开源多模态模型 Inkling", "source": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2077455354594836834", "date": "2026-07-15T18:08:48.000Z", "summary": "Thinky 发布 Inkling，一个高效处理文本、图像和音频的多模态推理模型，并开放完整权重。该模型即日起可在 Tinker 平台微调，并可通过 Inkling Playground 体验。Nathan Lambert 称赞这种开源发布方式，认为其有望取得类似 Tinker 的成功。", "type": "model", "relTime": "1天前"}, {"id": 48, "title": "Thinking Machines 发布多模态模型 Inkling", "source": "X：Thinking Machines (@thinkymachines)", "sourceUrl": "https://x.com/thinkymachines/status/2077454609551921208", "date": "2026-07-15T18:05:50.000Z", "summary": "今天，我们推出 Inkling。  Inkling 能高效地对文本、图像和音频模态进行推理。我们将提供完整权重。  https://thinkingmachines.ai/news/introducing-inkling/  即日起可在 Tinker 上进行微调。在 Inkling Playground 中试用。🧵", "type": "model", "relTime": "1天前"}, {"id": 49, "title": "阶跃星辰 Step 3.7 Flash 上线 Baseten", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077447198728659223", "date": "2026-07-15T17:36:23.000Z", "summary": "阶跃星辰的 Step 3.7 Flash 模型已上线 Baseten 模型库。该模型为 198B 参数稀疏 MoE 架构（每 token 激活 11B），原生支持图像和视频输入，拥有 256K 上下文窗口，专为视觉推理、智能体编程和长上下文任务设计。", "type": "industry", "relTime": "1天前"}, {"id": 50, "title": "预训练MLLM零样本奖励模型用于文生图", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2077420923410358343", "date": "2026-07-15T15:51:59.000Z", "summary": "Read It Back  预训练多模态大语言模型是文生图的零样本奖励模型", "type": "paper", "relTime": "1天前"}, {"id": 51, "title": "Apple Intelligence 获准在华上线，将集成阿里巴巴 Qwen 大模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai", "date": "2026-07-15T15:29:33.000Z", "summary": "中国网信办批准 Apple Intelligence 在华上线，苹果将把阿里巴巴的 Qwen 大模型集成至 iOS、iPadOS、macOS 及 visionOS 系统。该合作此前传闻已久，标志着苹果在关键市场的 AI 布局取得重要进展。阿里巴巴确认 Qwen 将被\"整合到 Apple Intelligence 体验中\"，提供文本与图像理解及生成等 AI 能力。", "type": "industry", "relTime": "1天前"}, {"id": 52, "title": "英伟达 Jim Fan 团队发布 RoboTTT，原生支持 8000 时间步上下文", "source": "X：Jim Fan (@DrJimFan)", "sourceUrl": "https://x.com/DrJimFan/status/2077414142340988962", "date": "2026-07-15T15:25:02.000Z", "summary": "英伟达高级科学家 Jim Fan 团队发布 RoboTTT，将机器人模型的原生上下文窗口扩展至 8000 个时间步（约 5 分钟肌肉记忆），推理成本不变。8K 上下文预训练性能比 1K 提升 62%，且性能随上下文增长持续提升无饱和迹象，支持从人类视频进行一次性上下文学习。", "type": "model", "relTime": "1天前"}, {"id": 53, "title": "Gemini 东南亚报告：用户翻倍，多模态驱动增长", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2077411104775406045", "date": "2026-07-15T15:12:58.000Z", "summary": "我们刚刚发布了首份 Gemini 东南亚报告（如下），3 个洞察：  1/ 活跃用户在过去一年翻了一番多 2/ 70% 的提示词以本地语言提交 3/ 40% 的提示词仅使用语音、图像或视频  Gemini 的本地语言能力 + 多模态功能 + 移动应用正在推动增长，我们很快将为该地区带来更多更新！  🇮🇩🇲🇾🇵🇭🇸🇬🇹🇭🇻🇳", "type": "industry", "relTime": "1天前"}, {"id": 54, "title": "PixVerse 推出 AI Game Engine 游戏引擎", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077405097546362919", "date": "2026-07-15T14:49:06.000Z", "summary": "PixVerse 发布 AI Game Engine，通过 PixVerse Game 将实时生成视频、AI 智能体、游戏机制与用户定义世界结合，探索视频模型融入交互式游戏的可能性。该项目目前为早期技术实验，并非成熟平台，已开放体验地址并发放少量邀请码。", "type": "model", "relTime": "1天前"}, {"id": 55, "title": "Viggle AI 新游戏支持自定义对战场景", "source": "X：Viggle AI (@ViggleAI)", "sourceUrl": "https://x.com/ViggleAI/status/2077402970015015234", "date": "2026-07-15T14:40:38.000Z", "summary": "我们的游戏 Fight Anyone 3D 新增功能：场景 ⚔️  选择一个著名对决。挑选你的战士。然后观看竞技场、技能和特殊招式围绕这场对决生成。  埼玉 vs 悟空。C罗 vs 梅西。你 vs 你的朋友。开始对战 → → https://viggle.ai/games/app/", "type": "product", "relTime": "1天前"}, {"id": 56, "title": "Withings Body Scan 2 体重秤上市：可测高血压风险与细胞健康等 60 项指标，599.95 美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/216.htm", "date": "2026-07-15T11:57:37.000Z", "summary": "Withings Body Scan 2 体重秤正式上市，定价 599.95 美元，可测量包括高血压风险检测和细胞健康评估在内的 60 项人体指标。新机型将显示屏移至可拉出式把手上，新增阻抗心动描记技术（ICG）与生物电阻抗光谱分析（BIS）功能。所有数据由经临床验证的 AI 模型分析，生成高血压风险评估、血糖调节能力分析等健康洞察。", "type": "model", "relTime": "1天前"}, {"id": 57, "title": "阿里 Qwen 将集成至 Apple Intelligence，为中国用户提供 AI 功能", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077360556156309530", "date": "2026-07-15T11:52:06.000Z", "summary": "阿里巴巴的 Qwen 模型将集成至 Apple Intelligence，为中国用户提供 iOS、iPadOS、macOS 及 visionOS 上的文本与图像理解、内容生成等 AI 功能。中国网信办已公布包括 Apple Intelligence 在内的七项移动端生成式 AI 服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在评估多家中国公司后选择了阿里。", "type": "industry", "relTime": "1天前"}, {"id": 58, "title": "阿里千问将集成至苹果智能，服务中国用户", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077357348293939259", "date": "2026-07-15T11:39:21.000Z", "summary": "阿里千问将作为AI能力集成至Apple智能，为iOS、iPadOS、macOS和visionOS的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可使用。网信办同日发布7款手机端侧生成式AI服务备案信息，包括苹果智能、华为小艺大模型、OPPO AndesGPT大模型等。", "type": "industry", "relTime": "1天前"}, {"id": 59, "title": "阿里Qwen将集成至Apple Intelligence服务中国用户", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077346752219521469", "date": "2026-07-15T10:57:15.000Z", "summary": "阿里巴巴的Qwen模型将被集成到Apple Intelligence中，为中国的iOS、iPadOS、macOS和visionOS用户提供文本与图像理解、内容生成等AI功能。中国网信办已公布包括Apple Intelligence、华为小艺大模型、OPPO AndesGPT在内的七项移动端生成式AI服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在选定阿里前曾与多家中国公司洽谈。", "type": "industry", "relTime": "1天前"}, {"id": 60, "title": "Booster T2 人形机器人算力达 2070 TFLOPS", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077344548234391719", "date": "2026-07-15T10:48:30.000Z", "summary": "Booster T2 作为旗舰级具身开发平台，提供高达 2070 TFLOPS 算力，为双足人形机器人同类最高。开发者可将更多算力用于本地推理，运行更复杂的视觉与策略模型，同时消除网络延迟与连接中断风险。", "type": "model", "relTime": "1天前"}, {"id": 61, "title": "MengTo 开源 75 个 AI 智能体技能包，含设计指令与工作流", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2077335188666044426", "date": "2026-07-15T10:11:18.000Z", "summary": "设计师与开发者 MengTo 开源了包含 75 个 Skills 的项目，将设计指令、工作流和风格系统沉淀为可复用的 AI 智能体技能包。项目涵盖 10 个 Codex 工作流（如从参考视频一键生成 HTML）和 62 个网页设计技能，并提供\"design-first-ui-prompting\"方法论，通过固定 prompt 骨架和变体迭代提升输出质量。", "type": "tip", "relTime": "1天前"}, {"id": 62, "title": "豆包用户分享AI工作实践：项目经理、博物馆管理员、科研工作者等案例", "source": "公众号：豆包（字节）", "sourceUrl": "https://mp.weixin.qq.com/s/9KViDnf0pUAkm618wAyDbQ", "date": "2026-07-15T09:59:20.000Z", "summary": "不同行业从业者用豆包辅助工作，效果显著。项目经理处理项目文档和代码时修改量最小；自然博物馆管理员用豆包鉴定出化石具体属名，复查确认无误；数学老师用豆包生成3D几何模型和可缩放地图教具，备课时间减半。", "type": "tip", "relTime": "1天前"}, {"id": 63, "title": "消息称百度为苹果 Apple 智能提供 AI 搜索功能，阿里千问也将集成", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/164.htm", "date": "2026-07-15T09:54:50.000Z", "summary": "知情人士透露，百度正为苹果 Apple 智能开发基于 AI 的搜索功能，可处理图像和文本，并升级中国版 Siri。同时，阿里巴巴宣布阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等体验。Apple 智能大模型已于 2026 年 7 月 8 日备案，适用场景为苹果手机。", "type": "industry", "relTime": "1天前"}, {"id": 64, "title": "Airtap 定时任务：AI Agent 自动生成日报", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077324930698313985", "date": "2026-07-15T09:30:32.000Z", "summary": "Airtap 通过 iMessage 实现定时 Routine 功能，每天早九点自动在云手机中打开 TikTok，扫描八个中英赛道关键词、刷七十多条热门视频，输出包含赛道趋势、高价值创作者清单和内容技巧的结构化日报。用户无需再发指令，AI Agent 从单次执行升级为常驻的初级信息岗位，替用户完成机械重复的信息搜集工作，只留决策环节。", "type": "tip", "relTime": "1天前"}, {"id": 65, "title": "国行 Apple 智能完成备案，阿里千问将集成至苹果 AI 能力", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/109.htm", "date": "2026-07-15T08:41:23.000Z", "summary": "苹果技术开发（上海）有限公司的\"Apple 智能\"大模型已于 2026 年 7 月 8 日完成备案，适用场景为苹果手机。阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可直接体验。", "type": "industry", "relTime": "1天前"}, {"id": 66, "title": "火山引擎发布 Seedance 2.5，AI 视频生成支持 30 秒直出与 50 份全模态素材输入", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/tSfAoa30uuwPsR7XhVA2VA", "date": "2026-07-15T08:04:37.000Z", "summary": "Seedance 2.5 大幅提升多人运动场景下的人物一致性与动态表现，支持图片、音频、视频等全模态素材最高 50 份同时导入。模型新增二次编辑能力，可对已生成画面进行定向修改而无需整段重做；指令遵循支持时间戳精准响应，按秒对齐 Prompt 中的画面动作。Seedance 2.5 单段原生视频最长 30 秒，火山引擎将于近日上线其 API。", "type": "model", "relTime": "1天前"}, {"id": 67, "title": "阶跃星辰 WAIC 2026 展区亮点：Step 系列模型矩阵、Step AOS 及智能体手机 STEPX Neo 亮相", "source": "公众号：阶跃星辰（Step）", "sourceUrl": "https://mp.weixin.qq.com/s/WG8XxNHddjEblHCPgleWpw", "date": "2026-07-15T07:08:22.000Z", "summary": "阶跃星辰将在 WAIC 2026 展出 Step 系列模型矩阵，覆盖云端与端侧、多模态理解与生成能力。全球首个智能体原生操作系统 Step AOS 及荣获本届 WAIC\"镇馆之宝\"的智能体手机 STEPX Neo 首次线下公开亮相。此外，阶跃还携手吉利、千里科技升级汽车智能体，并与原力灵机发起 6 台机器人连续协作 15 小时拼装 8 万余块积木的极限挑战。", "type": "model", "relTime": "1天前"}, {"id": 68, "title": "小米开源 Xiaomi-Robotics-U0：380 亿参数多模态具身生成模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/012.htm", "date": "2026-07-15T06:52:33.000Z", "summary": "小米发布并开源 Xiaomi-Robotics-U0，一个 380 亿参数的多模态自回归具身生成基础模型，是具身领域首个\"通吃\"场景生成、具身迁移、机器人交互视频生成和通用文生图/图像编辑四类任务的统一模型。该模型在 WorldArena 评测基准上以匿名代号 UNIS 取得全球 126 个模型中的总分第一名，并通过 FlashAR+ 推理加速方案将生成效率提升近 83 倍。", "type": "model", "relTime": "1天前"}, {"id": 69, "title": "谷歌图片服务 25 周年，AI 概览新增 Nano Banana 生图功能", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/980.htm", "date": "2026-07-15T06:26:45.000Z", "summary": "谷歌庆祝图片服务上线 25 周年，在 AI 概览中新增图像生成功能，用户可直接调用最新的 Nano Banana 模型，将文本提示转化为原创的高质量自定义图像。该功能将在未来几周内陆续在英文版中推出，面向所有目前支持 AI 模式图像创建的地区。", "type": "model", "relTime": "1天前"}, {"id": 70, "title": "Airtap iMessage 新功能：发条短信让 AI 替你操作手机", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077217295504490992", "date": "2026-07-15T02:22:50.000Z", "summary": "Airtap 推出 iMessage 新功能，用户只需给美国号码发一条 iMessage，其云手机上的 AI Agent 就能通过视觉模拟点击，替用户完成 TikTok 刷视频、星巴克点单等操作，无需安装对应 App。其架构分为三层：大脑（理解指令）、AutoPilot（视觉操控屏幕）、云手机（24小时在线）。但支付等敏感操作仍需用户手动完成，信任与授权仍是所有 Agent 厂商的难题。", "type": "tip", "relTime": "1天前"}, {"id": 71, "title": "OpenMOSS 开源 MOSS-VL-Realtime 实时视频流多模态模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077187667025125579", "date": "2026-07-15T00:25:06.000Z", "summary": "OpenMOSS 开源了 11B 参数的 MOSS-VL-Realtime 模型，支持在视频持续输入时同步感知与生成，可边处理新帧边回复，并在场景变化时主动修改或中断回答。该模型采用 Cross-Attention 架构与 XRoPE 时空位置编码，支持 256K 上下文窗口，已以 Apache-2.0 协议开源。", "type": "model", "relTime": "1天前"}, {"id": 72, "title": "离散扩散模型统一框架：从分词到生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13431", "date": "2026-07-15T00:00:00.000Z", "summary": "离散去噪扩散模型（DDM）近期成为自回归建模的有力替代方案，支持并行生成与迭代全局精炼。该研究提出一个统一概念框架，通过底层离散状态空间的构建（分词方案、词汇拓扑、领域特定结构字母表）审视DDM，将转移矩阵、掩码/吸收态、评分/比率等方法纳入同一设计空间。框架揭示了训练目标、推理算法、扩展行为、系统优化与评估协议中的常见设计权衡，并指出若干未来研究方向。", "type": "paper", "relTime": "1天前"}, {"id": 73, "title": "Hallo4D：面向一致时空生成的多模态幻觉缓解框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12752", "date": "2026-07-15T00:00:00.000Z", "summary": "Hallo4D 提出一种无需重训练或修改架构的生成-检测-修正范式，利用大语言模型识别多视角渲染中的时空不一致性，并通过多模型投票引导图像空间一致性优化。该方法引入运动感知关键帧采样与外观对齐，在多种3D和4D生成设置中持续优于强基线，提供可扩展的泛化解。", "type": "paper", "relTime": "1天前"}, {"id": 74, "title": "GigaWorld-Policy-0.5：一种更快速、更强的高效世界动作模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13960", "date": "2026-07-15T00:00:00.000Z", "summary": "GigaWorld-Policy-0.5 是一种面向机器人控制的高效世界动作模型，训练时利用未来视觉动态，推理时仅解码动作，避免生成未来视频的计算开销。该模型采用混合训练策略与 Mixture-of-Transformers 架构，在本地 RTX 4090 上实现 85 ms 推理延迟。", "type": "paper", "relTime": "1天前"}, {"id": 75, "title": "仅需一层适配层：将预训练视觉编码器用于扩散模型图像生成", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/adapting-pretrained-visual-encoders", "date": "2026-07-15T00:00:00.000Z", "summary": "Apple 研究提出在预训练视觉编码器后添加一个轻量级适配层，即可直接用于扩散模型图像生成，无需重新训练整个编码器。该方法在 ImageNet 无条件生成任务上达到 1 FID，性能与专用编码器相当，且大幅降低计算成本。", "type": "paper", "relTime": "1天前"}, {"id": 76, "title": "阿里开源14B音乐舞蹈视频模型Wan-Dancer", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077177242107727986", "date": "2026-07-14T23:43:41.000Z", "summary": "阿里巴巴开源14B参数模型Wan-Dancer-14B，可本地运行，上传角色和歌曲即可生成与节拍同步的舞蹈视频。支持街舞、踢踏、拉丁、K-Pop、中式古典等多种风格，并能实现较长时间连贯输出。该模型将\"音乐→节奏→精准舞蹈动作\"的垂直能力做到可本地部署，大幅降低了内容创作者的使用门槛。", "type": "model", "relTime": "2天前"}, {"id": 77, "title": "Atomic Chat 将腾讯 Hy3 模型压缩至 1-bit 本地运行，速度超云 API 2.2 倍", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077166650697388052", "date": "2026-07-14T23:01:36.000Z", "summary": "Atomic Chat 将腾讯开源 295B 参数 MoE（21B 活跃参数）模型 Hy3 极端压缩至 1-bit，生成 92GB GGUF 文件。在 4 块 RTX 5090（128GB VRAM）上本地运行，速度达同模型云 API 的 2.2 倍。测试中，本地版与云 API 版均能通过单次提示词生成 Flappy Bird、Arkanoid 和 Snake 游戏，无崩溃或明显视觉差异。输...", "type": "model", "relTime": "2天前"}, {"id": 78, "title": "Simon Willison 在 Codex Desktop 中创建自定义宠物\"Pedalican\"", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/14/pedalican", "date": "2026-07-14T22:29:45.000Z", "summary": "Simon Willison 在 Codex Desktop 中意外激活了一个类似 Clippy 的动画机器人\"宠物\"，随后发现可以自定义创建。他通过 GPT-5.6 Sol xhigh 模型描述需求，并借助 gpt-image-2 多轮生成精灵素材，最终制作出一只骑自行车的小鹈鹕\"Pedalican\"，在桌面上弹跳并更新 Codex 任务状态。关键实现细节已开源，包括 openai/ski...", "type": "tip", "relTime": "2天前"}, {"id": 79, "title": "阿里Qwen-Audio-3.0-TTS-Plus登顶Artificial Analysis语音竞技场排行榜", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077140161335631957", "date": "2026-07-14T21:16:20.000Z", "summary": "阿里巴巴最新文本转语音模型Qwen-Audio-3.0-TTS-Plus在Artificial Analysis语音竞技场排行榜上以1，236 Elo分（±17）超越Simba 3.2（1，234分）、Gemini 3.1 Flash TTS（1，214分）和Sonic 3.5（1，207分），成为提供商语音类别新领头羊。该模型生成速度为每秒16个字符，低于竞品；定价为每百万字符27.59美...", "type": "model", "relTime": "2天前"}, {"id": 80, "title": "Bonsai 27B：首款可在手机上运行的27B级多模态模型", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://prismml.com/news/bonsai-27b", "date": "2026-07-14T19:51:19.560Z", "summary": "Bonsai 27B 基于 Qwen3.6 27B，提供三元（1.71 有效比特/权重，5.9 GB）和 1-bit（1.125 有效比特/权重，3.9 GB）两个变体，后者首次将 27B 级模型装入 iPhone 17 Pro。模型支持多步推理、结构化工具调用、视觉任务和计算机使用智能体循环，拥有 262K token 上下文窗口，支持推测解码加速。在 15 项基准测试中，三元变体保留全精...", "type": "model", "relTime": "2天前"}, {"id": 81, "title": "Google 在 I/O Connect India 展示由 Tensor SoC 和 TPU 驱动的 Pixel 10 端侧 AI 未来", "source": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/unlocking-the-next-era-of-on-device-ai-with-google-tensor-and-pixel", "date": "2026-07-14T16:51:42.219Z", "summary": "在 Google I/O Connect India 上，Google 展示了由定制 Tensor SoC 和 TPU 驱动的 Pixel 10 系列所支持的 100% 私有端侧 AI 未来。活动首次推出轻量级 Gemma 4 E2B 模型，该模型原生运行于设备端，可实现完全离线的多模态功能，包括 AI 聊天、实时图像识别和个人智能体任务。开发者即日起可通过新发布的 Tensor SDK b...", "type": "model", "relTime": "2天前"}, {"id": 82, "title": "Google 为 25 周年改版图片搜索：用 AI 根据\"独特兴趣\"生成动态画廊", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/google/2026/07/google-revamps-image-search-for-its-25th-anniversary-with-more-images-and-more-ai", "date": "2026-07-14T16:28:14.000Z", "summary": "Google 在其图片搜索上线 25 周年之际推出改版，新版将利用 AI 根据用户的\"独特兴趣\"生成一个持续更新的个性化图片画廊。该功能旨在让搜索结果更贴合个人偏好，而非仅依赖传统关键词匹配。此次更新是 Google 搜索持续融入 AI 能力的一部分，但目前尚未公布具体的技术实现细节、可用地区或上线时间表。", "type": "paper", "relTime": "2天前"}, {"id": 83, "title": "Google 搜索 AI Overviews 集成图像生成功能", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/google-search-now-generates-ai-images-when-it-cant-find-what-youre-looking-for-on-the-web", "date": "2026-07-14T16:20:58.000Z", "summary": "Google 在搜索的 AI Overviews 中直接集成 AI 图像生成功能。当网络不存在匹配图片时，用户可在搜索栏输入文本提示词生成图像。该功能基于 Google 新推出的 Nano Banana 2 Lite 图像模型，优先考虑速度和成本而非质量。未来几周内，所有已支持 AI 模式图像生成的地区将率先上线英文版。此举意味着开放网络的点击量可能减少，AI 生成结果将进一步蚕食图片搜索带...", "type": "model", "relTime": "2天前"}, {"id": 84, "title": "360 AI 研究院 MoSA：让 AI 通过视频运动学习识别物体，无需人工标注", "source": "X：Rohan Paul (@rohanpaul_a seNova-Vision-7B-MoT 多任务视觉模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2076828658531262619", "date": "2026-07-14T00:38:32.000Z", "summary": "商汤发布并完全开源 SenseNova-Vision-7B-MoT，一个统一处理检测、OCR、GUI、深度与法线估计、分割、多视图等主要视觉任务的模型。该模型支持通过自然语言定义新的视觉任务变体，跨传统任务边界重组视觉能力。开源内容包括模型权重及 SenseNova-Vision Corpus（含 5000 万示例子集及复现剩余公开数据的完整工具包）。", "type": "model", "relTime": "2天前"}, {"id": 107, "title": "视频生成创企 PixVerse 完成 4.39 亿美元 C 轮扩展融资，估值超 20 亿美元", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/video-generation-startup-pixverse-raises-439m-valuation-soars-past-2b", "date": "2026-07-14T00:00:00.000Z", "summary": "新加坡视频生成初创公司 PixVerse 完成 C 轮扩展融资，共筹集 4.39 亿美元，估值突破 20 亿美元。公司提供 V 系列（消费者及 API）、C 系列（专业影视）及今年初发布的 R 系列世界模型（游戏开发）。用户可生成最高 4k 分辨率并自带音频的视频，消费端注册用户超 1.5 亿，月活超 1500 万，图生视频每分钟 4.80 美元。本轮投资者包括阿里巴巴等。公司计划今年推出新...", "type": "industry", "relTime": "2天前"}, {"id": 108, "title": "RINO：让RGB成为视觉的通用语言--统一视觉任务为RGB图像编辑问题", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12450", "date": "2026-07-14T00:00:00.000Z", "summary": "一项新研究提出RINO（RGB In and RGB Out）框架，将掩码、深度图等各类结构化视觉信号统一表示为RGB图像，并将分割、深度估计、姿态生成等视觉任务转化为通用的RGB到RGB图像编辑问题。该模型基于通用图像编辑骨干，无需任务特定微调即可在零样本条件下完成密集理解与条件生成任务，性能具有竞争力。代码已开源。", "type": "paper", "relTime": "2天前"}, {"id": 109, "title": "SIS-Bench 发布：首个评估无人机具身智能中自我意识与空间认知的基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12477", "date": "2026-07-14T00:00:00.000Z", "summary": "研究团队推出 SIS-Bench，一个专门评估无人机（UAV）场景下具身空间智能的基准。该基准包含来自 1，646 段真实无人机视频的 4，856 个问答对，覆盖 13 项任务，从感知、记忆与推理三个层级评估空间与自我两个维度。评测发现当前多模态大语言模型（MLLM）在建模动态与智能体中心过程上存在根本局限，空间认知与自我意识间存在明显失衡。", "type": "paper", "relTime": "2天前"}, {"id": 110, "title": "AffectFlow-DINO：基于条件整流流的不确定性感知多任务情感估计", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13250", "date": "2026-07-14T00:00:00.000Z", "summary": "AffectFlow-DINO 用条件整流流头替代确定性架构，从静态人脸图像联合估计效价-唤醒度、分类八种表情并检测十二个动作单元。整流流解码将效价-唤醒度 CCC-V 提升 0.058，后验阈值校准使 Fear 类识别率从 3.8% 恢复至 33.1%，最终 P_MTL 达 1.177，远超官方基线 0.45。", "type": "paper", "relTime": "2天前"}, {"id": 111, "title": "Boogu-Image-0.1 发布：开源统一多模态理解与生成模型，训练成本仅约 40 万美元", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13125", "date": "2026-07-14T00:00:00.000Z", "summary": "Boogu-Image-0.1 系列开源统一多模态理解与生成模型发布，包含 Base、Turbo、Edit 和 Edit-Turbo 四个变体，支持高质量文生图、快速推理、指令编辑及中英双语文本渲染。", "type": "model", "relTime": "2天前"}, {"id": 112, "title": "ShortOPD：用短到长在线策略蒸馏恢复剪枝后的大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13124", "date": "2026-07-14T00:00:00.000Z", "summary": "ShortOPD提出一种短到长的在线策略蒸馏调度，通过检测并跳过教师模型确认的重复后缀，仅对有效前缀进行训练，从而恢复结构化剪枝后的大语言模型。在数学、代码和开放生成任务中，该方法将压缩模型得分提升至未恢复时的约9倍，是标准恢复方法的1.6-4.4倍，且仅用固定8192-token rollout四分之一的训练时间（8.5小时 vs. 35.9小时）即达到相近效果。", "type": "paper", "relTime": "2天前"}, {"id": 113, "title": "Hermes 智能体开发商 Nous Research 正以 15 亿美元估值完成新一轮融资", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/hermes-agent-maker-nous-research-in-talks-for-new-funding-at-1-5b-valuation", "date": "2026-07-13T23:31:18.000Z", "summary": "开源 AI 智能体 Hermes 的开发商 Nous Research 正由 Robot Ventures 领投、USV 等参投，以 15 亿美元估值完成新一轮融资，至少筹集 7500 万美元。该公司成立于 2023 年，此前已累计融资 7000 万美元。Hermes 是开源 AI 智能体，内置网页搜索、编程和图像理解等\"技能\"，并能自动从用户使用中学习构建新技能。用户可在 Telegram...", "type": "industry", "relTime": "3天前"}, {"id": 114, "title": "蚂蚁集团旗下Robbyant发布LingBot-VA 2.0视频动作基础模型", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2076808536294887547", "date": "2026-07-13T23:18:34.000Z", "summary": "蚂蚁集团旗下具身AI公司Robbyant发布LingBot-VA 2.0，这是一款从零训练的视频动作基础模型，专为机器人控制设计。模型采用稀疏MoE架构，约13B总参数，每token激活约1.9B参数。通过前瞻推理及系统加速，峰值异步执行频率达225Hz。高层视觉语言规划器分解长任务，底层视频动作策略处理连续运动。模型仅需10-15次演示即可适应，支持跨机器人本体迁移及零样本新任务。在Rob...", "type": "model", "relTime": "3天前"}, {"id": 115, "title": "15款已停产NVIDIA企业级GPU在现代AI工作负载下的性能基准测试", "source": "Hacker News 热门（buzzing.cc 中文翻 , "relTime": "3天前"}, {"id": 143, "title": "中国电信联合北邮、鹏城实验室完成高轨卫星跨模态语义通信试验，传输效率较 H.265 提升 3.5 倍", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/855.htm", "date": "2026-07-13T00:20:06.000Z", "summary": "中国电信研究院联合北京邮电大学、鹏城实验室，基于亚洲九号卫星完成高轨卫星跨模态语义通信试验。该方案融合语义知识库与信源信道联合编码（JSCC）技术，将星地链路传输效率提升至 H.265 方案的 3.5 倍、H.264 方案的 5.5 倍，同时保持相近视频质量（FID<50）。试验还通过生成式语义恢复与多模态融合对齐，使多模态传输质量较传统方案提升 70% 以上。", "type": "industry", "relTime": "3天前"}, {"id": 144, "title": "LightMem-Ego：面向日常生活的轻量级流式多模态记忆系统", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11487", "date": "2026-07-13T00:00:00.000Z", "summary": "针对移动和可穿戴设备上个人AI助手难以持续积累、组织和检索长期多模态经验的问题，研究者提出LightMem-Ego。该系统持续捕获第一人称视角的视觉和音频流，将其对齐到统一时间线，并组织为当前、短期和长期三级层次化记忆。面对用户查询时，系统动态路由到相应记忆层级，基于多模态证据生成回答。该系统可部署于智能手机和AI眼镜，支持物品查找、对话回忆、生活总结、日常规律发现及个性化辅助。代码已开源。", "type": "paper", "relTime": "3天前"}, {"id": 145, "title": "AdvancedMathBench：面向高等数学证明生成与验证的基准套件", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11849", "date": "2026-07-13T00:00:00.000Z", "summary": "大语言模型在高中及奥数级别数学上表现优异，但在高等数学领域能力尚不明确。现有基准在学科覆盖与评估粒度上存在不足。为此，研究者推出AdvancedMathBench基准套件，其核心证明生成基准ProverBench包含296道涵盖本科至博士资格考试水平的问题。配套自动验证流程基于大规模专家标注训练，可输出正确性判定与细粒度错误评估。另一子集VerifierBench包含888条模型生成的证明轨...", "type": "paper", "relTime": "3天前"}, {"id": 146, "title": "SpectraReward：将预训练多模态大模型用作零样本奖励模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.11886", "date": "2026-07-13T00:00:00.000Z", "summary": "研究者提出 SpectraReward，一种无需训练的奖励函数，通过单次前向传播计算图像对原始提示词的重建似然作为奖励，直接利用预训练多模态大模型的图文对齐能力。实验覆盖两个扩散模型、三种强化学习算法及九个多模态大模型骨干（4B至235B参数），结果表明该方法显著优于此前基于多模态大模型的奖励训练方法，且更大规模的奖励模型并非总是更优。", "type": "paper", "relTime": "3天前"}, {"id": 147, "title": "MetaView：单图大视角新视角合成框架，融合隐式几何先验与度量深度", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12000", "date": "2026-07-13T00:00:00.000Z", "summary": "MetaView 提出一种扩散模型驱动的单目新视角合成框架，结合隐式几何先验与度量深度锚定，在单张图像的大视角变化下实现几何一致性与精确可控渲染。实验表明，MetaView 在挑战性大视角变化任务上显著优于现有方法，并展现出更强的泛化能力。代码已开源。", "type": "paper", "relTime": "3天前"}, {"id": 148, "title": "Pangram分析：社交媒体超四分之一长文为AI生成，LinkedIn成重灾区", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/842.htm", "date": "2026-07-12T23:26:09.000Z", "summary": "Pangram分析显示，社交媒体超250词的长文中，每四篇就有一篇由AI生成。LinkedIn的AI内容占比最高，41%长文被判定为AI撰写，贡献了近三分之二的AI内容。X平台近一半长文为AI生成或辅助完成。Substack的AI内容比例最低（约10%），Reddit回复几乎全为真人撰写（98%）。数据来自Pangram Chrome扩展，2026年4月至6月扫描五大平台超100万篇帖子。其...", "type": "tip", "relTime": "4天前"}, {"id": 149, "title": "特斯拉奥斯汀 Robotaxi 枢纽清洁机器人已投入运行", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/975/838.htm", "date": "2026-07-12T22:58:06.000Z", "summary": "特斯拉在奥斯汀 Robotaxi Hub 安装的清洁机器人已投入运行。该机器人配备大型机械臂和自动更换工具装置，可吸尘、清理垃圾、擦拭中控屏等精密部件，还能抓取塑料瓶或背包等遗落物品。该枢纽于 2026 年 3 月完工，配备超级充电桩和设备检测系统。特斯拉还计划建设 Robotaxi 自动洗车设施，并已申请紫外线消毒系统专利。Cybercab 已在奥斯汀公开测试，并将在得州超级工厂内部接送员工。", "type": "industry", "relTime": "4天前"}, {"id": 150, "title": "奥特曼称GPT-5.6在智能体编码任务效率提升54%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2076407574019334516", "date": "2026-07-12T20:45:18.000Z", "summary": "Sam Altman 在 CNBC 的新采访。  \"GPT 5.6 在智能体编码任务上效率提升 54%。这是 AI 支出首次成为重大话题的一年，突然间它成了一个非常大的话题。\"  ----  来自 \"CNBC Television\" YouTube 频道（完整视频链接在评论中）", "type": "tip", "relTime": "4天前"}, {"id": 151, "title": "我喜欢大型语言模型，讨厌炒作", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://geohot.github.io//blog/jekyll/update/2026/07/12/i-love-llms.html", "date": "2026-07-12T20:14:25.500Z", "summary": "作者自2007年起从事黑客工作，此后职业生涯一直投入AI，对LLM、自动驾驶、视频生成模型和编码智能体感到兴奋。上周在本地GLM-5.2上配置opencode，成功让Linux桌面实现\"安装tmux并加载geohot配置\"。作者反感两类炒作：一是渲染\"窗口关闭\"或\"落后\"的负面情绪，旨在让人自我怀疑并迁往旧金山；二是将AI从\"高级自动补全、智能编译器\"直接跳跃到\"统治一切\"的末日叙事。作者认...", "type": "tip", "relTime": "4天前"}, {"id": 152, "title": "研究显示LinkedIn是长文AI生成内容之王，41%帖子为AI撰写", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/linkedin-is-the-undisputed-king-of-long-form-ai-slop-according-
