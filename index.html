function fmtDate(iso){ var d=new Date(iso); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function render(){
  var c=document.getElementById("timeline"); var html=""; var lastDate="";

    if(dk!==lastDate){ lastDate=dk; html+='<div class="timeline-group">'; html+='<div class="timeline-dot"></div>';
      html+='<div class="timeline-date"><span class="mini-dot"></span>'+fmtDate(p.date)+'</div>'; }

}
