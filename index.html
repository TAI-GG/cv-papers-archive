ality.ai检测普通AI文本近乎完美，假阴性率最高仅0.7%。但当Claude Opus 4.8等模型模仿特定作者风格写作时，平均13%的AI文本未被检出；科学写作类别中漏检率高达24%-29%，Pangram对Gemini生成的学术文本漏检率达48%。", "type": "paper", "relTime": "22小时前"}, {"id": 17, "title": "阿里云百炼上线 HappyOyster 1.0，一句话生成可互动 AI 数字世界", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/729.htm", "date": "2026-07-19T08:16:45.000Z", "summary": "阿里云百炼今日上线开放式世界模型产品 HappyOyster 1.0，用户输入一句话或一张图即可生成可互动、可探索的 AI 数字世界。该模型支持 1 分钟连续实时交互的世界探索模式和 3 分钟以上分支叙事的实时导演模式，已提供三端 SDK 并开启灰测。", "type": "model", "relTime": "22小时前"}, {"id": 18, "title": "Castor：开源命令行工具，从终端向电视投屏任意网页视频", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/stupside/castor", "date": "2026-07-19T05:45:33.311Z", "summary": "Castor 是一款开源命令行工具，能从终端向电视投屏任意网页视频，支持 DLNA/UPnP 和实验性 Chromecast。它通过 headless Chrome 提取视频流、ffmpeg 转码并实时投屏，支持 IMDB/TMDB ID、直接流 URL 或网页播放器三种输入方式，可自动生成字幕。", "type": "model", "relTime": "1天前"}, {"id": 19, "title": "商汤发布旗舰原生多模态模型U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078681943680704993", "date": "2026-07-19T03:22:50.000Z", "summary": "商汤发布旗舰原生多模态基模SenseNova U1 Pro，基于NEO-Unify架构统一理解、生成与行动，并支持原生交织的视觉-语言推理。相比U1 Lite，U1 Pro支持智能体生成循环中的数十轮长程推理、8K原生分辨率输出，且渲染文字错误率极低。预览版现已开放邀请，API与定价将于2026年8月正式发布。", "type": "model", "relTime": "1天前"}, {"id": 20, "title": "Codex调用素材库一键生成视频", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078680925987291374", "date": "2026-07-19T03:18:47.000Z", "summary": "Codex 调用 Listenhub Cli + 免费视频素材库 pexels 写一个 skill，一句话生成类似视频。", "type": "tip", "relTime": "1天前"}, {"id": 21, "title": "阿里开放式世界模型快乐生蚝 HappyOyster 1.0 登陆百炼平台", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/644.htm", "date": "2026-07-19T02:53:07.000Z", "summary": "阿里巴巴发布开放式世界模型 HappyOyster 1.0（快乐生蚝），已登陆阿里云百炼面向企业和开发者开启灰测。模型提供世界探索与实时导演两大模式，支持用户通过一句话或一张图生成可实时交互的开放世界，并可用文字指令操控镜头与剧情。产品提供 Android/iOS/Web 三端 SDK，支持构建可玩世界、互动剧等沉浸式应用。", "type": "model", "relTime": "1天前"}, {"id": 22, "title": "Grok视频生成进化，质感丝滑可战Seedance", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078669737194631628", "date": "2026-07-19T02:34:19.000Z", "summary": "Grok视频生成能力大幅进化，生成的视频在质感和分镜丝滑程度上已可与Seedance一战。示例中，Grok根据详细提示词生成了超现实主义纪录片风格的网球观众席片段，包含精确的首帧锁定、手持抖动、自动对焦搜索等2000年代DV质感。", "type": "tip", "relTime": "1天前"}, {"id": 23, "title": "本田推出商用自动驾驶电动割草机，售价32999美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/627.htm", "date": "2026-07-19T01:14:04.000Z", "summary": "本田发布自动驾驶纯电动割草机ProZision Autonomous ZTR，售价32999美元，已开始向经销商发货。该设备通过GPS、激光雷达和360度视觉传感器实现约3厘米误差的自主作业，提供54英寸和60英寸两种割草宽度。", "type": "paper", "relTime": "1天前"}, {"id": 24, "title": "荣耀发布伙伴型多模态智能体操作系统 AgenticOS，Robot Phone 8 月首发内核", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/621.htm", "date": "2026-07-19T00:30:21.000Z", "summary": "荣耀在 2026 世界人工智能大会上发布 AgenticOS，支持意图驱动、自然交互等四大特征，拥有行业首个系统级 Agent 架构。8 月发布的 Robot Phone 将首发其内核，Q4 的 Magic9 系列将推出尝鲜版。Robot Phone 搭载第五代骁龙 8 至尊版芯片，顶部集成行业最小四自由度钛合金机械云台，体积缩小 70%。", "type": "paper", "relTime": "1天前"}, {"id": 25, "title": "无人机编队表演舞蹈与特技", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078624943021928715", "date": "2026-07-18T23:36:20.000Z", "summary": "在繁忙交通堵塞上空，小型无人机搭载舞者表演宝莱坞舞蹈，每架无人机一人，聚焦舞蹈动作。  （SD2）  啦啦队员身穿飞行服，在游乐园上空的无人机上进行特技表演，最后组成人塔，由地面业余电影人拍摄，白天。镜头稍微拉近，重新对焦。  （SD2）", "type": "tip", "relTime": "1天前"}, {"id": 26, "title": "NVIDIA 发布 DeepStream 9.1，新增 13 项智能体技能与多视角 3D 追踪", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/18/nvidia-released-deepstream-9-1-bringing-agentic-ai-to-vision-ai-with-13-skills-and-multi-view-3d-tracking", "date": "2026-07-18T19:16:22.000Z", "summary": "NVIDIA 发布 DeepStream 9.1，新增 13 项 agentic skills，支持通过自然语言描述构建多摄像头视觉管线。核心技能 MV3DT 将多摄像头检测投影至统一 3D 坐标系，为跨视角目标分配全局一致的 ID；AMC 技能可自动估算摄像头内外参，替代手动棋盘格标定。", "type": "paper", "relTime": "1天前"}, {"id": 27, "title": "商汤发布原生多模态旗舰模型SenseNova U1 Pro", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2078510614889238997", "date": "2026-07-18T16:02:02.000Z", "summary": "商汤发布旗舰原生多模态基础模型SenseNova U1 Pro，基于NEO-Unify架构，统一理解、生成与行动能力，并支持原生交织视觉-语言推理。相比U1 Lite，U1 Pro支持数十轮智能体生成循环、8K原生分辨率输出、超低文字渲染错误率，以及超宽/超高图像生成。预览版现已开放邀请，2026年8月正式发布API及定价。", "type": "model", "relTime": "1天前"}, {"id": 28, "title": "用GPT-Image-2+剪映一键生成爆款跳舞视频", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2078508800475029833", "date": "2026-07-18T15:54:49.000Z", "summary": "用户用GPT-Image-2生成游艇美女图，再导入剪映搜索\"梦的翅膀受了伤\"选剪同款，即可生成不带AI标志的跳舞视频。该方法操作简单，适合抖音、小红书快速起号。", "type": "tip", "relTime": "1天前"}, {"id": 29, "title": "央视对话生数科技朱军：AI从生成视频到理解世界", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/xLruk-2-eTG6LNC73xzHzQ", "date": "2026-07-18T12:56:36.000Z", "summary": "2026世界人工智能大会（WAIC）期间，央视总台《科技零距离》对话生数科技创始人、清华大学人工智能研究院副院长朱军，围绕世界模型、AI视频发展及未来智能展开交流。节目于今晚21：00全平台上线。", "type": "industry", "relTime": "1天前"}, {"id": 30, "title": "京东携 JoyAI 全系列大模型矩阵及 JoyInside 附身智能技术亮相 WAIC 2026", "source": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/A-Om9cK9rFnUme9l42BMLA", "date": "2026-07-18T12:29:13.000Z", "summary": "京东在 WAIC 2026 上展出 JoyAI 全系列大模型矩阵，覆盖多模态交互、具身智能等赛道，多款模型已开源。现场提供 JoyEgoCam 头戴数采设备体验机器人学习流程，并搭建 JoyInside 未来全屋 AI 样板间，实现无唤醒词的全屋语音联动。", "type": "industry", "relTime": "1天前"}, {"id": 31, "title": "Kimi 3 3D生成惊艳演示，效果绝佳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078428187768553902", "date": "2026-07-18T10:34:29.000Z", "summary": "Berry Xia 发布多个 Demo，展示 Kimi 3 在 3D 生成方面的惊艳效果，认为\"真的很绝\"。具体模型版本、参数规模、benchmark 分数等数字未在推文中提及。", "type": "tip", "relTime": "1天前"}, {"id": 32, "title": "上海发布太空算力星座工程\"星枢计划\"，首发星座含3颗卫星，商业运营阶段将完成千星部署", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/530.htm", "date": "2026-07-18T09:48:31.000Z", "summary": "上海在2026世界人工智能大会上发布\"星枢计划\"首发星座，由1颗中心算力主星、1颗伏羲气象星和1颗即时遥感星构成，通过星间激光链路实现数据贯通。主星搭载定制航天级GPU芯片，单星实现32P在轨算力，并首次引入具身智能系统用于在轨运维。该计划商业运营阶段将完成千星部署，包括800颗中心算力卫星和200颗边缘计算卫星。", "type": "industry", "relTime": "1天前"}, {"id": 33, "title": "思特威与地瓜机器人合作推出1：1方形视觉传感器", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/529.htm", "date": "2026-07-18T09:47:26.000Z", "summary": "思特威与地瓜机器人达成战略合作，基于旭日S600平台适配三款1：1方形全局快门图像传感器。该方案分辨率覆盖1080×1080至1944×1944，帧率80fps至130fps，为人形机器人等具身智能设备提供V-SLAM与主动避障等视觉支撑。", "type": "industry", "relTime": "1天前"}, {"id": 34, "title": "Claude Design 高保真原型可替代产品文档", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078388657979838830", "date": "2026-07-18T07:57:25.000Z", "summary": "开发者用 Claude Design 生成高保真可交互原型替代传统产品文档，原型包含模拟数据且修改便捷。以视频水印功能为例，先让 Opus 4.8 出原型稿，打磨确认后由 AI 实现代码，最终代码还原度可达 9 成以上。", "type": "tip", "relTime": "1天前"}, {"id": 35, "title": "荣耀 CEO 李健：AI 将脱离工具属性，迈向伙伴型类人生命体", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/476.htm", "date": "2026-07-18T07:02:32.000Z", "summary": "荣耀 CEO 李健在 2026 世界人工智能大会上表示，AI 的演进将脱离冰冷的工具属性，全面迈向伙伴型类人生命体。荣耀已将 MagicOS 升维为行业首个伙伴型、多模态智能体操作系统。首台机器人 Robot Phone 今日开启预约，搭载第五代骁龙 8 至尊版芯片与 4DoF 钛合金机械云台。", "type": "tip", "relTime": "1天前"}, {"id": 36, "title": "B站\"猫娘计划\"亮相WAIC 2026，支持自主导入模型并理解桌面内容", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/464.htm", "date": "2026-07-18T06:34:59.000Z", "summary": "哔哩哔哩在WAIC 2026上展示了开源AI数字生命生态计划\"猫娘计划\"，其核心产品为主动式全模态AI伙伴驱动器N.E.K.O.。该产品支持Live2D与VRM双引擎，用户可自由导入模型，并内置视觉多模态大模型以理解电脑屏幕内容。目前该产品已在Steam上架抢鲜体验。", "type": "model", "relTime": "2天前"}, {"id": 37, "title": "荣耀 WAIC 宣布 Robot Phone 开启预约：搭载 Agentic OS，8 月发布", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/462.htm", "date": "2026-07-18T06:30:45.000Z", "summary": "荣耀在 WAIC 2026 上正式官宣全球首台机器人手机 Robot Phone 开启全渠道预约，计划于 2026 年第三季度上市。该机搭载第五代骁龙 8 至尊版芯片与行业最小四自由度钛合金机械云台，系统层面将 MagicOS 升维为行业首个伙伴型多模态智能体操作系统 Agentic OS，并与阿里联合定义下一代 Magic 智能体大模型矩阵。", "type": "model", "relTime": "2天前"}, {"id": 38, "title": "Kimi K3 一句话生成在线视频编辑器", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078305954605772954", "date": "2026-07-18T02:28:47.000Z", "summary": "Kimi K3 通过\"乔木goal\"和\"PRD skill\"等技能，仅凭一句提示词便自动生成了一个类似剪映网页版的在线视频编辑器（cut.qiaomu.ai）。该Demo已开源，尽管功能粗糙且导出存在问题，但展示出AI从需求到产品原型的一步生成能力。", "type": "tip", "relTime": "2天前"}, {"id": 39, "title": "TikTok 开始测试 AI 肖像检测工具，允许创作者举报 AI 生成内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/967486/tiktok-ai-likeness-detection-tool", "date": "2026-07-17T19:34:30.000Z", "summary": "TikTok 正在测试一项可选工具，可扫描 AI 生成的肖像并允许创作者向平台举报。该工具目前仅对\"部分\"美国创作者开放测试，创作者需先通过 Jumio 完成实时自拍扫描和身份验证。TikTok 表示不会保留身份证件和面部信息。", "type": "paper", "relTime": "2天前"}, {"id": 40, "title": "宝玉：Agent 应用和开发首选 Mac", "source": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2078195610696482895", "date": "2026-07-17T19:10:19.000Z", "summary": "宝玉指出，当前主流 Agent 应用（如 Computer Use）在 Mac 上支持最好，开发者开发 App 也应优先 Mac。他推荐 Mac Mini 或 Mac Studio，但强调内存至少 16G 以上、硬盘 1T 起步。其开源工具 BaoCut 可转录 YouTube 视频并生成双语字幕，但仅支持 Mac。", "type": "tip", "relTime": "2天前"}, {"id": 41, "title": "Epoch AI 测试：AI 检测器易被模仿误导", "source": "X：Epoch AI (@EpochAIResearch)", "sourceUrl": "https://x.com/EpochAIResearch/status/2078195357599813723", "date": "2026-07-17T19:09:18.000Z", "summary": "我们对一些 AI 检测器进行了压力测试，发现它们很少将人类文本误判为 AI 生成。但要求大语言模型模仿特定作者时，检测器约 13% 的情况下会将文本误分类为人类生成。对于科学写作，假阴性率上升至约 26%。", "type": "paper", "relTime": "2天前"}, {"id": 42, "title": "免费AI视频素材库：低成本空镜头方案", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2078183471831277778", "date": "2026-07-17T18:22:05.000Z", "summary": "针对AI生成视频成本过高的问题，有网站提供无版权免费的AI素材库。作者提议编写CLI工具自动搜索下载，并交由Codex进行AI自动剪辑，至少可作为空镜头使用。", "type": "tip", "relTime": "2天前"}, {"id": 43, "title": "VideoChat3：全开源视频理解模型发布", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2078179727529877506", "date": "2026-07-17T18:07:12.000Z", "summary": "VideoChat3  完全开源的视频多模态大语言模型，用于高效且通用的视频理解。", "type": "paper", "relTime": "2天前"}, {"id": 44, "title": "Astribot Lumo-2：4B参数机器人基础模型发布", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2078171810403950614", "date": "2026-07-17T17:35:44.000Z", "summary": "Astribot发布Lumo-2，一个4B参数的机器人基础模型，采用行业首个Latent World-Action Model（LWAM）架构。该模型在22项真实世界操作任务中取得最佳综合表现，总推理速度提升2.71倍，支持人类视频与多种机器人本体，并在105个未见物体上表现更强。结果已在20+复杂家庭任务中通过真实机器人验证。", "type": "model", "relTime": "2天前"}, {"id": 45, "title": "人形机器人供应链比炫技视频更重要", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2078149200701977050", "date": "2026-07-17T16:05:54.000Z", "summary": "中国每周涌现人形机器人炫技视频，但真正关键的是背后的工业生态系统。机器人本体正快速商品化，Unitree G1售价仅¥99，000（$14，625），而核心零部件供应商利润率可达30-50%，本体制造商仅10-15%。随着量产推进，利润将向上游AI算法、软件和数据转移。", "type": "tip", "relTime": "2天前"}, {"id": 46, "title": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 为 Diffusers 模型提供分布式扩散训练", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/scale-diffusers-finetuning-nemo-automodel", "date": "2026-07-17T15:57:54.000Z", "summary": "NVIDIA 与 Hugging Face 合作，通过 NeMo Automodel 开源库为任意 Diffusers 格式模型提供生产级分布式扩散训练，无需检查点转换或模型重写。该集成支持 Wan 2.1、FLUX.1-dev 等模型的完整微调与 LoRA 微调，可在一到数百 GPU 上灵活扩展，所有检查点可直接加载回 Diffusers 管线进行推理。", "type": "model", "relTime": "2天前"}, {"id": 47, "title": "面壁智能在 WAIC 2026 发布具身智能模型 MiniCPM-Robot", "source": "公众号：面壁智能（MiniCPM）", "sourceUrl": "https://mp.weixin.qq.com/s/7ZUoWndvYXCVmt7SmljnVQ", "date": "2026-07-17T15:21:18.000Z", "summary": "面壁智能在 WAIC 2026 发布具身智能模型系列 MiniCPM-Robot，并展示端侧智能在汽车、机器人等领域的落地。其 MiniCPM 系列已覆盖文本、视觉、全模态和语音四大方向，其中 MiniCPM-o 4.5 实现离线全模态即时自由对话。该系列开源模型累计下载量突破 3800 万，已搭载于长安马自达 EZ-60 等车型量产上市。", "type": "industry", "relTime": "2天前"}, {"id": 48, "title": "可灵AI首尔颁奖礼表彰新一代创作者", "source": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2078132620873929184", "date": "2026-07-17T15:00:01.000Z", "summary": "🏆 来自首尔可灵AI NextGen颁奖典礼的精彩瞬间。  我们自豪地分享本次典礼的回顾，该典礼表彰了新一代创作者们使用可灵AI重新定义视觉叙事边界的杰出成就。  衷心感谢所有参与者、评委和合作伙伴，让这个鼓舞人心的首尔之夜成为可能。我们正在共同塑造AI艺术的未来。  观看下方完整回顾视频。", "type": "industry", "relTime": "2天前"}, {"id": 49, "title": "用户用Kimi 3一次生成咖啡机设计", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078132577668637146", "date": "2026-07-17T14:59:51.000Z", "summary": "用户@berryxia 用Kimi 3一次成型手搓咖啡机，兴奋表示被Kimi 3\"硬控\"。视频剪辑存在小问题，但成品效果出色，评论区将补充细节图。", "type": "tip", "relTime": "2天前"}, {"id": 50, "title": "程序员用 Codex 搞定视频下载，众筹到每月 $100 订阅费", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2078120758967251092", "date": "2026-07-17T14:12:53.000Z", "summary": "一位程序员用 Codex 在 8-10 分钟内下载了微信视频号视频，并为其生成字幕。他借机说服妻子将每月 $200 的订阅费分摊一半，成功众筹到 $100。Codex 的 /Goal 指令让原本需要搜索第三方网站的任务变得简单高效。", "type": "tip", "relTime": "2天前"}, {"id": 51, "title": "百度智能云发布\"AI+时尚\"全链路方案，百度搭子串联设计、生产与营销", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/QjAdiDm7fjudol2J46mOEA", "date": "2026-07-17T12:47:12.000Z", "summary": "7月17日，百度智能云在首届全球\"AI+时尚\"创新应用大赛上宣布，其通用智能体\"百度搭子\"已串联设计、3D虚拟样衣、数字人直播、营销素材生成等环节，推动AI时尚从单点内容生成走向全链路产业落地。百度百舸、千帆、一镜及Hogee等平台为高清渲染、模型调用和品牌出海提供支撑。大赛验证了中小品牌和独立设计师可基于成熟平台低成本参与AI时尚应用。", "type": "industry", "relTime": "2天前"}, {"id": 52, "title": "抖音严打 AI 生成虚假灾害画面，发布防汛期涉灾信息治理公告", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/291.htm", "date": "2026-07-17T12:37:04.000Z", "summary": "抖音发布防汛期涉灾信息治理公告，重点打击利用 AI 生成虚假灾害画面、翻炒旧闻编造灾情等行为。平台通过 AI 技术识别、人工复核及权威信息交叉比对，已累计核验典型涉灾谣言 71 起，处置相关谣言内容 1.9 万余条，清理评论区谣言 1.6 万余条，并对 20 个违规账号进行处罚。抖音同时上线 39 则求真卡，视频底部求真条累计曝光超 11.9 亿次。", "type": "industry", "relTime": "2天前"}, {"id": 53, "title": "LLM cliché highlighter：一款识别AI写作套话的检测工具", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/17/llm-cliche-highlighter", "date": "2026-07-17T12:11:11.000Z", "summary": "Simon Willison 用 Fable 5 开发了一款 LLM cliché highlighter 应用，用于高亮 LLM 生成文本中常见的十种套话模式，例如\"no fluff， no filler， no jargon\"这类陈词滥调。该工具旨在帮助读者快速识别并过滤掉充斥在文章中的 AI 写作风格化表达。", "type": "tip", "relTime": "2天前"}, {"id": 54, "title": "TapNow Creative OS：AI原生影视工作流操作系统", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2078084102448713931", "date": "2026-07-17T11:47:13.000Z", "summary": "TapNow Creative OS 正式上线，定位为面向影视制作全流程的 AI 原生操作系统，覆盖从创意开发、内容生成到后期制作。主推文将其类比为\"视觉领域的 Claude Code\"，认为它像 Codex 和 Claude Code 为 LLM 封装真实工具一样，将参考素材、创作方法和项目上下文围绕模型整合进统一工作空间。", "type": "model", "relTime": "2天前"}, {"id": 55, "title": "Omni 原型演示交互式实时视频生成", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2078063863346483431", "date": "2026-07-17T10:26:48.000Z", "summary": "我使用 Omni 原型演示了通过直接操控实现的交互式实时视频生成可能的样子。", "type": "tip", "relTime": "2天前"}, {"id": 56, "title": "Kimi 3 语音建模：一张嘴搞定细腻 3D 模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2078052528147804502", "date": "2026-07-17T09:41:45.000Z", "summary": "Kimi 3 支持仅靠语音指令直接生成细腻的 3D 模型，交互一气呵成，无需复杂提示词。用户感叹其质感和细节到位，认为它直接吊打头部 3D 建模模型。", "type": "tip", "relTime": "2天前"}, {"id": 57, "title": "腾讯发布具身 VLM 基座模型 Hy-Embodied-VLM-1.0，A3B 规模性能接近上一代 A32B 模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/080.htm", "date": "2026-07-17T07:22:18.000Z", "summary": "腾讯 Robotics X 实验室与福田实验室联合发布第二代具身 VLM 基座模型 Hy-Embodied-VLM-1.0。该模型仅采用 A3B 规模，在 37 个评测任务中综合平均得分 65.6，整体性能接近上一代 A32B 旗舰模型。模型已开源。", "type": "model", "relTime": "2天前"}, {"id": 58, "title": "文远知行发布物理 AI 大模型 WITT，引入\"最小物理事实单元\"概念", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/055.htm", "date": "2026-07-17T07:01:04.000Z", "summary": "文远知行发布自研物理 AI 认知基础大模型 WeRide WITT，首次引入\"最小物理事实单元\"概念，将真实场景拆解为可验证的事实单元。WITT 具备事实提取、推理、验证与编排四大能力，在自动驾驶垂类场景中平均每片段事实错误率仅为通用大模型的三分之一。相比百B级通用大模型，WITT 可节省 98% 的 Token 成本，单卡单日处理 1 万分钟视频，实现 200 倍数据处理效率提升。", "type": "model", "relTime": "3天前"}, {"id": 59, "title": "Kimi多模态能力令人惊喜", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077997593142132939", "date": "2026-07-17T06:03:28.000Z", "summary": "Kimi 的多模态能力让我惊讶。图像识别和推理能力相当不错。", "type": "tip", "relTime": "3天前"}, {"id": 60, "title": "谷歌 Google Vids 新增数字分身功能，Gemini Omni 模型同步登陆", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/978/022.htm", "date": "2026-07-17T05:42:59.000Z", "summary": "谷歌为 Google Vids 加入个人数字分身功能，用户上传自拍照和语音录音即可生成外貌与声音模仿本人的虚拟形象。多模态 AI 模型 Gemini Omni 同步登陆，支持文字提示词与参考图片整合生成视频，并可分步修改。数字分身与谷歌账号绑定，生成内容嵌入 SynthID 隐形水印，目前仅向部分地区年满 18 岁的用户开放。", "type": "model", "relTime": "3天前"}, {"id": 61, "title": "商汤开源 SenseNova-U1-8B 信息图生成编辑模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077984439389565366", "date": "2026-07-17T05:11:12.000Z", "summary": "商汤开源 SenseNova-U1-8B-MoT-Infographic-V3 模型，将信息图生成与编辑统一于单一模型。支持局部文本/内容编辑、全局风格编辑和全局布局编辑，同时保留强生成能力，编辑时尽可能保持未修改区域不变。", "type": "model", "relTime": "3天前"}, {"id": 62, "title": "Kimi 3 视频与 3D 生成能力实测", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077974125872865742", "date": "2026-07-17T04:30:13.000Z", "summary": "用户实测 Kimi 3，称其 3D 建模质感与交互\"吊打头部模型\"，无需复杂提示词。主推文进一步展示，用户将官方宣传视频风格提炼为 Skills，让 Kimi 3 以 AI 发展为主题自动生成视频，文案、脚本、配音、音轨全部交付。", "type": "tip", "relTime": "3天前"}, {"id": 63, "title": "Kimi K3 首测：与 Opus 4.8 前端对决，有来有回", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2077969109506277602", "date": "2026-07-17T04:10:17.000Z", "summary": "Kimi K3 正式上线，采用全新 Kimi Linear 混合线性注意力架构，拥有 2.8T 参数和 1M 上下文，覆盖编程、Agent 和多模态。博主将其与 Claude Opus 4.8 进行四项前端高难度对比测试，结果显示 K3 在视频理解生成 3D 场景上明显胜出，且能自我截图修正代码；Opus 4.8 则在精细排版和一次性成功率上更稳。K3 为开源模型，定价在 Sonnet 级别。", "type": "tip", "relTime": "3天前"}, {"id": 64, "title": "用6GB显存旧显卡训练AI底鼓模型：KickWithReverb项目全解析", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.zhinit.dev/blog/training-a-kick-drum-diffusion-model", "date": "2026-07-17T02:18:03.648Z", "summary": "作者在配备7年前NVIDIA GTX 1660 SUPER（6GB显存）的Linux台式机上，从零训练并部署了一个生成式潜在扩散底鼓模型。模型基于超过13，000个个人采样库中的底鼓样本，采用VAE压缩频谱图、扩散U-Net生成潜在张量、HiFi-GAN声码器还原音频的三阶段流水线。项目代码已开源至GitHub，模型权重上传至HuggingFace。", "type": "tip", "relTime": "3天前"}, {"id": 65, "title": "Roblox 移动版将推出 AI 游戏创作工具\"Build\"，7 月 28 日开启 Alpha 测试", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/876.htm", "date": "2026-07-17T01:31:35.000Z", "summary": "Roblox 宣布移动版客户端将推出\"Build\"功能，用户通过简单提示词即可用 AI 生成基础游戏，无需编程技能。该功能由多种 AI 模型（含开源和自研模型）驱动，支持生成玩法、环境、角色、视觉风格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上验证用户开启 Alpha 测试，未来将推出免费基础版和付费高级版。", "type": "model", "relTime": "3天前"}, {"id": 66, "title": "Kimi 自动复刻官网宣传视频，制作还原度高", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077918765371826656", "date": "2026-07-17T00:50:14.000Z", "summary": "用户让Kimi 自行复刻官网宣传视频，次日发现Kimi 已完成制作，并生成了快闪版、沉浸版等多个版本，还解释了部分画面缺失的原因。视频的还原度与配乐节奏均由Kimi 自主完成。", "type": "tip", "relTime": "3天前"}, {"id": 67, "title": "S1-Omni：统一多模态科学推理模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15686", "date": "2026-07-17T00:00:00.000Z", "summary": "S1-Omni 将科学理解、预测与生成能力整合到单一架构中，在 200 个科学任务的 S1-Omni-Corpus 上训练。在超过 60 个科学基准上，该模型多数测试超越 GPT-5.5 和 Gemini-3.1-Pro，并在多个基准上达到或超越领域专用模型。", "type": "paper", "relTime": "3天前"}, {"id": 68, "title": "NVIDIA 发布 Audio-Visual Flamingo：面向长视频的开放音频-视觉大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.16107", "date": "2026-07-17T00:00:00.000Z", "summary": "NVIDIA 推出 Nemotron-Labs-Audio-Visual Flamingo（AV-Flamingo），一个完全开源的音频-视觉大语言模型，专为理解和推理长视频中的音频、图像与复杂场景设计。", "type": "model", "relTime": "3天前"}, {"id": 69, "title": "Apple 研究：Show Me Examples - 从图像集推断视觉概念", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/visual-concept-inference", "date": "2026-07-17T00:00:00.000Z", "summary": "Apple 机器学习研究团队提出一种方法，让视觉语言模型（VLM）仅从图像集示例中推断视觉概念，无需文本指令。该方法通过对比示例图像与候选图像，使模型捕捉颜色、纹理等视觉规律，在多个概念推理基准上提升准确率。该研究目前为学术论文，未公布模型或 API 可用性。", "type": "paper", "relTime": "3天前"}, {"id": 70, "title": "概念锻造提示术：用卡巴拉智能体融合任意创意", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077892045172011272", "date": "2026-07-16T23:04:03.000Z", "summary": "fofr 探索了一种\"概念锻造\"图像提示技术，利用卡巴拉智能体技能将任意两个想法通过强制桥梁融合。例如输入\"evangelion/metztli\"，智能体生成融合描述：\"Metztli 的石化月球外壳作为沉睡宇宙泰坦的原始、充满液体的生物驾驶舱\"，并输出包含琥珀色液体、玉石座椅等细节的提示词。该技术基于 Nano Banana 2 Lite 模型。", "type": "tip", "relTime": "3天前"}, {"id": 71, "title": "fofr 展示概念锻造图像提示的卡巴拉智能体技能", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077874610293346385", "date": "2026-07-16T21:54:46.000Z", "summary": "fofr 展示了一种概念锻造图像提示方法，利用卡巴拉智能体技能将任意两个想法强制融合。例如输入\"evangelion/metztli\"，智能体生成一个桥梁描述，并输出融合后的详细提示词。该技能可生成高度创意且风格独特的图像提示。", "type": "tip", "relTime": "3天前"}, {"id": 72, "title": "fofrAI 用提示词生成引力波与葬送的芙莉莲风格图像", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077870441847287914", "date": "2026-07-16T21:38:12.000Z", "summary": "fofrAI 发布两条 AI 图像生成提示词。第一条以\"引力波/欢快\"为主题，用\"黄色细线球体悬浮于反射黑池之上，池面泛起同心涟漪\"的极简摄影描述视觉化引力波。第二条引用《葬送的芙莉莲》与天文摄影的共通点--像长曝光一样捕捉已消逝实体跨越时间的微弱光芒，提示词为\"精灵少女剪影在星轨巨幕下独行于黑暗平原\"。", "type": "tip", "relTime": "3天前"}, {"id": 73, "title": "fofr 展示概念锻造图像提示：融合任意两个想法", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077868904823595167", "date": "2026-07-16T21:32:06.000Z", "summary": "fofr 展示了一种概念锻造图像提示方法，使用卡巴拉智能体技能将任意两个想法融合。例如，输入\"evangelion/metztli\"会生成一个强制桥接描述，并输出对应的图像提示词。该方法通过 Nano Banana 2 Lite 实现。", "type": "tip", "relTime": "3天前"}, {"id": 74, "title": "概念锻造提示词：用卡巴拉智能体融合任意想法", "source": "X：fofr (@fofrAI)", "sourceUrl": "https://x.com/fofrAI/status/2077862231950118942", "date": "2026-07-16T21:05:35.000Z", "summary": "fofr 展示了一种名为\"概念锻造\"的图像提示词方法，利用卡巴拉智能体技能将两个概念通过强制桥梁融合。例如，输入\"evangelion/metztli\"后，智能体生成了\"被石化的月球外壳 Metztli 作为沉睡宇宙巨人的原始生物驾驶舱\"这一桥梁，并据此创作出充满琥珀色液体、玉石与生物线缆的驾驶舱提示词。该方法基于 Nano Banana 2 Lite 模型运行。", "type": "tip", "relTime": "3天前"}, {"id": 75, "title": "利用经典机器学习检测LLM生成文本", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://blog.lyc8503.net/en/post/llm-classifier", "date": "2026-07-16T20:40:36.733Z", "summary": "一项研究探索使用经典机器学习方法（如逻辑回归、随机森林）检测大型语言模型生成的文本，在特定数据集上达到与深度学习模型相当的准确率。该方法计算成本更低，且对短文本和改写文本具有较强鲁棒性。研究还发现，基于字符级n-gram特征的模型在跨领域泛化上表现优于基于词级特征的模型。", "type": "tip", "relTime": "3天前"}, {"id": 76, "title": "小鹏智驾负责人谈物理AI未来方向", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077855037208859129", "date": "2026-07-16T20:37:00.000Z", "summary": "非常高兴能与小鹏汽车通用智能中心负责人、主导自动驾驶与AI研究的科学家刘宪铭坐下来交流。 我们进行了一场关于物理AI实际发展方向的精彩对话，我从中受益匪浅。完整视频即将上线，敬请期待。", "type": "tip", "relTime": "3天前"}, {"id": 77, "title": "xAI 起诉 Grok 用户制作儿童性虐待内容，不再否认模型被滥用", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/tech-policy/2026/07/xai-cant-deny-grok-makes-csam-anymore-so-its-suing-users", "date": "2026-07-16T20:26:23.000Z", "summary": "xAI 首次对一名 Grok 用户提起诉讼，指控其利用该模型制作儿童性虐待图像（CSAM）。此前 xAI 一直否认 Grok 能生成此类内容，此次诉讼标志着其立场转变。案件聚焦用户滥用行为，而非模型本身的技术缺陷。", "type": "industry", "relTime": "3天前"}, {"id": 78, "title": "Google Vids 更新：上传自拍和录音即可创建数字分身，并引入 Gemini Omni 多模态模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/google-vids-now-lets-you-star-in-your-own-ai-videos", "date": "2026-07-16T18:32:54.000Z", "summary": "Google 为 Vids 推出数字分身功能，用户上传自拍和录音即可生成外观和声音与本人一致的 AI 头像。同时，多模态模型 Gemini Omni 被引入 Vids，支持结合文字提示和参考图片生成视频，并能逐步编辑、替换背景或调整光线。新头像与 Google 账号绑定，并带有 SynthID 隐形水印，仅限 18 岁以上特定地区用户使用。", "type": "model", "relTime": "3天前"}, {"id": 79, "title": "Roblox 在移动端推出 AI 游戏创建功能\"Build\"", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/16/roblox-launches-an-ai-powered-game-creation-feature-in-its-mobile-app", "date": "2026-07-16T18:22:06.000Z", "summary": "Roblox 发布新功能\"Build\"，允许用户通过手机输入文字提示（如\"制作一个森林中的舒适冒险游戏\"）直接生成基础游戏，无需编程经验。该功能由开源和 Roblox 自有的 AI 模型驱动，可处理玩法、环境、角色、视觉风格和音效。Build 将于 7 月 28 日在新西兰面向 9 岁以上用户开启公开 Alpha 测试，并提供免费基础版和付费选项。", "type": "model", "relTime": "3天前"}, {"id": 80, "title": "Gemini 数字头像功能上线，一键生成自拍", "source": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2077812539480748035", "date": "2026-07-16T17:48:07.000Z", "summary": "Avatar 🤝 Nano Banana  从今天起，将你自己置于不同场景、风格或时代变得更加快速和便捷。在 Gemini 中一次性设置好你的数字头像，即可无缝创建自定义个人图像，无需每次都上传自拍照。", "type": "paper", "relTime": "3天前"}, {"id": 81, "title": "商汤WAIC发布旗舰原生多模态模型SenseNova U1 PRO", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077807112273707455", "date": "2026-07-16T17:26:34.000Z", "summary": "商汤科技在WAIC发布旗舰原生多模态基础模型SenseNova U1 PRO，专为图像创作设计。现场设有40多个沉浸式技术展位，并展示搭载具身智能、具备\"大脑\"的SenseMART Go机器人。", "type": "industry", "relTime": "3天前"}, {"id": 82, "title": "德国监管机构首次将 Google AI Overviews 与 Perplexity 纳入媒体法管辖", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/germany-puts-googles-ai-overviews-and-perplexity-under-media-law-in-first-of-its-kind-ruling", "date": "2026-07-16T16:12:26.000Z", "summary": "德国媒体监管机构 ZAK 首次将 AI 搜索引擎和聊天机器人认定为内容提供者，对 Google 和 Perplexity 发布裁决。ZAK 认为《数字服务法》的责任豁免不适用于 AI 生成内容，因其属于独立创作而非第三方内容再分发。Google 被指控利用 AI 摘要的优先展示位置，将传统链接（尤其是新闻来源）推至后台，违反了媒体法中的透明度和反歧视规定。", "type": "industry", "relTime": "3天前"}, {"id": 83, "title": "Google Vids 上线 Gemini Omni 与个人数字分身功能", "source": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/workspace/gemini-omni-personal-avatars", "date": "2026-07-16T16:00:00.000Z", "summary": "Google Vids 推出两项更新：Gemini Omni 支持用户通过自然语言提示词和图片参考生成、逐步编辑高质量视频片段；个人数字分身功能允许用户上传自拍和语音录制后，输入文字即可让数字分身出镜。两项功能面向 Google AI Pro 和 Ultra 订阅者及 Google Workspace 商业客户开放，所有生成内容均含不可见的 SynthID 数字水印。", "type": "paper", "relTime": "3天前"}, {"id": 84, "title": "Runway Agent 2.0 发布：将单一创意转化为完整视频作品", "source": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/engineering/inside-building-runway-agent", "date": "2026-07-16T16:00:00.000Z", "summary": "Runway 推出 Agent 2.0，帮助用户将单一创意转化为包含视频、音频和图像的完整作品。在 Physion Labs 的 Arc 1.0 基准测试中，Agent 2.0 在六款 AI 视频智能体中排名第一，重点验证了电影质感、连贯性及信任安全。该工具内置多模型路由与技能层，可自动选择最优模型，并通过视觉优先界面支持故事板迭代，将创意控制始终保留在用户手中。", "type": "model", "relTime": "3天前"}, {"id": 85, "title": "PixVerse 推出 AI 互动直播体验 Live Party", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077784321180713352", "date": "2026-07-16T15:56:00.000Z", "summary": "PixVerse 推出 PixVerse Live Party，一种早期互动直播式体验，由 AI 粉丝主持人 Reina 驱动。该实验性项目探索 AI 视频从生成质量转向用户参与的可能性，展示了 AI 娱乐超越简单视频生成的潜在方向。", "type": "paper", "relTime": "3天前"}, {"id": 86, "title": "Kimi K3 着色器测试：生成新哥特式海洋城市", "source": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2077783731691995348", "date": "2026-07-16T15:53:39.000Z", "summary": "Ethan Mollick 用 Kimi K3 运行着色器测试，提示词为\"生成一座部分淹没在暴风雨海洋中的新哥特式塔楼无限城\"，并追加\"让它更好\"。Kimi K3 表现优秀，虽未达到 Sol Max 或 Fable 的水平，但作为开源权重模型表现出色。", "type": "tip", "relTime": "3天前"}, {"id": 87, "title": "Kimi 3一句话生成博朗3D录音机，质感交互惊艳", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077760058516238743", "date": "2026-07-16T14:19:35.000Z", "summary": "Kimi 3仅凭一句提示词即可生成博朗3D录音机模型，质感和交互一气呵成。用户称其直接吊打头部模型，无需复杂Prompt。", "type": "tip", "relTime": "3天前"}, {"id": 88, "title": "Kimi 3 3D建模能力吊打前代与竞品", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077756166353117402", "date": "2026-07-16T14:04:07.000Z", "summary": "Kimi 3在3D建模和CAD领域实现重大突破，其质感与交互流畅度直接超越头部模型。相比上一代Kimi 2.7，相同提示词下Kimi 3生成效果显著提升，用户无需复杂提示词即可获得高质量3D输出。", "type": "tip", "relTime": "3天前"}, {"id": 89, "title": "面壁智能Build Small黑客马拉松获奖项目", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2077755420610101705", "date": "2026-07-16T14:01:09.000Z", "summary": "🏆 Build Small 黑客马拉松获奖者 - OpenBMB 奖项：🥇爷爷的睡前故事 👴  恭喜以 2，500 美元奖金赢得千词木赛道第一名！🎉  图像可以捕捉瞬间，但背后的故事等待被探索。该项目利用 AI 将视觉内容转化为互动叙事体验，创造分享和体验故事的新方式。👇", "type": "industry", "relTime": "3天前"}, {"id": 90, "title": "生数科技入选工信部2025年人工智能应用典型案例", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/DUg4enEao_ltbEsy9zX5iA", "date": "2026-07-16T12:01:17.000Z", "summary": "生数科技申报的\"国产化高性能多模态通用大模型创新应用\"入选工信部《2025年人工智能应用典型案例名单》技术底座方向。在数字世界，Vidu支持文生视频、图生视频、参考生视频，实时交互模型Vidu S1实现数字角色实时交互；在物理世界，Motubrain打造具身智能通用大脑。", "type": "industry", "relTime": "3天前"}, {"id": 91, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/ex-openai-cto-muratis-thinking-machines-drops-inkling-a-975b-parameter-model-that-leads-us-labs-but-trails-china", "date": "2026-07-16T09:55:28.000Z", "summary": "Thinking Machines Lab 发布开源多模态模型 Inkling，总参数 9750 亿（活跃 410 亿），原生支持文本、图像、音频及百万 token 上下文。该模型在 Artificial Analysis Intelligence Index 上以 41 分领跑美国开源模型，但事实准确率仅 40%，幻觉率高达 63%。", "type": "model", "relTime": "3天前"}, {"id": 92, "title": "生数科技 WAIC 展区开放，可现场体验 Vidu S1 实时互动与 AI 视频生成", "source": "公众号：生数科技（Vidu·视频）", "sourceUrl": "https://mp.weixin.qq.com/s/o7ZBULUpNsiCyj8AtHD_qQ", "date": "2026-07-16T08:59:33.000Z", "summary": "生数科技在 WAIC 展区（上海西岸国际会展中心 X1B-301，7 月 17 日-20 日）开放三项互动活动。参与者可现场体验 Vidu S1 与 AI 角色实时互动，或扫码注册 Vidu 账号完成视频生成并发布至社交平台，领取限量礼品。", "type": "industry", "relTime": "3天前"}, {"id": 93, "title": "华为靳玉志：L3 与 L4 规模商用预计 2027 年、2028 年实现", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/584.htm", "date": "2026-07-16T08:53:04.000Z", "summary": "华为靳玉志预计，L3 规模商用将在 2027 年实现，L4 2B（Robotaxi 部分城市试点）与 L4 2C（低速 L4 部分城市商用）同年开启；2028 年 Robotaxi 或迎来部分城市商用。工信部 6 月已就首部针对 L3/L4 的强制性国家标准公开征求意见，要求自动驾驶系统安全水平至少达到\"合格且专注驾驶人\"水平。", "type": "industry", "relTime": "3天前"}, {"id": 94, "title": "用提示词给Codex换主题，QQ皮肤历史重演", "source": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2077660576655032678", "date": "2026-07-16T07:44:17.000Z", "summary": "用户通过提示词\"读取这个库，给我们当前codex换个主题，用Codex内置imagen生成\"，利用GitHub上的Codex-Dream-Skin库为Codex设计主题。这一操作被类比为当年QQ皮肤自定义的历史重演，做法简单，仅需一条指令即可调用内置图像生成模型完成主题更换。", "type": "tip", "relTime": "3天前"}, {"id": 95, "title": "阿里云EMR Serverless Spark推出AI Functions，SQL分析自动驾驶影像", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077611393272951202", "date": "2026-07-16T04:28:50.000Z", "summary": "阿里云在EMR Serverless Spark中推出AI Functions，将多模态AI能力集成至数据管道，无需模型工程即可用SQL分析自动驾驶摄像头画面。该功能可在数秒内分析5张高分辨率前视图像，识别环岛、警车、皮卡、起重机等目标，实现自动化分析。", "type": "model", "relTime": "4天前"}, {"id": 96, "title": "Mira Murati 新公司推出 975B 开源模型 Inkling", "source": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2077603550868422737", "date": "2026-07-16T03:57:41.000Z", "summary": "前 OpenAI CTO Mira Murati 创立的 Thinking Machine 发布首款模型 Inkling。该模型采用 MoE 架构，总参数量 975B，激活参数 41B，拥有 1M 上下文窗口，在 45T 数据上训练，原生支持文本、图像和音频多模态理解。同时推出激活参数 12B 的 Small 预览版，模型完全开源，后训练数据从 Kimi 2.5 等开源模型蒸馏得到。", "type": "model", "relTime": "4天前"}, {"id": 97, "title": "阿里云AgenticTalks探讨企业级AI视频制作", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2077603351802327458", "date": "2026-07-16T03:56:53.000Z", "summary": "大多数AI视频工具可以生成一个片段。但从原始脚本到成品视频--在企业规模上--需要什么？  #AgenticTalks 第1集--7月23日，在阿里云上直播。  注册 → https://int.alibabacloud.com/m/1000415408/  #AlibabaCloud #AIVideo #AIAgent", "type": "industry", "relTime": "4天前"}, {"id": 98, "title": "中国AI实验室收入达26亿美元，追赶美国巨头", "source": "X：Deedy Das (@deedydas)", "sourceUrl": "https://x.com/deedydas/status/2077573945759572196", "date": "2026-07-16T02:00:02.000Z", "summary": "中国五大独立AI实验室（Kimi、DeepSeek、智谱、快手可灵、MiniMax）及两大云厂商（字节Seedance、阿里Qwen）合计年化收入达26亿美元，其中4家已跻身全球AI公司收入前25。随着Kimi K3发布和Seedance 2.5即将推出，中国在LLM领域持续缩小差距，并在视频生成方面保持领先。", "type": "tip", "relTime": "4天前"}, {"id": 99, "title": "天工短剧工作台发布\"Agent智能分镜+无限画布\"双轨创作模式", "source": "公众号：昆仑万维（天工）", "sourceUrl": "https://mp.weixin.qq.com/s/WlGAeogkF_N5122nHA0TtQ", "date": "2026-07-16T02:00:00.000Z", "summary": "天工短剧工作台推出双轨创作模式，通过导演Agent自动解析剧本、规划站位与机位，并支持多视细节图生成，解决AI短剧角色变脸和站位漂移问题。该工具内置影视级提示词模板、720°全景图及3D导演台，实现可控生产。已有三部作品上线DramaWave 7天实现百万美元级营收。", "type": "paper", "relTime": "4天前"}, {"id": 100, "title": "xAI 起诉 Grok 用户滥用 AI 生成儿童性虐待材料", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/289.htm", "date": "2026-07-16T00:14:37.000Z", "summary": "xAI 起诉南卡罗来纳州男子特里·哈伍德，指控其滥用 Grok 生成儿童性虐待材料及未经同意的色情深度伪造内容。xAI 称 2026 年已暂停 52222 个账户，向美国国家失踪与受虐儿童中心提交 73604 份报告，促成至少 244 人被捕。xAI 要求法院判令哈伍德支付赔偿金并永久禁止其使用 Grok。", "type": "industry", "relTime": "4天前"}, {"id": 101, "title": "OpenRouter 统一多模态 API：Chat、图像生成、嵌入与转录共用同一端点", "source": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/every-modality-one-api", "date": "2026-07-16T00:00:00.000Z", "summary": "OpenRouter 将 Chat、图像生成、嵌入和转录四种模态统一到单一 base URL 下，用户只需切换模型字符串和内容类型，无需管理多个 SDK、账单和认证方案。同一套路由控制可跨所有模态复用，大幅降低多模态开发集成成本。", "type": "model", "relTime": "4天前"}, {"id": 102, "title": "小米发布 Xiaomi-Robotics-1：基于超10万小时真实轨迹训练的视觉-语言-动作基础模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15330", "date": "2026-07-16T00:00:00.000Z", "summary": "小米推出 Xiaomi-Robotics-1，一个视觉-语言-动作（VLA）基础模型，在超10万小时真实世界操控轨迹上预训练，并辅以1万小时跨本体数据后训练。该模型可直接在未见环境中执行多种移动操控任务，在 RoboCasa365 基准上以57.6%成功率超越此前最优的46.6%，在 RoboDojo 上取得20.07平均分（此前最优13.07）。代码和模型权重将开源。", "type": "paper", "relTime": "4天前"}, {"id": 103, "title": "HDR：面向多步视觉推理的分层去噪框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15278", "date": "2026-07-16T00:00:00.000Z", "summary": "HDR将分层潜变量集成到因果视频生成中，实现从粗到细的多步推理。在六项多步视频推理任务上，HDR将成功率从34.22提升至60.29（相对提升76.2%），推理速度比双向扩散快54.2倍。", "type": "paper", "relTime": "4天前"}, {"id": 104, "title": "SUFLECA：通过规模化特征学习实现零样本CAD-图像对齐", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15058", "date": "2026-07-16T00:00:00.000Z", "summary": "SUFLECA提出一种弱监督框架，利用674K张图像上的归一化对象坐标（NOCs）监督，从预训练视觉表征中规模化学习几何感知特征，并配合几何一致匹配算法，实现单张RGB图像到CAD模型的零样本9D位姿估计。在ScanNet25k上，SUFLECA以更小计算量达到33.4%/42.3%类别/实例准确率，超越最强零样本基线10.3/12.2个百分点，且首次在该基准上超过全监督方法。代码已开源。", "type": "paper", "relTime": "4天前"}, {"id": 105, "title": "VIABench：首个面向视障辅助场景的多模态视频评测基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14660", "date": "2026-07-16T00:00:00.000Z", "summary": "VIABench 是一个专门用视障人士第一人称视频评估多模态大语言模型（MLLM）的基准，定义了主动提醒、视觉问答和视觉引导交互三项核心任务。实验表明，当前 MLLM 在主动提醒任务上表现最差，难以准确预判导航事件并实时响应。该基准支持在线与离线两种评测模式，代码与数据将开源。", "type": "paper", "relTime": "4天前"}, {"id": 106, "title": "VideoChat3 发布：完全开源的高效通用视频 MLLM，4B 参数超越同规模模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14935", "date": "2026-07-16T00:00:00.000Z", "summary": "VideoChat3 是一个完全开源的视频多模态大模型（MLLM），专为高效和通用视频理解设计。它引入 Inflated 3D Vision Transformer （I3D-ViT） 和自适应帧率流式视频感知技术，降低训练与推理成本，并构建了覆盖通用、长视频和流式场景的三个高质量数据集。仅 4B 参数，VideoChat3 在多项基准测试中超越同等或更大参数量的开源模型。", "type": "paper", "relTime": "4天前"}, {"id": 107, "title": "RoboTTT：将机器人策略的视觉运动上下文窗口扩展至 8K 时间步", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15275", "date": "2026-07-16T00:00:00.000Z", "summary": "RoboTTT 将机器人策略的视觉运动上下文窗口扩展至 8K 时间步，比现有最优策略高出三个数量级，且推理延迟不增加。该模型支持从人类视频演示进行一次性上下文模仿、即时策略改进和长时程任务。在真实机器人操作任务中，RoboTTT 相比单步基线性能提升 87%，8K 上下文训练版本比 1K 版本性能高出 62%。", "type": "paper", "relTime": "4天前"}, {"id": 108, "title": "MeanFlowNFT：将前向过程强化学习引入平均速度生成器", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.15273", "date": "2026-07-16T00:00:00.000Z", "summary": "MeanFlowNFT 提出一种将前向过程强化学习（RL）应用于 MeanFlow 生成器的方法。通过构建瞬时速度预测器并应用 DiffusionNFT 目标函数，MeanFlowNFT 在保持平均速度快速少步采样的同时，实现了严格的策略改进保证。", "type": "paper", "relTime": "4天前"}, {"id": 109, "title": "WanSong v1.0 技术报告发布：纯扩散模型实现5分钟双轨歌曲生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14749", "date": "2026-07-16T00:00:00.000Z", "summary": "WanSong 是一个纯扩散模型，可直接生成长达5分钟、支持多语言的高保真歌曲，并一次性输出人声和背景音乐双音轨。该框架通过步蒸馏实现更快的推理速度，并为下游编辑任务提供高效的微调和定制路径。", "type": "paper", "relTime": "4天前"}, {"id": 110, "title": "Thinking Machines Lab 发布 Inkling：975B 参数开源多模态 MoE 模型", "source": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/07/15/thinking-machines-lab-releases-inkling-a-975b-parameter-open-weights-multimodal-moe-with-41b-active-parameters-and-controllable-thinking-effort", "date": "2026-07-15T23:48:58.000Z", "summary": "Thinking Machines Lab 于 7 月 15 日发布其首个从头训练的模型 Inkling，采用 Apache 2.0 协议开源完整权重。该模型为 975B 参数 MoE Transformer，41B 活跃参数，支持 1M token 上下文窗口及文本、图像、音频输入，核心差异化在于可控思考深度。", "type": "model", "relTime": "4天前"}, {"id": 111, "title": "苹果 Apple 智能通过备案，阿里千问将集成至国行 iPhone；小米开源具身通用模型 Xiaomi-Robotics-U0", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/275.htm", "date": "2026-07-15T23:28:20.000Z", "summary": "网信部门新增\"Apple 智能\"等7款手机端侧生成式AI服务备案，阿里千问将作为AI能力集成至Apple 智能，国行iPhone AI功能上线在即。小米开源具身领域首个统一生成模型Xiaomi-Robotics-U0，在WorldArena评测基准上以126个模型参评取得总分第一。华为2026年智能手机出货目标提升20%以上至6000万部，第二季度在华市场份额达23%。", "type": "industry", "relTime": "4天前"}, {"id": 112, "title": "英伟达与丰田扩大合作，基于NVIDIA DRIVE AGX开发L2++辅助驾驶汽车", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/272.htm", "date": "2026-07-15T23:18:27.000Z", "summary": "丰田与英伟达扩大合作，将采用搭载NVIDIA DriveOS的NVIDIA DRIVE AGX平台开发下一代汽车，实现L2++驾驶辅助功能。双方还将物理AI应用拓展至机器人、智慧城市等领域，丰田子公司Woven by Toyota使用NVIDIA H100 GPU开发了多模态视觉语言模型Woven City AI Vision Engine，用于城市交通智能分析。", "type": "industry", "relTime": "4天前"}, {"id": 113, "title": "xAI 起诉一名男子使用 Grok 生成儿童性虐待材料深度伪造内容", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/966293/xai-grok-user-lawsuit-csam", "date": "2026-07-15T21:33:20.000Z", "summary": "xAI 起诉南卡罗来纳州男子 Terry Wayne Harwood，指控其\"明知且故意\"使用 Grok AI 聊天机器人绕过安全措施、生成并传播儿童性虐待材料（CSAM），违反公司政策。Harwood 已于今年 2 月因涉嫌持有和传播 CSAM 被捕，面临八项重罪指控。xAI 在诉讼中称，与 Harwood 刑事指控相关的\"至少部分\"图像系使用 Grok 生成或篡改。", "type": "industry", "relTime": "4天前"}, {"id": 114, "title": "阶跃星辰 StepFun 3.7 Flash 上线 P0 平台", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077503365500874800", "date": "2026-07-15T21:19:35.000Z", "summary": "阶跃星辰与 P0 Systems 合作，将其旗舰多模态推理模型 StepFun 3.7 Flash 部署至 P0 平台。该模型支持 256K 上下文窗口、原生图像与视频理解及完整工具调用，限时免费向所有 P0 用户开放，可通过 Peezy CLI 和网关使用。", "type": "model", "relTime": "4天前"}, {"id": 115, "title": "Stanford与NVIDIA联合推出RoboTTT，原生扩展机器人策略上下文窗口至8000时间步", "source": "X：Fei-Fei Li (@drfeifei, World Labs)", "sourceUrl": "https://x.com/drfeifei/status/2077497317255737422", "date": "2026-07-15T20:55:33.000Z", "summary": "RoboTTT在模型内部嵌入微型网络，每帧传感器数据触发一次梯度更新，将历史压缩进固定大小的隐藏状态，实现持续学习且推理成本不变。8K上下文预训练性能比1K提升62%，从128到8K步的闭环性能持续爬升无饱和迹象，支持从人类视频进行一次性模仿学习。", "type": "paper", "relTime": "4天前"}, {"id": 116, "title": "Thinky发布多模态模型Inkling，训练成本约$10-20M", "source": "X：Emad Mostaque (@EMostaque)", "sourceUrl": "https://x.com/EMostaque/status/2077488972733808803", "date": "2026-07-15T20:22:23.000Z", "summary": "Thinky Machines发布Inkling模型，支持文本、图像、音频多模态推理，并开放完整权重。Emad Mostaque估算其训练算力约1e25 FLOPs（与DeepSeek V4相当），在2k块GB300芯片上运行1个月，成本约$10-20M。Lite版本算力约4倍更低，接近DeepSeek V3的3e24 FLOPs。", "type": "tip", "relTime": "4天前"}, {"id": 117, "title": "Fountain 0 用 AI 生成《奥德赛》改编电影《Odysseus： The Fall》", "source": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/entertainment/965616/ash-koosha-odysseus-the-fall-foundtain-zero-tilly-norwood", "date": "2026-07-15T20:00:00.000Z", "summary": "电影工作室 Fountain 0 宣布正在制作一部 AI 生成的《奥德赛》改编电影《Odysseus： The Fall》，试图借克里斯托弗·诺兰新片《奥德赛》的热度吸引关注。这类 AI 生成电影被视为新时代的\"直接发行视频\"式低成本快钱项目。", "type": "tip", "relTime": "4天前"}, {"id": 118, "title": "Inkling 发布：开放权重 975B 参数多模态 MoE 模型，41B 活跃参数", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://thinkingmachines.ai/inkling", "date": "2026-07-15T19:21:30.493Z", "summary": "Inkling 是一款开放权重的 975B 总参数（41B 活跃参数）MoE 大语言模型，支持文本、图像和音频输入，上下文窗口达 1M tokens。该模型在知识、数学、科学及智能体编程任务上表现均衡，并具备可控思考时间与校准置信度预测功能。用户可通过 Tinker 平台对 Inkling 进行微调，模型权重已在 Hugging Face 开放。", "type": "model", "relTime": "4天前"}, {"id": 119, "title": "Thinking Machines Lab 发布开源多模态模型 Inkling", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077472478499053846", "date": "2026-07-15T19:16:51.000Z", "summary": "Thinking Machines Lab 发布其首个完全训练并开源权重的基座模型 Inkling。该模型总参数量 975B，每 token 激活 41B，支持文本、图像、音频推理，上下文窗口达 1M token，并支持可控推理成本。完整权重已开放，开发者可通过 Tinker 平台进行微调。", "type": "model", "relTime": "4天前"}, {"id": 120, "title": "Thinking Machines 开源多模态模型 Inkling", "source": "X：Lilian Weng (@lilianweng)", "sourceUrl": "https://x.com/lilianweng/status/2077471903032528912", "date": "2026-07-15T19:14:33.000Z", "summary": "Thinking Machines 发布开源权重模型 Inkling，支持文本、图像和音频模态的高效推理。完整权重已开放，可在 Tinker 平台进行微调。", "type": "model", "relTime": "4天前"}, {"id": 121, "title": "Thinking Machines发布975B MoE开源模型Inkling", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2077470616832127423", "date": "2026-07-15T19:09:27.000Z", "summary": "Thinking Machines发布开源多模态MoE模型Inkling，总参数量975B（41B激活），原生支持文本、图像和音频模态，提供64K和256K两种上下文长度。完整权重已开放，可在Tinker平台微调并在Inkling Playground体验。", "type": "model", "relTime": "4天前"}, {"id": 122, "title": "Gemini东南亚报告：用户翻倍，多模态占比42%", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077465612226531586", "date": "2026-07-15T18:49:34.000Z", "summary": "Google 发布首份 Gemini 东南亚报告，该地区用户量在过去 12 个月翻倍，新加坡人均采用率全球最高，用户日均交互约 10 次。42% 的提示词已包含语音、图像、视频等多模态输入，70% 的提示词使用本地语言撰写。印尼 82% 的提示词来自手机，越南每月超 16 万学生使用 Exam Prep 功能。", "type": "industry", "relTime": "4天前"}, {"id": 123, "title": "Thinking Machines 发布生产级语言模型 Inkling，成美国实验室最强开源模型", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077461348079001716", "date": "2026-07-15T18:32:37.000Z", "summary": "Thinking Machines 发布首个生产级语言模型 Inkling，总参数量 975B，激活 41B，支持文本、图像和音频多模态输入。该模型在 Artificial Analysis Intelligence Index 上以 41 分成为美国实验室最强开源模型，超越 Nemotron 3 Ultra（38 分）和 Gemma 4 31B（29 分）。", "type": "model", "relTime": "4天前"}, {"id": 124, "title": "Thinky 发布开源多模态模型 Inkling", "source": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2077455354594836834", "date": "2026-07-15T18:08:48.000Z", "summary": "Thinky 发布 Inkling，一个高效处理文本、图像和音频的多模态推理模型，并开放完整权重。该模型即日起可在 Tinker 平台微调，并可通过 Inkling Playground 体验。Nathan Lambert 称赞这种开源发布方式，认为其有望取得类似 Tinker 的成功。", "type": "model", "relTime": "4天前"}, {"id": 125, "title": "Thinking Machines 发布多模态模型 Inkling", "source": "X：Thinking Machines (@thinkymachines)", "sourceUrl": "https://x.com/thinkymachines/status/2077454609551921208", "date": "2026-07-15T18:05:50.000Z", "summary": "今天，我们推出 Inkling。  Inkling 能高效地对文本、图像和音频模态进行推理。我们将提供完整权重。  https://thinkingmachines.ai/news/introducing-inkling/  即日起可在 Tinker 上进行微调。在 Inkling Playground 中试用。🧵", "type": "model", "relTime": "4天前"}, {"id": 126, "title": "阶跃星辰 Step 3.7 Flash 上线 Baseten", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2077447198728659223", "date": "2026-07-15T17:36:23.000Z", "summary": "阶跃星辰的 Step 3.7 Flash 模型已上线 Baseten 模型库。该模型为 198B 参数稀疏 MoE 架构（每 token 激活 11B），原生支持图像和视频输入，拥有 256K 上下文窗口，专为视觉推理、智能体编程和长上下文任务设计。", "type": "industry", "relTime": "4天前"}, {"id": 127, "title": "Moonshot AI 发布 PerceptionBench：多模态模型视觉感知能力诊断基准", "source": "Moonshot AI：Kimi Blog", "sourceUrl": "https://www.kimi.com/blog/perception-bench", "date": "2026-07-15T16:00:00.000Z", "summary": "Moonshot AI 发布 PerceptionBench，一个从 40 多个现有基准中模型实际失败案例归纳出的视觉感知基准，包含 10 项原子感知能力和 3000 道验证题。所有测试模型准确率均未超过 60%，且大量正确答案在重复提问时无法复现，表明模型更多是猜测而非真正感知。PerceptionBench 旨在精确诊断多模态 AI 的视觉感知断裂点，推动其实现忠实、一致的视觉理解。", "type": "paper", "relTime": "4天前"}, {"id": 128, "title": "预训练MLLM零样本奖励模型用于文生图", "source": "X：AK (@_akhaliq)", "sourceUrl": "https://x.com/_akhaliq/status/2077420923410358343", "date": "2026-07-15T15:51:59.000Z", "summary": "Read It Back  预训练多模态大语言模型是文生图的零样本奖励模型", "type": "paper", "relTime": "4天前"}, {"id": 129, "title": "Apple Intelligence 获准在华上线，将集成阿里巴巴 Qwen 大模型", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/15/apple-intelligence-approved-for-launch-in-china-with-alibabas-qwen-ai", "date": "2026-07-15T15:29:33.000Z", "summary": "中国网信办批准 Apple Intelligence 在华上线，苹果将把阿里巴巴的 Qwen 大模型集成至 iOS、iPadOS、macOS 及 visionOS 系统。该合作此前传闻已久，标志着苹果在关键市场的 AI 布局取得重要进展。阿里巴巴确认 Qwen 将被\"整合到 Apple Intelligence 体验中\"，提供文本与图像理解及生成等 AI 能力。", "type": "industry", "relTime": "4天前"}, {"id": 130, "title": "英伟达 Jim Fan 团队发布 RoboTTT，原生支持 8000 时间步上下文", "source": "X：Jim Fan (@DrJimFan)", "sourceUrl": "https://x.com/DrJimFan/status/2077414142340988962", "date": "2026-07-15T15:25:02.000Z", "summary": "英伟达高级科学家 Jim Fan 团队发布 RoboTTT，将机器人模型的原生上下文窗口扩展至 8000 个时间步（约 5 分钟肌肉记忆），推理成本不变。8K 上下文预训练性能比 1K 提升 62%，且性能随上下文增长持续提升无饱和迹象，支持从人类视频进行一次性上下文学习。", "type": "model", "relTime": "4天前"}, {"id": 131, "title": "Gemini 东南亚报告：用户翻倍，多模态驱动增长", "source": "X：Josh Woodward (@joshwoodward, Google Labs VP)", "sourceUrl": "https://x.com/joshwoodward/status/2077411104775406045", "date": "2026-07-15T15:12:58.000Z", "summary": "我们刚刚发布了首份 Gemini 东南亚报告（如下），3 个洞察：  1/ 活跃用户在过去一年翻了一番多 2/ 70% 的提示词以本地语言提交 3/ 40% 的提示词仅使用语音、图像或视频  Gemini 的本地语言能力 + 多模态功能 + 移动应用正在推动增长，我们很快将为该地区带来更多更新！  🇮🇩🇲🇾🇵🇭🇸🇬🇹🇭🇻🇳", "type": "industry", "relTime": "4天前"}, {"id": 132, "title": "PixVerse 推出 AI Game Engine 游戏引擎", "source": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2077405097546362919", "date": "2026-07-15T14:49:06.000Z", "summary": "PixVerse 发布 AI Game Engine，通过 PixVerse Game 将实时生成视频、AI 智能体、游戏机制与用户定义世界结合，探索视频模型融入交互式游戏的可能性。该项目目前为早期技术实验，并非成熟平台，已开放体验地址并发放少量邀请码。", "type": "model", "relTime": "4天前"}, {"id": 133, "title": "Viggle AI 新游戏支持自定义对战场景", "source": "X：Viggle AI (@ViggleAI)", "sourceUrl": "https://x.com/ViggleAI/status/2077402970015015234", "date": "2026-07-15T14:40:38.000Z", "summary": "我们的游戏 Fight Anyone 3D 新增功能：场景 ⚔️  选择一个著名对决。挑选你的战士。然后观看竞技场、技能和特殊招式围绕这场对决生成。  埼玉 vs 悟空。C罗 vs 梅西。你 vs 你的朋友。开始对战 → → https://viggle.ai/games/app/", "type": "product", "relTime": "4天前"}, {"id": 134, "title": "Withings Body Scan 2 体重秤上市：可测高血压风险与细胞健康等 60 项指标，599.95 美元", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/216.htm", "date": "2026-07-15T11:57:37.000Z", "summary": "Withings Body Scan 2 体重秤正式上市，定价 599.95 美元，可测量包括高血压风险检测和细胞健康评估在内的 60 项人体指标。新机型将显示屏移至可拉出式把手上，新增阻抗心动描记技术（ICG）与生物电阻抗光谱分析（BIS）功能。所有数据由经临床验证的 AI 模型分析，生成高血压风险评估、血糖调节能力分析等健康洞察。", "type": "model", "relTime": "4天前"}, {"id": 135, "title": "阿里 Qwen 将集成至 Apple Intelligence，为中国用户提供 AI 功能", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077360556156309530", "date": "2026-07-15T11:52:06.000Z", "summary": "阿里巴巴的 Qwen 模型将集成至 Apple Intelligence，为中国用户提供 iOS、iPadOS、macOS 及 visionOS 上的文本与图像理解、内容生成等 AI 功能。中国网信办已公布包括 Apple Intelligence 在内的七项移动端生成式 AI 服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在评估多家中国公司后选择了阿里。", "type": "industry", "relTime": "4天前"}, {"id": 136, "title": "阿里千问将集成至苹果智能，服务中国用户", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077357348293939259", "date": "2026-07-15T11:39:21.000Z", "summary": "阿里千问将作为AI能力集成至Apple智能，为iOS、iPadOS、macOS和visionOS的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可使用。网信办同日发布7款手机端侧生成式AI服务备案信息，包括苹果智能、华为小艺大模型、OPPO AndesGPT大模型等。", "type": "industry", "relTime": "4天前"}, {"id": 137, "title": "阿里Qwen将集成至Apple Intelligence服务中国用户", "source": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2077346752219521469", "date": "2026-07-15T10:57:15.000Z", "summary": "阿里巴巴的Qwen模型将被集成到Apple Intelligence中，为中国的iOS、iPadOS、macOS和visionOS用户提供文本与图像理解、内容生成等AI功能。中国网信办已公布包括Apple Intelligence、华为小艺大模型、OPPO AndesGPT在内的七项移动端生成式AI服务备案信息。阿里巴巴董事会主席蔡崇信表示，苹果在选定阿里前曾与多家中国公司洽谈。", "type": "industry", "relTime": "4天前"}, {"id": 138, "title": "Booster T2 人形机器人算力达 2070 TFLOPS", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077344548234391719", "date": "2026-07-15T10:48:30.000Z", "summary": "Booster T2 作为旗舰级具身开发平台，提供高达 2070 TFLOPS 算力，为双足人形机器人同类最高。开发者可将更多算力用于本地推理，运行更复杂的视觉与策略模型，同时消除网络延迟与连接中断风险。", "type": "model", "relTime": "4天前"}, {"id": 139, "title": "MengTo 开源 75 个 AI 智能体技能包，含设计指令与工作流", "source": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2077335188666044426", "date": "2026-07-15T10:11:18.000Z", "summary": "设计师与开发者 MengTo 开源了包含 75 个 Skills 的项目，将设计指令、工作流和风格系统沉淀为可复用的 AI 智能体技能包。项目涵盖 10 个 Codex 工作流（如从参考视频一键生成 HTML）和 62 个网页设计技能，并提供\"design-first-ui-prompting\"方法论，通过固定 prompt 骨架和变体迭代提升输出质量。", "type": "tip", "relTime": "4天前"}, {"id": 140, "title": "豆包用户分享AI工作实践：项目经理、博物馆管理员、科研工作者等案例", "source": "公众号：豆包（字节）", "sourceUrl": "https://mp.weixin.qq.com/s/9KViDnf0pUAkm618wAyDbQ", "date": "2026-07-15T09:59:20.000Z", "summary": "不同行业从业者用豆包辅助工作，效果显著。项目经理处理项目文档和代码时修改量最小；自然博物馆管理员用豆包鉴定出化石具体属名，复查确认无误；数学老师用豆包生成3D几何模型和可缩放地图教具，备课时间减半。", "type": "tip", "relTime": "4天前"}, {"id": 141, "title": "消息称百度为苹果 Apple 智能提供 AI 搜索功能，阿里千问也将集成", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/164.htm", "date": "2026-07-15T09:54:50.000Z", "summary": "知情人士透露，百度正为苹果 Apple 智能开发基于 AI 的搜索功能，可处理图像和文本，并升级中国版 Siri。同时，阿里巴巴宣布阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等体验。Apple 智能大模型已于 2026 年 7 月 8 日备案，适用场景为苹果手机。", "type": "industry", "relTime": "4天前"}, {"id": 142, "title": "Airtap 定时任务：AI Agent 自动生成日报", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077324930698313985", "date": "2026-07-15T09:30:32.000Z", "summary": "Airtap 通过 iMessage 实现定时 Routine 功能，每天早九点自动在云手机中打开 TikTok，扫描八个中英赛道关键词、刷七十多条热门视频，输出包含赛道趋势、高价值创作者清单和内容技巧的结构化日报。用户无需再发指令，AI Agent 从单次执行升级为常驻的初级信息岗位，替用户完成机械重复的信息搜集工作，只留决策环节。", "type": "tip", "relTime": "4天前"}, {"id": 143, "title": "国行 Apple 智能完成备案，阿里千问将集成至苹果 AI 能力", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/109.htm", "date": "2026-07-15T08:41:23.000Z", "summary": "苹果技术开发（上海）有限公司的\"Apple 智能\"大模型已于 2026 年 7 月 8 日完成备案，适用场景为苹果手机。阿里千问将作为 AI 能力集成至 Apple 智能，为 iOS、iPadOS、macOS 和 visionOS 的中国用户提供文本与图像理解、内容生成等功能，用户无需在应用间切换即可直接体验。", "type": "industry", "relTime": "4天前"}, {"id": 144, "title": "火山引擎发布 Seedance 2.5，AI 视频生成支持 30 秒直出与 50 份全模态素材输入", "source": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/tSfAoa30uuwPsR7XhVA2VA", "date": "2026-07-15T08:04:37.000Z", "summary": "Seedance 2.5 大幅提升多人运动场景下的人物一致性与动态表现，支持图片、音频、视频等全模态素材最高 50 份同时导入。模型新增二次编辑能力，可对已生成画面进行定向修改而无需整段重做；指令遵循支持时间戳精准响应，按秒对齐 Prompt 中的画面动作。Seedance 2.5 单段原生视频最长 30 秒，火山引擎将于近日上线其 API。", "type": "model", "relTime": "4天前"}, {"id": 145, "title": "阶跃星辰 WAIC 2026 展区亮点：Step 系列模型矩阵、Step AOS 及智能体手机 STEPX Neo 亮相", "source": "公众号：阶跃星辰（Step）", "sourceUrl": "https://mp.weixin.qq.com/s/WG8XxNHddjEblHCPgleWpw", "date": "2026-07-15T07:08:22.000Z", "summary": "阶跃星辰将在 WAIC 2026 展出 Step 系列模型矩阵，覆盖云端与端侧、多模态理解与生成能力。全球首个智能体原生操作系统 Step AOS 及荣获本届 WAIC\"镇馆之宝\"的智能体手机 STEPX Neo 首次线下公开亮相。此外，阶跃还携手吉利、千里科技升级汽车智能体，并与原力灵机发起 6 台机器人连续协作 15 小时拼装 8 万余块积木的极限挑战。", "type": "model", "relTime": "4天前"}, {"id": 146, "title": "小米开源 Xiaomi-Robotics-U0：380 亿参数多模态具身生成模型", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/977/012.htm", "date": "2026-07-15T06:52:33.000Z", "summary": "小米发布并开源 Xiaomi-Robotics-U0，一个 380 亿参数的多模态自回归具身生成基础模型，是具身领域首个\"通吃\"场景生成、具身迁移、机器人交互视频生成和通用文生图/图像编辑四类任务的统一模型。该模型在 WorldArena 评测基准上以匿名代号 UNIS 取得全球 126 个模型中的总分第一名，并通过 FlashAR+ 推理加速方案将生成效率提升近 83 倍。", "type": "model", "relTime": "5天前"}, {"id": 147, "title": "谷歌图片服务 25 周年，AI 概览新增 Nano Banana 生图功能", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/980.htm", "date": "2026-07-15T06:26:45.000Z", "summary": "谷歌庆祝图片服务上线 25 周年，在 AI 概览中新增图像生成功能，用户可直接调用最新的 Nano Banana 模型，将文本提示转化为原创的高质量自定义图像。该功能将在未来几周内陆续在英文版中推出，面向所有目前支持 AI 模式图像创建的地区。", "type": "model", "relTime": "5天前"}, {"id": 148, "title": "Airtap iMessage 新功能：发条短信让 AI 替你操作手机", "source": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2077217295504490992", "date": "2026-07-15T02:22:50.000Z", "summary": "Airtap 推出 iMessage 新功能，用户只需给美国号码发一条 iMessage，其云手机上的 AI Agent 就能通过视觉模拟点击，替用户完成 TikTok 刷视频、星巴克点单等操作，无需安装对应 App。其架构分为三层：大脑（理解指令）、AutoPilot（视觉操控屏幕）、云手机（24小时在线）。但支付等敏感操作仍需用户手动完成，信任与授权仍是所有 Agent 厂商的难题。", "type": "tip", "relTime": "5天前"}, {"id": 149, "title": "OpenMOSS 开源 MOSS-VL-Realtime 实时视频流多模态模型", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077187667025125579", "date": "2026-07-15T00:25:06.000Z", "summary": "OpenMOSS 开源了 11B 参数的 MOSS-VL-Realtime 模型，支持在视频持续输入时同步感知与生成，可边处理新帧边回复，并在场景变化时主动修改或中断回答。该模型采用 Cross-Attention 架构与 XRoPE 时空位置编码，支持 256K 上下文窗口，已以 Apache-2.0 协议开源。", "type": "model", "relTime": "5天前"}, {"id": 150, "title": "离散扩散模型统一框架：从分词到生成", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13431", "date": "2026-07-15T00:00:00.000Z", "summary": "离散去噪扩散模型（DDM）近期成为自回归建模的有力替代方案，支持并行生成与迭代全局精炼。该研究提出一个统一概念框架，通过底层离散状态空间的构建（分词方案、词汇拓扑、领域特定结构字母表）审视DDM，将转移矩阵、掩码/吸收态、评分/比率等方法纳入同一设计空间。框架揭示了训练目标、推理算法、扩展行为、系统优化与评估协议中的常见设计权衡，并指出若干未来研究方向。", "type": "paper", "relTime": "5天前"}, {"id": 151, "title": "Hallo4D：面向一致时空生成的多模态幻觉缓解框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12752", "date": "2026-07-15T00:00:00.000Z", "summary": "Hallo4D 提出一种无需重训练或修改架构的生成-检测-修正范式，利用大语言模型识别多视角渲染中的时空不一致性，并通过多模型投票引导图像空间一致性优化。该方法引入运动感知关键帧采样与外观对齐，在多种3D和4D生成设置中持续优于强基线，提供可扩展的泛化解。", "type": "paper", "relTime": "5天前"}, {"id": 152, "title": "GigaWorld-Policy-0.5：一种更快速、更强的高效世界动作模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13960", "date": "2026-07-15T00:00:00.000Z", "summary": "GigaWorld-Policy-0.5 是一种面向机器人控制的高效世界动作模型，训练时利用未来视觉动态，推理时仅解码动作，避免生成未来视频的计算开销。该模型采用混合训练策略与 Mixture-of-Transformers 架构，在本地 RTX 4090 上实现 85 ms 推理延迟。", "type": "paper", "relTime": "5天前"}, {"id": 153, "title": "仅需一层适配层：将预训练视觉编码器用于扩散模型图像生成", "source": "Apple Machine Learning Research（RSS）", "sourceUrl": "https://machinelearning.apple.com/research/adapting-pretrained-visual-encoders", "date": "2026-07-15T00:00:00.000Z", "summary": "Apple 研究提出在预训练视觉编码器后添加一个轻量级适配层，即可直接用于扩散模型图像生成，无需重新训练整个编码器。该方法在 ImageNet 无条件生成任务上达到 1 FID，性能与专用编码器相当，且大幅降低计算成本。", "type": "paper", "relTime": "5天前"}, {"id": 154, "title": "VideoRAE：利用表示自编码器驯服视频基础模型进行生成建模", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14088", "date": "2026-07-15T00:00:00.000Z", "summary": "VideoRAE 提出统一视频自编码框架，直接使用冻结的 V-JEPA 2 等视频基础模型作为编码器，通过轻量级投影器将多尺度特征压缩为紧凑潜空间，同时支持扩散 Transformer 和自回归模型的表示。在 UCF-101 上，其自回归和 DiT 生成器分别取得 40 和 93 的类到视频 gFVD，训练速度比竞争基线快约 5 倍。", "type": "paper", "relTime": "5天前"}, {"id": 155, "title": "Chat2Scenic：面向自动驾驶场景生成的迭代RAG框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14387", "date": "2026-07-15T00:00:00.000Z", "summary": "Chat2Scenic提出首个迭代检索增强框架，将法规描述自动转化为自动驾驶测试场景的可执行脚本。在包含123个场景的开放基准上，该框架实现76.42%编译成功率和58.17%框架准确率，显著超越现有方法。代码已开源。", "type": "paper", "relTime": "5天前"}, {"id": 156, "title": "Hy-Embodied-RxBrain：具身认知基础模型融合语言与视觉推理想象", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14187", "date": "2026-07-15T00:00:00.000Z", "summary": "Hy-Embodied-RxBrain 是一个具身认知基础模型，将语言与视觉想象融合到单一规划序列中，语言提供任务分解与决策逻辑，视觉想象则通过世界状态预测将抽象结构具象化。该模型采用统一的 Mixture-of-Transformers 架构，支持语言、图像和视频的理解与生成，并在连续机器人动作生成中无需大规模动作数据预训练即可展现有前景的实机表现。", "type": "paper", "relTime": "5天前"}, {"id": 157, "title": "从像素到状态：将交互式世界模型重新构想为游戏引擎", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14076", "date": "2026-07-15T00:00:00.000Z", "summary": "该论文提出将交互式世界模型视为游戏引擎，并沿玩家动作控制、游戏状态动态、状态-观察持久性和实时交互生成四个维度审视现有方法。论文还发布了《黑神话：悟空》可扩展数据引擎，包含超过90小时游戏画面、帧对齐的玩家动作、真实游戏状态及视觉观察，并配有结构化与语义标注，用于支持状态感知的世界模型研究。", "type": "paper", "relTime": "5天前"}, {"id": 158, "title": "KeyFrame-Compass：关键帧条件视频生成的首个系统评估基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14202", "date": "2026-07-15T00:00:00.000Z", "summary": "KeyFrame-Compass 是首个系统评估关键帧条件视频生成的基准，包含 386 个样本，覆盖三种应用领域与四种关键帧密度。测试九个系统后发现，当前模型在忠实执行关键帧与自然视频合成之间存在明显权衡，且多数开源模型无法将分镜网格输入理解为时序关键帧序列。", "type": "paper", "relTime": "5天前"}, {"id": 159, "title": "MultiRef-Compass：多参考音视频生成统一评测基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.14189", "date": "2026-07-15T00:00:00.000Z", "summary": "MultiRef-Compass 基准推出，填补多参考音视频生成（MR2AV）缺乏统一评测的空白。该基准包含 350 个样本，从基础质量、参考一致性等四个维度，采用 14 项子指标评测 8 个代表性系统，结果显示各维度均有显著提升空间。", "type": "paper", "relTime": "5天前"}, {"id": 160, "title": "Thinking Machines 发布开源多模态 MoE 模型 Inkling，1T 参数支持 1M 上下文", "source": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/thinkingmachines-inkling", "date": "2026-07-15T00:00:00.000Z", "summary": "Thinking Machines 在 Hugging Face 开源 Inkling，一个约 1T 参数的原生多模态 MoE 模型，支持图像、文本和音频输入，拥有 1M 上下文窗口。", "type": "model", "relTime": "5天前"}, {"id": 161, "title": "阿里开源14B音乐舞蹈视频模型Wan-Dancer", "source": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2077177242107727986", "date": "2026-07-14T23:43:41.000Z", "summary": "阿里巴巴开源14B参数模型Wan-Dancer-14B，可本地运行，上传角色和歌曲即可生成与节拍同步的舞蹈视频。支持街舞、踢踏、拉丁、K-Pop、中式古典等多种风格，并能实现较长时间连贯输出。该模型将\"音乐→节奏→精准舞蹈动作\"的垂直能力做到可本地部署，大幅降低了内容创作者的使用门槛。", "type": "model", "relTime": "5天前"}, {"id": 162, "title": "Atomic Chat 将腾讯 Hy3 模型压缩至 1-bit 本地运行，速度超云 API 2.2 倍", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077166650697388052", "date": "2026-07-14T23:01:36.000Z", "summary": "Atomic Chat 将腾讯开源 295B 参数 MoE（21B 活跃参数）模型 Hy3 极端压缩至 1-bit，生成 92GB GGUF 文件。在 4 块 RTX 5090（128GB VRAM）上本地运行，速度达同模型云 API 的 2.2 倍。测试中，本地版与云 API 版均能通过单次提示词生成 Flappy Bird、Arkanoid 和 Snake 游戏，无崩溃或明显视觉差异。输...", "type": "model", "relTime": "5天前"}, {"id": 163, "title": "Simon Willison 在 Codex Desktop 中创建自定义宠物\"Pedalican\"", "source": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/Jul/14/pedalican", "date": "2026-07-14T22:29:45.000Z", "summary": "Simon Willison 在 Codex Desktop 中意外激活了一个类似 Clippy 的动画机器人\"宠物\"，随后发现可以自定义创建。他通过 GPT-5.6 Sol xhigh 模型描述需求，并借助 gpt-image-2 多轮生成精灵素材，最终制作出一只骑自行车的小鹈鹕\"Pedalican\"，在桌面上弹跳并更新 Codex 任务状态。关键实现细节已开源，包括 openai/ski...", "type": "tip", "relTime": "5天前"}, {"id": 164, "title": "阿里Qwen-Audio-3.0-TTS-Plus登顶Artificial Analysis语音竞技场排行榜", "source": "X：Artificial Analysis (@ArtificialAnlys)", "sourceUrl": "https://x.com/ArtificialAnlys/status/2077140161335631957", "date": "2026-07-14T21:16:20.000Z", "summary": "阿里巴巴最新文本转语音模型Qwen-Audio-3.0-TTS-Plus在Artificial Analysis语音竞技场排行榜上以1，236 Elo分（±17）超越Simba 3.2（1，234分）、Gemini 3.1 Flash TTS（1，214分）和Sonic 3.5（1，207分），成为提供商语音类别新领头羊。该模型生成速度为每秒16个字符，低于竞品；定价为每百万字符27.59美...", "type": "model", "relTime": "5天前"}, {"id": 165, "title": "Bonsai 27B：首款可在手机上运行的27B级多模态模型", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://prismml.com/news/bonsai-27b", "date": "2026-07-14T19:51:19.560Z", "summary": "Bonsai 27B 基于 Qwen3.6 27B，提供三元（1.71 有效比特/权重，5.9 GB）和 1-bit（1.125 有效比特/权重，3.9 GB）两个变体，后者首次将 27B 级模型装入 iPhone 17 Pro。模型支持多步推理、结构化工具调用、视觉任务和计算机使用智能体循环，拥有 262K token 上下文窗口，支持推测解码加速。在 15 项基准测试中，三元变体保留全精...", "type": "model", "relTime": "5天前"}, {"id": 166, "title": "Google 在 I/O Connect India 展示由 Tensor SoC 和 TPU 驱动的 Pixel 10 端侧 AI 未来", "source": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/unlocking-the-next-era-of-on-device-ai-with-google-tensor-and-pixel", "date": "2026-07-14T16:51:42.219Z", "summary": "在 Google I/O Connect India 上，Google 展示了由定制 Tensor SoC 和 TPU 驱动的 Pixel 10 系列所支持的 100% 私有端侧 AI 未来。活动首次推出轻量级 Gemma 4 E2B 模型，该模型原生运行于设备端，可实现完全离线的多模态功能，包括 AI 聊天、实时图像识别和个人智能体任务。开发者即日起可通过新发布的 Tensor SDK b...", "type": "model", "relTime": "5天前"}, {"id": 167, "title": "Google 为 25 周年改版图片搜索：用 AI 根据\"独特兴趣\"生成动态画廊", "source": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/google/2026/07/google-revamps-image-search-for-its-25th-anniversary-with-more-images-and-more-ai", "date": "2026-07-14T16:28:14.000Z", "summary": "Google 在其图片搜索上线 25 周年之际推出改版，新版将利用 AI 根据用户的\"独特兴趣\"生成一个持续更新的个性化图片画廊。该功能旨在让搜索结果更贴合个人偏好，而非仅依赖传统关键词匹配。此次更新是 Google 搜索持续融入 AI 能力的一部分，但目前尚未公布具体的技术实现细节、可用地区或上线时间表。", "type": "paper", "relTime": "5天前"}, {"id": 168, "title": "Google 搜索 AI Overviews 集成图像生成功能", "source": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/google-search-now-generates-ai-images-when-it-cant-find-what-youre-looking-for-on-the-web", "date": "2026-07-14T16:20:58.000Z", "summary": "Google 在搜索的 AI Overviews 中直接集成 AI 图像生成功能。当网络不存在匹配图片时，用户可在搜索栏输入文本提示词生成图像。该功能基于 Google 新推出的 Nano Banana 2 Lite 图像模型，优先考虑速度和成本而非质量。未来几周内，所有已支持 AI 模式图像生成的地区将率先上线英文版。此举意味着开放网络的点击量可能减少，AI 生成结果将进一步蚕食图片搜索带...", "type": "model", "relTime": "5天前"}, {"id": 169, "title": "360 AI 研究院 MoSA：让 AI 通过视频运动学习识别物体，无需人工标注", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2077064067102253536", "date": "2026-07-14T16:13:58.000Z", "summary": "360 AI 研究院在 ECCV 2026 发表的 MoSA（Motion-Grounded Segment Anything）论文，提出让 AI 通过视频中物体的运动来学习识别，无需人工标注。该方法从约 10，000 小时无标签视频中自动生成了超过 2，100 万个伪标签，突破了 Meta 的 SAM 模型依赖数百万手工标注图像的限制。MoSA 属于该研究院 H1 2026 系列论文中\"精...", "type": "paper", "relTime": "5天前"}, {"id": 170, "title": "Seedance 实用心得：提示词只需四部分，720p 响应最好", "source": "X：卡兹克 (@Khazix0918)", "sourceUrl": "https://x.com/Khazix0918/status/2077063527467278363", "date": "2026-07-14T16:11:49.000Z", "summary": "卡兹克分享海辛与阿文高强度使用 Seedance 后的心得：X 和小红书上大部分提示词无效。有效 prompt 只需四部分：主体（图生图生成角色参考后 @）、场景（上传场景图）、音乐（只生成音效）、镜头（言简意赅）。其他心得：无需分镜故事板；prompt 非越长越好；不要加时间戳；720p 对提示词响应最好，定稿后用 Topaz 放大到 4K。省下的时间应花在构思分镜和故事上。", "type": "tip", "relTime": "5天前"}, {"id": 171, "title": "Google Images 25周年：推出可浏览图片主页与AI Overviews图像生成功能", "source": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/search/google-images-25th-anniversary", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Images迎来25周年，推出两项新功能：一是全新的可浏览图片主页，展示来自网络的动态沉浸式图片画廊，实时更新并根据用户兴趣智能定制，支持收藏夹标签页，未来几周在美国桌面端英文上线；二是将图像生成直接引入AI Overviews，基于最新的Nano Banana模型，将文本提示词转化为高质量定制图像，未来几周在英文区域逐步推出。回顾了2001年上线、2009年相似图片、2011...", "type": "model", "relTime": "5天前"}, {"id": 172, "title": "Google Images 改版：类似 Pinterest 的动态画廊与 AI 图像生成", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/14/google-images-gets-a-pinterest-like-redesign-focused-on-discovery", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Images 迎来重大改版，界面转向类似 Pinterest 的可浏览动态画廊，新增\"For You\"个性化推荐和\"collections\"收藏功能，旨在将图片搜索变为发现与灵感平台。同时，Google 在 AI Overviews 中直接集成图像生成能力，基于最新的 Nano Banana 模型将文本提示词转化为定制图像，帮助用户可视化房间装修等创意。桌面端英文版改版将在未来...", "type": "model", "relTime": "5天前"}, {"id": 173, "title": "Google Research 揭示扩散模型创造力的数学根源：分数平滑导致数据插值", "source": "Google Research：Blog（网页）", "sourceUrl": "https://research.google/blog/towards-demystifying-the-creativity-of-diffusion-models", "date": "2026-07-14T16:00:00.000Z", "summary": "Google Research 在 ICLR 2026 发表的论文证明，扩散模型的创造力并非偶然，而是神经网络训练中\"分数平滑\"的数学结果。正则化使神经网络学习到训练数据分数函数的平滑近似，导致去噪过程在训练数据点之间插值，从而生成新颖样本。实验表明，即使不显式使用权重衰减，梯度下降算法的隐式正则化也能产生分数平滑效应。", "type": "paper", "relTime": "5天前"}, {"id": 174, "title": "黑芝麻智能与百度智能云深化合作，加速智能驾驶研发体系升级", "source": "公众号：百度智能云（文心）", "sourceUrl": "https://mp.weixin.qq.com/s/8lgLKpfQf01rcefYopZKEg", "date": "2026-07-14T15:36:58.000Z", "summary": "黑芝麻智能与百度智能云在WAIC 2026上宣布深化合作，依托百度百舸·AI计算平台打造智能算力底座，支持智能驾驶模型训练、多模态模型开发及大模型推理。双方合作旨在提升模型训练与推理效率，加速车规级计算芯片研发及算法迭代。百度智能云在2025年自动驾驶研发解决方案市场以7.54亿元份额排名第一。", "type": "industry", "relTime": "5天前"}, {"id": 175, "title": "Kimi K3 预计明日发布，K2.6 开源模型表现强劲", "source": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2077049588356178269", "date": "2026-07-14T15:16:26.000Z", "summary": "Kimi K3 预计于 7 月 15 日发布，Kimi 开放平台已提前上线限时充值活动。K2.6 作为开源模型，支持 256K 上下文和原生视觉，可生成全栈应用并协调多达 300 个子智能体。其在长会话、工具调用可靠性及成本控制上表现突出：月之暗面展示过持续 12-13 小时的自主编码，Vercel 报告 Next.js 基准测试提升超 50%，CodeBuddy 工具调用成功率达 96.6...", "type": "tip", "relTime": "5天前"}, {"id": 176, "title": "商汤 SenseTime 发布 SenseNova Token Plan 限时免费试用", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2077045462088163355", "date": "2026-07-14T15:00:02.000Z", "summary": "商汤 SenseTime 推出 SenseNova Token Plan，新用户首月每 5 小时可获每个模型 1，500 次免费 API 调用。该计划包含 SenseNova-Skills 办公自动化技能套件（兼容主流 Agent 框架与开源工具，支持图像生成、PPT 制作、多维数据分析与研究）、原生多模态架构的 SenseNova 6.7 Flash-Lite（可直接解析网页、文档与金融图...", "type": "model", "relTime": "5天前"}, {"id": 177, "title": "Cola 全新改版，转型沉浸式桌面 AI 搭档", "source": "X：Oran Ge (@oran_ge)", "sourceUrl": "https://x.com/oran_ge/status/2077010664221270242", "date": "2026-07-14T12:41:45.000Z", "summary": "Cola 完成重大改版，从传统 Chat 转型为沉浸式桌面 AI 搭档。新版本包含四大核心功能：1）Chat 支持长期记忆与全新文件交付面板；2）Coding 提供专业多项目多任务并行界面；3）技能中心精选 PPT、网页、设计、视频等 Skills，每日更新推荐；4）觉知（原心迹）优化并新增金句卡片生成。机制上，切换模型不再清空上下文。内置模型即将升级，更超值的 Token Plan 也在研...", "type": "model", "relTime": "5天前"}, {"id": 178, "title": "用好Seedance做AI视频的心得技巧", "source": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weix een 分项上达到 76.6% 成功率，比最佳单摄像头方案高 9.7 个百分点。模型采用\"指向\"决策方法预测目标图像坐标，目标出视野时回退到位移指令。训练数据...", "type": "model", "relTime": "5天前"}, {"id": 187, "title": "SSD：空间推测解码加速自回归图像生成", "source": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2076929618280661101", "date": "2026-07-14T07:19:43.000Z", "summary": "新方法 Spatially Speculative Decoding （SSD） 通过并行预测图像行，将自回归图像模型加速最高 13.28 倍。SSD 不逐个预测 token，而是利用附近空间信息整行草拟。它添加小型辅助网络，可同时向右和向下查看，预测更易学习的内部特征而非精确视觉 token 标签。主模型并行审查每个草拟块并纠正错误。Janus-Pro、Lumina-mGPT 和 Emu3...", "type": "paper", "relTime": "5天前"}, {"id": 188, "title": "蚂蚁集团推出 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-9B-GGUF", "date": "2026-07-14T04:06:31.000Z", "summary": "蚂蚁集团 AI 安全实验室发布 SingGuard-NSFA，一种结合生成式推理与轻量分类头的双模式护栏框架，用于检测智能体操作威胁。四个模型尺寸（0.8B/2B/4B/9B）均基于 Qwen3.5 微调，在多语言基准上 F1 超过 94%，比最强竞品高出 6-12 个绝对 F1 点。实时分类模式在单张 A100 GPU 上每样本仅需约 45-57 毫秒。", "type": "model", "relTime": "6天前"}, {"id": 189, "title": "腾讯元宝发布\"办事大厅\"使用指南，覆盖旅行规划、修图、总结等九大委托场景", "source": "公众号：腾讯元宝", "sourceUrl": "https://mp.weixin.qq.com/s/egmzYMcM7q1hdSFvZ6JmIg", "date": "2026-07-14T04:00:00.000Z", "summary": "腾讯元宝发布《元宝办事大厅使用指南》，针对用户高频需求推出九类委托场景。用户可通过一句话指令完成旅行攻略制定、图片修图（如去路人）、减肥计划生成、运势查询与起名、多链接内容总结（Hy3 模型支持）、学习计划制定、外语翻译（支持微信元宝好友）、歌曲识别以及长视频总结。指南强调所有功能均通过自然语言对话完成，并鼓励用户分享更多宝藏功能。", "type": "tip", "relTime": "6天前"}, {"id": 190, "title": "蚂蚁集团推出 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-4B-GGUF", "date": "2026-07-14T03:55:11.000Z", "summary": "蚂蚁集团 AI 安全实验室发布 SingGuard-NSFA，一个结合生成式推理与轻量分类头的双模式护栏框架，用于检测提示注入、敏感信息窃取等 Agent 操作威胁。四个模型尺寸（0.8B-9B）均基于 Qwen3.5 微调，在自建多语言基准上 F1 超过 94%，比最强竞品高出 6-12 个绝对 F1 点，实时检测延迟约 50 毫秒。模型以 Apache 2.0 许可证开源。", "type": "model", "relTime": "6天前"}, {"id": 191, "title": "蚂蚁集团发布 SingGuard-NSFA 双模式护栏框架", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-2B-GGUF", "date": "2026-07-14T03:46:45.000Z", "summary": "蚂蚁集团发布 SingGuard-NSFA，一种保护 AI 智能体系统免受提示注入、敏感信息窃取等威胁的双模式护栏框架。该框架结合基于 SFT 的生成式推理（用于可解释离线审计）和轻量级判别分类头（约 50 毫秒实时检测），提供 0.8B 至 9B 四种模型尺寸，在专用多语言基准测试中 F1 均超 94%，比最强竞品高 6-12 个绝对 F1 点。", "type": "model", "relTime": "6天前"}, {"id": 192, "title": "蚂蚁集团发布 SingGuard-NSFA：面向智能体 AI 的双模式护栏框架，支持生成式推理与实时分类", "source": "蚂蚁 inclusionAI：HuggingFace 新模型", "sourceUrl": "https://huggingface.co/inclusionAI/SingGuard-NSFA-0.8B-GGUF", "date": "2026-07-14T03:41:47.000Z", "summary": "蚂蚁集团 AI 安全实验室推出 SingGuard-NSFA，一个基于 NSFA 分类法（覆盖 185 种风险变体）的双模式护栏框架，用于检测提示注入、敏感信息窃取等智能体操作威胁。", "type": "paper", "relTime": "6天前"}, {"id": 193, "title": "阿里云EMR StarRocks发布多模态混合检索引擎", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2076852043210277270", "date": "2026-07-14T02:11:27.000Z", "summary": "阿里云EMR Serverless StarRocks推出湖仓多模态混合检索功能，统一全文、向量与标量搜索于单一SQL引擎。支持直接查询Paimon/Iceberg/Lance等湖格式，无需数据迁移；通过列级写入更新嵌入向量或标签；内置SQL AI函数生成嵌入向量。Serverless架构按查询付费。适用于自动驾驶场景挖掘、RAG知识库及多模态电商搜索等场景。", "type": "paper", "relTime": "6天前"}, {"id": 194, "title": "特斯拉正开发轮椅无障碍自动驾驶汽车", "source": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/976/289.htm", "date": "2026-07-14T01:21:54.000Z", "summary": "特斯拉高级政策顾问英迪娅·赫德曼在华盛顿特区听证会上证实，公司正在得州开发一款专门面向轮椅乘客的自动驾驶汽车，旨在解决无障碍接送服务不便的问题。现有自动驾驶车队采用Model Y，轮椅乘客无法直接使用；Cybercab虽有无障碍设计，但同样无法让轮椅直接进入车内。特斯拉去年已在Robotaxi应用中增加无障碍出行入口，但当前仅引导至其他服务商。美国目前尚无无人驾驶出租车公司能为轮椅乘客提供全...", "type": "industry", "relTime": "6天前"}, {"id": 195, "title": "Uber 产品负责人谈酒店预订、自动驾驶出租车及公司为何不想成为\"万能应用\"", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/ubers-product-chief-on-hotels-robotaxis-and-why-the-company-doesnt-want-to-be-everything-for-everyone", "date": "2026-07-14T00:45:00.000Z", "summary": "Uber 首席产品官 Sachin Kansal 透露，Uber 正通过与 Expedia 合作推出酒店预订、欧洲船艇租赁及\"shop for me\"代购服务，将旅行定位为继出行与外卖后的第三大业务支柱。Uber 已成立六个月的新业务部门 AV Labs，开发配备传感器的车队以采集驾驶数据，强化与 Waymo 等自动驾驶合作伙伴的关系并保留自身筹码。Uber Pro 借记卡面向司机与骑手开放...", "type": "tip", "relTime": "6天前"}, {"id": 196, "title": "商汤开源 SenseNova-Vision-7B-MoT 多任务视觉模型", "source": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2076828658531262619", "date": "2026-07-14T00:38:32.000Z", "summary": "商汤发布并完全开源 SenseNova-Vision-7B-MoT，一个统一处理检测、OCR、GUI、深度与法线估计、分割、多视图等主要视觉任务的模型。该模型支持通过自然语言定义新的视觉任务变体，跨传统任务边界重组视觉能力。开源内容包括模型权重及 SenseNova-Vision Corpus（含 5000 万示例子集及复现剩余公开数据的完整工具包）。", "type": "model", "relTime": "6天前"}, {"id": 197, "title": "视频生成创企 PixVerse 完成 4.39 亿美元 C 轮扩展融资，估值超 20 亿美元", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/video-generation-startup-pixverse-raises-439m-valuation-soars-past-2b", "date": "2026-07-14T00:00:00.000Z", "summary": "新加坡视频生成初创公司 PixVerse 完成 C 轮扩展融资，共筹集 4.39 亿美元，估值突破 20 亿美元。公司提供 V 系列（消费者及 API）、C 系列（专业影视）及今年初发布的 R 系列世界模型（游戏开发）。用户可生成最高 4k 分辨率并自带音频的视频，消费端注册用户超 1.5 亿，月活超 1500 万，图生视频每分钟 4.80 美元。本轮投资者包括阿里巴巴等。公司计划今年推出新...", "type": "industry", "relTime": "6天前"}, {"id": 198, "title": "RINO：让RGB成为视觉的通用语言--统一视觉任务为RGB图像编辑问题", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12450", "date": "2026-07-14T00:00:00.000Z", "summary": "一项新研究提出RINO（RGB In and RGB Out）框架，将掩码、深度图等各类结构化视觉信号统一表示为RGB图像，并将分割、深度估计、姿态生成等视觉任务转化为通用的RGB到RGB图像编辑问题。该模型基于通用图像编辑骨干，无需任务特定微调即可在零样本条件下完成密集理解与条件生成任务，性能具有竞争力。代码已开源。", "type": "paper", "relTime": "6天前"}, {"id": 199, "title": "SIS-Bench 发布：首个评估无人机具身智能中自我意识与空间认知的基准", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12477", "date": "2026-07-14T00:00:00.000Z", "summary": "研究团队推出 SIS-Bench，一个专门评估无人机（UAV）场景下具身空间智能的基准。该基准包含来自 1，646 段真实无人机视频的 4，856 个问答对，覆盖 13 项任务，从感知、记忆与推理三个层级评估空间与自我两个维度。评测发现当前多模态大语言模型（MLLM）在建模动态与智能体中心过程上存在根本局限，空间认知与自我意识间存在明显失衡。", "type": "paper", "relTime": "6天前"}, {"id": 200, "title": "AffectFlow-DINO：基于条件整流流的不确定性感知多任务情感估计", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13250", "date": "2026-07-14T00:00:00.000Z", "summary": "AffectFlow-DINO 用条件整流流头替代确定性架构，从静态人脸图像联合估计效价-唤醒度、分类八种表情并检测十二个动作单元。整流流解码将效价-唤醒度 CCC-V 提升 0.058，后验阈值校准使 Fear 类识别率从 3.8% 恢复至 33.1%，最终 P_MTL 达 1.177，远超官方基线 0.45。", "type": "paper", "relTime": "6天前"}, {"id": 201, "title": "Boogu-Image-0.1 发布：开源统一多模态理解与生成模型，训练成本仅约 40 万美元", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13125", "date": "2026-07-14T00:00:00.000Z", "summary": "Boogu-Image-0.1 系列开源统一多模态理解与生成模型发布，包含 Base、Turbo、Edit 和 Edit-Turbo 四个变体，支持高质量文生图、快速推理、指令编辑及中英双语文本渲染。", "type": "model", "relTime": "6天前"}, {"id": 202, "title": "ShortOPD：用短到长在线策略蒸馏恢复剪枝后的大语言模型", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13124", "date": "2026-07-14T00:00:00.000Z", "summary": "ShortOPD提出一种短到长的在线策略蒸馏调度，通过检测并跳过教师模型确认的重复后缀，仅对有效前缀进行训练，从而恢复结构化剪枝后的大语言模型。在数学、代码和开放生成任务中，该方法将压缩模型得分提升至未恢复时的约9倍，是标准恢复方法的1.6-4.4倍，且仅用固定8192-token rollout四分之一的训练时间（8.5小时 vs. 35.9小时）即达到相近效果。", "type": "paper", "relTime": "6天前"}, {"id": 203, "title": "UniVR：在视觉空间中思考，实现统一视觉推理", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.12800", "date": "2026-07-14T00:00:00.000Z", "summary": "UniVR 首次探索从纯视觉演示中同时学习复杂推理、细粒度物理动力学和长期规划。其核心 VR-GRPO 是一种强化学习范式，通过全局和步骤级互补奖励确保推理过程的逻辑连贯性与物理一致性，无需任务特定启发式或图文对。在包含 16 个来源的 VR-X 基准上，UniVR 取得最高 25% 的提升，并提升了多项多模态理解基准的性能，所有代码、数据和模型均已开源。", "type": "paper", "relTime": "6天前"}, {"id": 204, "title": "自校正耦合马尔可夫跳跃过程（SC-CMJP）框架", "source": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2607.13188", "date": "2026-07-14T00:00:00.000Z", "summary": "研究团队提出SC-CMJP框架，让Masked Diffusion Models在生成时通过跨模态注意力实时交换置信度，并在证据冲突时撤回承诺。基于该框架的CO2Jump无需训练，在图像理解、编辑及视觉推理任务上取得最佳联合性能，且性能随去噪步数单调提升。团队将发布JEdit-1M、JMaze-200K、JNono-200K三个大规模联合多模态语料库及基准。", "type": "paper", "relTime": "6天前"}, {"id": 205, "title": "Hermes 智能体开发商 Nous Research 正以 15 亿美元估值完成新一轮融资", "source": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/07/13/hermes-agent-maker-nous-resear
